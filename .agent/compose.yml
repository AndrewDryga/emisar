# Sibling services for the agent box. `coop up` starts them (and every box
# launch auto-ups them); the box reaches each by its service name over the
# coop network — portal's config picks that up via PGHOST=db, which
# Dockerfile.agent bakes into the box image (host dev keeps localhost).
# Dev data is throwaway — it lives in a named volume.
#
# postgres:18-alpine tracks prod's Cloud SQL major (POSTGRES_18, infra/db.tf)
# and CI (.github/workflows/ci.yml), so the box tests against what prod runs.
# `mix test` creates + migrates emisar_test itself (the ecto.create test alias).
services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: emisar_dev
    volumes: ["pgdata:/var/lib/postgresql"]  # postgres:18 mounts the parent; data goes in a version subdir
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 3s
      retries: 15
volumes:
  pgdata:
