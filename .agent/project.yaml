# coop project conemisar is the MCP server that connects Claude, Cursor, ChatGPT — any AI agent — to your production infrastructure — committed with the repo (unlike the rest of .agent/).

# Monorepo members: coop aggregates each one's .agent/tasks queue automatically,
# so you never hand-maintain COOP_TASKS.
subprojects:
  - mcp
  - packs
  - portal
  - runner

# Ports a dev server in the box listens on — coop publishes each to a stable host
# port so you can open it in your browser (bind the server to 0.0.0.0 in the box):
# serve:
#   ports: [5173]
