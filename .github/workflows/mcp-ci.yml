name: MCP bridge CI

# CI for the Go MCP stdio↔HTTP bridge. Same security posture as
# runner-ci.yml: read-only token, third-party actions SHA-pinned and
# first-party `actions/*` tracked at major-version tags, no secrets.

on:
  pull_request:
    branches: [main]
    paths:
      - "mcp/**"
      - "install-mcp.sh"
      - "go.work"
      - "go.work.sum"
      - ".github/workflows/mcp-ci.yml"
  push:
    branches: [main]
    paths:
      - "mcp/**"
      - "install-mcp.sh"
      - "go.work"
      - "go.work.sum"
      - ".github/workflows/mcp-ci.yml"

concurrency:
  group: mcp-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: vet + gofmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-go@v5
        with:
          go-version-file: mcp/go.mod
          cache: true
          cache-dependency-path: mcp/go.sum

      - run: cd mcp && go vet ./...

      - name: gofmt -s check
        run: |
          diff=$(gofmt -d -s mcp/ | head -200)
          if [ -n "$diff" ]; then
            echo "::error::gofmt diff (run 'gofmt -w -s mcp/'):"
            echo "$diff"
            exit 1
          fi

      - run: cd mcp && go mod verify

      - name: go mod tidy is up to date
        working-directory: mcp
        run: |
          go mod tidy
          if ! git diff --exit-code -- go.mod go.sum; then
            echo "::error::mcp/go.mod or go.sum are not tidy. Run 'cd mcp && go mod tidy' and commit."
            exit 1
          fi

      - name: shellcheck install-mcp.sh
        # install-mcp.sh is a permanent part of the install surface;
        # if it's gone, that's a regression we want CI to flag.
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          shellcheck install-mcp.sh
          bash -n install-mcp.sh

      - name: govulncheck
        # Same posture as runner-ci: surface findings as a warning,
        # don't block unrelated PRs. Pinned version (not @latest).
        working-directory: mcp
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          if ! govulncheck ./...; then
            echo "::warning::govulncheck reported findings — review and update deps"
          fi

  test:
    name: test (race)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-go@v5
        with:
          go-version-file: mcp/go.mod
          cache: true
          cache-dependency-path: mcp/go.sum

      - run: cd mcp && go test -race -count=1 ./...

  build:
    name: build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-go@v5
        with:
          go-version-file: mcp/go.mod
          cache: true
          cache-dependency-path: mcp/go.sum

      - name: build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          (cd mcp && go build -trimpath -ldflags "-s -w" -o ../dist/emisar-mcp .)
          file dist/emisar-mcp || true
          ls -la dist/
