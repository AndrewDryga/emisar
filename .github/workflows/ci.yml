name: CI

# Reusable validation for pull requests and main-branch delivery. CD calls this
# exact file from the same commit, so the image it publishes is the image these
# jobs built and smoke-tested. The `changes` job computes which areas the diff
# touches with plain git (no third-party path-filter action to trust), and each
# area job runs only when selected.
#
# Two properties this buys over per-workflow `paths:` filters:
#
#   * A skipped area REPORTS as a skipped job, so if a check is ever marked
#     required under branch protection, an untouched area satisfies it —
#     with `paths:` the workflow never runs and the required check hangs
#     "Expected" forever.
#   * One file owns the CI security posture instead of six copies.
#
# Security posture (carried over from the workflows this replaces):
#
#   * GITHUB_TOKEN is read-only. Delivery permissions and secrets exist only in
#     cd.yml; pull-request code cannot reach them.
#   * `actions/checkout` always runs with `persist-credentials: false`.
#   * Every action — first-party included — is pinned to a full commit SHA
#     (the version tag rides along as a comment); an org-level setting
#     enforces this repo-wide.
#   * External tools (terraform, tflint, actionlint) are installed at a
#     pinned version AND checksum-verified before use; Go tools are
#     version-pinned `go install`s.
#   * Caches key on lockfiles; a PR's cache writes are ref-scoped by GitHub
#     Actions, so a malicious PR can't poison what main restores.

on:
  pull_request:
    branches: [main]
  workflow_call:
    outputs:
      portal_release:
        description: Whether CD must publish the tested portal image.
        value: ${{ jobs.changes.outputs.portal_release }}
      packs_release:
        description: Whether CD must publish the pack registry.
        value: ${{ jobs.changes.outputs.packs_release }}

# Cancel obsolete PR revisions. A reusable main call uses its caller's run ID,
# so separate CD runs never cancel one another.
concurrency:
  group: ci-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  changes:
    name: Select checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      portal: ${{ steps.detect.outputs.portal }}
      packs: ${{ steps.detect.outputs.packs }}
      infra: ${{ steps.detect.outputs.infra }}
      deps: ${{ steps.detect.outputs.deps }}
      workflows: ${{ steps.detect.outputs.workflows }}
      mcp_listing: ${{ steps.detect.outputs.mcp_listing }}
      go_modules: ${{ steps.detect.outputs.go_modules }}
      portal_release: ${{ steps.detect.outputs.portal_release }}
      packs_release: ${{ steps.detect.outputs.packs_release }}
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          # Full history: PR diffs use the merge-base, push diffs the
          # pushed-over commit.
          fetch-depth: 0

      - id: detect
        env:
          EVENT: ${{ github.event_name }}
          BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: .github/scripts/select-ci.sh "$EVENT" "$BASE"

      - name: Enforce frozen migration history
        env:
          EVENT: ${{ github.event_name }}
          BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: .github/scripts/check-frozen-migrations.sh "$EVENT" "$BASE"

  portal:
    name: Portal - Test
    needs: changes
    if: needs.changes.outputs.portal == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    services:
      postgres:
        # Track prod's Cloud SQL major (POSTGRES_18, infra/db.tf) so the
        # suite runs against what production runs.
        image: &postgres-image postgres:18-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: emisar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: portal

    env:
      MIX_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost/emisar_test
      # Hex's native release-age cooldown (hex >= 2.5). Mostly a no-op here —
      # lock-pinned versions bypass it by design — but any resolution CI does
      # perform can't pick up a release younger than the policy window. The
      # dep-age job enforces the same windows on the lock diff itself.
      HEX_COOLDOWN: 7d

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1.24.1
        with:
          # Pinned in /.tool-versions (repo root) — the single source of
          # truth shared with local asdf, so CI can't drift from dev.
          # setup-beam resolves version-file against GITHUB_WORKSPACE and
          # requires version-type: strict.
          version-file: .tool-versions
          version-type: strict

      - name: Restore Elixir build cache
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            portal/deps
            portal/_build
          key: ${{ runner.os }}-${{ runner.arch }}-mix-${{ hashFiles('.tool-versions', 'portal/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-mix-

      - name: Install Hex and Rebar
        env:
          HEX_VERSION: "2.5.1"
          REBAR3_VERSION: "3.27.0"
          REBAR3_SHA512: 0d00494d849fdc521a55142278d1f6ba552954fbd65b80d40df8022f594f05d6c99ed1d731bc263691a04176e11d4c6e126c56ba20dca19c5e42d4ffab2e7e36
        run: |
          set -euo pipefail
          grep -Fqx "ARG HEX_VERSION=${HEX_VERSION}" Dockerfile
          grep -Fqx "ARG REBAR3_VERSION=${REBAR3_VERSION}" Dockerfile
          grep -Fqx "ARG REBAR3_SHA512=${REBAR3_SHA512}" Dockerfile
          mix local.hex "$HEX_VERSION" --force
          curl -fsSL "https://github.com/erlang/rebar3/releases/download/${REBAR3_VERSION}/rebar3" -o /tmp/rebar3
          printf '%s  %s\n' "$REBAR3_SHA512" /tmp/rebar3 | sha512sum --check --
          mix local.rebar rebar3 /tmp/rebar3 --force

      - name: Fetch locked dependencies
        run: mix deps.get --check-locked

      - name: Compile with warnings as errors
        run: mix compile --warnings-as-errors

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run Credo and Iron Laws
        # The mechanical IL-20 gate: the custom Emisar.Checks.* AST checks
        # (.credo.exs, strict) + stock UnsafeToAtom/NoProcessDictionary —
        # the same `mix credo` an agent runs locally.
        run: mix credo

      - name: Audit dependencies
        # emisar is a security product — fail the build on a known advisory.
        # cowlib 2.18.0 is current and has no upstream patch. Its affected
        # response-header encoder is used only by the internal Prometheus
        # listener, which emits fixed headers and is blocked by the GCP
        # firewall. Keep the exact IDs visible until an upstream fix lands.
        run: >-
          mix deps.audit --ignore-advisory-ids
          GHSA-g2wm-735q-3f56,EEF-CVE-2026-43966

      - name: Scan Phoenix security
        # Static analysis of the Phoenix surface (XSS, SQLi, command
        # injection, CSRF, insecure config). Threshold + ignores live in
        # apps/emisar_web/.sobelow-conf.
        run: mix sobelow --root apps/emisar_web --config

      - name: Check compile-cycle budget
        # Keep the xref budget gate without dumping the known cycle into
        # normal CI output; print the report only when the budget breaks.
        run: |
          if ! output="$(cd apps/emisar && mix xref.cycles 2>&1)"; then
            echo "$output"
            exit 1
          fi

      - name: Run ExUnit suites
        # Runs both portal test suites and fails if the output contains
        # compiler warnings, Logger warning/error lines, or async DB teardown
        # noise. Dirty test output is a regression: fix the source, don't hide it.
        run: ../.agent/scripts/check-portal-test-output.sh

  mcp-listing:
    name: Portal - MCP Registry Listing
    needs: changes
    if: needs.changes.outputs.mcp_listing == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Validate registry listing
        run: |
          set -euo pipefail
          .github/scripts/install-mcp-publisher.sh ./mcp-publisher
          ./mcp-publisher validate server.json

  portal-image:
    name: Portal - Image
    needs: changes
    if: needs.changes.outputs.portal == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    services:
      postgres:
        image: *postgres-image
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: emisar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Read release toolchain
        id: release-toolchain
        run: |
          elixir_version=$(awk '$1=="elixir"{split($2,a,"-otp-"); print a[1]}' .tool-versions)
          otp_version=$(awk '$1=="erlang"{print $2}' .tool-versions)
          if [ -z "$elixir_version" ] || [ -z "$otp_version" ]; then
            echo "::error::Could not parse Elixir and OTP versions from .tool-versions"
            exit 1
          fi
          echo "elixir=${elixir_version}" >> "$GITHUB_OUTPUT"
          echo "otp=${otp_version}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build release image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: portal/Dockerfile
          load: true
          tags: emisar/portal:ci
          build-args: |
            ELIXIR_VERSION=${{ steps.release-toolchain.outputs.elixir }}
            OTP_VERSION=${{ steps.release-toolchain.outputs.otp }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=portal-release
          cache-to: type=gha,mode=max,scope=portal-release

      - name: Smoke-test release image
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost/emisar_smoke
          SECRET_KEY_BASE: smoke-key-base-64-chars-of-non-secret-text-aaaaaaaaaaaaaaaaaaaaaaa
          PHX_HOST: localhost
          PORT: "4000"
          EMISAR_DISABLE_BILLING: "1"
          # Validate the catalog bundled in this image. The published pointer can
          # still name the previous pack version until CD publishes this commit.
          EMISAR_PACK_CATALOG_URL: ""
          FORCE_SSL: "false"
        run: |
          set -euo pipefail

          PGPASSWORD=postgres psql -h localhost -U postgres -d postgres \
            -c 'CREATE DATABASE emisar_smoke;' >/dev/null

          docker run --rm --network host \
            -e DATABASE_URL -e SECRET_KEY_BASE -e PHX_HOST \
            -e EMISAR_DISABLE_BILLING -e EMISAR_PACK_CATALOG_URL -e FORCE_SSL \
            emisar/portal:ci /app/bin/emisar eval 'Emisar.Release.migrate()'

          cid=$(docker run -d --network host \
            -e DATABASE_URL -e SECRET_KEY_BASE -e PHX_HOST -e PORT \
            -e EMISAR_DISABLE_BILLING -e EMISAR_PACK_CATALOG_URL -e FORCE_SSL \
            emisar/portal:ci)

          cleanup() {
            rc=$?
            trap - EXIT
            if [ "$rc" -ne 0 ]; then
              echo "::group::Portal container logs"
              docker logs "$cid" 2>&1 | tail -80
              echo "::endgroup::"
            fi
            docker rm -f "$cid" >/dev/null 2>&1 || true
            exit "$rc"
          }
          trap cleanup EXIT

          health_error=/tmp/emisar-healthz-error
          for i in $(seq 1 30); do
            if curl -fsS -H 'x-forwarded-proto: https' http://localhost:4000/healthz \
              >/dev/null 2>"$health_error"; then
              echo "healthz OK after ~${i}s"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "::error::Portal image did not become healthy within 60 seconds"
              sed 's/^/last health probe: /' "$health_error"
              exit 1
            fi
            sleep 2
          done

          curl -fsS -H 'x-forwarded-proto: https' http://localhost:4000/readyz >/dev/null || {
            echo "::error::Portal image is live but not ready to serve database-backed traffic"
            exit 1
          }
          echo "readyz OK"

          location=$(curl -fsS -o /dev/null -w '%{redirect_url}' \
            -H 'x-forwarded-proto: https' \
            http://localhost:4000/packs/linux-core/pack.tar.gz)
          pack_version=$(awk -F': ' '$1 == "version" {gsub(/"/, "", $2); print $2; exit}' packs/linux-core/pack.yaml)
          prefix="https://registry.emisar.dev/v1/packs/linux-core/${pack_version}/"
          object=${location#"$prefix"}
          hash=${object%/pack.tar.gz}
          if [ -z "$pack_version" ] || \
            [ "$location" != "${prefix}${hash}/pack.tar.gz" ] || \
            ! [[ "$hash" =~ ^[0-9a-f]{64}$ ]]; then
              echo "::error::Pack endpoint returned an invalid local-catalog redirect: ${location}"
              exit 1
          fi
          curl -fsS -H 'x-forwarded-proto: https' http://localhost:4000/packs.json \
            | grep -q '"linux-core"' \
            || { echo "::error::Pack catalog does not contain linux-core"; exit 1; }
          echo "pack registry endpoints OK"

          docker stop --time 15 "$cid" >/dev/null

      - name: Install Trivy (pinned, checksum-verified)
        env:
          TRIVY_VERSION: "0.72.0"
          TRIVY_SHA256: bbb64b9695866ce4a7a8f5c9592002c5961cab378577fa3f8a040df362b9b2ea
        run: |
          set -euo pipefail
          artifact="trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          curl -fsSLO "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/${artifact}"
          printf '%s  %s\n' "$TRIVY_SHA256" "$artifact" | sha256sum --check --
          tar -xzf "$artifact" trivy
          sudo install -m 0755 trivy /usr/local/bin/trivy

      - name: Scan tested image vulnerabilities
        run: >-
          trivy image --exit-code 1 --severity HIGH,CRITICAL
          --ignorefile .trivyignore.yaml emisar/portal:ci

      - name: Generate tested image SBOM
        run: trivy image --format cyclonedx --output /tmp/emisar-portal.cdx.json emisar/portal:ci

      - name: Export tested image
        if: github.event_name == 'push' && needs.changes.outputs.portal_release == 'true'
        run: |
          set -euo pipefail
          docker save emisar/portal:ci | gzip -1 > /tmp/emisar-portal-image.tar.gz
          test -s /tmp/emisar-portal-image.tar.gz

      - name: Upload tested image
        if: github.event_name == 'push' && needs.changes.outputs.portal_release == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: portal-image-${{ github.sha }}
          path: /tmp/emisar-portal-image.tar.gz
          retention-days: 2
          if-no-files-found: error
          overwrite: true

      - name: Upload tested image SBOM
        if: github.event_name == 'push' && needs.changes.outputs.portal_release == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: portal-sbom-${{ github.sha }}
          path: /tmp/emisar-portal.cdx.json
          retention-days: 2
          if-no-files-found: error
          overwrite: true

  go:
    name: Go - ${{ matrix.module == 'runner' && 'Runner' || matrix.module == 'mcp' && 'MCP' || 'Tools' }}
    needs: changes
    if: needs.changes.outputs.go_modules != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.changes.outputs.go_modules) }}
    env:
      # runner ships install.sh; the mcp bridge ships install-mcp.sh.
      INSTALL_SCRIPT: ${{ matrix.module == 'runner' && 'install.sh' || 'install-mcp.sh' }}
      # Native toolchain pin: a go.mod/go.work `toolchain` directive in a
      # malicious bump could otherwise make the go command download and run a
      # remote toolchain; `local` locks CI to the setup-go-installed one.
      GOTOOLCHAIN: local
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: ${{ matrix.module }}/go.mod
          cache: true
          # Glob: tools/ is deliberately dependency-free (no go.sum).
          cache-dependency-path: ${{ matrix.module }}/go.*

      - name: Check client module boundaries
        # runner/ and mcp/ are CLIENT-SHIPPED modules (self-hosters build and
        # audit them) — repo tooling lives in tools/, never there. packctl is
        # the one sanctioned exception (pack-hash parity; runner/AGENTS.md).
        # Extending either list is a deliberate, reviewed act.
        if: matrix.module != 'tools'
        run: |
          set -euo pipefail
          test "$(ls runner/cmd)" = "packctl" || {
            echo "::error::runner/cmd must contain exactly packctl — repo tooling goes in tools/ (runner/AGENTS.md)"; exit 1; }
          test ! -d mcp/cmd || {
            echo "::error::mcp/ is client-shipped and carries no cmd/ — repo tooling goes in tools/ (runner/AGENTS.md)"; exit 1; }

      - name: Check attestation implementation parity
        if: matrix.module == 'runner' || matrix.module == 'mcp'
        run: |
          .github/scripts/test-check-attest-parity.sh
          .github/scripts/check-attest-parity.sh

      - name: Run go vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...

      - name: Check formatting
        run: |
          diff=$(gofmt -d -s ${{ matrix.module }}/)
          if [ -n "$diff" ]; then
            echo "::error::gofmt diff (run 'gofmt -w -s ${{ matrix.module }}/'):"
            sed -n '1,200p' <<< "$diff"
            exit 1
          fi

      - name: Verify module checksums
        # Verifies hashes in go.sum match the on-disk module bytes; a
        # tampered cache won't pass.
        working-directory: ${{ matrix.module }}
        run: go mod verify

      - name: Check module tidiness
        working-directory: ${{ matrix.module }}
        run: |
          go mod tidy
          if ! git diff --exit-code -- go.mod go.sum; then
            echo "::error::${{ matrix.module }}/go.mod or go.sum are not tidy. Run 'cd ${{ matrix.module }} && go mod tidy' and commit."
            exit 1
          fi

      - name: Check install script
        # The install script is a permanent part of the module's install
        # surface; if it's gone, that's a regression CI must flag. tools/ is
        # internal — it has no install surface.
        if: matrix.module != 'tools'
        env:
          EMISAR_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          shellcheck "$INSTALL_SCRIPT"
          bash -n "$INSTALL_SCRIPT"
          .github/scripts/smoke-installers.sh "${{ matrix.module }}"

      - name: Scan known vulnerabilities
        # govulncheck reports reachable vulnerable symbols, not merely a module
        # version. A reachable finding in client-shipped security code blocks.
        working-directory: ${{ matrix.module }}
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          govulncheck ./...

      - name: Run staticcheck
        # Blocking (unlike govulncheck): dead code / SA findings fail CI so
        # the Go audit's clean reading can't silently regress. Pinned.
        working-directory: ${{ matrix.module }}
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@2026.1
          staticcheck ./...

      - name: Run race tests with coverage
        working-directory: ${{ matrix.module }}
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Check repository documentation
        if: matrix.module == 'tools'
        working-directory: tools
        run: go run ./cmd/doccheck

      - name: Summarize coverage
        if: always()
        working-directory: ${{ matrix.module }}
        run: |
          go tool cover -func=coverage.out | tail -50
          total=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}')
          echo "**Go - ${{ matrix.module }}** coverage: ${total}" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.module }}-coverage
          path: ${{ matrix.module }}/coverage.out
          retention-days: 7
          overwrite: true

      - name: Cross-build release and development platforms
        # One loop instead of a matrix: proves every release target still
        # compiles without burning a runner per target. Windows is compile-only
        # (not published) so non-Linux fallbacks cannot silently rot. tools/ is
        # never shipped, so it has no platform set to prove.
        if: matrix.module != 'tools'
        working-directory: ${{ matrix.module }}
        env:
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            GOOS="${target%/*}" GOARCH="${target#*/}" go build -trimpath -ldflags "-s -w" -o /dev/null .
            echo "ok: $target"
          done

  packs:
    name: Packs - Validate
    needs: changes
    if: needs.changes.outputs.packs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Same toolchain pin as the go job (see its comment).
      GOTOOLCHAIN: local
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: runner/go.mod
          cache: true
          cache-dependency-path: runner/go.sum

      - name: Build emisar CLI
        run: |
          cd runner
          go build -trimpath -o /tmp/emisar .
          /tmp/emisar version

      - name: Validate every pack
        # Collect failures so the report names every bad pack instead of
        # bailing on the first — faster PR triage. `nullglob` + an explicit
        # floor: an empty packs/ must fail loudly, not masquerade as green.
        run: |
          set -euo pipefail
          shopt -s nullglob

          packs=(packs/*/)
          if [ ${#packs[@]} -lt 1 ]; then
            echo "::error::no packs found under packs/ — did the layout change?"
            exit 1
          fi

          failures=()
          for pack in "${packs[@]}"; do
            pack="${pack%/}"
            name="$(basename "$pack")"
            printf '\n\033[1m==> %s\033[0m\n' "$name"
            if ! /tmp/emisar pack validate "$pack"; then
              failures+=("$name")
            fi
          done

          if [ ${#failures[@]} -gt 0 ]; then
            printf '\n\033[1;31m✗ packs failed validation:\033[0m\n'
            printf '   - %s\n' "${failures[@]}"
            exit 1
          fi

          printf '\n\033[1;32m✓ all %d packs valid\033[0m\n' "${#packs[@]}"
          echo "✅ all ${#packs[@]} packs valid" >> "$GITHUB_STEP_SUMMARY"

  infra:
    name: Terraform - Validate
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TFLINT_VERSION: v0.63.1
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install Terraform (version from .tool-versions, checksum-verified)
        run: |
          ver="$(awk '/^terraform /{print $2}' .tool-versions)"
          test -n "$ver" || { echo "::error::no terraform pin in .tool-versions"; exit 1; }
          tmp="$(mktemp -d)" && cd "$tmp"
          base="https://releases.hashicorp.com/terraform/${ver}"
          curl -fsSLO "${base}/terraform_${ver}_linux_amd64.zip"
          curl -fsSLO "${base}/terraform_${ver}_SHA256SUMS"
          grep " terraform_${ver}_linux_amd64.zip$" "terraform_${ver}_SHA256SUMS" | sha256sum -c -
          unzip -q "terraform_${ver}_linux_amd64.zip"
          sudo install -m 0755 terraform /usr/local/bin/terraform
          terraform version

      - name: Install TFLint (pinned, checksum-verified)
        run: |
          tmp="$(mktemp -d)" && cd "$tmp"
          base="https://github.com/terraform-linters/tflint/releases/download/${TFLINT_VERSION}"
          curl -fsSLO "${base}/tflint_linux_amd64.zip"
          curl -fsSLO "${base}/checksums.txt"
          grep " tflint_linux_amd64.zip$" checksums.txt | sha256sum -c -
          unzip -q tflint_linux_amd64.zip
          sudo install -m 0755 tflint /usr/local/bin/tflint
          tflint --version

      - name: Check Terraform formatting
        working-directory: infra
        run: terraform fmt -check -recursive

      - name: Validate Terraform
        working-directory: infra
        run: |
          terraform init -backend=false -input=false
          terraform validate

      - name: Run TFLint
        working-directory: infra
        run: tflint

      - name: Validate rendered cloud-init and shell
        run: |
          sudo apt-get update
          sudo apt-get install -y cloud-init shellcheck
          infra/scripts/validate-templates.sh

  dep-age:
    name: Dependencies - Release age
    needs: changes
    if: needs.changes.outputs.deps == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          # Need the base commit in history to diff lockfile versions against.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: tools/go.mod
          cache: true
          cache-dependency-path: tools/go.*

      - name: Enforce dependency release age
        # Supply-chain enforcement: reject a bump to a version published more
        # recently than its release-age window. Dependabot's cooldown only
        # throttles Dependabot's own PRs; this gate covers supported Hex, Go,
        # and npm manifest changes. Terraform providers deliberately rely on
        # Dependabot cooldown plus review of the resulting Terraform plan.
        # PR: diff against the PR base. Push to main: diff against the prior
        # tip. The gate's own logic is tested by the Go - Tools job whenever
        # tools/cmd/depgate changes.
        working-directory: tools
        env:
          DEP_AGE_BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          GOTOOLCHAIN: local
        run: |
          if [ "$GITHUB_EVENT_NAME" = pull_request ]; then
            DEP_AGE_BASE_REF=$(git merge-base "$DEP_AGE_BASE_REF" HEAD)
            export DEP_AGE_BASE_REF
          fi
          go run ./cmd/depgate check

  actionlint:
    name: Actions - Validate workflows
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      ACTIONLINT_VERSION: "1.7.12"
      ACTIONLINT_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Run actionlint
        # The workflows ARE the supply chain's front door — lint them like
        # code: expression injection, wrong event fields, invalid globs.
        run: |
          set -euo pipefail
          artifact="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          curl -fsSLO "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${artifact}"
          printf '%s  %s\n' "$ACTIONLINT_SHA256" "$artifact" | sha256sum --check --
          tar -xzf "$artifact" actionlint
          ./actionlint -color

      - name: Check workflow shell helpers
        run: shellcheck .github/scripts/*.sh

      - name: Run workflow security regression tests
        run: .github/scripts/ci.test.sh

  ci-gate:
    name: Required - CI
    if: always()
    needs: [changes, portal, portal-image, mcp-listing, go, packs, infra, dep-age, actionlint]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CHANGES: ${{ needs.changes.result }}
      PORTAL: ${{ needs.portal.result }}
      SELECT_PORTAL: ${{ needs.changes.outputs.portal }}
      PORTAL_IMAGE: ${{ needs.portal-image.result }}
      MCP_LISTING: ${{ needs.mcp-listing.result }}
      SELECT_MCP_LISTING: ${{ needs.changes.outputs.mcp_listing }}
      GO: ${{ needs.go.result }}
      GO_MODULES: ${{ needs.changes.outputs.go_modules }}
      PACKS: ${{ needs.packs.result }}
      SELECT_PACKS: ${{ needs.changes.outputs.packs }}
      INFRA: ${{ needs.infra.result }}
      SELECT_INFRA: ${{ needs.changes.outputs.infra }}
      DEP_AGE: ${{ needs.dep-age.result }}
      SELECT_DEP_AGE: ${{ needs.changes.outputs.deps }}
      ACTIONLINT: ${{ needs.actionlint.result }}
      SELECT_ACTIONLINT: ${{ needs.changes.outputs.workflows }}
    steps:
      - name: Verify selected checks
        run: |
          set -euo pipefail
          test "$CHANGES" = success || { echo "::error::Changes ended $CHANGES"; exit 1; }
          require_selected() {
            local gate=$1 selected=$2 result=${!1}
            if [ "$selected" = true ]; then
              test "$result" = success || {
                echo "::error::$gate was selected but ended $result"
                exit 1
              }
            else
              case "$result" in
                success|skipped) ;;
                *) echo "::error::$gate ended $result"; exit 1 ;;
              esac
            fi
          }
          require_selected PORTAL "$SELECT_PORTAL"
          require_selected PORTAL_IMAGE "$SELECT_PORTAL"
          require_selected MCP_LISTING "$SELECT_MCP_LISTING"
          if [ "$GO_MODULES" = '[]' ]; then
            require_selected GO false
          else
            require_selected GO true
          fi
          require_selected PACKS "$SELECT_PACKS"
          require_selected INFRA "$SELECT_INFRA"
          require_selected DEP_AGE "$SELECT_DEP_AGE"
          require_selected ACTIONLINT "$SELECT_ACTIONLINT"
