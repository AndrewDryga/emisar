name: CI / CD

# ONE workflow for per-area CI plus main-branch delivery: Elixir, the Go
# modules, packs, Terraform, dependency age, workflow lint, portal image
# publishing, pack registry publishing, and production planning. The `changes`
# job computes which areas the diff touches with plain git (no third-party
# path-filter action to trust), and each area job runs only when selected.
#
# Two properties this buys over per-workflow `paths:` filters:
#
#   * A skipped area REPORTS as a skipped job, so if a check is ever marked
#     required under branch protection, an untouched area satisfies it —
#     with `paths:` the workflow never runs and the required check hangs
#     "Expected" forever.
#   * One file owns the CI security posture instead of six copies.
#
# Security posture (carried over from the workflows this replaces):
#
#   * Default GITHUB_TOKEN is read-only. Only delivery jobs opt into their
#     explicit write/OIDC scopes; pack publishing remains `release`-gated.
#   * `actions/checkout` always runs with `persist-credentials: false`.
#   * Every action — first-party included — is pinned to a full commit SHA
#     (the version tag rides along as a comment); an org-level setting
#     enforces this repo-wide.
#   * External tools (terraform, tflint, actionlint) are installed at a
#     pinned version AND checksum-verified before use; Go tools are
#     version-pinned `go install`s.
#   * Caches key on lockfiles; a PR's cache writes are ref-scoped by GitHub
#     Actions, so a malicious PR can't poison what main restores.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  changes:
    name: Select checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      portal: ${{ steps.detect.outputs.portal }}
      packs: ${{ steps.detect.outputs.packs }}
      infra: ${{ steps.detect.outputs.infra }}
      deps: ${{ steps.detect.outputs.deps }}
      workflows: ${{ steps.detect.outputs.workflows }}
      mcp_listing: ${{ steps.detect.outputs.mcp_listing }}
      go_modules: ${{ steps.detect.outputs.go_modules }}
      portal_release: ${{ steps.detect.outputs.portal_release }}
      packs_release: ${{ steps.detect.outputs.packs_release }}
      infra_release: ${{ steps.detect.outputs.infra_release }}
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          # Full history: PR diffs use the merge-base, push diffs the
          # pushed-over commit.
          fetch-depth: 0

      - id: detect
        env:
          EVENT: ${{ github.event_name }}
          BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -euo pipefail

          # An unknown base (first push to a branch, force-push, rewritten
          # history) FAILS OPEN: run every area rather than silently skip a
          # gate.
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BASE" 2>/dev/null; then
            files="__run_all__"
          elif [ "$EVENT" = "pull_request" ]; then
            files=$(git diff --name-only "$(git merge-base "$BASE" HEAD)" HEAD)
          else
            files=$(git diff --name-only "$BASE" HEAD)
          fi

          portal=false; runner=false; mcp=false; tools=false; packs=false; infra=false; deps=false; workflows=false; mcp_listing=false
          portal_release=false; packs_release=false; infra_release=false
          while IFS= read -r f; do
            [ -n "$f" ] || continue
            case "$f" in
              __run_all__) portal=true; runner=true; mcp=true; tools=true; packs=true; infra=true; deps=true; workflows=true; mcp_listing=true; portal_release=true; packs_release=true; infra_release=true ;;
            esac
            # install.sh + packs/** are real source inputs to the portal
            # release (InstallController embeds install.sh; PacksRegistry
            # compile-scans packs/); .tool-versions is the single toolchain
            # source of truth for both the test job and the release image.
            case "$f" in
              portal/*|.dockerignore|install.sh|install-mcp.sh|packs/*|.tool-versions) portal=true; portal_release=true ;;
              .agent/scripts/check-portal-test-output.sh) portal=true ;;
            esac
            case "$f" in runner/*|install.sh|README.md|go.work|go.work.sum) runner=true ;; esac
            case "$f" in mcp/*|install-mcp.sh|go.work|go.work.sum) mcp=true ;; esac
            case "$f" in server.json) mcp_listing=true ;; esac
            case "$f" in tools/*|go.work|go.work.sum) tools=true ;; esac
            # Packs re-validate when the packs change OR the validator does.
            case "$f" in
              packs/*|runner/internal/packs/*|runner/pkg/packspec/*|runner/pkg/actionspec/*|runner/pack.go|runner/main.go|runner/go.mod|runner/go.sum|go.work|go.work.sum) packs=true ;;
            esac
            case "$f" in
              packs/*|runner/internal/packs/*|runner/internal/catalog/*|runner/cmd/packctl/*|runner/pkg/packspec/*|runner/pkg/actionspec/*|runner/pack.go|runner/main.go|runner/go.mod|runner/go.sum|go.work|go.work.sum) packs_release=true ;;
            esac
            case "$f" in infra/*) infra=true; infra_release=true ;; .tool-versions) infra=true ;; esac
            case "$f" in
              portal/mix.lock|runner/go.mod|runner/go.sum|mcp/go.mod|mcp/go.sum|tools/go.mod|tools/go.sum|portal/.agent/scripts/package-lock.json|portal/.agent/scripts/package.json|.dep-age-allow|tools/cmd/depgate/*) deps=true ;;
            esac
            case "$f" in .github/workflows/*|.github/dependabot.yml) workflows=true ;; esac
          done <<< "$files"

          # A workflow/dependabot change re-gates every area — the old
          # "own workflow file" trigger, generalized to the shared file.
          if [ "$workflows" = "true" ]; then
            portal=true; runner=true; mcp=true; tools=true; packs=true; infra=true; deps=true; mcp_listing=true
          fi

          mods=()
          if [ "$runner" = "true" ]; then mods+=('"runner"'); fi
          if [ "$mcp" = "true" ]; then mods+=('"mcp"'); fi
          if [ "$tools" = "true" ]; then mods+=('"tools"'); fi
          modules="[$(IFS=,; echo "${mods[*]-}")]"

          {
            echo "portal=$portal"
            echo "packs=$packs"
            echo "infra=$infra"
            echo "deps=$deps"
            echo "workflows=$workflows"
            echo "mcp_listing=$mcp_listing"
            echo "go_modules=$modules"
            echo "portal_release=$portal_release"
            echo "packs_release=$packs_release"
            echo "infra_release=$infra_release"
          } >> "$GITHUB_OUTPUT"

          mark() { if [ "$1" = "true" ]; then echo "run"; else echo "skip"; fi; }
          {
            echo "### Gates for this change"
            echo "| Area | |"
            echo "|---|---|"
            echo "| Portal - Test | $(mark "$portal") |"
            echo "| Portal - Image | $(mark "$portal") |"
            echo "| Go - Runner | $(mark "$runner") |"
            echo "| Go - MCP | $(mark "$mcp") |"
            echo "| Go - Tools | $(mark "$tools") |"
            echo "| Packs - Validate | $(mark "$packs") |"
            echo "| Terraform - Validate | $(mark "$infra") |"
            echo "| Dependencies - Release age | $(mark "$deps") |"
            echo "| Actions - Validate workflows | $(mark "$workflows") |"
            echo "| Portal - MCP Registry Listing | $(mark "$mcp_listing") |"
          } >> "$GITHUB_STEP_SUMMARY"

  portal:
    name: Portal - Test
    needs: changes
    if: needs.changes.outputs.portal == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    services:
      postgres:
        # Track prod's Cloud SQL major (POSTGRES_18, infra/db.tf) so the
        # suite runs against what production runs.
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: emisar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: portal

    env:
      MIX_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost/emisar_test
      # Hex's native release-age cooldown (hex >= 2.5). Mostly a no-op here —
      # lock-pinned versions bypass it by design — but any resolution CI does
      # perform can't pick up a release younger than the policy window. The
      # dep-age job enforces the same windows on the lock diff itself.
      HEX_COOLDOWN: 7d

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1.24.1
        with:
          # Pinned in /.tool-versions (repo root) — the single source of
          # truth shared with local asdf, so CI can't drift from dev.
          # setup-beam resolves version-file against GITHUB_WORKSPACE and
          # requires version-type: strict.
          version-file: .tool-versions
          version-type: strict

      - name: Restore Elixir build cache
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            portal/deps
            portal/_build
          key: ${{ runner.os }}-${{ runner.arch }}-mix-${{ hashFiles('.tool-versions', 'portal/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-mix-

      - name: Install Hex and Rebar
        run: mix local.hex --force && mix local.rebar --force

      - name: Fetch dependencies
        run: mix deps.get

      - name: Compile with warnings as errors
        run: mix compile --warnings-as-errors

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run Credo and Iron Laws
        # The mechanical IL-20 gate: the custom Emisar.Checks.* AST checks
        # (.credo.exs, strict) + stock UnsafeToAtom/NoProcessDictionary —
        # the same `mix credo` an agent runs locally.
        run: mix credo

      - name: Audit dependencies
        # emisar is a security product — fail the build on a known
        # advisory in any dependency. GHSA-g2wm-735q-3f56 (cowlib, low)
        # has no upstream patch yet; ignore it explicitly and revisit
        # when cowlib ships a fix.
        run: mix deps.audit --ignore-advisory-ids GHSA-g2wm-735q-3f56

      - name: Scan Phoenix security
        # Static analysis of the Phoenix surface (XSS, SQLi, command
        # injection, CSRF, insecure config). Threshold + ignores live in
        # apps/emisar_web/.sobelow-conf.
        run: mix sobelow --root apps/emisar_web --config

      - name: Check compile-cycle budget
        # Keep the xref budget gate without dumping the known cycle into
        # normal CI output; print the report only when the budget breaks.
        run: |
          if ! output="$(cd apps/emisar && mix xref.cycles 2>&1)"; then
            echo "$output"
            exit 1
          fi

      - name: Run ExUnit suites
        # Runs both portal test suites and fails if the output contains
        # compiler warnings, Logger warning/error lines, or async DB teardown
        # noise. Dirty test output is a regression: fix the source, don't hide it.
        run: ../.agent/scripts/check-portal-test-output.sh

  mcp-listing:
    name: Portal - MCP Registry Listing
    needs: changes
    if: needs.changes.outputs.mcp_listing == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Validate registry listing
        env:
          MCP_PUBLISHER_VERSION: "1.7.9"
          MCP_PUBLISHER_SHA256: ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac
        run: |
          set -euo pipefail
          artifact="mcp-publisher_linux_amd64.tar.gz"
          curl -fsSLO "https://github.com/modelcontextprotocol/registry/releases/download/v${MCP_PUBLISHER_VERSION}/${artifact}"
          printf '%s  %s\n' "$MCP_PUBLISHER_SHA256" "$artifact" | sha256sum --check --
          tar -xzf "$artifact" mcp-publisher
          ./mcp-publisher validate server.json

  portal-image:
    name: Portal - Image
    needs: changes
    if: needs.changes.outputs.portal == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: emisar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Read release toolchain
        id: release-toolchain
        run: |
          elixir_version=$(awk '$1=="elixir"{split($2,a,"-otp-"); print a[1]}' .tool-versions)
          otp_version=$(awk '$1=="erlang"{print $2}' .tool-versions)
          if [ -z "$elixir_version" ] || [ -z "$otp_version" ]; then
            echo "::error::Could not parse Elixir and OTP versions from .tool-versions"
            exit 1
          fi
          echo "elixir=${elixir_version}" >> "$GITHUB_OUTPUT"
          echo "otp=${otp_version}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build release image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: portal/Dockerfile
          load: true
          tags: emisar/portal:ci
          build-args: |
            ELIXIR_VERSION=${{ steps.release-toolchain.outputs.elixir }}
            OTP_VERSION=${{ steps.release-toolchain.outputs.otp }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=portal-release
          cache-to: type=gha,mode=max,scope=portal-release

      - name: Smoke-test release image
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost/emisar_smoke
          SECRET_KEY_BASE: smoke-key-base-64-chars-of-non-secret-text-aaaaaaaaaaaaaaaaaaaaaaa
          PHX_HOST: localhost
          PORT: "4000"
          EMISAR_DISABLE_BILLING: "1"
          FORCE_SSL: "false"
        run: |
          set -euo pipefail

          PGPASSWORD=postgres psql -h localhost -U postgres -d postgres \
            -c 'CREATE DATABASE emisar_smoke;' >/dev/null

          docker run --rm --network host \
            -e DATABASE_URL -e SECRET_KEY_BASE -e PHX_HOST \
            -e EMISAR_DISABLE_BILLING -e FORCE_SSL \
            emisar/portal:ci /app/bin/emisar eval 'Emisar.Release.migrate()'

          cid=$(docker run -d --network host \
            -e DATABASE_URL -e SECRET_KEY_BASE -e PHX_HOST -e PORT \
            -e EMISAR_DISABLE_BILLING -e FORCE_SSL \
            emisar/portal:ci)

          cleanup() {
            rc=$?
            trap - EXIT
            if [ "$rc" -ne 0 ]; then
              echo "::group::Portal container logs"
              docker logs "$cid" 2>&1 | tail -80
              echo "::endgroup::"
            fi
            docker rm -f "$cid" >/dev/null 2>&1 || true
            exit "$rc"
          }
          trap cleanup EXIT

          health_error=/tmp/emisar-healthz-error
          for i in $(seq 1 30); do
            if curl -fsS -H 'x-forwarded-proto: https' http://localhost:4000/healthz \
              >/dev/null 2>"$health_error"; then
              echo "healthz OK after ~${i}s"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "::error::Portal image did not become healthy within 60 seconds"
              sed 's/^/last health probe: /' "$health_error"
              exit 1
            fi
            sleep 2
          done

          location=$(curl -fsS -o /dev/null -w '%{redirect_url}' \
            -H 'x-forwarded-proto: https' \
            http://localhost:4000/packs/linux-core/pack.tar.gz)
          case "$location" in
            */v1/packs/linux-core/*/pack.tar.gz) ;;
            *) echo "::error::Pack endpoint returned an invalid redirect: ${location}"; exit 1 ;;
          esac
          curl -fsS -H 'x-forwarded-proto: https' http://localhost:4000/packs.json \
            | grep -q '"linux-core"' \
            || { echo "::error::Pack catalog does not contain linux-core"; exit 1; }
          echo "pack registry endpoints OK"

          docker stop --time 15 "$cid" >/dev/null

      - name: Export tested image
        if: github.event_name == 'push' && needs.changes.outputs.portal_release == 'true'
        run: |
          set -euo pipefail
          docker save emisar/portal:ci | gzip -1 > /tmp/emisar-portal-image.tar.gz
          test -s /tmp/emisar-portal-image.tar.gz

      - name: Upload tested image
        if: github.event_name == 'push' && needs.changes.outputs.portal_release == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: portal-image-${{ github.sha }}
          path: /tmp/emisar-portal-image.tar.gz
          retention-days: 2
          if-no-files-found: error

  go:
    name: Go - ${{ matrix.module == 'runner' && 'Runner' || matrix.module == 'mcp' && 'MCP' || 'Tools' }}
    needs: changes
    if: needs.changes.outputs.go_modules != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.changes.outputs.go_modules) }}
    env:
      # runner ships install.sh; the mcp bridge ships install-mcp.sh.
      INSTALL_SCRIPT: ${{ matrix.module == 'runner' && 'install.sh' || 'install-mcp.sh' }}
      # Native toolchain pin: a go.mod/go.work `toolchain` directive in a
      # malicious bump could otherwise make the go command download and run a
      # remote toolchain; `local` locks CI to the setup-go-installed one.
      GOTOOLCHAIN: local
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: ${{ matrix.module }}/go.mod
          cache: true
          # Glob: tools/ is deliberately dependency-free (no go.sum).
          cache-dependency-path: ${{ matrix.module }}/go.*

      - name: Check client module boundaries
        # runner/ and mcp/ are CLIENT-SHIPPED modules (self-hosters build and
        # audit them) — repo tooling lives in tools/, never there. packctl is
        # the one sanctioned exception (pack-hash parity; runner/AGENTS.md).
        # Extending either list is a deliberate, reviewed act.
        if: matrix.module != 'tools'
        run: |
          set -euo pipefail
          test "$(ls runner/cmd)" = "packctl" || {
            echo "::error::runner/cmd must contain exactly packctl — repo tooling goes in tools/ (runner/AGENTS.md)"; exit 1; }
          test ! -d mcp/cmd || {
            echo "::error::mcp/ is client-shipped and carries no cmd/ — repo tooling goes in tools/ (runner/AGENTS.md)"; exit 1; }

      - name: Run go vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...

      - name: Check formatting
        run: |
          diff=$(gofmt -d -s ${{ matrix.module }}/ | head -200)
          if [ -n "$diff" ]; then
            echo "::error::gofmt diff (run 'gofmt -w -s ${{ matrix.module }}/'):"
            echo "$diff"
            exit 1
          fi

      - name: Verify module checksums
        # Verifies hashes in go.sum match the on-disk module bytes; a
        # tampered cache won't pass.
        working-directory: ${{ matrix.module }}
        run: go mod verify

      - name: Check module tidiness
        working-directory: ${{ matrix.module }}
        run: |
          go mod tidy
          if ! git diff --exit-code -- go.mod go.sum; then
            echo "::error::${{ matrix.module }}/go.mod or go.sum are not tidy. Run 'cd ${{ matrix.module }} && go mod tidy' and commit."
            exit 1
          fi

      - name: Check install script
        # The install script is a permanent part of the module's install
        # surface; if it's gone, that's a regression CI must flag. tools/ is
        # internal — it has no install surface.
        if: matrix.module != 'tools'
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          shellcheck "$INSTALL_SCRIPT"
          bash -n "$INSTALL_SCRIPT"

      - name: Scan known vulnerabilities
        # Informational by design — a same-day CVE in a transitive dep
        # shouldn't block unrelated PRs. Surface as a warning, exit 0.
        # Pinned version so a govulncheck behavior change can't rebreak CI.
        working-directory: ${{ matrix.module }}
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          if ! govulncheck ./...; then
            echo "::warning::govulncheck reported findings — review and update deps"
          fi

      - name: Run staticcheck
        # Blocking (unlike govulncheck): dead code / SA findings fail CI so
        # the Go audit's clean reading can't silently regress. Pinned.
        working-directory: ${{ matrix.module }}
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@2026.1
          staticcheck ./...

      - name: Run race tests with coverage
        working-directory: ${{ matrix.module }}
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Summarize coverage
        if: always()
        working-directory: ${{ matrix.module }}
        run: |
          go tool cover -func=coverage.out | tail -50
          total=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}')
          echo "**Go - ${{ matrix.module }}** coverage: ${total}" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.module }}-coverage
          path: ${{ matrix.module }}/coverage.out
          retention-days: 7

      - name: Cross-build release platforms
        # One loop instead of a 4-leg matrix: proves every release target
        # still compiles without burning four runners per module. tools/ is
        # never shipped, so it has no release platforms to prove.
        if: matrix.module != 'tools'
        working-directory: ${{ matrix.module }}
        env:
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            GOOS="${target%/*}" GOARCH="${target#*/}" go build -trimpath -ldflags "-s -w" -o /dev/null .
            echo "ok: $target"
          done

  packs:
    name: Packs - Validate
    needs: changes
    if: needs.changes.outputs.packs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Same toolchain pin as the go job (see its comment).
      GOTOOLCHAIN: local
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: runner/go.mod
          cache: true
          cache-dependency-path: runner/go.sum

      - name: Build emisar CLI
        run: |
          cd runner
          go build -trimpath -o /tmp/emisar .
          /tmp/emisar version

      - name: Validate every pack
        # Collect failures so the report names every bad pack instead of
        # bailing on the first — faster PR triage. `nullglob` + an explicit
        # floor: an empty packs/ must fail loudly, not masquerade as green.
        run: |
          set -euo pipefail
          shopt -s nullglob

          packs=(packs/*/)
          if [ ${#packs[@]} -lt 1 ]; then
            echo "::error::no packs found under packs/ — did the layout change?"
            exit 1
          fi

          failures=()
          for pack in "${packs[@]}"; do
            pack="${pack%/}"
            name="$(basename "$pack")"
            printf '\n\033[1m==> %s\033[0m\n' "$name"
            if ! /tmp/emisar pack validate "$pack"; then
              failures+=("$name")
            fi
          done

          if [ ${#failures[@]} -gt 0 ]; then
            printf '\n\033[1;31m✗ packs failed validation:\033[0m\n'
            printf '   - %s\n' "${failures[@]}"
            exit 1
          fi

          printf '\n\033[1;32m✓ all %d packs valid\033[0m\n' "${#packs[@]}"
          echo "✅ all ${#packs[@]} packs valid" >> "$GITHUB_STEP_SUMMARY"

  infra:
    name: Terraform - Validate
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TFLINT_VERSION: v0.61.0
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install Terraform (version from .tool-versions, checksum-verified)
        run: |
          ver="$(awk '/^terraform /{print $2}' .tool-versions)"
          test -n "$ver" || { echo "::error::no terraform pin in .tool-versions"; exit 1; }
          tmp="$(mktemp -d)" && cd "$tmp"
          base="https://releases.hashicorp.com/terraform/${ver}"
          curl -fsSLO "${base}/terraform_${ver}_linux_amd64.zip"
          curl -fsSLO "${base}/terraform_${ver}_SHA256SUMS"
          grep " terraform_${ver}_linux_amd64.zip$" "terraform_${ver}_SHA256SUMS" | sha256sum -c -
          unzip -q "terraform_${ver}_linux_amd64.zip"
          sudo install -m 0755 terraform /usr/local/bin/terraform
          terraform version

      - name: Install TFLint (pinned, checksum-verified)
        run: |
          tmp="$(mktemp -d)" && cd "$tmp"
          base="https://github.com/terraform-linters/tflint/releases/download/${TFLINT_VERSION}"
          curl -fsSLO "${base}/tflint_linux_amd64.zip"
          curl -fsSLO "${base}/checksums.txt"
          grep " tflint_linux_amd64.zip$" checksums.txt | sha256sum -c -
          unzip -q tflint_linux_amd64.zip
          sudo install -m 0755 tflint /usr/local/bin/tflint
          tflint --version

      - name: Check Terraform formatting
        working-directory: infra
        run: terraform fmt -check -recursive

      - name: Validate Terraform
        working-directory: infra
        run: |
          terraform init -backend=false -input=false
          terraform validate

      - name: Run TFLint
        working-directory: infra
        run: |
          tflint --init
          tflint

  dep-age:
    name: Dependencies - Release age
    needs: changes
    if: needs.changes.outputs.deps == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          # Need the base commit in history to diff lockfile versions against.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: tools/go.mod
          cache: true
          cache-dependency-path: tools/go.*

      - name: Enforce dependency release age
        # Supply-chain enforcement: reject a bump to a version published more
        # recently than its release-age window. Dependabot's cooldown only
        # throttles Dependabot's own PRs; this gate covers ANY lockfile change.
        # PR: diff against the PR base. Push to main: diff against the prior
        # tip. The gate's own logic is tested by the Go - Tools job whenever
        # tools/cmd/depgate changes.
        working-directory: tools
        env:
          DEP_AGE_BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          GOTOOLCHAIN: local
        run: go run ./cmd/depgate check

  actionlint:
    name: Actions - Validate workflows
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      ACTIONLINT_VERSION: "1.7.12"
      ACTIONLINT_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Run actionlint
        # The workflows ARE the supply chain's front door — lint them like
        # code: expression injection, wrong event fields, invalid globs.
        run: |
          set -euo pipefail
          artifact="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          curl -fsSLO "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${artifact}"
          printf '%s  %s\n' "$ACTIONLINT_SHA256" "$artifact" | sha256sum --check --
          tar -xzf "$artifact" actionlint
          ./actionlint -color

  ci-gate:
    name: Required - CI
    if: always()
    needs: [changes, portal, portal-image, mcp-listing, go, packs, infra, dep-age, actionlint]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CHANGES: ${{ needs.changes.result }}
      PORTAL: ${{ needs.portal.result }}
      PORTAL_IMAGE: ${{ needs.portal-image.result }}
      MCP_LISTING: ${{ needs.mcp-listing.result }}
      GO: ${{ needs.go.result }}
      PACKS: ${{ needs.packs.result }}
      INFRA: ${{ needs.infra.result }}
      DEP_AGE: ${{ needs.dep-age.result }}
      ACTIONLINT: ${{ needs.actionlint.result }}
    steps:
      - name: Verify selected checks
        run: |
          set -euo pipefail
          test "$CHANGES" = success || { echo "::error::Changes ended $CHANGES"; exit 1; }
          for gate in PORTAL PORTAL_IMAGE MCP_LISTING GO PACKS INFRA DEP_AGE ACTIONLINT; do
            result=${!gate}
            case "$result" in
              success|skipped) ;;
              *) echo "::error::$gate ended $result"; exit 1 ;;
            esac
          done

  portal-publish:
    name: CD - Publish portal image
    if: github.event_name == 'push' && needs.changes.outputs.portal_release == 'true'
    needs: [changes, ci-gate]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    concurrency:
      group: portal-publish
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      image: ${{ steps.push.outputs.image }}
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - name: Download tested image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: portal-image-${{ github.sha }}
          path: /tmp/portal-image

      - name: Load tested image
        run: |
          set -euo pipefail
          gunzip -c /tmp/portal-image/emisar-portal-image.tar.gz | docker load

      - name: Install Trivy (pinned, checksum-verified)
        env:
          TRIVY_VERSION: "0.72.0"
          TRIVY_SHA256: bbb64b9695866ce4a7a8f5c9592002c5961cab378577fa3f8a040df362b9b2ea
        run: |
          set -euo pipefail
          artifact="trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          curl -fsSLO "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/${artifact}"
          printf '%s  %s\n' "$TRIVY_SHA256" "$artifact" | sha256sum --check --
          tar -xzf "$artifact" trivy
          sudo install -m 0755 trivy /usr/local/bin/trivy

      - name: Scan image vulnerabilities
        run: trivy image --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed emisar/portal:ci

      - name: Generate SBOM
        run: trivy image --format cyclonedx --output /tmp/emisar-portal.cdx.json emisar/portal:ci

      - name: Sign in to GHCR
        run: printf '%s' "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish tested image
        id: push
        env:
          IMAGE: ghcr.io/andrewdryga/emisar
        run: |
          set -euo pipefail
          # Include run identity so a re-run can never overwrite a tag with
          # different bytes if an upstream package repository changed.
          immutable="${IMAGE}:sha-${GITHUB_SHA}-run-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          docker tag emisar/portal:ci "$immutable"
          docker push "$immutable"
          repo_digest=$(docker inspect --format='{{index .RepoDigests 0}}' "$immutable")
          digest=${repo_digest#*@}
          test -n "$digest" && test "$digest" != "$repo_digest"

          # Mutable convenience tag moves only after the immutable push works.
          docker tag emisar/portal:ci "${IMAGE}:latest"
          docker push "${IMAGE}:latest"

          echo "image=${IMAGE}@${digest}" >> "$GITHUB_OUTPUT"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          {
            echo "### Published portal image"
            echo "- immutable tag: \`${immutable}\`"
            echo "- digest: \`${IMAGE}@${digest}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Attest provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-name: ghcr.io/andrewdryga/emisar
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Attest SBOM
        uses: actions/attest-sbom@4651f806c01d8637787e274ac3bdf724ef169f34 # v4.1.0
        with:
          subject-name: ghcr.io/andrewdryga/emisar
          subject-digest: ${{ steps.push.outputs.digest }}
          sbom-path: /tmp/emisar-portal.cdx.json
          push-to-registry: true

  packs-publish:
    name: CD - Publish pack registry
    if: github.event_name == 'push' && needs.changes.outputs.packs_release == 'true'
    needs: [changes, ci-gate]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: packs-publish
      cancel-in-progress: false
    environment:
      name: pack-registry
    permissions:
      contents: read
      id-token: write
    env:
      GOTOOLCHAIN: local
      REGISTRY_BASE: https://storage.googleapis.com/emisar-pack-registry
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: runner/go.mod
          cache: true
          cache-dependency-path: runner/go.sum

      - name: Build pack publisher
        run: cd runner && go build -trimpath -o /tmp/packctl ./cmd/packctl

      - name: Fetch published catalog
        run: |
          set -euo pipefail
          status=$(curl -sS -o /tmp/previous.json -w '%{http_code}' "${REGISTRY_BASE}/v1/catalog.json")
          case "$status" in
            200) echo "using published catalog history" ;;
            404)
              echo "registry is empty; bootstrapping from the committed catalog"
              cp portal/apps/emisar/priv/packs/catalog.json /tmp/previous.json
              ;;
            *) echo "::error::Registry catalog returned HTTP ${status}"; exit 1 ;;
          esac

      - name: Build registry artifacts
        run: |
          /tmp/packctl catalog build \
            --packs packs \
            --out dist \
            --previous /tmp/previous.json

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: projects/65212203604/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: emisar-pack-publisher@emisar.iam.gserviceaccount.com
          token_format: access_token

      - name: Publish registry artifacts
        env:
          GOOGLE_OAUTH_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          set -euo pipefail
          /tmp/packctl catalog publish --dir dist | tee /tmp/publish.log
          {
            echo "### Pack registry published"
            echo '```'
            tail -20 /tmp/publish.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify published catalog
        run: |
          set -euo pipefail
          curl -fsS --retry 5 --retry-delay 2 "${REGISTRY_BASE}/v1/catalog.json" -o /tmp/gcs-catalog.json
          cmp dist/v1/catalog.json /tmp/gcs-catalog.json

          if getent ahosts registry.emisar.dev >/dev/null; then
            curl -fsS --retry 5 --retry-delay 2 \
              "https://registry.emisar.dev/v1/catalog.json" -o /tmp/canonical-catalog.json
            cmp dist/v1/catalog.json /tmp/canonical-catalog.json
          else
            echo "::warning::registry.emisar.dev is not delegated yet; verified the backing GCS registry only"
          fi

  deployment-plan:
    name: CD - Plan production
    if: >-
      always() &&
      github.event_name == 'push' &&
      needs.ci-gate.result == 'success' &&
      (needs.changes.outputs.portal_release == 'true' || needs.changes.outputs.infra_release == 'true')
    needs: [changes, ci-gate, portal-publish]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: production-plan
      cancel-in-progress: true
    environment:
      name: production-plan
    permissions:
      contents: read
    env:
      TF_CLOUD_ORGANIZATION: Dryga
      TFC_WORKSPACE: emisar
      PUBLISHED_IMAGE: ${{ needs.portal-publish.outputs.image }}
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Verify HCP workspace and select image
        id: image
        env:
          TF_API_TOKEN: ${{ secrets.TFC_PLAN_TOKEN }}
        run: |
          set -euo pipefail
          api=https://app.terraform.io/api/v2
          auth=(-H "Authorization: Bearer ${TF_API_TOKEN}" -H "Content-Type: application/vnd.api+json")
          workspace=$(curl -fsS "${auth[@]}" \
            "${api}/organizations/${TF_CLOUD_ORGANIZATION}/workspaces/${TFC_WORKSPACE}?include=current_run")
          workspace_id=$(jq -er '.data.id' <<< "$workspace")
          auto_apply=$(jq -r '.data.attributes["auto-apply"]' <<< "$workspace")
          test "$auto_apply" = false || {
            echo "::error::HCP Terraform workspace auto-apply must remain disabled"
            exit 1
          }

          if [ "$(jq -r '.data.attributes.locked' <<< "$workspace")" = true ]; then
            current_run_id=$(jq -er '.data.relationships["current-run"].data.id' <<< "$workspace")
            current_run=$(curl -fsS "${auth[@]}" "${api}/runs/${current_run_id}")
            current_status=$(jq -r '.data.attributes.status' <<< "$current_run")
            current_source=$(jq -r '.data.attributes.source' <<< "$current_run")
            current_message=$(jq -r '.data.attributes.message // ""' <<< "$current_run")
            discardable=$(jq -r \
              '.data.attributes.actions | .["is-discardable"] // .IsDiscardable // false' \
              <<< "$current_run")

            if [ "$current_source" != tfe-api ] || [ "$discardable" != true ] || \
              [[ ! "$current_message" =~ ^main\ ([0-9a-f]{40})\  ]]; then
              echo "::error::HCP workspace is locked by ${current_run_id} (${current_status}); refusing to replace it"
              exit 1
            fi
            current_sha=${BASH_REMATCH[1]}
            if [ "$current_sha" = "$GITHUB_SHA" ]; then
              echo "::error::HCP workspace already has a plan for ${GITHUB_SHA}; review or discard it before rerunning"
              exit 1
            fi

            echo "discarding superseded HCP plan ${current_run_id} for ${current_sha}"
            discard_payload=$(jq -cn --arg comment "Superseded by main ${GITHUB_SHA}" '{comment: $comment}')
            curl -fsS "${auth[@]}" -X POST -d "$discard_payload" \
              "${api}/runs/${current_run_id}/actions/discard" >/dev/null

            for attempt in $(seq 1 30); do
              workspace=$(curl -fsS "${auth[@]}" \
                "${api}/organizations/${TF_CLOUD_ORGANIZATION}/workspaces/${TFC_WORKSPACE}")
              if [ "$(jq -r '.data.attributes.locked' <<< "$workspace")" = false ]; then
                break
              fi
              if [ "$attempt" = 30 ]; then
                echo "::error::HCP workspace remained locked after discarding ${current_run_id}"
                exit 1
              fi
              sleep 2
            done
          fi

          image="$PUBLISHED_IMAGE"
          if [ -z "$image" ]; then
            state=$(curl -fsS "${auth[@]}" "${api}/workspaces/${workspace_id}/current-state-version?include=outputs")
            image=$(jq -er '.included[] | select(.type == "state-version-outputs" and .attributes.name == "container_image") | .attributes.value' <<< "$state")
            if [[ ! "$image" =~ ^ghcr\.io/andrewdryga/emisar@sha256:[0-9a-f]{64}$ ]]; then
              # One-time bootstrap: the last state predates digest pinning, but
              # the workspace variable was already corrected by the old CD.
              image=$(curl -fsS "${auth[@]}" "${api}/workspaces/${workspace_id}/vars" \
                | jq -er '.data[] | select(.attributes.category == "terraform" and .attributes.key == "container_image") | .attributes.value')
            fi
          fi
          case "$image" in
            ghcr.io/andrewdryga/emisar@sha256:*) ;;
            *) echo "::error::container_image must be an immutable emisar GHCR digest (got '$image')"; exit 1 ;;
          esac
          printf 'TF_VAR_container_image=%s\n' "$(jq -cn --arg image "$image" '$image')" >> "$GITHUB_ENV"
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Upload Terraform configuration
        id: upload
        uses: hashicorp/tfc-workflows-github/actions/upload-configuration@8e08d1ba957673f5fbf971a22b3219639dc45661 # v1.3.2
        env:
          TF_API_TOKEN: ${{ secrets.TFC_PLAN_TOKEN }}
        with:
          workspace: emisar
          directory: ./infra
          speculative: false

      - name: Create HCP Terraform plan
        id: run
        uses: hashicorp/tfc-workflows-github/actions/create-run@8e08d1ba957673f5fbf971a22b3219639dc45661 # v1.3.2
        env:
          TF_API_TOKEN: ${{ secrets.TFC_PLAN_TOKEN }}
        with:
          workspace: emisar
          configuration_version: ${{ steps.upload.outputs.configuration_version_id }}
          message: "main ${{ github.sha }} (@${{ github.actor }}, gh run ${{ github.run_id }})"

      - name: Read Terraform plan
        id: plan
        uses: hashicorp/tfc-workflows-github/actions/plan-output@8e08d1ba957673f5fbf971a22b3219639dc45661 # v1.3.2
        env:
          TF_API_TOKEN: ${{ secrets.TFC_PLAN_TOKEN }}
        with:
          plan: ${{ steps.run.outputs.plan_id }}

      - name: Summarize manual apply
        env:
          RUN_PAYLOAD: ${{ steps.run.outputs.payload }}
          RUN_LINK: ${{ steps.run.outputs.run_link }}
          ADD: ${{ steps.plan.outputs.add }}
          CHANGE: ${{ steps.plan.outputs.change }}
          DESTROY: ${{ steps.plan.outputs.destroy }}
          IMAGE: ${{ steps.image.outputs.image }}
        run: |
          set -euo pipefail
          has_changes=$(jq -r '.data.attributes["has-changes"]' <<< "$RUN_PAYLOAD")
          {
            echo "### Production Terraform plan"
            echo "- commit: \`${GITHUB_SHA}\`"
            echo "- image: \`${IMAGE}\`"
            echo "- resources: **${ADD} add, ${CHANGE} change, ${DESTROY} destroy**"
            echo "- [review the complete HCP Terraform plan](${RUN_LINK})"
            if [ "$has_changes" = true ]; then
              echo "- CI stops here: review the plan, then use HCP Terraform's **Confirm & Apply** button"
              echo "- before applying, verify the run's \`main ${GITHUB_SHA}\` message still matches the current main commit"
            else
              echo "- no apply is required"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
