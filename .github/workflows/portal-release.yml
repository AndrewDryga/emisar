name: Portal image

# Builds the portal release image and pushes it to PUBLIC GHCR
# (ghcr.io/andrewdryga/emisar) — the production deployment and self-hosters
# pull the same artifact (infra/COMPLIANCE.md: supply-chain transparency).
#
# Trigger model mirrors runner-release.yml: a version tag (`v*`, the unified
# product line) or a manual `workflow_dispatch`; never a PR. The job gates on
# the `release` environment (required reviewers), so an image can't reach GHCR
# without a maintainer approving the run. Correctness of the image itself is
# portal-ci's job — it builds and boot-smokes the same Dockerfile on every
# main push, so this workflow only builds and publishes.
#
# Tags pushed:
#   latest           — what infra's default container_image tracks
#   sha-<short-sha>  — immutable pointer; the digest for pinning is printed
#                      in the run summary
#   <version>        — additionally, when triggered by a `v*` tag
#
# FIRST publish only: GHCR creates a new package PRIVATE. Flip it to Public in
# the package settings (Packages → emisar → Package settings → Change
# visibility), or the unauthenticated `docker pull` on the instances 403s.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      ref:
        description: "git ref to build (default: the ref you dispatch from)"
        required: false
        type: string

concurrency:
  group: portal-image-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-push:
    name: build + push ghcr.io/andrewdryga/emisar
    runs-on: ubuntu-latest
    environment:
      name: release
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false

      - name: derive image tags
        id: meta
        run: |
          image="ghcr.io/andrewdryga/emisar"
          short_sha=$(git rev-parse --short=12 HEAD)
          tags="${image}:latest ${image}:sha-${short_sha}"
          ref="${{ inputs.ref || github.ref_name }}"
          ref="${ref#refs/tags/}"
          if [[ "$ref" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            tags="${tags} ${image}:${ref#v}"
          fi
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "tags=${tags}"   >> "$GITHUB_OUTPUT"

      - name: build release image
        # Build context is the REPO ROOT (the Dockerfile pulls in install.sh and
        # packs/), and the toolchain --build-args come from /.tool-versions —
        # exactly like portal-ci, one source of truth with local dev. No
        # EMISAR_DEV_HOST_EXCLUDES here: that build-arg is for portal-ci's
        # plain-HTTP smoke image only, never a published artifact.
        run: |
          elixir_version=$(awk '$1=="elixir"{split($2,a,"-otp-"); print a[1]}' .tool-versions)
          otp_version=$(awk '$1=="erlang"{print $2}' .tool-versions)
          if [ -z "$elixir_version" ] || [ -z "$otp_version" ]; then
            echo "::error::could not parse Elixir/OTP from .tool-versions"
            exit 1
          fi
          echo "building with Elixir ${elixir_version} / OTP ${otp_version}"
          docker build -f portal/Dockerfile \
            --build-arg ELIXIR_VERSION="${elixir_version}" \
            --build-arg OTP_VERSION="${otp_version}" \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            -t "${{ steps.meta.outputs.image }}:latest" \
            .
          for tag in ${{ steps.meta.outputs.tags }}; do
            docker tag "${{ steps.meta.outputs.image }}:latest" "$tag"
          done

      - name: login to GHCR
        run: printf '%s' "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: push
        run: |
          for tag in ${{ steps.meta.outputs.tags }}; do
            docker push "$tag"
          done
          digest=$(docker inspect --format='{{index .RepoDigests 0}}' "${{ steps.meta.outputs.image }}:latest")
          {
            echo "### Published"
            echo '```'
            printf '%s\n' ${{ steps.meta.outputs.tags }}
            echo "digest: ${digest}"
            echo '```'
            echo "Pin for a reproducible rollout: \`container_image = \"${digest}\"\` (TFC workspace variable)."
          } >> "$GITHUB_STEP_SUMMARY"
