name: CD · Portal

# One-click continuous delivery for the portal:
#
#   Actions → "CD · Portal" → Run workflow  →  build → scan → publish → deploy
#
# Publish builds the release image from portal/Dockerfile and pushes it to
# PUBLIC GHCR (ghcr.io/andrewdryga/emisar) — the production deployment and
# self-hosters pull the same artifact (supply-chain transparency: nothing
# runs in prod that isn't publicly pullable and scannable). A DEPLOY IS A TERRAFORM RUN: this workflow sets the TFC
# workspace's container_image variable to the freshly pushed digest and queues
# an apply — the instance-template replace rolls the fleet under the MIG's
# update policy, and Terraform state always records exactly what production
# runs. No gcloud, no GCP identity in CI: infrastructure changes go through
# Terraform, full stop. A `v*` tag publishes the image AND refreshes the MCP
# registry listing (server.json describes the HOSTED remote server, so its
# version rides the product tag — the mcp-v* bridge binary is a separate
# stream) but never deploys — cutting a release and shipping it are separate
# decisions.
#
# Guardrails:
#   * The publish job gates on the `release` environment (required
#     reviewers) — one approval covers the whole run; deploy needs publish.
#   * A blocking trivy scan runs BEFORE anything is pushed.
#   * The apply itself is capacity-safe: the MIG replaces into a base-count
#     reservation with no surge (infra/compute.tf), and wait_for_instances
#     fails the run if the new image never turns healthy.
#   * TFC_TOKEN is a TFC team token scoped to the emisar workspace — it can
#     set variables and queue runs there, nothing else.
#
# Rollback = redeploy a previous immutable digest the same way: TFC → the
# emisar workspace → set container_image to the prior digest (every publish
# prints it in the run summary) → queue an apply. Or re-dispatch this
# workflow from the old ref.
#
# FIRST publish only: GHCR creates the package PRIVATE. Flip it to Public in
# the package settings (Packages → emisar → Package settings → Change
# visibility) or the unauthenticated `docker pull` on the instances 403s.

run-name: ${{ github.event_name == 'workflow_dispatch' && format('Portal · publish{0} · by @{1}', (inputs.deploy && ' → deploy') || '', github.actor) || format('Portal · image for {0}', github.ref_name) }}

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      ref:
        description: "git ref to build (default: the ref you dispatch from)"
        required: false
        type: string
      deploy:
        description: "Roll the GCP fleet to the freshly published image"
        required: false
        type: boolean
        default: true

concurrency:
  group: portal-cd-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: Build · scan · publish
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: release
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false

      - name: Derive image tags
        id: meta
        run: |
          image="ghcr.io/andrewdryga/emisar"
          short_sha=$(git rev-parse --short=12 HEAD)
          tags="${image}:latest ${image}:sha-${short_sha}"
          ref="${{ inputs.ref || github.ref_name }}"
          ref="${ref#refs/tags/}"
          if [[ "$ref" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            tags="${tags} ${image}:${ref#v}"
          fi
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "tags=${tags}"   >> "$GITHUB_OUTPUT"

      - name: Build release image
        # Build context is the REPO ROOT (the Dockerfile pulls in install.sh and
        # packs/), and the toolchain --build-args come from /.tool-versions —
        # exactly like CI's portal job, one source of truth with local dev. No
        # EMISAR_DEV_HOST_EXCLUDES here: that build-arg is for CI's plain-HTTP
        # smoke image only, never a published artifact.
        run: |
          elixir_version=$(awk '$1=="elixir"{split($2,a,"-otp-"); print a[1]}' .tool-versions)
          otp_version=$(awk '$1=="erlang"{print $2}' .tool-versions)
          if [ -z "$elixir_version" ] || [ -z "$otp_version" ]; then
            echo "::error::could not parse Elixir/OTP from .tool-versions"
            exit 1
          fi
          echo "building with Elixir ${elixir_version} / OTP ${otp_version}"
          docker build -f portal/Dockerfile \
            --build-arg ELIXIR_VERSION="${elixir_version}" \
            --build-arg OTP_VERSION="${otp_version}" \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            -t "${{ steps.meta.outputs.image }}:latest" \
            .
          for tag in ${{ steps.meta.outputs.tags }}; do
            docker tag "${{ steps.meta.outputs.image }}:latest" "$tag"
          done

      - name: Vulnerability scan (trivy — blocks the publish)
        # Image scanning is the CI-side control for the public-GHCR supply
        # chain: refuse to publish an image with known
        # fixable HIGH/CRITICAL vulns. Pinned + checksum-verified like the
        # other external tools (same pattern as CI's infra job).
        env:
          TRIVY_VERSION: "0.72.0"
          TRIVY_SHA256: bbb64b9695866ce4a7a8f5c9592002c5961cab378577fa3f8a040df362b9b2ea
        run: |
          set -euo pipefail
          artifact="trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          curl -fsSLO "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/${artifact}"
          printf '%s  %s\n' "$TRIVY_SHA256" "$artifact" | sha256sum --check --
          tar -xzf "$artifact" trivy
          ./trivy image --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed \
            "${{ steps.meta.outputs.image }}:latest"
          echo "🛡️ trivy: no fixable HIGH/CRITICAL findings" >> "$GITHUB_STEP_SUMMARY"

      - name: Login to GHCR
        run: printf '%s' "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push
        id: push
        run: |
          for tag in ${{ steps.meta.outputs.tags }}; do
            docker push "$tag"
          done
          digest=$(docker inspect --format='{{index .RepoDigests 0}}' "${{ steps.meta.outputs.image }}:latest")
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          {
            echo "### 📦 Published"
            echo '```'
            printf '%s\n' ${{ steps.meta.outputs.tags }}
            echo "digest: ${digest}"
            echo '```'
            echo "Freeze an environment by setting the TFC \`container_image\` variable to a \`sha-\` tag or the digest."
          } >> "$GITHUB_STEP_SUMMARY"

  registry-listing:
    name: Publish MCP registry listing
    # Product tags only — never a CD dispatch. The listing advertises the
    # hosted remote server (https://emisar.dev/api/mcp/rpc), so its version IS
    # the product version; the mcp-v* bridge releases don't touch it.
    # Independent of the image publish on purpose (no `needs:`) — a failed
    # image build shouldn't hold the listing hostage, and vice versa. Its own
    # `release` environment gate guards MCP_PRIVATE_KEY exactly as before.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: release
    permissions:
      contents: read
    env:
      MCP_PUBLISHER_VERSION: "1.7.9"
      MCP_PUBLISHER_SHA256: ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set registry version from the product tag
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          jq --arg version "$version" '.version = $version' server.json > server.tmp
          mv server.tmp server.json

      - name: Install verified mcp-publisher
        run: |
          set -euo pipefail
          artifact="mcp-publisher_linux_amd64.tar.gz"
          curl --fail --location --retry 3 --retry-delay 2 \
            "https://github.com/modelcontextprotocol/registry/releases/download/v${MCP_PUBLISHER_VERSION}/${artifact}" \
            --output "$artifact"
          printf '%s  %s\n' "$MCP_PUBLISHER_SHA256" "$artifact" | sha256sum --check --
          tar --extract --gzip --file "$artifact" mcp-publisher

      - name: Validate server.json against the registry schema
        run: ./mcp-publisher validate server.json

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login http --domain emisar.dev --private-key "${{ secrets.MCP_PRIVATE_KEY }}"

      - name: Publish listing
        run: ./mcp-publisher publish server.json

  deploy:
    name: Deploy · terraform apply
    needs: publish
    # Dispatch-only, opt-out via the input. A v* tag publishes the image but
    # never deploys — shipping is its own click. No second `environment:` gate
    # here: publish is already release-gated and this job can't run without it
    # (GitHub prompts per env-gated job, so doubling up = approving twice).
    if: github.event_name == 'workflow_dispatch' && inputs.deploy
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      # hashicorp/tfc-workflows-github actions read these two.
      TF_API_TOKEN: ${{ secrets.TFC_TOKEN }}
      TF_CLOUD_ORGANIZATION: Dryga
      TFC_WORKSPACE: emisar
      IMAGE: ${{ needs.publish.outputs.digest }}
    steps:
      - name: Point the workspace at the new image
        # Upsert the container_image workspace variable to the immutable digest
        # just pushed — the pin Terraform state will record as what runs. The
        # one curl in this job: the official action set covers runs, not
        # workspace-variable writes.
        run: |
          set -euo pipefail
          api=https://app.terraform.io/api/v2
          auth=(-H "Authorization: Bearer ${TF_API_TOKEN}" -H "Content-Type: application/vnd.api+json")
          ws=$(curl -fsS "${auth[@]}" "${api}/organizations/${TF_CLOUD_ORGANIZATION}/workspaces/${TFC_WORKSPACE}" | jq -r .data.id)
          var_id=$(curl -fsS "${auth[@]}" "${api}/workspaces/${ws}/vars" \
            | jq -r '.data[] | select(.attributes.key == "container_image") | .id')
          payload=$(jq -n --arg v "$IMAGE" \
            '{data:{type:"vars",attributes:{key:"container_image",value:$v,category:"terraform",hcl:false,sensitive:false,description:"deployed image — set by CD · Portal"}}}')
          if [ -n "$var_id" ]; then
            curl -fsS -X PATCH "${auth[@]}" -d "$payload" "${api}/workspaces/${ws}/vars/${var_id}" > /dev/null
          else
            curl -fsS -X POST "${auth[@]}" -d "$payload" "${api}/workspaces/${ws}/vars" > /dev/null
          fi
          echo "pinned container_image = ${IMAGE}"

      - name: Plan (Terraform run on the workspace's current configuration)
        id: run
        uses: hashicorp/tfc-workflows-github/actions/create-run@8e08d1ba957673f5fbf971a22b3219639dc45661 # v1.3.2
        with:
          workspace: emisar
          message: "CD · Portal deploy ${{ needs.publish.outputs.digest }} (@${{ github.actor }}, gh run ${{ github.run_id }})"

      - name: Apply
        # The apply replaces the instance template and the MIG's update policy
        # rolls the fleet — no surge, each replacement recreates into the
        # capacity reservation (infra/compute.tf), and wait_for_instances
        # fails the run if the new image never turns healthy. Skipped when the
        # plan has nothing to confirm (redeploying the already-live digest).
        if: fromJSON(steps.run.outputs.payload).data.attributes.actions['is-confirmable']
        uses: hashicorp/tfc-workflows-github/actions/apply-run@8e08d1ba957673f5fbf971a22b3219639dc45661 # v1.3.2
        with:
          run: ${{ steps.run.outputs.run_id }}
          comment: "Applied by CD · Portal (gh run ${{ github.run_id }})"

      - name: Deploy summary
        env:
          RUN_ID: ${{ steps.run.outputs.run_id }}
        run: |
          {
            echo "### 🚀 Deployed"
            echo ""
            echo "\`${IMAGE}\` applied via [Terraform run](https://app.terraform.io/app/${TF_CLOUD_ORGANIZATION}/workspaces/${TFC_WORKSPACE}/runs/${RUN_ID}) — state records exactly what production runs."
          } >> "$GITHUB_STEP_SUMMARY"
