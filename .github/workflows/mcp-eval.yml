name: MCP Conformance Eval

# Weekly real-agent conformance eval. Boots the local docker compose stack
# (portal + seeded fixture runners), then drives REAL headless coding agents —
# Claude Code and Codex — through tools/cmd/mcpeval's policy-enforcing MCP relay
# and fails on hard API-conformance violations: policy-blocked calls, portal
# invalid_args rejections, run_action without a prior get_action for the same
# action, the same failing call repeated more than twice, runs left non-terminal,
# or required tools/actions that never succeeded. The model's prose is captured
# in the report artifact but never scored, so the signal survives model drift.
#
# Both providers run on every schedule tick, each gated only on its own secret
# (ANTHROPIC_API_KEY, OPENAI_API_KEY); a lane whose secret is absent is skipped,
# and the job fails if neither is configured. ChatGPT/Codex is a first-class
# lane, not an afterthought — the trace that motivated this eval was a ChatGPT
# trace.
#
# Scheduled + manual only — never PR-triggered: it spends real provider tokens
# and reads provider secrets, which pull-request code must not reach. The relay
# holds the (well-known, dev-only) Emisar key; the agent process never sees it.
# No deploy permissions, no production URLs.
on:
  schedule:
    # Weekly. Offset from :00/:30 — GitHub delays top-of-hour scheduled runs.
    - cron: "27 5 * * 1"
  workflow_dispatch:
    inputs:
      claude_model:
        description: Claude model to evaluate (empty = mcpeval's pinned default)
        required: false
        type: string
      codex_model:
        description: Codex model to evaluate (empty = the CLI's configured default)
        required: false
        type: string

# One serialized lane: a manual dispatch never races the schedule tick into
# double provider spend.
concurrency:
  group: mcp-eval
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  eval:
    name: Real-agent conformance
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      GOTOOLCHAIN: local
      # The compose stack's seeded WELL-KNOWN dev key (docker-compose.yml,
      # EMISAR_DEV_FIXED_MCP_KEY): the public base64url encoding of 32 zero
      # bytes — deliberately not a secret, valid only inside this stack.
      EMISAR_API_KEY: "emk-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Detect provider secrets
        id: keys
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          claude=false
          codex=false
          [ -n "$ANTHROPIC_API_KEY" ] && claude=true
          [ -n "$OPENAI_API_KEY" ] && codex=true
          if [ "$claude" = false ] && [ "$codex" = false ]; then
            echo "::error::configure ANTHROPIC_API_KEY and/or OPENAI_API_KEY to run at least one provider lane"
            exit 1
          fi
          echo "claude=$claude" >> "$GITHUB_OUTPUT"
          echo "codex=$codex" >> "$GITHUB_OUTPUT"
          echo "Provider lanes — claude=$claude codex=$codex"

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: tools/go.mod
          cache: true
          cache-dependency-path: tools/go.*

      - name: Build stack images
        run: docker compose build portal runner-1

      - name: Boot the e2e stack
        run: |
          set -euo pipefail
          docker compose up -d --wait --wait-timeout 300 portal
          docker compose up -d --wait --wait-timeout 240 runner-1 runner-2 runner-3

      - name: Wait for three connected runners
        run: |
          set -euo pipefail
          for i in $(seq 1 24); do
            connected=$(curl -fsS -X POST http://localhost:4010/api/mcp/rpc \
              -H "Authorization: Bearer $EMISAR_API_KEY" \
              -H 'Content-Type: application/json' \
              -d '{"jsonrpc":"2.0","id":1,"method":"tools/call","params":{"name":"list_runners","arguments":{}}}' \
              | jq '[.result.structuredContent.runners[]? | select(.status == "connected")] | length' || echo 0)
            if [ "$connected" -ge 3 ]; then
              echo "$connected connected runners after ~$((i * 5))s"
              exit 0
            fi
            sleep 5
          done
          echo "::error::the fixture runners did not all connect within 120 seconds"
          exit 1

      - name: Install Claude Code CLI (pinned)
        if: steps.keys.outputs.claude == 'true'
        env:
          # The mcpeval driver's flags are verified against this version.
          CLAUDE_CODE_VERSION: "2.1.212"
        run: |
          set -euo pipefail
          npm install -g "@anthropic-ai/claude-code@${CLAUDE_CODE_VERSION}"
          claude --version

      - name: Run Claude conformance eval
        id: claude_eval
        if: steps.keys.outputs.claude == 'true'
        continue-on-error: true
        working-directory: tools
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EVAL_MODEL: ${{ inputs.claude_model }}
        run: |
          set -euo pipefail
          args=(-provider claude -out /tmp/mcpeval-claude.json)
          if [ -n "$EVAL_MODEL" ]; then
            args+=(-model "$EVAL_MODEL")
          fi
          go run ./cmd/mcpeval "${args[@]}"

      - name: Install Codex CLI (pinned)
        if: steps.keys.outputs.codex == 'true'
        env:
          # The mcpeval driver's flags are verified against this version.
          CODEX_CLI_VERSION: "0.144.5"
        run: |
          set -euo pipefail
          npm install -g "@openai/codex@${CODEX_CLI_VERSION}"
          codex --version

      - name: Run Codex conformance eval
        id: codex_eval
        if: steps.keys.outputs.codex == 'true'
        continue-on-error: true
        working-directory: tools
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CODEX_MODEL: ${{ inputs.codex_model }}
        run: |
          set -euo pipefail
          # Key rides stdin, never argv (argv is visible in process listings).
          printenv OPENAI_API_KEY | codex login --with-api-key
          args=(-provider codex -codex-bypass-sandbox -out /tmp/mcpeval-codex.json)
          # The bypass opt-in is safe here per its own contract: the runner VM
          # is disposable, and headless codex otherwise cancels the
          # annotation-gated run_action dispatches the scenario must score.
          if [ -n "$CODEX_MODEL" ]; then
            args+=(-model "$CODEX_MODEL")
          fi
          go run ./cmd/mcpeval "${args[@]}"

      - name: Show stack logs
        if: failure()
        run: docker compose logs --tail 40 portal seeder runner-1 runner-2 runner-3

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mcp-eval-report-${{ github.run_id }}
          path: /tmp/mcpeval-*.json
          retention-days: 30
          # A harness failure before either eval starts legitimately leaves no
          # report; the job status already carries the signal.
          if-no-files-found: warn

      - name: Fail if any provider lane violated conformance
        if: always()
        run: |
          set -euo pipefail
          claude='${{ steps.claude_eval.outcome }}'
          codex='${{ steps.codex_eval.outcome }}'
          echo "Lane outcomes — claude=${claude:-skipped} codex=${codex:-skipped}"
          if [ "$claude" = failure ] || [ "$codex" = failure ]; then
            echo "::error::a provider lane failed MCP conformance — see the uploaded report"
            exit 1
          fi
