name: Portal CI

on:
  push:
    branches: [main]
    paths:
      - "portal/**"
      - ".agent/scripts/check-portal-test-output.sh"
      - "install.sh"
      - "packs/**"
      - ".tool-versions"
      - ".github/workflows/portal-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "portal/**"
      - ".agent/scripts/check-portal-test-output.sh"
      - "install.sh"
      - "packs/**"
      - ".tool-versions"
      - ".github/workflows/portal-ci.yml"

# install.sh + packs/** are real source inputs to the
# portal release: InstallController embeds install.sh via @external_resource
# and EmisarWeb.PacksRegistry compile-scans packs/. A
# change to either silently rebuilds the release artefact, so it must
# also re-run portal-ci.
#
# .tool-versions (repo root) is the single source of truth for the
# Erlang/Elixir toolchain: setup-beam resolves it via version-file, and
# the release image build derives its --build-args from it. A bump there
# changes what the test job and the release image compile with, so it
# must re-run portal-ci even when nothing under portal/ changed.

concurrency:
  group: portal-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: emisar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: portal

    env:
      MIX_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost/emisar_test

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1.24.1
        with:
          # Pinned in /.tool-versions (repo root) — the single source of
          # truth shared with local asdf, so CI can't drift from dev.
          # setup-beam resolves version-file against GITHUB_WORKSPACE (not
          # this job's portal/ working-dir), and requires version-type: strict.
          version-file: .tool-versions
          version-type: strict

      - name: Restore deps cache
        uses: actions/cache@v5
        with:
          path: |
            portal/deps
            portal/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('portal/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install hex + rebar
        run: mix local.hex --force && mix local.rebar --force

      - name: Fetch deps
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Format check
        run: mix format --check-formatted

      - name: Credo (Iron Laws)
        # The mechanical IL-20 gate: the 35 custom Emisar.Checks.* AST checks
        # (.credo.exs, strict) + stock UnsafeToAtom/NoProcessDictionary. Runs the
        # same `mix credo` an agent runs locally, so a context-level violation
        # (String.to_atom on runner/LLM input, a Process.put metadata channel, a
        # web-layer Repo/Audit/Changeset call, a subject-less public read) can't
        # merge green. Ordered after format to match the IL-20 chain
        # compile && format && credo && test.
        run: mix credo

      - name: Dependency audit (mix_audit)
        # emisar is a security product — fail the build on a known
        # advisory in any dependency. GHSA-g2wm-735q-3f56 (cowlib, low)
        # has no upstream patch yet; ignore it explicitly and revisit
        # when cowlib ships a fix.
        run: mix deps.audit --ignore-advisory-ids GHSA-g2wm-735q-3f56

      - name: Security scan (Sobelow)
        # Static analysis of the Phoenix surface (XSS, SQLi, command
        # injection, CSRF, insecure config). Threshold + ignores live in
        # apps/emisar_web/.sobelow-conf.
        run: mix sobelow --root apps/emisar_web --config

      - name: Compile-cycle budget
        # Keep the existing xref budget gate without dumping the known cycle
        # into normal CI output. If the budget is exceeded, print the report.
        run: |
          if ! output="$(cd apps/emisar && mix xref.cycles 2>&1)"; then
            echo "$output"
            exit 1
          fi

      - name: Test output gate (clean ExUnit output)
        # Runs both portal test suites and fails if the output contains
        # compiler warnings, Logger warning/error lines, or async DB teardown
        # noise. Dirty test output is a regression: fix the source, don't hide it.
        run: ../.agent/scripts/check-portal-test-output.sh

      - name: Docker build (release image)
        # Build context must be the REPO ROOT (the Dockerfile pulls in
        # ../install.sh and ../packs); the default
        # working-directory: portal would scope the context too tight.
        # Override here only — other steps stay in portal/.
        #
        # Toolchain --build-args come from /.tool-versions so the release
        # image compiles with the same Erlang/Elixir as the test job and
        # local dev — one source of truth, no drift. The elixir line
        # carries an asdf `-otp-NN` suffix the hexpm image tag omits, so
        # strip it; erlang maps straight to OTP_VERSION. The smoke image
        # also gets the dev-host force_ssl excludes so plain-HTTP localhost
        # probes can hit more than `/healthz`.
        working-directory: ${{ github.workspace }}
        run: |
          elixir_version=$(awk '$1=="elixir"{split($2,a,"-otp-"); print a[1]}' .tool-versions)
          otp_version=$(awk '$1=="erlang"{print $2}' .tool-versions)
          if [ -z "$elixir_version" ] || [ -z "$otp_version" ]; then
            echo "::error::could not parse Elixir/OTP from .tool-versions"
            exit 1
          fi
          echo "building portal image with Elixir ${elixir_version} / OTP ${otp_version}"
          docker build -f portal/Dockerfile \
            --build-arg ELIXIR_VERSION="${elixir_version}" \
            --build-arg OTP_VERSION="${otp_version}" \
            --build-arg EMISAR_DEV_HOST_EXCLUDES=1 \
            -t emisar/portal:ci .

      - name: Docker smoke (release boots + runs migrations + serves /healthz)
        # `docker build` passing only proves the Dockerfile parses and
        # compiles — it doesn't prove the image boots. Three checks here:
        #
        #   1. `Emisar.Release.migrate()` — exercises runtime.exs +
        #      DATABASE_URL handling + the migrator. Catches a broken
        #      release alias or a config bug that crashes on prod boot.
        #   2. `/app/bin/server` boots in the background and serves
        #      `/healthz`. Catches supervision-tree crashes that only
        #      surface at runtime.
        #   3. `docker stop` exits within the grace window. Catches a
        #      hung GenServer.terminate/2.
        #
        # `--network host` lets the container reach the `postgres` service
        # via localhost:5432 (the service is published there by GHA).
        working-directory: ${{ github.workspace }}
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost/emisar_smoke
          SECRET_KEY_BASE: smoke-key-base-64-chars-of-non-secret-text-aaaaaaaaaaaaaaaaaaaaaaa
          PHX_HOST: localhost
          PORT: "4000"
          # runtime.exs raises in :prod if neither PADDLE_API_KEY nor
          # EMISAR_DISABLE_BILLING is set — we don't want to bake a
          # Paddle key into CI, so use the stub.
          EMISAR_DISABLE_BILLING: "1"
          # FORCE_SSL=false disables the secure-cookie pin and makes URL
          # generation plain HTTP. HTTPS redirects are compile-time, so the
          # docker build above also sets EMISAR_DEV_HOST_EXCLUDES=1 for the
          # smoke image.
          FORCE_SSL: "false"
        run: |
          set -euo pipefail

          # Fresh DB next to the running postgres service. `|| true`
          # is fine here — the migrate step below will fail loudly if
          # the DB really isn't there.
          PGPASSWORD=postgres psql -h localhost -U postgres -d postgres \
            -c 'CREATE DATABASE emisar_smoke;' || true

          docker run --rm --network host \
            -e DATABASE_URL -e SECRET_KEY_BASE -e PHX_HOST \
            -e EMISAR_DISABLE_BILLING -e FORCE_SSL \
            emisar/portal:ci /app/bin/emisar eval 'Emisar.Release.migrate()'

          cid=$(docker run -d --network host \
            -e DATABASE_URL -e SECRET_KEY_BASE -e PHX_HOST -e PORT \
            -e EMISAR_DISABLE_BILLING -e FORCE_SSL \
            emisar/portal:ci)

          # Always dump tail on exit so a boot failure is debuggable
          # from the CI log without re-running.
          trap 'docker logs "$cid" 2>&1 | tail -80; docker rm -f "$cid" >/dev/null 2>&1 || true' EXIT

          for i in $(seq 1 30); do
            if curl -fsS http://localhost:4000/healthz >/dev/null; then
              echo "healthz OK after ~${i}s"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "::error::release container failed to serve /healthz within 60s"
              exit 1
            fi
            sleep 2
          done

          # The pack registry endpoint must serve a real gzip tarball
          # from the running image — catches a missing compile-time
          # bake or a broken route before it reaches an install script.
          ctype=$(curl -fsS -o /tmp/pack.tgz -w '%{content_type}' \
            http://localhost:4000/packs/linux-core/pack.tar.gz)
          echo "pack tarball content-type: ${ctype}"
          gzip -t /tmp/pack.tgz || { echo "::error::/packs/linux-core/pack.tar.gz is not valid gzip"; exit 1; }
          curl -fsS http://localhost:4000/packs.json | grep -q '"linux-core"' \
            || { echo "::error::/packs.json missing linux-core"; exit 1; }
          echo "pack registry endpoints OK"

          docker stop --time 15 "$cid"
