name: Release · runner

run-name: Release ${{ inputs.ref || github.ref_name }}

# Triggered ONLY by a maintainer pushing a tag `runner-vMAJOR.MINOR.PATCH`,
# or by manual `workflow_dispatch` (also restricted to maintainers via
# the `release` environment's required-reviewers config).
#
# A PR cannot reach this workflow:
#
#   * `on:` does not include `pull_request` or `pull_request_target`.
#   * The publish step gates on `environment: release`, which the repo
#     settings configure with required reviewers — at least one
#     maintainer must approve before binaries are uploaded.
#   * Default token permissions are read-only; the publish job is the
#     only place that opts into `contents: write` (for the release
#     itself) and `id-token: write` + `attestations: write` (for
#     generating Sigstore build provenance).
#
# Asset naming:
#
#   tag      : runner-v0.3.0
#   version  : 0.3.0   (tag with `runner-v` prefix stripped)
#   tarball  : emisar-0.3.0-<OS>-<ARCH>.tar.gz
#   checksum : SHA256SUMS (one combined file for all four arches)
#
# `install.sh` queries the latest release matching `runner-v*` and
# downloads `emisar-${version}-${os}-${arch}.tar.gz` + `SHA256SUMS`.

on:
  push:
    tags:
      - "runner-v*.*.*"
  workflow_dispatch:
    inputs:
      ref:
        description: "git tag to release (e.g. runner-v0.3.0)"
        required: true
        type: string

concurrency:
  group: runner-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    name: Verify (vet + test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version-file: runner/go.mod
          cache: true
          cache-dependency-path: runner/go.sum

      - run: cd runner && go vet ./...
      - run: cd runner && go test -race -count=1 ./...

  validate-packs:
    # Runs every shipped pack through `emisar pack validate` before
    # we tag a binary. Without this, a malformed pack baked into the
    # release tarball would only fail when an operator extracted it
    # — packs-ci catches it on PR, but a force-push to main after the
    # PR closed could slip a regression past that gate. Defense in depth.
    name: Validate packs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version-file: runner/go.mod
          cache: true
          cache-dependency-path: runner/go.sum

      - name: build emisar CLI
        run: cd runner && go build -trimpath -o /tmp/emisar .

      - name: validate every shipped pack
        run: |
          set -euo pipefail
          shopt -s nullglob
          packs=(packs/*/)
          if [ ${#packs[@]} -lt 1 ]; then
            echo "::error::no packs found — refusing to release"
            exit 1
          fi
          failures=()
          for pack in "${packs[@]}"; do
            name="$(basename "${pack%/}")"
            printf '\n==> %s\n' "$name"
            /tmp/emisar pack validate "${pack%/}" || failures+=("$name")
          done
          if [ ${#failures[@]} -gt 0 ]; then
            printf '\n✗ packs failed validation:\n'
            printf '   - %s\n' "${failures[@]}"
            exit 1
          fi
          printf '\n✓ all %d packs valid\n' "${#packs[@]}"

  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [verify, validate-packs]
    # `release` environment gate at BUILD (not just publish) so the
    # Sigstore OIDC token used for attestation isn't minted until a
    # maintainer approves. Without this, anyone who can push a tag
    # (collaborators with write access) can mint an attested-by-our-
    # workflow artefact — even if the publish step blocks them from
    # uploading, the attestation itself carries a real signature.
    environment:
      name: release
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
    # Attestations need id-token write at the build job (where the
    # SLSA provenance subject is computed) so the runner can request
    # an OIDC token bound to this workflow run.
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version-file: runner/go.mod
          cache: true
          cache-dependency-path: runner/go.sum

      - name: derive version
        id: ver
        run: |
          ref="${{ inputs.ref || github.ref_name }}"
          ref="${ref#refs/tags/}"
          if [[ ! "$ref" =~ ^runner-v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "::error::tag $ref doesn't match runner-vMAJOR.MINOR.PATCH"
            exit 1
          fi
          version="${ref#runner-v}"
          echo "tag=${ref}"           >> "$GITHUB_OUTPUT"
          echo "version=${version}"   >> "$GITHUB_OUTPUT"

      - name: build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p dist
          (cd runner && go build -trimpath \
            -ldflags "-s -w -X main.Version=${VERSION}" \
            -o "../dist/emisar" .)
          # Bundle runner binary + install.sh + sample packs + docs
          # into the tarball install.sh expects. Tarball internals
          # keep the flat shape (packs/ at the root) so the
          # script's hard-coded paths work after extraction.
          name="emisar-${VERSION}-${GOOS}-${GOARCH}"
          mkdir -p "dist/${name}"
          cp dist/emisar "dist/${name}/emisar"
          cp README.md "dist/${name}/"
          # runner/LICENSE (Apache-2.0 — the license of the shipped
          # binary + packs) and install.sh are repo invariants; missing
          # either is a malformed release, so copy unconditionally (no
          # `[ -f X ] && ... || true` swallows). `docs/` is gitignored
          # and read at https://emisar.dev/docs, so it's not shipped.
          cp runner/LICENSE "dist/${name}/LICENSE"
          cp install.sh "dist/${name}/install.sh"
          chmod +x "dist/${name}/install.sh"
          # Bundle only a SMALL curated default set so install.sh can set
          # up host-appropriate starter packs offline. The full catalog
          # (~73 packs) is fetched on demand via `emisar pack install
          # <name>` from the registry — we do NOT ship all of them.
          mkdir -p "dist/${name}/packs"
          for pack in linux-core debugging debian dnf-rpm systemd-deep docker; do
            if [ -d "packs/${pack}" ]; then
              cp -R "packs/${pack}" "dist/${name}/packs/${pack}"
            else
              echo "::error::bundled default pack ${pack} not found"
              exit 1
            fi
          done
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          shasum -a 256 "dist/${name}.tar.gz" | awk '{print $1}' > "dist/${name}.tar.gz.sha256"
          ls -la dist/

      - name: attest build provenance
        # Generates a SLSA-3 provenance attestation for the tarball.
        # The attestation is signed by Sigstore using a workflow-bound
        # ambient OIDC identity (no long-lived keys). Verifiable later
        # with `gh attestation verify <tarball> --owner andrewdryga`.
        #
        # GitHub's attestation API rejects user-owned private repos
        # (free-tier feature gate). Skip on private; the step kicks
        # back in automatically once the repo is public. Without this
        # guard, the release would never publish (build job fails →
        # publish skips) on a private repo.
        if: ${{ !github.event.repository.private }}
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/emisar-${{ steps.ver.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz

      - name: upload artefact
        uses: actions/upload-artifact@v7
        with:
          name: emisar-runner-${{ steps.ver.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          retention-days: 7

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    # No `environment:` block here — the `build` job is already gated
    # by `environment: release`, and GitHub Actions prompts for an
    # approval per env-gated job (not per env, per workflow run). One
    # approval at build covers the whole release flow; double-gating
    # publish would just mean clicking approve twice for no extra
    # protection.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false

      - name: download artefacts
        uses: actions/download-artifact@v8
        with:
          path: artefacts/

      - name: assemble release assets
        id: assets
        run: |
          mkdir -p release
          find artefacts/ -name "emisar-*.tar.gz" -exec cp {} release/ \;
          find artefacts/ -name "emisar-*.tar.gz.sha256" -exec cp {} release/ \;
          # One combined checksum file is friendlier for `sha256sum -c`.
          ( cd release && shasum -a 256 emisar-*.tar.gz > SHA256SUMS )
          ls -la release/

      - name: derive version
        id: ver
        run: |
          ref="${{ inputs.ref || github.ref_name }}"
          ref="${ref#refs/tags/}"
          version="${ref#runner-v}"
          echo "tag=${ref}"           >> "$GITHUB_OUTPUT"
          echo "version=${version}"   >> "$GITHUB_OUTPUT"

      - name: create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "emisar runner ${{ steps.ver.outputs.version }}"
          # `make_latest: legacy` — only this release is marked Latest
          # on GitHub if it's the newest by semver. The MCP bridge has
          # its own release stream (mcp-v*) and shouldn't compete for
          # the Latest pointer; we keep the runner as Latest because
          # that's what most install pipelines (`curl | bash`) hit.
          make_latest: legacy
          generate_release_notes: true
          files: |
            release/emisar-*.tar.gz
            release/emisar-*.tar.gz.sha256
            release/SHA256SUMS
          fail_on_unmatched_files: true
