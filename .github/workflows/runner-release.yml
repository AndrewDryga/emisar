name: Runner release

# Triggered ONLY by a maintainer pushing a tag `runner-vMAJOR.MINOR.PATCH`,
# or by manual `workflow_dispatch` (also restricted to maintainers via
# the `release` environment's required-reviewers config).
#
# A PR cannot reach this workflow:
#
#   * `on:` does not include `pull_request` or `pull_request_target`.
#   * The publish step gates on `environment: release`, which the repo
#     settings configure with required reviewers — at least one
#     maintainer must approve before binaries are uploaded.
#   * Default token permissions are read-only; the publish job is the
#     only place that opts into `contents: write` (for the release
#     itself) and `id-token: write` + `attestations: write` (for
#     generating Sigstore build provenance).
#
# Asset naming:
#
#   tag      : runner-v0.3.0
#   version  : 0.3.0   (tag with `runner-v` prefix stripped)
#   tarball  : emisar-0.3.0-<OS>-<ARCH>.tar.gz
#   checksum : SHA256SUMS (one combined file for all four arches)
#
# `install.sh` queries the latest release matching `runner-v*` and
# downloads `emisar-${version}-${os}-${arch}.tar.gz` + `SHA256SUMS`.

on:
  push:
    tags:
      - "runner-v*.*.*"
  workflow_dispatch:
    inputs:
      ref:
        description: "git tag to release (e.g. runner-v0.3.0)"
        required: true
        type: string

concurrency:
  group: runner-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    name: verify (vet + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false

      - uses: actions/setup-go@v5
        with:
          go-version-file: runner/go.mod
          cache: true
          cache-dependency-path: runner/go.sum

      - run: cd runner && go vet ./...
      - run: cd runner && go test -race -count=1 ./...

  build:
    name: build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: [verify]
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
    # Attestations need id-token write at the build job (where the
    # SLSA provenance subject is computed) so the runner can request
    # an OIDC token bound to this workflow run.
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false

      - uses: actions/setup-go@v5
        with:
          go-version-file: runner/go.mod
          cache: true
          cache-dependency-path: runner/go.sum

      - name: derive version
        id: ver
        run: |
          ref="${{ inputs.ref || github.ref_name }}"
          ref="${ref#refs/tags/}"
          if [[ ! "$ref" =~ ^runner-v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "::error::tag $ref doesn't match runner-vMAJOR.MINOR.PATCH"
            exit 1
          fi
          version="${ref#runner-v}"
          echo "tag=${ref}"           >> "$GITHUB_OUTPUT"
          echo "version=${version}"   >> "$GITHUB_OUTPUT"

      - name: build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p dist
          (cd runner && go build -trimpath \
            -ldflags "-s -w -X main.Version=${VERSION}" \
            -o "../dist/emisar" .)
          # Bundle runner binary + install.sh + sample packs + docs
          # into the tarball install.sh expects. Tarball internals
          # keep the flat shape (examples/packs at the root) so the
          # script's hard-coded paths work after extraction.
          name="emisar-${VERSION}-${GOOS}-${GOARCH}"
          mkdir -p "dist/${name}"
          cp dist/emisar "dist/${name}/emisar"
          cp README.md "dist/${name}/"
          [ -f LICENSE ] && cp LICENSE "dist/${name}/" || true
          [ -f LICENSE.md ] && cp LICENSE.md "dist/${name}/" || true
          cp install.sh "dist/${name}/install.sh"
          chmod +x "dist/${name}/install.sh"
          cp -R runner/examples "dist/${name}/examples"
          [ -d docs ] && cp -R docs "dist/${name}/docs" || true
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          shasum -a 256 "dist/${name}.tar.gz" | awk '{print $1}' > "dist/${name}.tar.gz.sha256"
          ls -la dist/

      - name: attest build provenance
        # Generates a SLSA-3 provenance attestation for the tarball.
        # The attestation is signed by Sigstore using a workflow-bound
        # ambient OIDC identity (no long-lived keys). Verifiable later
        # with `gh attestation verify <tarball> --owner andrewdryga`.
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/emisar-${{ steps.ver.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz

      - name: upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: emisar-runner-${{ steps.ver.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          retention-days: 7

  publish:
    name: publish GitHub release
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: release
      url: ${{ github.server_url }}/${{ github.repository }}/releases
    # Only this job gets contents:write — needed to create the release
    # and upload assets.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false

      - name: download artefacts
        uses: actions/download-artifact@v4
        with:
          path: artefacts/

      - name: assemble release assets
        id: assets
        run: |
          mkdir -p release
          find artefacts/ -name "emisar-*.tar.gz" -exec cp {} release/ \;
          find artefacts/ -name "emisar-*.tar.gz.sha256" -exec cp {} release/ \;
          # One combined checksum file is friendlier for `sha256sum -c`.
          ( cd release && shasum -a 256 emisar-*.tar.gz > SHA256SUMS )
          ls -la release/

      - name: derive version
        id: ver
        run: |
          ref="${{ inputs.ref || github.ref_name }}"
          ref="${ref#refs/tags/}"
          version="${ref#runner-v}"
          echo "tag=${ref}"           >> "$GITHUB_OUTPUT"
          echo "version=${version}"   >> "$GITHUB_OUTPUT"

      - name: create GitHub release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "emisar runner ${{ steps.ver.outputs.version }}"
          # `make_latest: legacy` — only this release is marked Latest
          # on GitHub if it's the newest by semver. The MCP bridge has
          # its own release stream (mcp-v*) and shouldn't compete for
          # the Latest pointer; we keep the runner as Latest because
          # that's what most install pipelines (`curl | bash`) hit.
          make_latest: legacy
          generate_release_notes: true
          files: |
            release/emisar-*.tar.gz
            release/emisar-*.tar.gz.sha256
            release/SHA256SUMS
          fail_on_unmatched_files: true
