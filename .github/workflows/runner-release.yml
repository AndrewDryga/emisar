name: Runner release

# Releases are triggered ONLY by a maintainer pushing a tag matching
# v*.*.*. PRs cannot trigger this workflow — the `on:` triggers below
# do not include pull_request or pull_request_target. The only ways to
# kick off a release are:
#
#   1. `git tag vX.Y.Z && git push origin vX.Y.Z` from someone with
#      push access to the repo (or via the protected `release` GitHub
#      Environment which requires manual approval).
#   2. Manual `workflow_dispatch`, restricted to maintainers.
#
# A PR opened by an attacker against this repo will never reach the
# release path. The CI workflow runs on PRs separately and has no
# secret access.

on:
  push:
    tags:
      - "v*.*.*"
  # workflow_dispatch lets maintainers re-run a release manually
  # without pushing a new tag (e.g., to rebuild after fixing CI).
  workflow_dispatch:
    inputs:
      ref:
        description: "git tag or commit to release"
        required: true
        type: string

# Cancel in-flight releases of the same tag (avoids parallel uploads
# clashing on the same release).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Default token scope is read-only. The publish job below opts into
# `contents: write` for creating the release; no other elevated scopes
# are granted anywhere in this workflow.
permissions:
  contents: read

jobs:
  verify:
    name: verify (test + vet)
    runs-on: ubuntu-latest
    # No secrets needed for verify; runs with the default read-only token.
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false

      - uses: actions/setup-go@v5
        with:
          go-version-file: runner/go.mod
          cache: true
          cache-dependency-path: |
            runner/go.sum

      - run: cd runner && go vet ./...
      - run: cd mcp && go vet ./...
      - run: cd runner && go test -race -count=1 ./...
      - run: cd mcp && go test -race -count=1 ./...

  build:
    name: build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: [verify]
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false

      - uses: actions/setup-go@v5
        with:
          go-version-file: runner/go.mod
          cache: true
          cache-dependency-path: |
            runner/go.sum

      - name: derive version
        id: ver
        run: |
          ref="${{ inputs.ref || github.ref_name }}"
          # Strip refs/tags/ prefix if present.
          ref="${ref#refs/tags/}"
          echo "version=${ref}" >> "$GITHUB_OUTPUT"

      - name: build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p dist
          # emisar — the runner (runs on managed Linux hosts as a service)
          (cd runner && go build -trimpath \
            -ldflags "-s -w -X main.Version=${VERSION}" \
            -o "../dist/emisar" .)
          # emisar-mcp — the stdio MCP bridge (runs on the operator's
          # laptop, spawned as a child process by Claude Code, Cursor,
          # Gemini CLI, Codex CLI, etc.)
          (cd mcp && go build -trimpath \
            -ldflags "-s -w -X main.Version=${VERSION}" \
            -o "../dist/emisar-mcp" .)
          # Bundle both binaries, README, install.sh, packs dir, and docs
          # into a tarball. The install.sh inside the tarball matches
          # the version of the runner it ships — operators can extract
          # and run it directly without a separate curl-pipe step.
          # Note: tarball internals keep the flat shape install.sh
          # expects (examples/packs at the tarball root), independent
          # of the monorepo layout.
          name="emisar-${VERSION}-${GOOS}-${GOARCH}"
          mkdir -p "dist/${name}"
          cp dist/emisar "dist/${name}/emisar"
          cp dist/emisar-mcp "dist/${name}/emisar-mcp"
          cp README.md "dist/${name}/"
          [ -f LICENSE ] && cp LICENSE "dist/${name}/" || true
          [ -f LICENSE.md ] && cp LICENSE.md "dist/${name}/" || true
          cp install.sh "dist/${name}/install.sh"
          chmod +x "dist/${name}/install.sh"
          cp -R runner/examples "dist/${name}/examples"
          cp -R docs "dist/${name}/docs"
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          shasum -a 256 "dist/${name}.tar.gz" | awk '{print $1}' > "dist/${name}.tar.gz.sha256"
          ls -la dist/

      - name: upload binary artefact
        uses: actions/upload-artifact@v4
        with:
          name: emisar-${{ steps.ver.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          retention-days: 7

  publish:
    name: publish GitHub release
    runs-on: ubuntu-latest
    needs: [build]
    # The `release` environment is configured in GitHub repo settings
    # with required reviewers — at least one maintainer must approve
    # before this job runs. This is the single human checkpoint between
    # a tag landing and binaries being published.
    environment:
      name: release
      url: ${{ github.server_url }}/${{ github.repository }}/releases
    # Only this job gets contents:write — needed to create the release
    # and upload assets. No other secret is referenced anywhere.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false

      - name: download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: artefacts/

      - name: assemble release assets
        run: |
          mkdir -p release
          find artefacts/ -name "emisar-*.tar.gz" -exec cp {} release/ \;
          find artefacts/ -name "emisar-*.tar.gz.sha256" -exec cp {} release/ \;
          # One combined checksum file is friendlier for `sha256sum -c`.
          ( cd release && shasum -a 256 emisar-*.tar.gz > SHA256SUMS )
          ls -la release/

      - name: derive version
        id: ver
        run: |
          ref="${{ inputs.ref || github.ref_name }}"
          ref="${ref#refs/tags/}"
          echo "version=${ref}" >> "$GITHUB_OUTPUT"

      - name: create GitHub release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            release/emisar-*.tar.gz
            release/emisar-*.tar.gz.sha256
            release/SHA256SUMS
          fail_on_unmatched_files: true
