name: Release - Runner

run-name: Release ${{ github.ref_name }}

# Triggered ONLY by a maintainer pushing a tag `runner-vMAJOR.MINOR.PATCH`
# (the /ops-release skill cuts the signed tag). Re-running a release is a re-run
# of that tag's run from the Actions UI — no separate manual trigger. The
# first attempt requires current main; a rerun preserves the original SHA/ref
# and therefore needs only the signed tag's continuing ancestry on main.
#
# A PR cannot reach this workflow:
#
#   * `on:` does not include `pull_request` or `pull_request_target`.
#   * The build step gates on `environment: public-releases`, whose tag
#     patterns (`runner-v*`, `mcp-v*`) bound which refs may reach it. The
#     signed annotated tag targeting current main IS the human release
#     decision — the environment carries no required reviewer while the
#     repository has a single maintainer (see DEPLOYMENT.md).
#   * Default token permissions are read-only; the publish job is the
#     only place that opts into `contents: write` (for the release
#     itself) and `id-token: write` + `attestations: write` (for
#     generating Sigstore build provenance).
#
# Asset naming:
#
#   tag      : runner-v0.3.0
#   version  : 0.3.0   (tag with `runner-v` prefix stripped)
#   tarball  : emisar-0.3.0-<OS>-<ARCH>.tar.gz
#   checksum : SHA256SUMS (one combined file for all four arches)
#
# `install.sh` queries the latest release matching `runner-v*` and
# downloads `emisar-${version}-${os}-${arch}.tar.gz` + `SHA256SUMS`.

on:
  push:
    tags:
      - "runner-v*.*.*"

concurrency:
  group: runner-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    name: Verify release source
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GOTOOLCHAIN: local
      RELEASE_TAG: ${{ github.ref_name }}
      RUN_ATTEMPT: ${{ github.run_attempt }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.ref }}
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: runner/go.mod
          cache: true
          cache-dependency-path: runner/go.sum

      - name: Verify exact signed annotated tag
        run: |
          set -euo pipefail
          [[ "$RELEASE_TAG" =~ ^runner-v[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "::error::tag must exactly match runner-vMAJOR.MINOR.PATCH"; exit 1; }
          ref=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}")
          test "$(jq -r '.object.type' <<< "$ref")" = tag || {
            echo "::error::release tags must be signed annotated tags"; exit 1; }
          tag=$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/$(jq -r '.object.sha' <<< "$ref")")
          test "$(jq -r '.verification.verified' <<< "$tag")" = true || {
            echo "::error::GitHub could not verify the release tag signature"; exit 1; }
          test "$(jq -r '.object.sha' <<< "$tag")" = "$(git rev-parse HEAD)" || {
            echo "::error::tag target does not match the checked-out commit"; exit 1; }
          git merge-base --is-ancestor HEAD origin/main || {
            echo "::error::release tag target is not on main"; exit 1; }
          if [ "$RUN_ATTEMPT" = 1 ]; then
            test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)" || {
              echo "::error::new release tags must target current main"; exit 1; }
          else
            echo "Recovery attempt ${RUN_ATTEMPT}: signed tag target remains on main; current-tip equality is intentionally relaxed."
          fi

      - name: Require successful CI for tagged commit
        # The release process tags only after the commit's Required - CI
        # aggregate reports green; this enforces it. Content-stable checks
        # (vet, staticcheck, race tests, pack validation, installer lint)
        # were enforced by CI when this exact tree last changed — force
        # pushes to main are disabled, so the history is append-only and a
        # green check cannot be rewritten out from under the tag.
        run: |
          set -euo pipefail
          deadline=$((SECONDS + 1500))
          while true; do
            result=$(gh api \
              -H 'Accept: application/vnd.github+json' \
              "repos/${GITHUB_REPOSITORY}/commits/$(git rev-parse HEAD)/check-runs?per_page=100" \
              --jq '[.check_runs[] | select((.name == "Required - CI" or .name == "CI / Required - CI") and .app.id == 15368)] | sort_by(.id) | last | [(.status // "missing"), (.conclusion // "pending")] | @tsv')
            IFS=$'\t' read -r status conclusion <<< "$result"

            if [ "$status" = completed ]; then
              test "$conclusion" = success || {
                echo "::error::tagged commit's Required - CI check ended '$conclusion'"
                exit 1
              }
              break
            fi

            if ((SECONDS >= deadline)); then
              echo "::error::timed out waiting for the tagged commit's Required - CI check (last status '$status')"
              exit 1
            fi

            echo "Required - CI is ${status}; checking again in 15 seconds"
            sleep 15
          done

      - name: Scan current advisories
        # The one release-time re-check: govulncheck consults today's
        # vulnerability database, which moves independently of the source —
        # a tag can land on a tree whose last Go change predates a fresh
        # advisory. Everything content-stable already rode Required - CI.
        working-directory: runner
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          govulncheck ./...

  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [verify]
    # `public-releases` environment gate at BUILD (not just publish) so the
    # Sigstore OIDC token used for attestation is minted only for a ref the
    # environment's tag patterns admit (`runner-v*`/`mcp-v*`) — an arbitrary
    # branch can never produce an attested-by-our-workflow artefact. The
    # human decision is the signed tag itself; re-add required reviewers
    # here the moment a second collaborator gains write access.
    environment:
      name: public-releases
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
    # Attestations need id-token write at the build job (where the
    # SLSA provenance subject is computed) so the runner can request
    # an OIDC token bound to this workflow run.
    permissions:
      contents: read
      id-token: write
      attestations: write
    env:
      GOTOOLCHAIN: local
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.ref }}
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: runner/go.mod
          cache: true
          cache-dependency-path: runner/go.sum

      - name: Derive version
        id: ver
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^runner-v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::tag $RELEASE_TAG doesn't match runner-vMAJOR.MINOR.PATCH"
            exit 1
          fi
          version="${RELEASE_TAG#runner-v}"
          echo "tag=${RELEASE_TAG}"   >> "$GITHUB_OUTPUT"
          echo "version=${version}"   >> "$GITHUB_OUTPUT"

      - name: Build deterministic archive
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p dist
          (cd runner && go build -trimpath \
            -ldflags "-buildid= -s -w -X main.Version=${VERSION}" \
            -o "../dist/emisar" .)
          # Bundle runner binary + install.sh + sample packs + docs
          # into the tarball install.sh expects. Tarball internals
          # keep the flat shape (packs/ at the root) so the
          # script's hard-coded paths work after extraction.
          name="emisar-${VERSION}-${GOOS}-${GOARCH}"
          mkdir -p "dist/${name}"
          cp dist/emisar "dist/${name}/emisar"
          cp README.md "dist/${name}/"
          # runner/LICENSE (Apache-2.0 — the license of the shipped
          # binary + packs) and install.sh are repo invariants; missing
          # either is a malformed release, so copy unconditionally (no
          # `[ -f X ] && ... || true` swallows). `docs/` is gitignored
          # and read at https://emisar.dev/docs, so it's not shipped.
          cp runner/LICENSE "dist/${name}/LICENSE"
          cp install.sh "dist/${name}/install.sh"
          chmod +x "dist/${name}/install.sh"
          # Bundle only a SMALL curated default set so install.sh can set
          # up host-appropriate starter packs offline. The full catalog
          # (~73 packs) is fetched on demand via `emisar pack install
          # <name>` from the registry — we do NOT ship all of them.
          mkdir -p "dist/${name}/packs"
          while IFS= read -r pack; do
            test -n "$pack" || continue
            if [ -d "packs/${pack}" ]; then
              cp -R "packs/${pack}" "dist/${name}/packs/${pack}"
            else
              echo "::error::bundled default pack ${pack} not found"
              exit 1
            fi
          done < runner/bundled-packs.txt
          tar --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner \
            -C dist -czf "dist/${name}.tar.gz" "${name}"
          shasum -a 256 "dist/${name}.tar.gz" | awk '{print $1}' > "dist/${name}.tar.gz.sha256"
          ls -la dist/

      - name: Verify release archive
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          name="emisar-${VERSION}-${GOOS}-${GOARCH}"
          mkdir -p /tmp/release-check
          tar -xzf "dist/${name}.tar.gz" -C /tmp/release-check
          test -x "/tmp/release-check/${name}/emisar"
          test -x "/tmp/release-check/${name}/install.sh"
          test -f "/tmp/release-check/${name}/LICENSE"
          test -f "/tmp/release-check/${name}/README.md"
          expected_packs=$(grep -cve '^[[:space:]]*$' runner/bundled-packs.txt)
          test "$(find "/tmp/release-check/${name}/packs" -mindepth 1 -maxdepth 1 -type d | wc -l)" -eq "$expected_packs"
          go version -m "/tmp/release-check/${name}/emisar"
          if [ "$GOOS/$GOARCH" = linux/amd64 ]; then
            test "$("/tmp/release-check/${name}/emisar" --version)" = "emisar version ${VERSION}"
          fi

      - name: Attest build provenance
        # Generates a SLSA-3 provenance attestation for the tarball.
        # The attestation is signed by Sigstore using a workflow-bound
        # ambient OIDC identity (no long-lived keys). Verifiable later
        # with `gh attestation verify <tarball> --owner andrewdryga`.
        #
        # GitHub's attestation API rejects user-owned private repos
        # (free-tier feature gate). Skip on private; the step kicks
        # back in automatically once the repo is public. Without this
        # guard, the release would never publish (build job fails →
        # publish skips) on a private repo.
        if: ${{ !github.event.repository.private }}
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: |
            dist/emisar-${{ steps.ver.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz

      - name: Upload release archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: emisar-runner-${{ steps.ver.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          retention-days: 7
          overwrite: true

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    # No `environment:` block here — the ref restriction already applied at
    # build, and publish only uploads what build attested. A second
    # environment gate would add nothing.
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.ref }}
          persist-credentials: false

      - name: Download release archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artefacts/

      - name: Assemble release assets
        id: assets
        run: |
          mkdir -p release
          find artefacts/ -name "emisar-*.tar.gz" -exec cp {} release/ \;
          find artefacts/ -name "emisar-*.tar.gz.sha256" -exec cp {} release/ \;
          # One combined checksum file is friendlier for `sha256sum -c`.
          ( cd release && shasum -a 256 emisar-*.tar.gz > SHA256SUMS )
          ls -la release/

      - name: Derive version
        id: ver
        run: |
          [[ "$RELEASE_TAG" =~ ^runner-v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          version="${RELEASE_TAG#runner-v}"
          echo "tag=${RELEASE_TAG}"   >> "$GITHUB_OUTPUT"
          echo "version=${version}"   >> "$GITHUB_OUTPUT"

      - name: Publish immutable GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "Runner v${{ steps.ver.outputs.version }}"
          # `make_latest: legacy` — only this release is marked Latest
          # on GitHub if it's the newest by semver. The MCP bridge has
          # its own release stream (mcp-v*) and shouldn't compete for
          # the Latest pointer; we keep the runner as Latest because
          # that's what most install pipelines (`curl | bash`) hit.
          make_latest: legacy
          generate_release_notes: true
          files: |
            release/emisar-*.tar.gz
            release/emisar-*.tar.gz.sha256
            release/SHA256SUMS
          fail_on_unmatched_files: true
