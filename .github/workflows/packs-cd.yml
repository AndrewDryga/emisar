name: CD · Packs

# Continuous delivery for the public pack registry (the GCS bucket
# `emisar pack install` reads unauthenticated):
#
#   packs/** merges to main  →  approve the run  →  catalog built → published
#
# Retiring old versions needs no separate motion: a pack's retired_below floor
# is authored in its pack.yaml and ships through this same merge → publish.
#
# The catalog is ALWAYS built against the currently-published catalog.json
# (`--previous`): version history carries forward (the K-previous window +
# retirement watermark), and a version/hash drift on an already-published
# pack fails the build instead of silently rewriting an immutable artifact.
# packctl publishes immutable tarballs BEFORE flipping the mutable pointers
# (catalog.json / suggest.json), so a half-finished upload never dangles a
# pointer at a missing artifact; runs are serialized (concurrency below) so
# two publishes can't race the pointers.
#
# Auth is keyless: the job's OIDC token exchanges at the `github-actions`
# WIF pool (infra/deploy.tf) for `emisar-pack-publisher`, whose only power
# is bucket-scoped objectUser on the registry bucket
# (infra/packs_registry.tf). Install trust never rests on this pipeline —
# snippets pin `--hash sha256:…` and the runner rejects tampered tarballs.

on:
  push:
    branches: [main]
    paths:
      # The packs themselves, plus everything that shapes the built artifacts:
      # the loader (hash parity), the shared spec types, and the catalog
      # builder/publisher.
      - "packs/**"
      - "runner/internal/packs/**"
      - "runner/internal/catalog/**"
      - "runner/cmd/packctl/**"
      - "runner/pkg/packspec/**"
      - "runner/pkg/actionspec/**"
      - ".github/workflows/packs-cd.yml"

# One publish at a time, queued — never cancelled mid-upload: concurrent runs
# could interleave the mutable-pointer flips.
concurrency:
  group: packs-cd
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  require-ci:
    name: Require same-SHA CI
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      checks: read
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Wait for CI Gate on this commit
        run: |
          set -euo pipefail
          for attempt in $(seq 1 60); do
            result=$(gh api \
              -H 'Accept: application/vnd.github+json' \
              "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/check-runs?per_page=100" \
              --jq '[.check_runs[] | select(.name == "CI Gate")] | sort_by(.started_at) | last | if . == null then "missing:" else "\(.status):\(.conclusion // "")" end')
            case "$result" in
              completed:success) echo "CI Gate passed for ${GITHUB_SHA}"; exit 0 ;;
              completed:*) echo "::error::CI Gate for ${GITHUB_SHA} ended ${result#completed:}"; exit 1 ;;
              *) echo "CI Gate is ${result}; waiting (${attempt}/60)"; sleep 10 ;;
            esac
          done
          echo "::error::timed out waiting for CI Gate on ${GITHUB_SHA}"
          exit 1

  publish:
    name: Build · publish registry
    needs: require-ci
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: release
    permissions:
      contents: read
      # OIDC token for the keyless WIF exchange.
      id-token: write
    env:
      GOTOOLCHAIN: local
      REGISTRY_BASE: https://storage.googleapis.com/emisar-pack-registry
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: runner/go.mod
          cache: true
          cache-dependency-path: runner/go.sum

      - name: Build packctl
        run: cd runner && go build -trimpath -o /tmp/packctl ./cmd/packctl

      - name: Fetch the currently-published catalog
        # Bootstrap once from the reviewed catalog committed with the portal.
        # After the first successful publish, every build carries forward only
        # the public registry's history and retirement watermark.
        run: |
          set -euo pipefail
          status=$(curl -sS -o /tmp/previous.json -w '%{http_code}' "${REGISTRY_BASE}/v1/catalog.json")
          case "$status" in
            200) echo "using published catalog history" ;;
            404)
              echo "registry is empty; bootstrapping from the committed catalog"
              cp portal/apps/emisar/priv/packs/catalog.json /tmp/previous.json
              ;;
            *) echo "::error::registry catalog returned HTTP ${status}"; exit 1 ;;
          esac

      - name: Build the artifact tree
        run: |
          /tmp/packctl catalog build \
            --packs packs \
            --out dist \
            --previous /tmp/previous.json

      - name: Verify the canonical registry endpoint
        run: |
          set -euo pipefail
          status=$(curl -sS --retry 3 --connect-timeout 10 -o /dev/null -w '%{http_code}' \
            https://registry.emisar.dev/v1/catalog.json)
          case "$status" in
            200|404) echo "registry.emisar.dev DNS and TLS are ready (HTTP ${status})" ;;
            *) echo "::error::registry.emisar.dev is not ready (HTTP ${status})"; exit 1 ;;
          esac

      - name: Authenticate to GCP (keyless, WIF)
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: projects/65212203604/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: emisar-pack-publisher@emisar.iam.gserviceaccount.com
          # packctl's hand-rolled GCS client takes a raw OAuth2 token
          # (GOOGLE_OAUTH_ACCESS_TOKEN) — no gcloud, no SDK.
          token_format: access_token

      - name: Publish to the registry bucket
        env:
          GOOGLE_OAUTH_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          set -euo pipefail
          /tmp/packctl catalog publish --dir dist | tee /tmp/publish.log
          {
            echo "### 📦 Pack registry published"
            echo '```'
            tail -20 /tmp/publish.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify published pointers byte-for-byte
        run: |
          set -euo pipefail
          curl -fsS --retry 5 --retry-delay 2 "${REGISTRY_BASE}/v1/catalog.json" -o /tmp/gcs-catalog.json
          curl -fsS --retry 5 --retry-delay 2 "https://registry.emisar.dev/v1/catalog.json" -o /tmp/canonical-catalog.json
          cmp dist/v1/catalog.json /tmp/gcs-catalog.json
          cmp dist/v1/catalog.json /tmp/canonical-catalog.json
