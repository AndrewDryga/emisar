name: Runner CI

# Runner + MCP CI runs on every PR and every push to main.
# It uses ONLY the read-only GITHUB_TOKEN scope — no repo secrets are
# referenced anywhere. PRs from forks are therefore safe to run: a
# malicious PR cannot exfiltrate any signing keys, publish artefacts,
# or write to the repository. See .github/workflows/runner-release.yml
# for the trusted publishing path.

on:
  pull_request:
    branches: [main]
    paths:
      - "runner/**"
      - "mcp/**"
      - "install.sh"
      - "Makefile"
      - ".github/workflows/runner-ci.yml"
  push:
    branches: [main]
    paths:
      - "runner/**"
      - "mcp/**"
      - "install.sh"
      - "Makefile"
      - ".github/workflows/runner-ci.yml"

# Cancel earlier runs on the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Lock down GITHUB_TOKEN to the absolute minimum required for CI.
permissions:
  contents: read

jobs:
  lint:
    name: vet + gofmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-go@v5
        with:
          go-version-file: runner/go.mod
          cache: true
          cache-dependency-path: |
            runner/go.sum

      - name: go vet (runner)
        run: cd runner && go vet ./...

      - name: go vet (mcp)
        run: cd mcp && go vet ./...

      - name: gofmt check
        run: |
          diff=$(gofmt -d -s runner/ mcp/ | head -200)
          if [ -n "$diff" ]; then
            echo "::error::gofmt diff (run 'gofmt -w -s runner/ mcp/'):"
            echo "$diff"
            exit 1
          fi

      - name: shellcheck install.sh
        # apt's shellcheck is fine on ubuntu-latest. Pin nothing — the
        # lint output is informative even when the version drifts.
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          shellcheck install.sh

      - name: bash -n install.sh
        run: bash -n install.sh

      - name: go mod verify
        # Fails the build if go.sum hashes don't match the cached
        # module bytes — a tampered dependency cache won't pass.
        run: cd runner && go mod verify

      - name: go mod tidy is up to date
        # Catches PRs that add a dep without running `go mod tidy`. If
        # the diff is non-empty, the PR needs a tidy commit.
        run: |
          cd runner && go mod tidy
          if ! git diff --exit-code -- runner/go.mod runner/go.sum; then
            echo "::error::runner/go.mod or go.sum are not tidy. Run 'cd runner && go mod tidy' locally and commit."
            exit 1
          fi

      - name: govulncheck
        # Scans the dependency graph against the Go vulnerability
        # database. CI is informational by default (continue-on-error)
        # so a same-day-disclosed vuln in a transitive dep doesn't
        # break unrelated PRs; remove continue-on-error to enforce.
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd runner && govulncheck ./...

  test:
    name: test (Linux)
    runs-on: ubuntu-latest
    strategy:
      # Don't abort other jobs on a single timing flake — let them all
      # finish so we have a full picture.
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-go@v5
        with:
          go-version-file: runner/go.mod
          cache: true
          cache-dependency-path: |
            runner/go.sum

      - name: go test (runner, race + cover)
        run: |
          cd runner && go test -race -count=1 -coverprofile=../coverage.out ./...

      - name: go test (mcp, race)
        run: cd mcp && go test -race -count=1 ./...

      - name: coverage summary
        if: always()
        run: go tool cover -func=coverage.out | tail -50

      - name: upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  build:
    name: build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-go@v5
        with:
          go-version-file: runner/go.mod
          cache: true
          cache-dependency-path: |
            runner/go.sum

      - name: build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          (cd runner && go build -trimpath -ldflags "-s -w" -o ../dist/emisar .)
          (cd mcp    && go build -trimpath -ldflags "-s -w" -o ../dist/emisar-mcp .)
          file dist/emisar || true
          ls -la dist/

      - name: upload binary
        uses: actions/upload-artifact@v4
        with:
          name: emisar-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            dist/emisar
            dist/emisar-mcp
          retention-days: 7
