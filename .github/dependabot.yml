version: 2

# One entry per ecosystem; multi-directory entries share the identical weekly
# cadence and release-age cooldown every ecosystem uses (Dependabot groups and
# opens PRs per directory). The dep-age CI gate enforces the same windows on
# the lock diffs themselves, so a hand-made bump can't dodge the cooldown.
updates:
  - package-ecosystem: "mix"
    directory: "/portal"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 2
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 14
      semver-patch-days: 7
    groups:
      mix-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "gomod"
    directories: ["/runner", "/mcp", "/tools"]
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 2
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 14
      semver-patch-days: 7
    groups:
      go-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "terraform"
    directory: "/infra"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "09:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 2
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 14
      semver-patch-days: 7
    groups:
      terraform-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "docker"
    directories:
      - "/portal"
      - "/runner/docker"
      - "/mcp"
      - "/dev/test-packs"
      - "/dev/test-packs/snmpd"
      - "/dev/test-packs/snmpd-frr"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "09:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 2
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 14
      semver-patch-days: 7

  - package-ecosystem: "npm"
    # The docs-screenshot tooling — the repo's only npm surface (dev-only,
    # never shipped). Same cooldown policy as every other ecosystem.
    directory: "/portal/.agent/scripts"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "09:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 2
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 14
      semver-patch-days: 7
    groups:
      screenshot-tooling-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "09:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 2
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 14
      semver-patch-days: 7
    groups:
      github-actions-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
