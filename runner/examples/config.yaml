schema_version: 1

runner:
  # Group is the cloud UI's auto-grouping key. Every runner with the same
  # group is displayed together. Free-form labels go in the labels map.
  group: cassandra-us-east1
  labels:
    region: us-east-1
    role: cassandra
    environment: dev

cloud:
  url: wss://cloud.example.com/runner/v1
  auth_key_env: EMISAR_AUTH_KEY
  token_path: ./var/lib/emisar/token
  heartbeat_every: 30s
  reconnect_min: 1s
  reconnect_max: 60s

paths:
  data_dir: ./var/lib/emisar
  work_dir: ./var/lib/emisar/work
  packs:
    - ./packs

execution: {}

# Admission is the runner-local gate over which actions this host will
# expose and run. The cloud already decides which actions are safe; this
# is defense-in-depth on the host side. If the portal is compromised, a
# malicious dispatch still has to clear admission before the runner will
# execute. Two axes — action id (allow/deny globs) and risk ceiling.
#
# Behavior (action id):
#   - Both empty (the default) → admit every action the registry knows.
#   - allow non-empty → action MUST match at least one allow pattern.
#   - deny non-empty → action MUST NOT match any deny pattern.
#   - When both are set, allow is checked first, then deny.
#
# Risk ceiling (max_risk): when set, any action whose risk exceeds the
# tier is dropped — one flag turns the fleet read-only for a customer
# demo (low|medium|high|critical; empty = no ceiling). The whole linux
# pack can be installed, but high/critical actions (reboot, restart,
# repair) simply never appear.
#
# Both axes hide a rejected action from the catalog this runner
# advertises to cloud (so it never appears in the portal) AND refuse it
# at dispatch, so neither a stale catalog nor a compromised portal can
# run what the operator suppressed.
#
# admission:
#   allow:
#     - "linux.*"            # everything from the linux-core pack
#     - "postgres.uptime"    # one specific high-trust action
#   deny:
#     - "*.repair"           # no matter the pack, never repair
#     - "linux.systemctl_restart"
#   max_risk: medium         # read-only demo: hide/refuse high + critical

# Signing is the client-attested-dispatch gate — the strongest defense
# against a compromised control plane. With enforce_signatures on, the
# runner runs a dispatch ONLY if it carries a valid Ed25519 attestation whose
# leaf key is vouched for by a still-valid, in-scope certificate from one of
# the trusted CAs below, is inside the freshness window, and uses a nonce it
# hasn't seen. The cloud can RELAY a real user's MCP-signed action but can
# never originate one. The runner advertises enforcement to the cloud, which
# then disables its own (operator/runbook) dispatch here.
#
# The trust boundary is the CA: the runner trusts a few offline CA public keys,
# not every leaf key, so onboarding an operator is one signature and zero
# runner-config edits. Every v2 call also signs the exact durable runner-id set.
# The cert's SCOPE is a second, coarser CA-authored group/label ceiling matched
# only against this runner's local identity.
#
# Bootstrap with `emisar signing init` (offline — it mints a CA, a leaf, and a
# cert, prints this trusted_cas block, the CA PRIVATE key to keep offline, and
# the MCP client's EMISAR_SIGNING_KEY + EMISAR_SIGNING_CERT). The CA private key
# stays offline and signs new operator certs as they expire
# (`emisar signing new-cert`).
#
# Changing anything under `signing` (enabling enforcement, rotating or revoking
# a CA) takes effect on the next SIGHUP — the runner rebuilds the verifier and
# re-advertises — or on a full restart. SIGHUP shares the live, boot-owned nonce
# store with the replacement verifier; restart reloads it from disk. A
# still-fresh captured dispatch cannot replay across either transition.
#
# signing:
#   enforce_signatures: true
#   max_attestation_age: 24h   # also caps replay exposure + the nonce cache
#   trusted_cas:
#     - ca_id: acme-2026
#       public_key: e7f162a10bec559afea195e4dce84b69568d5d2cb0963eb446c0685e2b17f2f0

events:
  jsonl_path: ./var/log/emisar/events.jsonl
  max_preview_bytes: 4096

redaction:
  rules:
    - name: bearer-token
      type: regex
      pattern: "(?i)bearer\\s+[a-z0-9._\\-]{8,}"
      replacement: "Bearer [REDACTED]"
