schema_version: 1

runner:
  # Group is the cloud UI's auto-grouping key. Every runner with the same
  # group is displayed together. Free-form labels go in the labels map.
  group: cassandra-us-east1
  labels:
    region: us-east-1
    role: cassandra
    environment: dev

cloud:
  url: wss://cloud.example.com/runner/v1
  auth_key_env: EMISAR_AUTH_KEY
  token_path: ./var/lib/emisar/token
  heartbeat_every: 30s
  reconnect_min: 1s
  reconnect_max: 60s

paths:
  data_dir: ./var/lib/emisar
  work_dir: ./var/lib/emisar/work
  packs:
    - ./packs

execution: {}

# Admission is the runner-local allow/deny for action ids. The cloud
# already decides which actions are safe; this is defense-in-depth on
# the host side. If the portal is compromised, a malicious dispatch
# still has to clear this list before the runner will execute. Both
# lists use shell-style globs over action ids.
#
# Behavior:
#   - Both empty (the default) → admit every action the registry knows.
#   - allow non-empty → action MUST match at least one allow pattern.
#   - deny non-empty → action MUST NOT match any deny pattern.
#   - When both are set, allow is checked first, then deny.
#
# Blocked actions are also hidden from the catalog this runner
# advertises to cloud, so they won't appear in the portal at all.
#
# admission:
#   allow:
#     - "linux.*"            # everything from the linux-core pack
#     - "postgres.uptime"    # one specific high-trust action
#   deny:
#     - "*.repair"           # no matter the pack, never repair
#     - "linux.systemctl_restart"

# Signing is the client-attested-dispatch gate — the strongest defense
# against a compromised control plane. With enforce_signatures on, the
# runner runs a dispatch ONLY if it carries a valid Ed25519 signature from
# one of the trusted keys below, is inside the freshness window, and uses a
# nonce it hasn't seen. The cloud can RELAY a real user's MCP-signed action
# but can never originate one itself. The runner advertises enforcement to
# the cloud, which then disables its own (operator/runbook) dispatch here.
#
# The key is the trust boundary: the runner accepts only the key_id(s) listed,
# established out of band. Use a distinct keypair per runner (or per
# environment — staging vs prod) so a dispatch signed for one can't be
# redirected to another; a fleet-wide shared key trades that for simpler ops.
#
# Generate a keypair on this host with `emisar keygen` (offline — the private
# key is never sent anywhere). Install the PUBLIC key here; give the PRIVATE key
# to the MCP client as EMISAR_SIGNING_KEY + EMISAR_SIGNING_KEY_ID.
#
# Changing anything under `signing` (enabling enforcement, rotating or revoking
# a key) takes effect on the next SIGHUP — the runner rebuilds the verifier and
# re-advertises — or on a full restart. A rebuild resets the in-memory nonce cache.
#
# signing:
#   enforce_signatures: true
#   max_attestation_age: 24h   # also caps replay exposure + the nonce cache
#   trusted_keys:
#     - key_id: mcp-prod-2026
#       public_key: 79b5562e8fe654f94078b112e8a98ba7901f853ae695bed7e0e3910bad049664

events:
  jsonl_path: ./var/log/emisar/events.jsonl
  max_preview_bytes: 4096

redaction:
  rules:
    - name: bearer-token
      type: regex
      pattern: "(?i)bearer\\s+[a-z0-9._\\-]{8,}"
      replacement: "Bearer [REDACTED]"
