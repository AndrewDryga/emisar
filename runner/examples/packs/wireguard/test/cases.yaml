defaults:
  env: {}
cases:
- action: wg.quick_down
  args:
    iface: wg0
  skip: mutator skipped by default (high); set --include=wg.quick_down to run
- action: wg.quick_up
  args:
    iface: wg0
  skip: mutator skipped by default (medium); set --include=wg.quick_up to run
- action: wg.set_peer_remove
  args:
    iface: wg0
    pubkey: abcDEF1234567890abcDEF1234567890abcDEF1234=
  skip: mutator skipped by default (high); set --include=wg.set_peer_remove to run
- action: wg.show
  args: {}
  expect_exit: 0
- action: wg.show_endpoints
  args: {}
  expect_exit: 0
- action: wg.show_latest_handshakes
  args: {}
  expect_exit: 0
- action: wg.show_transfer
  args: {}
  expect_exit: 0
- action: wg.showconf
  args:
    interface: wg0
  expect_exit: 0
