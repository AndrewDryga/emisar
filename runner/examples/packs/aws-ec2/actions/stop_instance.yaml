schema_version: 1
id: ec2.stop_instance
title: aws ec2 stop-instances
kind: exec
risk: high
description: Stops one instance. Public IP is released (use Elastic IP to retain).
side_effects:
  - Instance powers off; not billed for compute hours while stopped.
  - Public IPv4 address is lost unless Elastic IP attached.
args:
  - name: instance_id
    type: string
    required: true
    description: Instance ID.
    validation:
      pattern: "^i-[0-9a-f]{8,17}$"
execution:
  command:
    binary: aws
    argv: ["ec2", "stop-instances", "--instance-ids", "{{ args.instance_id }}", "--output", "json"]
  timeout: 60s
output:
  parser: json
  max_stdout_bytes: 16384
  max_stderr_bytes: 8192
examples:
  - title: Stop one
    args:
      instance_id: "i-0123456789abcdef0"
