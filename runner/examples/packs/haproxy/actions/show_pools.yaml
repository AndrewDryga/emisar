schema_version: 1
id: haproxy.show_pools
title: show pools
kind: exec
risk: low
description: Internal memory pool usage. Use to spot leaks.
side_effects:
  - One admin socket command.
  - Read-only.
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "echo 'show pools' | socat - \"$HAPROXY_SOCK\""
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192
examples:
  - title: Pools
    args: {}
