schema_version: 1
id: haproxy.show_frontend
title: show frontend
kind: exec
risk: low
description: List frontend names.
side_effects:
  - One admin socket command.
  - Read-only.
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "echo 'show frontend' | socat - \"$HAPROXY_SOCK\""
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 16384
  max_stderr_bytes: 8192
examples:
  - title: Frontends
    args: {}
