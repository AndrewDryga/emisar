schema_version: 1
id: haproxy.show_servers_state
title: show servers state
kind: exec
risk: low
description: Persisted server state — health, weight, admin overrides. Read this before reloading config to know what state should be preserved.
side_effects:
  - One admin socket command.
  - Read-only.
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "echo 'show servers state' | socat - \"$HAPROXY_SOCK\""
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: Server state
    args: {}
