schema_version: 1
id: nomad.host_volume_list
title: Host volumes from /v1/nodes
kind: exec
risk: low
description: Host-volume declarations across all client nodes.
side_effects: ["One API call.", "Read-only."]
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "curl -sS -H \"X-Nomad-Token: $NOMAD_TOKEN\" \"$NOMAD_ADDR/v1/nodes\" | head -200"
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: Host volumes
    args: {}
