schema_version: 1
id: nomad.job_evaluations
title: nomad job eval <id> (force re-evaluation)
kind: exec
risk: medium
description: >
  Forces a fresh evaluation of one job — the scheduler re-checks placement
  and constraints and may reschedule allocations. NOT read-only: the CLI
  `nomad job eval` creates a new evaluation, it does not just list them.
side_effects:
  - Creates a new evaluation for the job.
  - The scheduler reconciles the job; allocations may be moved or restarted.
args:
  - name: job
    type: string
    required: true
    description: Job ID.
    validation:
      pattern: "^[a-zA-Z0-9_\\-]{1,128}$"
execution:
  command: {binary: /usr/bin/nomad, argv: ["job", "eval", "-verbose", "{{ args.job }}"]}
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 131072
  max_stderr_bytes: 8192
examples:
  - title: Force a re-evaluation
    args:
      job: "api"
