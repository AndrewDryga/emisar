schema_version: 1
id: nomad.job_evaluations
title: nomad job eval status <id>
kind: exec
risk: low
description: Recent evaluations for one job — scheduling decisions.
side_effects: ["One API call.", "Read-only."]
args:
  - name: job
    type: string
    required: true
    description: Job ID.
    validation:
      pattern: "^[a-zA-Z0-9_\\-]{1,128}$"
execution:
  command: {binary: /usr/bin/nomad, argv: ["job", "eval", "-verbose", "{{ args.job }}"]}
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 131072
  max_stderr_bytes: 8192
examples:
  - title: Evaluations
    args:
      job: "api"
