schema_version: 1
id: nomad.leader
title: GET /v1/status/leader
kind: exec
risk: low
description: Current Raft leader address (host:port).
side_effects: ["One API call.", "Read-only."]
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "curl -sS -H \"X-Nomad-Token: $NOMAD_TOKEN\" \"${NOMAD_ADDR:-http://127.0.0.1:4646}/v1/status/leader\""
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 1024
  max_stderr_bytes: 8192
examples:
  - title: Leader
    args: {}
