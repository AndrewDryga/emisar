schema_version: 1
id: nomad.system_gc
title: nomad system gc
kind: exec
risk: medium
description: Forces a system-wide GC of jobs, allocations, evaluations, and deployments past their GC threshold.
side_effects:
  - Old dead jobs/evals/allocs/deployments are removed from the catalog.
  - Frees Raft / state-store space.
args: []
execution:
  command: {binary: /usr/bin/nomad, argv: ["system", "gc"]}
  timeout: 5m
output:
  parser: text
  max_stdout_bytes: 4096
  max_stderr_bytes: 8192
examples:
  - title: Trigger GC
    args: {}
