schema_version: 1
id: nomad.job_allocations
title: nomad job allocs <id>
kind: exec
risk: low
description: All allocations for one job.
side_effects: ["One API call.", "Read-only."]
args:
  - name: job
    type: string
    required: true
    description: Job ID.
    validation:
      pattern: "^[a-zA-Z0-9_\\-]{1,128}$"
execution:
  command: {binary: nomad, argv: ["job", "allocs", "-verbose", "{{ args.job }}"]}
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: Allocations
    args:
      job: "api"
