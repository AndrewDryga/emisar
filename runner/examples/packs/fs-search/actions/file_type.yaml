schema_version: 1
id: fs.file_type
title: file <path>
kind: exec
risk: low
description: 'libmagic-detected type of one file (e.g. "ELF 64-bit executable", "ASCII text").'
side_effects:
  - One read of the first few KB of the file.
  - Read-only.
args:
  - name: path
    type: string
    required: true
    description: Path.
    validation:
      pattern: "^/[a-zA-Z0-9_./\\-]{0,512}$"
execution:
  command:
    binary: /usr/bin/file
    argv:
      - "{{ args.path }}"
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 4096
  max_stderr_bytes: 8192
examples:
  - title: What is this binary?
    args:
      path: "/usr/bin/sshd"
