schema_version: 1

id: redis.slowlog
title: SLOWLOG GET
kind: exec
risk: low

description: >
  Returns the last N slowlog entries (commands that exceeded the
  slowlog threshold). Each entry shows id, timestamp, duration (µs),
  command + args, client addr, and client name. Read-only.

side_effects:
  - Issues one SLOWLOG GET command.
  - No keys read or written.

args:
  - name: limit
    type: integer
    required: false
    default: 50
    description: How many slowlog entries to return.
    validation:
      min: 1
      max: 1024

execution:
  command:
    binary: /usr/bin/redis-cli
    argv:
      - "SLOWLOG"
      - "GET"
      - "{{ args.limit }}"
  timeout: 10s

output:
  parser: text
  max_stdout_bytes: 131072
  max_stderr_bytes: 8192

examples:
  - title: Last 50 slow commands
    args: {}
