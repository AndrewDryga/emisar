schema_version: 1
id: redis.client_pause
title: CLIENT PAUSE
kind: exec
risk: high
description: >
  Pauses all clients for N milliseconds. Used during safe failover
  windows to drain in-flight writes before flipping a master.
  Long pauses block all traffic — anything over 1s is a real outage.
  Replicas keep streaming during the pause.
side_effects:
  - All clients stalled at the server side.
  - Pending requests buffer.
  - Memory may grow if clients keep sending.
args:
  - name: ms
    type: integer
    required: true
    description: Pause duration in milliseconds (1–10000).
    validation:
      min: 1
      max: 10000
execution:
  command:
    binary: redis-cli
    argv: ["CLIENT", "PAUSE", "{{ args.ms }}"]
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 4096
  max_stderr_bytes: 8192
examples:
  - title: Pause 500ms during failover prep
    args:
      ms: 500
