schema_version: 1
id: redis.cluster_check
title: redis-cli --cluster check
kind: exec
risk: low
description: >
  `redis-cli --cluster check` against the given host:port — verifies
  slot coverage, master/replica health, epoch consistency. Use after
  any topology change.
side_effects:
  - Talks to every cluster node briefly.
  - Read-only.
args:
  - name: host
    type: string
    required: false
    default: "127.0.0.1"
    description: Cluster entry-point host.
    validation:
      pattern: "^[a-zA-Z0-9._\\-]{1,253}$"
  - name: port
    type: integer
    required: false
    default: 6379
    description: Cluster entry-point port.
    validation:
      min: 1
      max: 65535
execution:
  command:
    binary: redis-cli
    argv: ["--cluster", "check", "{{ args.host }}:{{ args.port }}"]
  timeout: 60s
output:
  parser: text
  max_stdout_bytes: 131072
  max_stderr_bytes: 16384
examples:
  - title: Local cluster check
    args: {}
