schema_version: 1

id: redis.memory_stats
title: MEMORY STATS
kind: exec
risk: low

description: >
  Runs `MEMORY STATS`. Returns the detailed memory accounting
  (allocator stats, fragmentation, peak, overheads, replication
  backlog, client and AOF buffers). Read-only. Use to diagnose OOM
  warnings before resizing.

side_effects:
  - Issues one MEMORY STATS command.
  - No keys read or written.

args: []

execution:
  command:
    binary: /usr/bin/redis-cli
    argv:
      - "MEMORY"
      - "STATS"
  timeout: 10s

output:
  parser: text
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192

examples:
  - title: Detailed memory accounting
    args: {}
