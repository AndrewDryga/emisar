schema_version: 1
id: redis.xinfo_stream
title: XINFO STREAM
kind: exec
risk: low
description: >
  One stream's length, last-generated-id, groups, first/last entry.
  Use to confirm producers are still appending.
side_effects:
  - One XINFO STREAM command.
  - Read-only.
args:
  - name: key
    type: string
    required: true
    description: Stream key.
    validation:
      pattern: "^[A-Za-z0-9_:.\\-{}@#/=+]{1,512}$"
execution:
  command:
    binary: redis-cli
    argv: ["XINFO", "STREAM", "{{ args.key }}"]
  timeout: 10s
output:
  parser: text
  max_stdout_bytes: 16384
  max_stderr_bytes: 8192
examples:
  - title: Inspect events stream
    args:
      key: "events:audit"
