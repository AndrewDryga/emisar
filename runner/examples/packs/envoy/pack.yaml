schema_version: 1

id: envoy
name: Envoy proxy / service mesh
version: 0.1.3
description: >
  Envoy admin-API ops: cluster + listener + runtime + config + cert
  inventory, server info, logging level read/write, plus traffic-shifting
  mutators (drain listeners, healthcheck fail/ok, reset counters) for
  planned failovers and incident response. Default admin URL
  http://127.0.0.1:9901; override via ENVOY_ADMIN env.
vendor: emisar
homepage: https://github.com/andrewdryga/emisar

requires:
  os:
    - linux
  binaries:
    - curl

# `emisar pack suggest` detection: the envoy process + its default admin port.
detect:
  processes:
    - envoy
  ports:
    - 9901

setup:
  summary: >
    Operates on the local Envoy instance on the runner host via its admin
    endpoint (default 127.0.0.1:9901) — no credentials needed.
  env:
    - name: ENVOY_ADMIN
      description: Base URL of the Envoy admin endpoint for the read actions; set only if it is not on the default.
      default: "http://127.0.0.1:9901"
  notes:
    - "The admin endpoint must be enabled in the Envoy bootstrap (admin.address) for any action to work."
    - "The traffic-shifting mutators (drain_listeners, healthcheck_fail/ok, reset_counters) take their admin URL as an `admin` argument, not from ENVOY_ADMIN."
  verify: envoy.ready

actions:
  - actions/server_info.yaml
  - actions/clusters.yaml
  - actions/listeners.yaml
  - actions/stats.yaml
  - actions/config_dump.yaml
  - actions/certs.yaml
  - actions/runtime.yaml
  - actions/ready.yaml
  - actions/logging_get.yaml
  - actions/logging_set.yaml
  - actions/drain_listeners.yaml
  - actions/healthcheck_fail.yaml
  - actions/healthcheck_ok.yaml
  - actions/reset_counters.yaml
