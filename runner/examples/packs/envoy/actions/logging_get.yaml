schema_version: 1
id: envoy.logging_get
title: GET /logging
kind: exec
risk: low
description: Current per-component log levels.
side_effects: ["One admin GET.", "Read-only."]
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "curl -sS \"${ENVOY_ADMIN:-http://127.0.0.1:9901}/logging\""
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 16384
  max_stderr_bytes: 8192
examples:
  - title: Logging
    args: {}
