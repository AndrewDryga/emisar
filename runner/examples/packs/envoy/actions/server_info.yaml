schema_version: 1
id: envoy.server_info
title: GET /server_info
kind: exec
risk: low
description: Envoy version, uptime, hot-restart state, command-line.
side_effects: ["One admin GET.", "Read-only."]
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "curl -sS \"${ENVOY_ADMIN:-http://127.0.0.1:9901}/server_info\""
  timeout: 15s
output:
  parser: json
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192
examples:
  - title: Server info
    args: {}
