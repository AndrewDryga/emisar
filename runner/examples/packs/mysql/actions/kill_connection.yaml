schema_version: 1
id: mysql.kill_connection
title: KILL (terminate connection)
kind: exec
risk: high
description: Terminates one connection. Use to clean up a stuck/idle session. Client sees "lost connection" and must reconnect.
side_effects:
  - Target connection closed.
  - In-flight transaction on it rolls back.
args:
  - name: thread_id
    type: integer
    required: true
    description: Thread ID (from processlist).
    validation:
      min: 1
      max: 4294967295
execution:
  command:
    binary: /usr/bin/mysql
    argv:
      - "-e"
      - "KILL {{ args.thread_id }}"
  timeout: 10s
output:
  parser: text
  max_stdout_bytes: 4096
  max_stderr_bytes: 8192
examples:
  - title: Kill connection 12345
    args:
      thread_id: 12345
