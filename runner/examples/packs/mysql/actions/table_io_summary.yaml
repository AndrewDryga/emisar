schema_version: 1
id: mysql.table_io_summary
title: Top tables by IO wait
kind: exec
risk: low
description: Top 30 tables ordered by total I/O wait time. Identifies tables driving disk pressure.
side_effects:
  - One SELECT against performance_schema.
  - Read-only.
args: []
execution:
  command:
    binary: /usr/bin/mysql
    argv:
      - "-e"
      - "SELECT object_schema, object_name, count_read, count_write, ROUND(sum_timer_wait/1e9, 2) AS total_ms FROM performance_schema.table_io_waits_summary_by_table WHERE object_schema NOT IN ('mysql','performance_schema') ORDER BY sum_timer_wait DESC LIMIT 30;"
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192
examples:
  - title: IO-heavy tables
    args: {}
