schema_version: 1
id: vault.status
title: vault status
kind: exec
risk: low
description: 'Top-level Vault status: sealed, version, HA mode, active node.'
side_effects:
  - One sys/health request.
  - Read-only.
args: []
execution:
  command:
    binary: vault
    argv:
      - "status"
      - "-format=json"
  timeout: 15s
output:
  parser: json
  max_stdout_bytes: 8192
  max_stderr_bytes: 8192
examples:
  - title: Vault status
    args: {}
