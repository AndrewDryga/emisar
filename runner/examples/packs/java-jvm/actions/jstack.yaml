schema_version: 1
id: jvm.jstack
title: jstack -l (thread dump)
kind: exec
risk: low
description: Full thread dump with lock info. The canonical "what are all my threads doing?" diagnostic.
side_effects:
  - One jstack invocation.
  - Read-only; introduces a STW pause on the JVM (~ms).
args:
  - name: pid
    type: integer
    required: true
    description: JVM PID.
    validation:
      min: 1
      max: 4194304
execution:
  command:
    binary: /usr/bin/jstack
    argv: ["-l", "{{ args.pid }}"]
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 1048576
  max_stderr_bytes: 16384
examples:
  - title: Thread dump
    args:
      pid: 4321
