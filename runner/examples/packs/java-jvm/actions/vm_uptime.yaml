schema_version: 1
id: jvm.vm_uptime
title: jcmd VM.uptime
kind: exec
risk: low
description: How long this JVM has been running.
side_effects:
  - One jcmd call.
  - Read-only.
args:
  - name: pid
    type: integer
    required: true
    description: JVM PID.
    validation:
      min: 1
      max: 4194304
execution:
  command:
    binary: /usr/bin/jcmd
    argv: ["{{ args.pid }}", "VM.uptime"]
  timeout: 10s
output:
  parser: text
  max_stdout_bytes: 4096
  max_stderr_bytes: 8192
examples:
  - title: JVM uptime
    args:
      pid: 4321
