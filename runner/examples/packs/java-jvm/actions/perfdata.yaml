schema_version: 1
id: jvm.perfdata
title: jcmd PerfCounter.print
kind: exec
risk: low
description: 'JVM performance counters — class loading, JIT, GC. Cheaper than jstat for one-shot.'
side_effects:
  - One jcmd call.
  - Read-only.
args:
  - name: pid
    type: integer
    required: true
    description: JVM PID.
    validation:
      min: 1
      max: 4194304
execution:
  command:
    binary: /usr/bin/jcmd
    argv: ["{{ args.pid }}", "PerfCounter.print"]
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 131072
  max_stderr_bytes: 8192
examples:
  - title: PerfData
    args:
      pid: 4321
