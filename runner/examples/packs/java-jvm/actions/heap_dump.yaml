schema_version: 1
id: jvm.heap_dump
title: jmap -dump:live (heap dump)
kind: exec
risk: critical
description: >
  Triggers a full GC, then dumps the live heap to /tmp/<pid>-heap.hprof. Can be many GB. Causes a long STW pause (seconds). Use only when you have analyst capacity to load the .hprof and disk space to hold it.
side_effects:
  - Triggers full GC.
  - JVM pause for the duration of the dump (seconds to minutes).
  - Writes a potentially-multi-GB file to /tmp.
args:
  - name: pid
    type: integer
    required: true
    description: JVM PID.
    validation:
      min: 1
      max: 4194304
execution:
  command:
    binary: /usr/bin/jmap
    argv:
      - "-dump:live,format=b,file=/tmp/{{ args.pid }}-heap.hprof"
      - "{{ args.pid }}"
  timeout: 30m
output:
  parser: text
  max_stdout_bytes: 4096
  max_stderr_bytes: 8192
examples:
  - title: Heap dump
    args:
      pid: 4321
