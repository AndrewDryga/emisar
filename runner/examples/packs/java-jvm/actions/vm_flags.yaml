schema_version: 1
id: jvm.vm_flags
title: jcmd VM.flags
kind: exec
risk: low
description: Returns the JVM command-line and tuning flags. Use to confirm "is -Xmx set to what we expect?"
side_effects:
  - One jcmd call.
  - Read-only.
args:
  - name: pid
    type: integer
    required: true
    description: JVM PID.
    validation:
      min: 1
      max: 4194304
execution:
  command:
    binary: /usr/bin/jcmd
    argv: ["{{ args.pid }}", "VM.flags"]
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 16384
  max_stderr_bytes: 8192
examples:
  - title: Flags for PID 4321
    args:
      pid: 4321
