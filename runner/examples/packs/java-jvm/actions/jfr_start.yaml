schema_version: 1
id: jvm.jfr_start
title: Start a Java Flight Recording
kind: exec
risk: medium
description: >
  Starts a 60-second Java Flight Recording named "emisar". JFR is low-overhead (~1%). Pair with `jvm.jfr_dump` to retrieve the recording, then `jvm.jfr_stop` to end it.
side_effects:
  - Starts a JFR session in the JVM.
  - Writes profile data to /tmp/<pid>-emisar.jfr.
args:
  - name: pid
    type: integer
    required: true
    description: JVM PID.
    validation:
      min: 1
      max: 4194304
  - name: duration
    type: integer
    required: false
    default: 60
    description: Duration in seconds.
    validation:
      min: 10
      max: 600
execution:
  command:
    binary: jcmd
    argv:
      - "{{ args.pid }}"
      - "JFR.start"
      - "name=emisar"
      - "duration={{ args.duration }}s"
      - "filename=/tmp/{{ args.pid }}-emisar.jfr"
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 4096
  max_stderr_bytes: 8192
examples:
  - title: Start a 60s recording
    args:
      pid: 4321
