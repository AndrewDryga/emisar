schema_version: 1
id: docker.stop
title: docker stop (one container)
kind: exec
risk: high
description: >
  Stops one container — SIGTERM, then SIGKILL after the configured timeout. Container stays around (for inspection/restart). Use `docker.kill` for immediate SIGKILL.
side_effects:
  - SIGTERM the container; SIGKILL on timeout.
  - In-flight requests dropped unless the app handles graceful drain.
args:
  - name: container
    type: string
    required: true
    description: Container name or ID.
    validation:
      pattern: "^[a-zA-Z0-9_.\\-]{1,128}$"
  - name: timeout
    type: integer
    required: false
    default: 10
    description: SIGTERM → SIGKILL grace seconds.
    validation:
      min: 1
      max: 600
execution:
  command:
    binary: /usr/bin/docker
    argv:
      - "stop"
      - "-t"
      - "{{ args.timeout }}"
      - "{{ args.container }}"
  timeout: 15m
output:
  parser: text
  max_stdout_bytes: 4096
  max_stderr_bytes: 8192
examples:
  - title: Stop "api" with 10s grace
    args:
      container: api
