schema_version: 1
id: docker.info
title: docker info
kind: exec
risk: low
description: >
  `docker info` — daemon version, storage driver, total containers/images, host resources. Read-only.
side_effects:
  - One docker info invocation.
  - Read-only.
args: []
execution:
  command:
    binary: /usr/bin/docker
    argv: ["info"]
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 32768
  max_stderr_bytes: 8192
examples:
  - title: Daemon summary
    args: {}
