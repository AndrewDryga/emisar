schema_version: 1
id: rmq.stop_app
title: rabbitmqctl stop_app
kind: exec
risk: high
description: >
  Stop the RabbitMQ application while keeping the Erlang node
  running. Required before reset/join_cluster. All clients
  disconnect.
side_effects:
  - RabbitMQ app stops; clients disconnect.
  - Erlang node keeps running.
  - Producers fail; consumers reconnect when start_app runs.
args: []
execution:
  command:
    binary: /usr/sbin/rabbitmqctl
    argv: ["stop_app"]
  timeout: 60s
cancel_grace: 30s
output:
  parser: text
  max_stdout_bytes: 4096
  max_stderr_bytes: 8192
examples:
  - title: Stop the app
    args: {}
