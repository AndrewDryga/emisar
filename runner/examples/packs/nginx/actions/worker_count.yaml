schema_version: 1
id: nginx.worker_count
title: Live worker process count
kind: exec
risk: low
description: Counts the workers spawned by the master via pgrep. Read-only.
side_effects:
  - One pgrep invocation.
  - Read-only.
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "MP=$(cat /run/nginx.pid 2>/dev/null); [ -n \"$MP\" ] && pgrep -c -P \"$MP\" || echo 0"
  timeout: 5s
output:
  parser: text
  max_stdout_bytes: 64
  max_stderr_bytes: 4096
examples:
  - title: Worker count
    args: {}
