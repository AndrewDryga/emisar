schema_version: 1
id: nginx.bytes_by_url
title: Top URLs by total bytes sent
kind: exec
risk: low
description: Top N URLs ordered by `$body_bytes_sent` summed per URL (column 10). Read-only.
side_effects:
  - Reads /var/log/nginx/access.log.
  - Read-only.
args:
  - name: lines
    type: integer
    required: false
    default: 100000
    description: How many tail lines to scan.
    validation:
      min: 1000
      max: 1000000
  - name: limit
    type: integer
    required: false
    default: 30
    description: Top-N URLs.
    validation:
      min: 1
      max: 200
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "tail -n {{ args.lines }} /var/log/nginx/access.log | awk '{bytes[$7]+=$10} END{for(u in bytes) printf \"%d %s\\n\", bytes[u], u}' | sort -rn | head -n {{ args.limit }}"
  timeout: 60s
output:
  parser: text
  max_stdout_bytes: 131072
  max_stderr_bytes: 16384
examples:
  - title: Top URLs by traffic
    args: {}
