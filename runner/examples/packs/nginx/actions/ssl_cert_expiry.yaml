schema_version: 1
id: nginx.ssl_cert_expiry
title: TLS cert expiry for one vhost
kind: exec
risk: low
description: Probes localhost:443 with SNI to read the cert expiry. Returns notBefore/notAfter and subject/issuer.
side_effects:
  - One openssl s_client to localhost.
  - Read-only.
args:
  - name: sni
    type: string
    required: true
    description: Server Name Indication (the vhost to probe).
    validation:
      pattern: "^[a-zA-Z0-9.\\-]{1,253}$"
  - name: port
    type: integer
    required: false
    default: 443
    description: Port to probe.
    validation:
      min: 1
      max: 65535
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "openssl s_client -connect 127.0.0.1:{{ args.port }} -servername {{ args.sni }} </dev/null 2>/dev/null | openssl x509 -noout -dates -subject -issuer"
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 8192
  max_stderr_bytes: 8192
examples:
  - title: Expiry for example.com vhost
    args:
      sni: "example.com"
