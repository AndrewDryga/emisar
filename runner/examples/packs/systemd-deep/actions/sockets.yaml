schema_version: 1
id: systemd.sockets
title: systemd-managed sockets
kind: exec
risk: low
description: '`systemctl list-sockets` — every socket-activated unit with its listening address.'
side_effects:
  - One systemctl invocation.
  - Read-only.
args: []
execution:
  command:
    binary: systemctl
    argv: ["list-sockets", "--no-pager", "--no-legend"]
  timeout: 10s
output:
  parser: text
  max_stdout_bytes: 32768
  max_stderr_bytes: 8192
examples:
  - title: All sockets
    args: {}
