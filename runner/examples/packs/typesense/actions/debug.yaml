schema_version: 1
id: typesense.debug
title: GET /debug
kind: script
risk: low
description: >
  Node version and raft state. The "state" field reports this node's role in
  the cluster: 1 = LEADER, 4 = FOLLOWER. This is how you read which node is
  leader vs follower per node. Requires the admin API key.
side_effects:
  - One read-only HTTP GET to the Typesense /debug endpoint.
  - Read-only — never writes or mutates data.
execution:
  script:
    path: scripts/tsget.sh
    interpreter: /bin/sh
  argv:
    - "/debug"
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192
examples:
  - title: Read version and raft state
    args: {}
