schema_version: 1
id: consul.service_passing_only
title: GET /v1/health/service/<name>?passing
kind: exec
risk: low
description: Only healthy (all-passing) instances of one service. What service discovery would return.
side_effects: ["One API call.", "Read-only."]
args:
  - name: service
    type: string
    required: true
    description: Service name.
    validation:
      pattern: "^[a-zA-Z0-9_.\\-]{1,128}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "curl -sS -H \"X-Consul-Token: $CONSUL_HTTP_TOKEN\" \"$CONSUL_HTTP_ADDR/v1/health/service/{{ args.service }}?passing\""
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: Healthy instances
    args:
      service: "api"
