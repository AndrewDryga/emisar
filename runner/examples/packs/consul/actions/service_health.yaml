schema_version: 1
id: consul.service_health
title: consul health service <name>
kind: exec
risk: low
description: Per-node health for one service.
side_effects:
  - One health request.
  - Read-only.
args:
  - name: service
    type: string
    required: true
    description: Service name.
    validation:
      pattern: "^[a-zA-Z0-9_.\\-]{1,128}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "curl -sS \"${CONSUL_HTTP_ADDR:-http://127.0.0.1:8500}/v1/health/service/{{ args.service }}\" -H \"X-Consul-Token: $CONSUL_HTTP_TOKEN\""
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: Health for api
    args:
      service: "api"
