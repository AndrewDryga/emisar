schema_version: 1
id: consul.agent_services
title: GET /v1/agent/services
kind: exec
risk: low
description: Services registered with the local agent.
side_effects: ["One API call.", "Read-only."]
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "curl -sS -H \"X-Consul-Token: $CONSUL_HTTP_TOKEN\" \"${CONSUL_HTTP_ADDR:-http://127.0.0.1:8500}/v1/agent/services\""
  timeout: 15s
output:
  parser: json
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: Local services
    args: {}
