schema_version: 1
id: consul.connect_ca_configuration
title: GET /v1/connect/ca/configuration
kind: exec
risk: low
description: CA provider configuration (which CA, intermediate cert TTL, etc).
side_effects: ["One API call.", "Read-only."]
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "curl -sS -H \"X-Consul-Token: $CONSUL_HTTP_TOKEN\" \"$CONSUL_HTTP_ADDR/v1/connect/ca/configuration\""
  timeout: 15s
output:
  parser: json
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192
examples:
  - title: CA config
    args: {}
