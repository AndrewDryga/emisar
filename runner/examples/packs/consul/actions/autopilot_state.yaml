schema_version: 1
id: consul.autopilot_state
title: GET /v1/operator/autopilot/state
kind: exec
risk: low
description: 'Autopilot view of cluster health: server stabilization, leader, failure tolerance.'
side_effects: ["One API call.", "Read-only."]
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "curl -sS -H \"X-Consul-Token: $CONSUL_HTTP_TOKEN\" \"${CONSUL_HTTP_ADDR:-http://127.0.0.1:8500}/v1/operator/autopilot/state\""
  timeout: 15s
output:
  parser: json
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192
examples:
  - title: Autopilot state
    args: {}
