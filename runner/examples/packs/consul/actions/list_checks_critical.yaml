schema_version: 1
id: consul.list_checks_critical
title: GET /v1/health/state/critical
kind: exec
risk: low
description: Every check currently in CRITICAL state across the catalog.
side_effects: ["One API call.", "Read-only."]
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "curl -sS -H \"X-Consul-Token: $CONSUL_HTTP_TOKEN\" \"$CONSUL_HTTP_ADDR/v1/health/state/critical\""
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 1048576
  max_stderr_bytes: 8192
examples:
  - title: Critical checks
    args: {}
