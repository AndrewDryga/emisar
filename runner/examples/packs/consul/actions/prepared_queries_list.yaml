schema_version: 1
id: consul.prepared_queries_list
title: GET /v1/query
kind: exec
risk: low
description: All defined prepared queries (named service-discovery templates with failover).
side_effects: ["One API call.", "Read-only."]
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "curl -sS -H \"X-Consul-Token: $CONSUL_HTTP_TOKEN\" \"$CONSUL_HTTP_ADDR/v1/query\""
  timeout: 15s
output:
  parser: json
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: All prepared queries
    args: {}
