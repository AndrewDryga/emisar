schema_version: 1
id: consul.node_services
title: GET /v1/catalog/node-services/<node>
kind: exec
risk: low
description: All services registered against one node.
side_effects: ["One API call.", "Read-only."]
args:
  - name: node
    type: string
    required: true
    description: Node name.
    validation:
      pattern: "^[a-zA-Z0-9_.\\-]{1,128}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "curl -sS -H \"X-Consul-Token: $CONSUL_HTTP_TOKEN\" \"${CONSUL_HTTP_ADDR:-http://127.0.0.1:8500}/v1/catalog/node-services/{{ args.node }}\""
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: One node's services
    args:
      node: "node-1"
