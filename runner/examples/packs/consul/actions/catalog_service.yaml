schema_version: 1
id: consul.catalog_service
title: GET /v1/catalog/service/<name>
kind: exec
risk: low
description: All instances of one service across the cluster.
side_effects: ["One API call.", "Read-only."]
args:
  - name: service
    type: string
    required: true
    description: Service name.
    validation:
      pattern: "^[a-zA-Z0-9_.\\-]{1,128}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "curl -sS -H \"X-Consul-Token: $CONSUL_HTTP_TOKEN\" \"$CONSUL_HTTP_ADDR/v1/catalog/service/{{ args.service }}\""
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: Service instances
    args:
      service: "api"
