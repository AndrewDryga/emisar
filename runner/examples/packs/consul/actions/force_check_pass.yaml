schema_version: 1
id: consul.force_check_pass
title: PUT /v1/agent/check/pass/<check_id>
kind: exec
risk: high
description: Forces one TTL check into the PASSING state. The check stays passing until the next TTL expires.
side_effects:
  - Targeted check transitions to PASSING.
  - Services watching this check may resume routing traffic.
  - For non-TTL checks, the override is overwritten by the next actual run.
args:
  - name: check_id
    type: string
    required: true
    description: Check ID.
    validation:
      pattern: "^[a-zA-Z0-9_.:\\-]{1,128}$"
  - name: note
    type: string
    required: false
    default: "operator override"
    description: Note attached to the check.
    validation:
      pattern: "^[A-Za-z0-9 _.,:/()#@=+-]{1,255}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - 'curl -sS -XPUT -H "X-Consul-Token: $CONSUL_HTTP_TOKEN" --data-urlencode "note=$NOTE" -G "$CONSUL_HTTP_ADDR/v1/agent/check/pass/$CHECK_ID"'
  env:
    NOTE: "{{ args.note }}"
    CHECK_ID: "{{ args.check_id }}"
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 4096
  max_stderr_bytes: 8192
examples:
  - title: Force pass a TTL check
    args:
      check_id: "service:api:1"
