schema_version: 1
id: consul.service_maintenance
title: consul maint -enable -service <svc>
kind: exec
risk: high
description: Puts one local-agent service into maintenance mode. Its checks report critical until disabled.
side_effects:
  - Service checks report critical.
  - Service discovery routes traffic away.
  - Other agents' services unaffected.
args:
  - name: service_id
    type: string
    required: true
    description: Service ID.
    validation:
      pattern: "^[a-zA-Z0-9_.\\-:]{1,128}$"
  - name: reason
    type: string
    required: false
    default: "operator action"
    description: Reason.
    validation:
      pattern: "^.{1,255}$"
execution:
  command:
    binary: /usr/bin/consul
    argv: ["maint", "-enable", "-service", "{{ args.service_id }}", "-reason", "{{ args.reason }}"]
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 4096
  max_stderr_bytes: 8192
examples:
  - title: Drain one service
    args:
      service_id: "api-1"
