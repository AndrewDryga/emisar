schema_version: 1
id: grafana.alerting_state
title: GET /api/alertmanager/grafana/api/v2/alerts
kind: exec
risk: low
description: Currently-firing alerts known to Grafana's alertmanager.
side_effects: ["One API call.", "Read-only."]
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "{ [ -n \"$GRAFANA_TOKEN\" ] && printf 'Authorization: Bearer %s\\n' \"$GRAFANA_TOKEN\"; } | curl -sS -H @- \"${GRAFANA_URL:-http://127.0.0.1:3000}/api/alertmanager/grafana/api/v2/alerts\""
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: Active alerts
    args: {}
