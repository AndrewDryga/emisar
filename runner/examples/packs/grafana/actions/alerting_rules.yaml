schema_version: 1
id: grafana.alerting_rules
title: GET /api/prometheus/grafana/api/v1/rules
kind: exec
risk: low
description: All Grafana-managed alert rules with last evaluation state.
side_effects: ["One API call.", "Read-only."]
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "{ [ -n \"$GRAFANA_TOKEN\" ] && printf 'Authorization: Bearer %s\\n' \"$GRAFANA_TOKEN\"; } | curl -sS -H @- \"${GRAFANA_URL:-http://127.0.0.1:3000}/api/prometheus/grafana/api/v1/rules\""
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 1048576
  max_stderr_bytes: 8192
examples:
  - title: Rules
    args: {}
