schema_version: 1
id: grafana.dashboards_search
title: GET /api/search
kind: exec
risk: low
description: Dashboard search (default returns all dashboards).
side_effects: ["One API call.", "Read-only."]
args:
  - name: query
    type: string
    required: false
    default: ""
    description: Search string.
    validation:
      pattern: "^[a-zA-Z0-9 _.\\-]{0,128}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "curl -sS -H \"Authorization: Bearer $GRAFANA_TOKEN\" \"${GRAFANA_URL:-http://127.0.0.1:3000}/api/search?type=dash-db&query={{ args.query }}\""
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 1048576
  max_stderr_bytes: 8192
examples:
  - title: All dashboards
    args: {}
