schema_version: 1
id: kafka.describe_topic
title: Describe topic
kind: exec
risk: low
description: Partition layout, leaders, ISR, replicas for one topic.
side_effects:
  - One metadata request.
  - Read-only.
args:
  - name: topic
    type: string
    required: true
    description: Topic name.
    validation:
      pattern: "^[a-zA-Z0-9_.\\-]{1,249}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "kafka-topics.sh '--bootstrap-server' \"$KAFKA_BOOTSTRAP\" '--describe' '--topic' '{{ args.topic }}'"
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 131072
  max_stderr_bytes: 8192
examples:
  - title: Describe my-topic
    args:
      topic: "orders"
