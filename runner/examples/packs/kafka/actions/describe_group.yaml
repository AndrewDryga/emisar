schema_version: 1
id: kafka.describe_group
title: Describe consumer group
kind: exec
risk: low
description: Member list, partition assignment, host for one consumer group.
side_effects:
  - One coordinator request.
  - Read-only.
args:
  - name: group
    type: string
    required: true
    description: Consumer group ID.
    validation:
      pattern: "^[a-zA-Z0-9_.\\-]{1,255}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "kafka-consumer-groups.sh '--bootstrap-server' \"$KAFKA_BOOTSTRAP\" '--describe' '--group' '{{ args.group }}' '--members'"
  timeout: 60s
output:
  parser: text
  max_stdout_bytes: 131072
  max_stderr_bytes: 8192
examples:
  - title: Describe my-group
    args:
      group: "order-processor"
