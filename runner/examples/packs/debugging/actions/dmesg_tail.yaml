schema_version: 1

id: debugging.dmesg_tail
title: Recent kernel messages
kind: exec
risk: low

description: >
  Returns the last N kernel log lines. Surfaces OOM kills, hardware
  errors, network link flaps, and dropped packets. Reads the kernel ring
  buffer via dmesg; when that is not permitted (modern kernels gate it
  behind CAP_SYSLOG) it falls back to `journalctl -k`, which works when
  the runner can read the journal (root, or a member of systemd-journal /
  adm). Read-only.

side_effects:
  - One dmesg (or journalctl -k) invocation.
  - Read-only.

args:
  - name: lines
    type: integer
    required: false
    default: 100
    description: How many tail lines.
    validation:
      min: 1
      max: 5000

execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "{ dmesg -T 2>/dev/null || journalctl -k --no-pager -n {{ args.lines }}; } | tail -n {{ args.lines }}"
  timeout: 15s

output:
  parser: text
  max_stdout_bytes: 524288
  max_stderr_bytes: 16384

examples:
  - title: Last 100 kernel log lines
    args: {}
