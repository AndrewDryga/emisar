schema_version: 1

id: debugging.dmesg_tail
title: Recent kernel messages
kind: exec
risk: low

description: >
  Returns the last N kernel log lines. Surfaces OOM kills, hardware
  errors, network link flaps, and dropped packets. On modern hosts
  this requires CAP_SYSLOG (or the runner running as root or in the
  systemd-journal group). Read-only.

side_effects:
  - One dmesg invocation.
  - Read-only.

args:
  - name: lines
    type: integer
    required: false
    default: 100
    description: How many tail lines.
    validation:
      min: 1
      max: 5000

execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "dmesg -T | tail -n {{ args.lines }}"
  timeout: 15s

output:
  parser: text
  max_stdout_bytes: 524288
  max_stderr_bytes: 16384

examples:
  - title: Last 100 kernel log lines
    args: {}
