schema_version: 1

id: debugging.sar_recent
title: sar 3-sample CPU snapshot
kind: exec
risk: low

description: >
  `sar -u 5 3` — three 5-second CPU utilization samples. Surfaces
  user/system/iowait/steal/idle split with statistical smoothing.
  Use when `vmstat`'s noise hides the signal. Requires the sysstat
  package.

side_effects:
  - One sar invocation running ~15s.
  - Read-only.

args: []

execution:
  command:
    binary: sar
    argv:
      - "-u"
      - "5"
      - "3"
  timeout: 30s

output:
  parser: text
  max_stdout_bytes: 8192
  max_stderr_bytes: 4096

examples:
  - title: 15-second CPU snapshot
    args: {}
