schema_version: 1

id: debugging.tcp_retrans_top
title: TCP connections with retransmits
kind: exec
risk: low

description: >
  `ss -i state established` filtered to flows showing retrans
  counters. Use when network latency is high — surfaces which
  peers are seeing TCP loss without a tcpdump. Read-only.

side_effects:
  - One ss invocation.
  - Read-only.

args: []

execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "ss -tnpi state established | awk '/retrans/{print}' | sort -k 5 | head -50"
  timeout: 15s

output:
  parser: text
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192

examples:
  - title: Top retransmitting flows
    args: {}
