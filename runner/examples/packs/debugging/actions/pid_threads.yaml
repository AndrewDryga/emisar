schema_version: 1

id: debugging.pid_threads
title: Per-thread stats for one PID
kind: exec
risk: low

description: >
  Lists every thread of one PID with CPU%, policy, priority, comm
  name. Use when one PID's CPU is high but it's unclear which
  thread inside it is hot. Read-only.

side_effects:
  - One ps invocation.
  - Read-only.

args:
  - name: pid
    type: integer
    required: true
    description: PID to inspect.
    validation:
      min: 1
      max: 4194304

execution:
  command:
    binary: /bin/ps
    argv:
      - "-L"
      - "-p"
      - "{{ args.pid }}"
      - "-o"
      - "tid,nlwp,policy,priority,pcpu,pmem,stat,wchan,comm"
  timeout: 10s

output:
  parser: text
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192

examples:
  - title: Threads of PID 4321
    args:
      pid: 4321
