schema_version: 1

id: debugging.pid_stack
title: Process kernel stack
kind: exec
risk: low

description: >
  Reads /proc/<pid>/stack — the current kernel-side stack trace.
  Use to find what syscall a stuck process is hung in (futex,
  read, write, lock_kernel). Needs CAP_SYS_ADMIN or root to read.

side_effects:
  - One /proc read.
  - Read-only.

args:
  - name: pid
    type: integer
    required: true
    description: PID to inspect.
    validation:
      min: 1
      max: 4194304

execution:
  command:
    binary: /bin/cat
    argv:
      - "/proc/{{ args.pid }}/stack"
  timeout: 5s

output:
  parser: text
  max_stdout_bytes: 16384
  max_stderr_bytes: 4096

examples:
  - title: Kernel stack for PID 4321
    args:
      pid: 4321
