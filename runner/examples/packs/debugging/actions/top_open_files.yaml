schema_version: 1

id: debugging.top_open_files
title: Top processes by open-file count
kind: exec
risk: low

description: >
  Aggregates `lsof` by PID and returns the top 20 PIDs holding the
  most file descriptors. Use to find FD-leak candidates before
  EMFILE breaks something. Read-only.

side_effects:
  - One lsof invocation.
  - Read-only; may be slow on large systems.

args: []

execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "lsof -F p 2>/dev/null | sort | uniq -c | sort -rn | head -20"
  timeout: 30s

output:
  parser: text
  max_stdout_bytes: 16384
  max_stderr_bytes: 16384

examples:
  - title: Top 20 PIDs by FD count
    args: {}
