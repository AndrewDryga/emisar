schema_version: 1
id: zk.cons
title: cons (all connections)
kind: exec
risk: low
description: All client connections + their session + per-session stats.
side_effects: ["One 4lw command.", "Read-only."]
args:
  - name: server
    type: string
    required: true
    description: host:port.
    validation:
      pattern: "^[a-zA-Z0-9.\\-]{1,255}:[0-9]{1,5}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "S='{{ args.server }}'; echo cons | nc -w 5 ${S%:*} ${S##*:}"
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: Connections
    args:
      server: "zk1:2181"
