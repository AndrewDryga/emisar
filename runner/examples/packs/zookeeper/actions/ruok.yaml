schema_version: 1
id: zk.ruok
title: ruok (health probe)
kind: exec
risk: low
description: One-byte 'imok' if server is serving.
side_effects: ["One 4lw command.", "Read-only."]
args:
  - name: server
    type: string
    required: true
    description: host:port.
    validation:
      pattern: "^[a-zA-Z0-9.\\-]{1,255}:[0-9]{1,5}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "S='{{ args.server }}'; echo ruok | nc -w 5 ${S%:*} ${S##*:}"
  timeout: 10s
output:
  parser: text
  max_stdout_bytes: 1024
  max_stderr_bytes: 8192
examples:
  - title: Are you OK?
    args:
      server: "zk1:2181"
