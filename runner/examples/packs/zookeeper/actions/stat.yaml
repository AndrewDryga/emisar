schema_version: 1
id: zk.stat
title: stat (server + per-conn stats)
kind: exec
risk: low
description: Server + per-connection latency, packet counts.
side_effects: ["One 4lw command.", "Read-only."]
args:
  - name: server
    type: string
    required: true
    description: host:port.
    validation:
      pattern: "^[a-zA-Z0-9.\\-]{1,255}:[0-9]{1,5}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "S='{{ args.server }}'; echo stat | nc -w 5 ${S%:*} ${S##*:}"
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192
examples:
  - title: stat
    args:
      server: "zk1:2181"
