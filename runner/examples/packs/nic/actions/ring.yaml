schema_version: 1
id: nic.ring
title: ethtool -g <iface>
kind: exec
risk: low
description: >
  RX/TX ring-buffer sizes for one NIC — the hardware preset maximums and
  the current settings. Small rings under bursty load show up as rx_dropped
  in nic.stats.
side_effects: ["One ethtool -g call.", "Read-only."]
args:
  - name: iface
    type: string
    required: true
    description: Interface name (e.g. eth0, eno1, enp24s0f0).
    validation:
      pattern: "^[a-zA-Z][a-zA-Z0-9._-]{0,14}$"
execution:
  command: {binary: ethtool, argv: ["-g", "{{ args.iface }}"]}
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 16384
  max_stderr_bytes: 8192
examples:
  - title: Ring sizes for eth0
    args:
      iface: eth0
