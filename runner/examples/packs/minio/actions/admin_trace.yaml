schema_version: 1
id: minio.admin_trace
title: mc admin trace (5s window)
kind: exec
risk: low
description: 5-second trace of S3 API calls hitting the cluster.
side_effects: ["One admin call.", "Read-only."]
args:
  - name: alias
    type: string
    required: true
    description: mc alias.
    validation:
      pattern: "^[a-zA-Z0-9_\\-]{1,64}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "timeout 5 mc admin trace -v \"{{ args.alias }}\" || true"
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 1048576
  max_stderr_bytes: 8192
examples:
  - title: Trace 5s
    args:
      alias: "minio"
