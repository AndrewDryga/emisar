schema_version: 1
id: minio.list_policies
title: mc admin policy list
kind: exec
risk: low
description: All IAM policy names.
side_effects: ["One admin call.", "Read-only."]
args:
  - name: alias
    type: string
    required: true
    description: mc alias.
    validation:
      pattern: "^[a-zA-Z0-9_\\-]{1,64}$"
execution:
  command:
    binary: mc
    argv: ["admin", "policy", "list", "{{ args.alias }}", "--json"]
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192
examples:
  - title: Policies
    args:
      alias: "minio"
