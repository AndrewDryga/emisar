schema_version: 1
id: minio.heal_bucket
title: mc admin heal -r <alias>/<bucket>
kind: exec
risk: high
description: >
  Heal one bucket recursively. Scans every object, repairs
  inconsistent erasure-coded shards, restores missing replicas.
  CPU + I/O heavy; run during low-traffic windows.
side_effects:
  - All objects under the bucket scanned.
  - Damaged shards rebuilt.
  - CPU + disk I/O spike for the duration of the heal.
args:
  - name: alias
    type: string
    required: true
    description: mc alias name.
    validation:
      pattern: "^[a-zA-Z0-9_\\-]{1,64}$"
  - name: bucket
    type: string
    required: true
    description: Bucket name.
    validation:
      pattern: "^[a-z0-9.\\-]{3,63}$"
execution:
  command:
    binary: /usr/local/bin/mc
    argv: ["admin", "heal", "-r", "{{ args.alias }}/{{ args.bucket }}"]
  timeout: 3600s
cancel_grace: 60s
output:
  parser: text
  max_stdout_bytes: 65536
  max_stderr_bytes: 16384
examples:
  - title: Heal photos bucket
    args:
      alias: "prod"
      bucket: "photos"
