schema_version: 1
id: pfsense.version
title: GET /api/v2/system/version
kind: script
risk: low
description: >
  pfSense version, build, and kernel. Cheap connectivity + auth check, and
  the pack's verify action.
side_effects:
  - One read-only HTTP GET to the pfSense REST API.
  - Read-only.
args: []
execution:
  script:
    path: scripts/pfreq.sh
    interpreter: /bin/sh
  argv:
    - "GET"
    - "/api/v2/system/version"
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 1048576
  max_stderr_bytes: 8192
examples:
  - title: Version
    args: {}
