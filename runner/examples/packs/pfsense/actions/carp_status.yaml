schema_version: 1
id: pfsense.carp_status
title: GET /api/v2/status/carp
kind: script
risk: low
description: >
  CARP high-availability status — whether this node is MASTER or BACKUP and
  the state of each virtual IP. Use to confirm HA roles after a failover.
side_effects:
  - One read-only HTTP GET to the pfSense REST API.
  - Read-only.
args: []
execution:
  script:
    path: scripts/pfreq.sh
    interpreter: /bin/sh
  argv:
    - "GET"
    - "/api/v2/status/carp"
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 1048576
  max_stderr_bytes: 8192
examples:
  - title: CARP / HA state
    args: {}
