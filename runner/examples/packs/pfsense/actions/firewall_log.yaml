schema_version: 1
id: pfsense.firewall_log
title: GET /api/v2/status/logs/firewall
kind: script
risk: low
description: >
  Recent firewall filter-log entries — blocked/passed packets with time,
  interface, action, and source/destination. Use to see what is being
  dropped.
side_effects:
  - One read-only HTTP GET to the pfSense REST API.
  - Read-only.
args:
  - name: limit
    type: integer
    required: false
    default: 100
    description: Maximum number of log lines to return.
    validation:
      min: 1
      max: 5000
execution:
  script:
    path: scripts/pfreq.sh
    interpreter: /bin/sh
  argv:
    - "GET"
    - "/api/v2/status/logs/firewall?limit={{ args.limit }}"
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 2097152
  max_stderr_bytes: 8192
examples:
  - title: Last 100 firewall log lines
    args: {}
