schema_version: 1
id: cloud-init.modules_final
title: cloud-init modules --mode=final
kind: exec
risk: high
description: >
  Re-run every module in the `final` stage (runcmd, scripts-user,
  phone-home, power-state-change, etc.). Anything that was scripted
  to run "after first boot" runs again. Power-state modules can
  reboot/shutdown — make sure your cloud-config has no power-state
  directive before invoking.
side_effects:
  - Every module in the final stage re-runs.
  - User scripts under /var/lib/cloud/scripts/per-once and per-boot may execute.
  - power-state-change may reboot the host.
args: []
execution:
  command:
    binary: /usr/bin/cloud-init
    argv: ["modules", "--mode=final"]
  timeout: 600s
cancel_grace: 60s
output:
  parser: text
  max_stdout_bytes: 524288
  max_stderr_bytes: 16384
examples:
  - title: Re-apply final stage
    args: {}
