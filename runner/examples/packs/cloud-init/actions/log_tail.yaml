schema_version: 1
id: cloud-init.log_tail
title: tail /var/log/cloud-init.log
kind: exec
risk: low
description: >
  Last N lines of the main cloud-init log. Contains module
  execution, errors, and per-stage timing.
side_effects:
  - Reads one log file.
  - Read-only.
args:
  - name: lines
    type: integer
    required: false
    default: 200
    description: Number of trailing lines.
    validation:
      min: 1
      max: 10000
execution:
  command:
    binary: /usr/bin/tail
    argv: ["-n", "{{ args.lines }}", "/var/log/cloud-init.log"]
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 1048576
  max_stderr_bytes: 4096
examples:
  - title: Last 200 lines
    args: {}
