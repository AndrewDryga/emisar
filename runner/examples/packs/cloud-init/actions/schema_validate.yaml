schema_version: 1
id: cloud-init.schema_validate
title: cloud-init schema --system
kind: exec
risk: low
description: >
  Validate the rendered cloud-config against the cloud-init schema.
  Use to catch typos / deprecated keys before they cause a silent
  no-op on next boot.
side_effects:
  - One CLI call.
  - Read-only.
args: []
execution:
  command:
    binary: /usr/bin/cloud-init
    argv: ["schema", "--system"]
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 16384
  max_stderr_bytes: 8192
examples:
  - title: Validate effective config
    args: {}
