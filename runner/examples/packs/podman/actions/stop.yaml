schema_version: 1
id: podman.stop
title: podman stop <id>
kind: exec
risk: high
description: SIGTERM then SIGKILL after timeout.
side_effects:
  - Container stops.
  - Restart policy may bring it back unless --rm.
args:
  - name: container
    type: string
    required: true
    description: Container ID or name.
    validation:
      pattern: "^[a-zA-Z0-9_.\\-]{1,64}$"
execution:
  command: {binary: /usr/bin/podman, argv: ["stop", "{{ args.container }}"]}
  timeout: 2m
output:
  parser: text
  max_stdout_bytes: 4096
  max_stderr_bytes: 8192
examples:
  - title: Stop one
    args:
      container: "web"
