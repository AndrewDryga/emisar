schema_version: 1
id: caddy.access_log_tail
title: tail caddy access log
kind: exec
risk: low
description: Tail the access log (path configurable via CADDY_ACCESS_LOG env).
side_effects: ["One file read.", "Read-only."]
args:
  - name: lines
    type: integer
    required: false
    default: 200
    description: Lines.
    validation:
      min: 1
      max: 10000
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "tail -n {{ args.lines }} \"${CADDY_ACCESS_LOG:-/var/log/caddy/access.log}\""
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 2097152
  max_stderr_bytes: 8192
examples:
  - title: Last 200
    args: {}
