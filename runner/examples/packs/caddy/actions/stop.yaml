schema_version: 1
id: caddy.stop
title: caddy stop
kind: exec
risk: high
description: >
  Stop the running Caddy process via its admin API. All listeners
  close; in-flight requests drain. Recovery requires starting Caddy
  again via systemd or `caddy start`. Use as a last resort during
  incidents.
side_effects:
  - All Caddy listeners closed.
  - In-flight requests drain then terminate.
  - Reverse-proxy traffic to backends stops.
  - Process exits; supervisor decides restart.
args: []
execution:
  command:
    binary: caddy
    argv: ["stop"]
  timeout: 30s
cancel_grace: 10s
output:
  parser: text
  max_stdout_bytes: 8192
  max_stderr_bytes: 8192
examples:
  - title: Stop Caddy
    args: {}
