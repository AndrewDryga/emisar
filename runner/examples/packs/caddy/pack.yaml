schema_version: 1

id: caddy
name: Caddy web server
version: 0.1.0
description: >
  Caddy v2 ops via its admin API (default http://127.0.0.1:2019) and CLI.
  Config dump, upstream health, PKI inventory, config validation, plus
  reload (live config swap). Set CADDY_ADMIN env var if not on default.
vendor: emisar
homepage: https://github.com/andrewdryga/emisar

requires:
  os:
    - linux
  binaries:
    - caddy
    - curl

setup:
  summary: >
    Operates on the local Caddy instance on the runner host — no
    credentials needed. Inventory/health actions curl the admin API at
    127.0.0.1:2019; validate/reload/stop run the caddy binary directly.
  env:
    - name: CADDY_ADMIN
      description: Base URL of the Caddy admin API; set only if it does not listen on the default.
      default: "http://127.0.0.1:2019"
  notes:
    - "reload_config and stop change runtime state and need permission to talk to the admin socket and signal the process — run the runner as root or as the caddy service user."
  verify: caddy.version

actions:
  # Inventory
  - actions/version.yaml
  - actions/config_dump.yaml
  - actions/cluster_state.yaml
  - actions/pki_certs.yaml
  - actions/adapt_caddyfile.yaml
  # Health + logs
  - actions/reverse_proxy_upstreams.yaml
  - actions/runtime_metrics.yaml
  - actions/access_log_tail.yaml
  # Mutators
  - actions/validate_config.yaml
  - actions/reload_config.yaml
  - actions/stop.yaml
