schema_version: 1
id: f2b.status
title: fail2ban-client status
kind: exec
risk: low
description: All configured jails + currently-active count.
side_effects: ["One fail2ban call.", "Read-only."]
args: []
execution:
  command: {binary: /usr/bin/fail2ban-client, argv: ["status"]}
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 8192
  max_stderr_bytes: 8192
examples:
  - title: All jails
    args: {}
