schema_version: 1
id: mc.stats_items
title: stats items
kind: exec
risk: low
description: Per-slab item counts + age.
side_effects: ["One ASCII protocol call.", "Read-only."]
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "printf 'stats items\\nquit\\n' | nc -w 5 \"${MEMCACHED_HOST:-127.0.0.1}\" \"${MEMCACHED_PORT:-11211}\""
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 32768
  max_stderr_bytes: 8192
examples:
  - title: Items
    args: {}
