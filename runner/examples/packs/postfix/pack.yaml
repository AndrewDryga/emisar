schema_version: 1

id: postfix
name: Postfix mail server
version: 0.1.4
description: >
  Queue inspection, config dump, log tailing, plus narrow operator
  actions (flush, requeue, delete-by-queue-id). These mutators are high-
  or critical-risk; the reversible hold/release pause is medium. All are
  audited. Postfix uid must own the runner OR runner must be in the
  postdrop group.
vendor: emisar
homepage: https://github.com/andrewdryga/emisar

requires:
  os:
    - linux

# `emisar pack suggest` detection: a postfix-specific CLI. The master
# process is generically named `master`, and :25 is shared by every MTA —
# neither discriminates postfix, so detect by a postfix-only binary.
detect:
  binaries:
    - postqueue

setup:
  summary: >
    Operates on the local Postfix instance on the runner host — no
    credentials needed. Uses the standard binaries (postqueue, postconf,
    mailq, postsuper) and reads the queue under /var/spool/postfix.
  notes:
    - "The runner user must own the Postfix queue or be in the postdrop group to read it; the postsuper_* hold/release/requeue actions and `reload` need root."
    - "maillog actions read /var/log/mail.log, falling back to /var/log/maillog (RHEL-family)."
  verify: postfix.mailq

actions:
  - actions/mailq.yaml
  - actions/qshape.yaml
  - actions/queue_counts.yaml
  - actions/postconf.yaml
  - actions/postcat_qid.yaml
  - actions/maillog_tail.yaml
  - actions/maillog_grep.yaml
  - actions/flush_queue.yaml
  - actions/delete_qid.yaml
  - actions/check_config.yaml
  - actions/reload.yaml
  - actions/postsuper_hold.yaml
  - actions/postsuper_release.yaml
  - actions/postsuper_requeue.yaml
