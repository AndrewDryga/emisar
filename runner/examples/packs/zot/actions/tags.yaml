schema_version: 1
id: zot.tags
title: GET /v2/{repo}/tags/list
kind: script
risk: low
description: >
  Lists the tags available for a single repository. Use after the catalog to
  see which versions of an image are published. Read-only.
side_effects:
  - One read-only HTTP GET to the zot /v2/{repo}/tags/list endpoint.
  - Read-only — never pushes or deletes.
args:
  - name: repo
    type: string
    required: true
    description: Repository name (may include a namespace path).
    validation:
      pattern: '^[a-z0-9._/-]{1,256}$'
execution:
  script:
    path: scripts/zotget.sh
    interpreter: /bin/sh
  argv:
    - "GET"
    - "/v2/{{ args.repo }}/tags/list"
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 1048576
  max_stderr_bytes: 8192
examples:
  - title: Tags for library/alpine
    args:
      repo: library/alpine
