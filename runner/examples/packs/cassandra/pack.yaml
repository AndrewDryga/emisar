schema_version: 1

id: cassandra
name: Cassandra operations
version: 0.4.1
description: >
  Deep Cassandra ops via nodetool + cqlsh: topology (status, ring,
  gossip, describering, failure detector), health (tpstats, netstats,
  proxy + table histograms, compaction stats + history, throughput),
  schema introspection, maintenance mutators (snapshot, flush, cleanup,
  verify, compact, stop, throughput, cache invalidation), repair
  workflows, node lifecycle (drain, decommission, assassinate,
  removenode, rebuild), and logging level control. JMX on 127.0.0.1:7199.
vendor: emisar
homepage: https://github.com/andrewdryga/emisar

requires:
  os:
    - linux
  binaries:
    - nodetool

setup:
  summary: >
    nodetool actions connect to the local node's JMX port (127.0.0.1:7199 by
    default, set per call) and take no credentials. cqlsh actions read
    CQLSH_HOST and CQLSH_PORT on the runner host (defaulting to 127.0.0.1:9042)
    and authenticate, when the cluster requires it, from ~/.cassandra/cqlshrc.
  env:
    - name: CQLSH_HOST
      description: Host for the cqlsh actions (schema/keyspace/role introspection).
      default: 127.0.0.1
    - name: CQLSH_PORT
      description: Native CQL port for the cqlsh actions.
      default: "9042"
  notes:
    - nodetool host/port come from each action's args (default 127.0.0.1:7199), not the environment; this pack passes no JMX username/password, so it works only against a node without JMX auth.
    - "cqlsh credentials belong in ~/.cassandra/cqlshrc (with a [authentication] username/password) on the runner host — read from disk, so it needs no inherit_env entry; the actions pass no -u/-p."
    - Lifecycle and maintenance mutators (repair, drain, decommission, assassinate, removenode, cleanup, compact) are cluster-affecting; run the read actions first.
  verify: cassandra.nodetool_status

actions:
  # Topology / cluster state
  - actions/nodetool_status.yaml
  - actions/nodetool_describecluster.yaml
  - actions/nodetool_info.yaml
  - actions/nodetool_version.yaml
  - actions/nodetool_gossipinfo.yaml
  - actions/nodetool_ring.yaml
  - actions/nodetool_failuredetector.yaml
  - actions/nodetool_describering.yaml
  # Health
  - actions/nodetool_tpstats.yaml
  - actions/nodetool_netstats.yaml
  - actions/nodetool_proxyhistograms.yaml
  - actions/nodetool_tablehistograms.yaml
  - actions/nodetool_tablestats.yaml
  - actions/nodetool_compactionstats.yaml
  - actions/nodetool_compactionhistory.yaml
  - actions/nodetool_getconcurrentcompactors.yaml
  - actions/nodetool_getcompactionthroughput.yaml
  - actions/analyze_disk_pressure.yaml
  # Snapshots / endpoints
  - actions/nodetool_listsnapshots.yaml
  - actions/nodetool_getendpoints.yaml
  # Schema (cqlsh)
  - actions/cqlsh_describe_schema.yaml
  - actions/cqlsh_list_keyspaces.yaml
  - actions/cqlsh_describe_keyspace.yaml
  - actions/cqlsh_list_roles.yaml
  - actions/cqlsh_system_peers.yaml
  - actions/cqlsh_system_size_estimates.yaml
  # Maintenance mutators
  - actions/nodetool_flush.yaml
  - actions/nodetool_snapshot.yaml
  - actions/nodetool_clearsnapshot.yaml
  - actions/nodetool_cleanup.yaml
  - actions/nodetool_verify.yaml
  - actions/nodetool_compact.yaml
  - actions/nodetool_stop_compaction.yaml
  - actions/nodetool_setcompactionthroughput.yaml
  # Cache invalidation
  - actions/nodetool_invalidatekeycache.yaml
  - actions/nodetool_invalidaterowcache.yaml
  - actions/nodetool_invalidatecountercache.yaml
  # Repair
  - actions/nodetool_repair.yaml
  # Lifecycle
  - actions/nodetool_drain.yaml
  - actions/nodetool_decommission.yaml
  - actions/nodetool_assassinate.yaml
  - actions/nodetool_removenode.yaml
  - actions/nodetool_rebuild.yaml
  # Logging
  - actions/nodetool_getlogginglevels.yaml
  - actions/nodetool_setlogginglevel.yaml
