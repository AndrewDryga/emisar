schema_version: 1
id: cassandra.nodetool_clearsnapshot
title: nodetool clearsnapshot -t <name>
kind: exec
risk: high
description: Deletes one snapshot tag from all keyspaces. Frees disk that was pinned by the snapshot.
side_effects:
  - Snapshot hard links removed.
  - Disk space reclaims as the underlying SSTables become orphaned.
args:
  - name: tag
    type: string
    required: true
    description: Snapshot tag to delete.
    validation:
      pattern: "^[a-zA-Z0-9_.\\-]{1,64}$"
execution:
  command:
    binary: /usr/bin/nodetool
    argv: ["clearsnapshot", "-t", "{{ args.tag }}"]
  timeout: 5m
output:
  parser: text
  max_stdout_bytes: 16384
  max_stderr_bytes: 8192
examples:
  - title: Delete tag
    args:
      tag: "old-backup"
