schema_version: 1
id: cassandra.nodetool_describecluster
title: nodetool describecluster
kind: exec
risk: low
description: 'Cluster name, partitioner, snitch, and schema versions per host. Schema disagreement here is a sign of partial DDL propagation.'
side_effects: ["One JMX call.", "Read-only."]
args: []
execution:
  command: {binary: /usr/bin/nodetool, argv: ["describecluster"]}
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 32768
  max_stderr_bytes: 8192
examples:
  - title: Cluster summary
    args: {}
