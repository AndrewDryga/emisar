schema_version: 1

id: elasticsearch
name: Elasticsearch / OpenSearch ops
version: 0.1.1
description: >
  Cluster + index introspection plus narrow mutators (cache_clear,
  force_merge, flush_synced, close_index). Auth via ELASTIC_USER +
  ELASTIC_PASSWORD env vars on the runner host. Does NOT include
  delete_index — too easy to misuse.
vendor: emisar
homepage: https://github.com/andrewdryga/emisar

requires:
  os:
    - linux
  binaries:
    - curl

setup:
  summary: >
    Each action expands ELASTIC_URL, ELASTIC_USER, and ELASTIC_PASSWORD on the
    runner host and passes them to curl as the target URL and HTTP basic-auth
    credentials.
  env:
    - name: ELASTIC_URL
      required: true
      description: Base URL of the cluster, scheme and port included. No default — curl has no endpoint without it.
      example: "https://es.internal:9200"
    - name: ELASTIC_USER
      required: true
      description: Username for HTTP basic auth; needs privileges for the actions you enable.
      example: elastic
    - name: ELASTIC_PASSWORD
      required: true
      description: Password for ELASTIC_USER.
  notes:
    - curl does not read these on its own; the actions build the -u credential and the URL from them, so all three must be allowlisted in inherit_env.
    - For a cluster without security enabled, point ELASTIC_URL at the HTTP endpoint and set ELASTIC_USER / ELASTIC_PASSWORD to any non-empty placeholder — the basic-auth header is sent unconditionally.
    - Mutators (cache_clear, force_merge, flush_synced, close_index) need a role with manage privileges on the target indices.
  verify: es.cluster_health

actions:
  # Cluster
  - actions/cluster_health.yaml
  - actions/cluster_settings.yaml
  - actions/cluster_allocation_explain.yaml
  - actions/pending_tasks.yaml
  # _cat
  - actions/cat_nodes.yaml
  - actions/cat_indices.yaml
  - actions/cat_shards.yaml
  - actions/cat_aliases.yaml
  - actions/cat_thread_pool.yaml
  - actions/cat_recovery.yaml
  - actions/cat_segments.yaml
  # Index introspection
  - actions/index_settings.yaml
  - actions/index_stats.yaml
  - actions/index_mapping.yaml
  - actions/index_count.yaml
  # Snapshots
  - actions/snapshot_list.yaml
  - actions/snapshot_status.yaml
  # Mutators
  - actions/cache_clear.yaml
  - actions/force_merge.yaml
  - actions/flush_synced.yaml
  - actions/close_index.yaml
