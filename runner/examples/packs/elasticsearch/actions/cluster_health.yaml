schema_version: 1
id: es.cluster_health
title: GET /_cluster/health
kind: exec
risk: low
description: Cluster status (green/yellow/red), node count, shard counts. Read-only.
side_effects:
  - One GET request.
  - Read-only.
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "{ printf 'Authorization: Basic '; printf '%s:%s' \"$ELASTIC_USER\" \"$ELASTIC_PASSWORD\" | base64 | tr -d '\\n'; printf '\\n'; } | curl -sS -H @- \"${ELASTIC_URL:-http://127.0.0.1:9200}/_cluster/health?pretty\""
  timeout: 15s
output:
  parser: json
  max_stdout_bytes: 8192
  max_stderr_bytes: 8192
examples:
  - title: Cluster health
    args: {}
