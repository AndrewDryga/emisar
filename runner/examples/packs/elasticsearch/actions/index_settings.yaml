schema_version: 1
id: es.index_settings
title: GET /<index>/_settings
kind: exec
risk: low
description: Returns one index's settings.
side_effects:
  - One GET request.
  - Read-only.
args:
  - name: index
    type: string
    required: true
    description: Index name.
    validation:
      pattern: "^[a-zA-Z0-9_.\\-]{1,255}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "curl -sS -u \"$ELASTIC_USER:$ELASTIC_PASSWORD\" \"${ELASTIC_URL:-http://127.0.0.1:9200}/{{ args.index }}/_settings?pretty\""
  timeout: 15s
output:
  parser: json
  max_stdout_bytes: 32768
  max_stderr_bytes: 8192
examples:
  - title: Settings for one index
    args:
      index: "logs-2026-06-01"
