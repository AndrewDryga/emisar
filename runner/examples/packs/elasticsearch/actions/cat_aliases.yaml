schema_version: 1
id: es.cat_aliases
title: GET /_cat/aliases
kind: exec
risk: low
description: All aliases pointing to indices. Use to confirm an alias rotation worked.
side_effects:
  - One GET request.
  - Read-only.
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "curl -sS -u \"$ELASTIC_USER:$ELASTIC_PASSWORD\" \"$ELASTIC_URL/_cat/aliases?v\""
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192
examples:
  - title: Aliases
    args: {}
