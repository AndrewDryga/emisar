schema_version: 1
id: es.cluster_settings
title: GET /_cluster/settings
kind: exec
risk: low
description: Returns persistent + transient cluster-level settings.
side_effects:
  - One GET request.
  - Read-only.
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "curl -sS -u \"$ELASTIC_USER:$ELASTIC_PASSWORD\" \"${ELASTIC_URL:-http://127.0.0.1:9200}/_cluster/settings?include_defaults=false&pretty\""
  timeout: 15s
output:
  parser: json
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192
examples:
  - title: Cluster settings
    args: {}
