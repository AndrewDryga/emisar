schema_version: 1
id: postgres.activity_detail
title: pg_stat_activity (per-backend)
kind: exec
risk: low
description: 'Per-backend detail: pid, user, app, state, wait_event, query age, query text.'
side_effects: ["One SELECT against pg_stat_activity.", "No locks."]
args: []
execution:
  command:
    binary: /usr/bin/psql
    argv:
      - "-XAt"
      - "-c"
      - "SELECT pid, usename, application_name, client_addr, state, wait_event_type, wait_event, EXTRACT(EPOCH FROM (now()-query_start))::int AS query_age_sec, EXTRACT(EPOCH FROM (now()-state_change))::int AS state_age_sec, substring(query, 1, 300) AS query FROM pg_stat_activity WHERE pid <> pg_backend_pid() ORDER BY query_start ASC NULLS LAST LIMIT 200;"
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: All backends
    args: {}
