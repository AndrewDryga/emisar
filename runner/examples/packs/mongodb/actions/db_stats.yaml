schema_version: 1
id: mongo.db_stats
title: db.stats()
kind: exec
risk: low
description: Database-level totals — collections, indexes, data size, storage size.
side_effects:
  - One dbStats command.
  - Read-only.
args:
  - name: database
    type: string
    required: true
    description: Database name.
    validation:
      pattern: "^[a-zA-Z0-9_\\-]{1,63}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "mongosh \"$MONGO_URI\" '--quiet' '--eval' \"JSON.stringify(db.getSiblingDB('{{ args.database }}').stats())\""
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 32768
  max_stderr_bytes: 8192
examples:
  - title: Stats for one DB
    args:
      database: "production"
