schema_version: 1

id: dnf-rpm
name: RHEL/Fedora package ops
version: 0.1.2
description: >
  Counterpart to the `debian` pack for RHEL/CentOS/Fedora/Alma/Rocky:
  rpm inventory, dnf check-update, narrow install/remove actions for a
  single named package. Equivalent risk model to the apt counterpart.
vendor: emisar
homepage: https://github.com/andrewdryga/emisar

requires:
  os:
    - linux
  binaries:
    - rpm
    - dnf

setup:
  summary: >
    Operates on the local runner host — no credentials needed.
  notes:
    - "Read-only inventory (rpm_qa, rpm_qi, rpm_ql, rpm_verify, dnf_check_update, dnf_history, dnf_repolist) needs no privilege."
    - "Mutators (dnf_install, dnf_remove, dnf_clean_metadata, upgrade_pkg, reinstall_pkg, autoremove) need root — run the runner as root or via sudo."
  verify: rpm.rpm_qa

actions:
  # rpm inventory
  - actions/rpm_qa.yaml
  - actions/rpm_qi.yaml
  - actions/rpm_ql.yaml
  - actions/rpm_verify.yaml
  # dnf inventory
  - actions/dnf_check_update.yaml
  - actions/dnf_history.yaml
  - actions/dnf_repolist.yaml
  # dnf mutators
  - actions/dnf_install.yaml
  - actions/dnf_remove.yaml
  - actions/dnf_clean_metadata.yaml
  - actions/upgrade_pkg.yaml
  - actions/reinstall_pkg.yaml
  - actions/autoremove.yaml
