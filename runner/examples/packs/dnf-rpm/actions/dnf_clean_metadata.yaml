schema_version: 1
id: rpm.dnf_clean_metadata
title: dnf clean metadata
kind: exec
risk: medium
description: Wipes cached repo metadata. Next dnf call refetches.
side_effects:
  - Local metadata cache removed.
  - Next operation downloads fresh metadata (one-time slowdown).
args: []
execution:
  command: {binary: dnf, argv: ["clean", "metadata"]}
  timeout: 60s
output:
  parser: text
  max_stdout_bytes: 8192
  max_stderr_bytes: 8192
examples:
  - title: Wipe cache
    args: {}
