schema_version: 1
id: rpm.dnf_remove
title: dnf remove -y <pkg>
kind: exec
risk: high
description: Removes one package + dependencies that no longer have a reverse-dep.
side_effects:
  - Files installed by the package are deleted.
  - Other packages depending on it may also be removed.
args:
  - name: package
    type: string
    required: true
    description: Package name.
    validation:
      pattern: "^[a-zA-Z0-9_.+\\-]{1,128}$"
execution:
  command: {binary: dnf, argv: ["remove", "-y", "{{ args.package }}"]}
  timeout: 10m
output:
  parser: text
  max_stdout_bytes: 262144
  max_stderr_bytes: 65536
examples:
  - title: Uninstall jq
    args:
      package: "jq"
