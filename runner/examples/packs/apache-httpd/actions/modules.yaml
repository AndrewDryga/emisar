schema_version: 1
id: httpd.modules
title: apachectl -M
kind: exec
risk: low
description: All loaded modules (static + shared).
side_effects:
  - Forks apachectl.
  - Read-only.
args: []
execution:
  command:
    binary: apachectl
    argv:
      - "-M"
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 32768
  max_stderr_bytes: 8192
examples:
  - title: Modules
    args: {}
