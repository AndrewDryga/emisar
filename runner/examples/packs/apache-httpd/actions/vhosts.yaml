schema_version: 1
id: httpd.vhosts
title: apachectl -S
kind: exec
risk: low
description: All configured vhosts with their effective listen + ServerName.
side_effects:
  - Forks apachectl.
  - Read-only.
args: []
execution:
  command:
    binary: apachectl
    argv:
      - "-S"
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192
examples:
  - title: Vhosts
    args: {}
