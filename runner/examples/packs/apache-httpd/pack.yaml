schema_version: 1

id: apache-httpd
name: Apache HTTPD operations
version: 0.1.2
description: >
  Apache version, modules, mod_status snapshot, config syntax check,
  vhost dump, error/access log tails, plus narrow mutators (graceful
  reload, graceful stop). Full restart not included — use systemd for
  that.
vendor: emisar
homepage: https://github.com/andrewdryga/emisar

requires:
  os:
    - linux
  binaries:
    - apachectl
    - curl

# `emisar pack suggest` detection — default process names / ports.
detect:
  processes:
    - httpd
    - apache2
  ports:
    - 80
    - 443

setup:
  summary: >
    Operates on the local Apache instance on the runner host — no
    credentials needed. Defaults to the Debian/Ubuntu layout; override
    the paths below only if your install differs.
  env:
    - name: HTTPD_STATUS_URL
      description: mod_status URL the status action fetches (requires mod_status enabled).
      default: "http://127.0.0.1/server-status?auto"
    - name: HTTPD_ERROR_LOG
      description: Path to the Apache error log for error_tail.
      default: /var/log/apache2/error.log
    - name: HTTPD_ACCESS_LOG
      description: Path to the Apache access log for the access_top_* actions.
      default: /var/log/apache2/access.log
  notes:
    - "graceful_reload and graceful_stop control the server and need root (run the runner as root or via sudo)."
    - "On RHEL-family installs the logs live under /var/log/httpd — set HTTPD_ERROR_LOG / HTTPD_ACCESS_LOG accordingly."
  verify: httpd.version

actions:
  - actions/version.yaml
  - actions/modules.yaml
  - actions/vhosts.yaml
  - actions/test_config.yaml
  - actions/status.yaml
  - actions/error_tail.yaml
  - actions/access_top_clients.yaml
  - actions/access_top_urls.yaml
  - actions/graceful_reload.yaml
  - actions/graceful_stop.yaml
