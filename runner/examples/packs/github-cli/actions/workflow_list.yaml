schema_version: 1
id: gh.workflow_list
title: gh workflow list
kind: exec
risk: low
description: All workflows defined in one repo.
side_effects:
  - One API call.
  - Read-only.
args:
  - name: repo
    type: string
    required: true
    description: 'Repo in owner/name form.'
    validation:
      pattern: "^[a-zA-Z0-9_.\\-]{1,40}/[a-zA-Z0-9_.\\-]{1,100}$"
execution:
  command:
    binary: gh
    argv:
      - "workflow"
      - "list"
      - "--repo"
      - "{{ args.repo }}"
      - "--all"
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192
examples:
  - title: Workflows
    args:
      repo: "andrewdryga/emisar"
