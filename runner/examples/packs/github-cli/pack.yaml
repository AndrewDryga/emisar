schema_version: 1

id: github-cli
name: GitHub CLI operations
version: 0.1.1
description: >
  GitHub introspection — PRs, issues, repos, workflow runs, releases,
  commit checks, search — plus operator actions: merge PR, close PR,
  rerun workflow, dispatch workflow. Authenticates via the runner host's
  `gh auth status` token (i.e. ~/.config/gh).
vendor: emisar
homepage: https://github.com/andrewdryga/emisar

requires:
  os:
    - linux
  binaries:
    - gh

setup:
  summary: >
    Actions shell out to gh on the runner host. gh authenticates with GH_TOKEN
    (or GITHUB_TOKEN) if set, otherwise with the token stored by `gh auth
    login`. Provide one of those so gh is signed in.
  env:
    - name: GH_TOKEN
      description: 'GitHub token gh uses to authenticate. Omit if the runner host is already signed in via `gh auth login`.'
  notes:
    - "Token-free alternative: run `gh auth login` as the runner's user once; the credential is stored in ~/.config/gh/hosts.yml and read from disk, so it needs no inherit_env entry."
    - "The token needs repo read scope for the introspection actions; the mutators (pr_merge, pr_close, workflow_rerun, workflow_dispatch) and repo_clone_count need write/push access to the target repo."
  verify: gh.auth_status

actions:
  # Auth + repo
  - actions/auth_status.yaml
  - actions/repo_view.yaml
  - actions/repo_clone_count.yaml
  - actions/branch_list.yaml
  - actions/release_list.yaml
  # Pull requests
  - actions/pr_list.yaml
  - actions/pr_view.yaml
  - actions/pr_checks.yaml
  - actions/search_prs.yaml
  # Issues
  - actions/issue_list.yaml
  - actions/issue_view.yaml
  # Workflows
  - actions/workflow_list.yaml
  - actions/workflow_run_list.yaml
  - actions/workflow_run_view.yaml
  - actions/workflow_run_logs.yaml
  # Mutators
  - actions/pr_merge.yaml
  - actions/pr_close.yaml
  - actions/workflow_rerun.yaml
  - actions/workflow_dispatch.yaml
