schema_version: 1

id: debian
name: Debian/Ubuntu package operations
version: 0.1.2
description: >
  Operator pack for Debian/Ubuntu hosts. Read-only inventory and
  patching diagnostics, plus narrow apt install/remove actions for a
  single named package. Designed for production hosts where a human
  approver must see the package name before a write happens.
vendor: emisar
homepage: https://github.com/andrewdryga/emisar

requires:
  os:
    - linux
  binaries:
    - apt-get
    - dpkg

setup:
  summary: >
    Operates on the local runner host — no credentials needed.
  notes:
    - "Read-only inventory (dpkg_status, apt_upgradable, apt_security_check, kernel_info) needs no privilege."
    - "Mutators (apt_install, apt_remove, apt_autoremove) and apt_update need root — run the runner as root or via sudo."
  verify: debian.dpkg_status

actions:
  - actions/apt_update.yaml
  - actions/apt_upgradable.yaml
  - actions/apt_security_check.yaml
  - actions/dpkg_status.yaml
  - actions/dpkg_changes.yaml
  - actions/kernel_info.yaml
  - actions/apt_install.yaml
  - actions/apt_remove.yaml
  - actions/apt_autoremove.yaml
