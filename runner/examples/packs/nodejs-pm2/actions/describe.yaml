schema_version: 1
id: pm2.describe
title: pm2 describe <name>
kind: exec
risk: low
description: Full config + runtime details for one process.
side_effects:
  - One PM2 IPC call.
  - Read-only.
args:
  - name: name
    type: string
    required: true
    description: Process name or id.
    validation:
      pattern: "^[a-zA-Z0-9_.\\-]{1,64}$"
execution:
  command:
    binary: pm2
    argv:
      - "describe"
      - "{{ args.name }}"
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 131072
  max_stderr_bytes: 8192
examples:
  - title: Describe one
    args:
      name: "api"
