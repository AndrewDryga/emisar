schema_version: 1

id: clickhouse
name: ClickHouse analytics DB
version: 0.1.3
description: >
  ClickHouse server + table introspection plus narrow mutators
  (OPTIMIZE, KILL QUERY, SYSTEM RELOAD CONFIG). Auth via CH_HOST +
  CH_USER + CH_PASSWORD env vars on the runner host. Uses clickhouse-client
  with --query to keep arg surface minimal.
vendor: emisar
homepage: https://github.com/andrewdryga/emisar

requires:
  os:
    - linux
  binaries:
    - clickhouse-client

# `emisar pack suggest` detection — default process names / ports.
detect:
  processes:
    - clickhouse-server
  ports:
    - 8123

setup:
  summary: >
    Each action reads CH_HOST, CH_USER, and CH_PASSWORD on the runner host and
    passes them to clickhouse-client as --host/--user/--password. Host and user
    fall back to localhost and the default user, so a local server with the
    default account needs no setup at all.
  env:
    - name: CH_HOST
      description: Server host passed to --host.
      default: localhost
    - name: CH_USER
      description: User passed to --user.
      default: default
    - name: CH_PASSWORD
      description: Password passed to --password. Leave unset for a passwordless account.
  notes:
    - Connection always uses clickhouse-client's default native port (9000); there is no port env var in this pack.
    - The user needs SELECT on the system tables for the reads, plus rights for the mutators (KILL QUERY, OPTIMIZE, SYSTEM ... for replica/config actions) you enable.
  verify: ch.uptime

actions:
  # Server state
  - actions/uptime.yaml
  - actions/system_metrics.yaml
  - actions/system_events.yaml
  - actions/disks.yaml
  - actions/dictionaries.yaml
  # Live queries
  - actions/processes.yaml
  - actions/slow_queries.yaml
  # Replication / merges / mutations
  - actions/replicas_status.yaml
  - actions/merge_queue.yaml
  - actions/mutation_queue.yaml
  # Tables / parts
  - actions/parts_summary.yaml
  - actions/table_sizes.yaml
  # Mutators
  - actions/kill_query.yaml
  - actions/optimize_table.yaml
  - actions/reload_config.yaml
  - actions/system_drop_replica.yaml
  - actions/system_restart_replica.yaml
  - actions/system_sync_replica.yaml
  - actions/system_flush_logs.yaml
