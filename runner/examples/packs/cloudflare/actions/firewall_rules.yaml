schema_version: 1
id: cf.firewall_rules
title: GET /zones/<id>/rulesets/phases/http_request_firewall_custom/entrypoint
kind: exec
risk: low
description: >
  Zone WAF custom rules — the entrypoint ruleset for the
  http_request_firewall_custom phase. Replaces the legacy /firewall/rules
  API, which Cloudflare sunset on 2025-06-15.
side_effects:
  - One API request.
  - Read-only.
args:
  - name: zone_id
    type: string
    required: true
    description: Zone ID.
    validation:
      pattern: "^[a-f0-9]{32}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "curl -sS \"https://api.cloudflare.com/client/v4/zones/{{ args.zone_id }}/rulesets/phases/http_request_firewall_custom/entrypoint\" -H \"Authorization: Bearer $CF_API_TOKEN\""
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: Firewall rules
    args:
      zone_id: "abc123def456abc123def456abc123de"
