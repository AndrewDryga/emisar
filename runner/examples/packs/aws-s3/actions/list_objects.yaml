schema_version: 1
id: s3.list_objects
title: aws s3 ls s3://<bucket>/<prefix>
kind: exec
risk: low
description: List objects under a prefix (capped at 1000 per page).
side_effects:
  - One ListObjectsV2 call.
  - Read-only.
args:
  - name: bucket
    type: string
    required: true
    description: Bucket name.
    validation:
      pattern: "^[a-z0-9.\\-]{3,63}$"
  - name: prefix
    type: string
    required: false
    default: ""
    description: Key prefix.
    validation:
      pattern: "^[a-zA-Z0-9_.!*'(),/\\-]{0,512}$"
execution:
  command:
    binary: aws
    argv: ["s3", "ls", "s3://{{ args.bucket }}/{{ args.prefix }}"]
  timeout: 60s
output:
  parser: text
  max_stdout_bytes: 1048576
  max_stderr_bytes: 8192
examples:
  - title: Objects under prefix
    args:
      bucket: "my-bucket"
      prefix: "logs/2026/"
