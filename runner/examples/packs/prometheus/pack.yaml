schema_version: 1

id: prometheus
name: Prometheus operations
version: 0.1.4
description: >
  Server status, target health, alertmanager linkage, instant + range
  queries, rule listing, TSDB stats, plus admin-API actions for
  remediation: reload config, take snapshot, clean tombstones, delete
  series. Admin endpoints require --web.enable-admin-api +
  --web.enable-lifecycle.
vendor: emisar
homepage: https://github.com/andrewdryga/emisar

requires:
  os:
    - linux
  binaries:
    - curl

# `emisar pack suggest` detection: Prometheus' own process + default port.
detect:
  processes:
    - prometheus
  ports:
    - 9090

setup:
  summary: >
    Every action calls the Prometheus HTTP API at $PROM_URL via curl on the
    runner host. Set PROM_URL to the server base URL; the actions send no
    auth, so a reachable endpoint is all that is needed.
  env:
    - name: PROM_URL
      required: true
      description: Prometheus base URL (scheme + host + port, no trailing path).
      example: http://prometheus.internal:9090
  notes:
    - "No credentials are sent. If your Prometheus sits behind an auth proxy, expose it to the runner on a network path that does not require a header, or point PROM_URL at a trusted side door."
    - "Admin actions (reload_config, snapshot, clean_tombstones, delete_series) only work if Prometheus was started with --web.enable-admin-api and --web.enable-lifecycle."
  verify: prom.build_info

actions:
  - actions/build_info.yaml
  - actions/runtime_info.yaml
  - actions/flags.yaml
  - actions/targets.yaml
  - actions/alertmanagers.yaml
  - actions/rules.yaml
  - actions/alerts.yaml
  - actions/tsdb_stats.yaml
  - actions/query_instant.yaml
  - actions/query_range.yaml
  - actions/reload_config.yaml
  - actions/snapshot.yaml
  - actions/clean_tombstones.yaml
  - actions/delete_series.yaml
