schema_version: 1
id: prom.alerts
title: GET /api/v1/alerts
kind: exec
risk: low
description: Currently active alerts (pending or firing).
side_effects:
  - One GET request.
  - Read-only.
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "curl -sS \"$PROM_URL/api/v1/alerts\""
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: Active alerts
    args: {}
