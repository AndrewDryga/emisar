schema_version: 1
id: traefik.overview
title: GET /api/overview
kind: script
risk: low
description: >
  Dashboard summary — counts of HTTP/TCP/UDP routers, services, and
  middlewares by state (enabled/warning/errored), enabled providers, and
  which features (metrics, tracing) are on. The fastest "is anything broken?"
  read before drilling into the per-router inventory.
side_effects:
  - One read-only HTTP GET to the Traefik API.
  - Read-only.
args: []
execution:
  script:
    path: scripts/trget.sh
    interpreter: /bin/sh
  argv:
    - "/api/overview"
  timeout: 15s
output:
  parser: json
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192
examples:
  - title: Router/service/middleware counts + features
    args: {}
