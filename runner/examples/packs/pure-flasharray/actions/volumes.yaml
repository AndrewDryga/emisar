schema_version: 1
id: pure.volumes
title: GET /volumes
kind: script
risk: low
description: >
  Volume inventory — each volume's name, id, provisioned (virtual) size, and
  whether it is destroyed / pending eradication. Use to confirm a volume
  exists and its size. Returns {items:[...], more_items_remaining, ...}, one
  item per volume; can be large on arrays with many volumes.
side_effects:
  - One read-only HTTP GET to the FlashArray REST API.
  - Read-only — never writes or mutates array state.
args: []
execution:
  script:
    path: scripts/pureget.sh
    interpreter: /bin/sh
  argv:
    - "/volumes"
  timeout: 60s
output:
  parser: json
  max_stdout_bytes: 4194304
  max_stderr_bytes: 8192
examples:
  - title: Volume inventory and provisioned size
    args: {}
