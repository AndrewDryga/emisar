schema_version: 1

id: linux.systemctl_reload
title: Reload a systemd unit's config
kind: exec
risk: medium

description: >
  `systemctl reload <unit>`. The unit re-reads its config without
  restarting (works only for units declaring an ExecReload). Use
  after editing nginx.conf / postgresql.conf / etc. The reload is
  graceful by definition — no requests dropped.

side_effects:
  - Sends SIGHUP (or the configured reload signal) to the unit.
  - Unit re-reads its config; existing workers continue.

args:
  - name: unit
    type: string
    required: true
    description: Systemd unit name.
    validation:
      pattern: "^[a-zA-Z0-9@:_.\\-]{1,128}$"

execution:
  command:
    binary: systemctl
    argv:
      - "reload"
      - "{{ args.unit }}"
  timeout: 30s

output:
  parser: text
  max_stdout_bytes: 8192
  max_stderr_bytes: 8192

examples:
  - title: Reload nginx
    args:
      unit: nginx.service
