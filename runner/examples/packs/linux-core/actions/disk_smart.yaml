schema_version: 1

id: linux.disk_smart
title: SMART health for one disk
kind: exec
risk: low

description: >
  Runs `smartctl -H -A` against a block device. Returns the overall
  PASS/FAIL plus the attribute table (reallocated sectors, pending,
  uncorrectable, temperature). Read-only on the disk; needs the
  `smartmontools` package and CAP_SYS_RAWIO (root) to access ATA
  registers.

side_effects:
  - One smartctl invocation.
  - Reads SMART registers; no writes to the disk.

args:
  - name: device
    type: string
    required: true
    description: Block device under /dev (e.g. sda, nvme0n1).
    validation:
      pattern: "^[a-zA-Z0-9]{1,16}$"

execution:
  command:
    binary: /usr/sbin/smartctl
    argv:
      - "-H"
      - "-A"
      - "/dev/{{ args.device }}"
  timeout: 15s

output:
  parser: text
  max_stdout_bytes: 32768
  max_stderr_bytes: 8192

examples:
  - title: SMART for sda
    args:
      device: sda
