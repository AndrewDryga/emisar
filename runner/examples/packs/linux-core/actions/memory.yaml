schema_version: 1

id: linux.memory
title: System memory snapshot
kind: exec
risk: low

description: >
  Reports memory and swap usage via /usr/bin/free -m. Read-only, single
  sample. Memory state fluctuates between consecutive calls; take two
  samples a few seconds apart before drawing conclusions about pressure.

side_effects:
  - Reads /proc/meminfo via the free utility.
  - Touches no files.

args: []

execution:
  command:
    binary: /usr/bin/free
    argv:
      - "-m"
  timeout: 5s
  cwd: /

output:
  parser: text
  max_stdout_bytes: 8192
  max_stderr_bytes: 2048

examples:
  - title: Snapshot memory
    args: {}
