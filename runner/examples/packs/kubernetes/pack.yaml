schema_version: 1

id: kubernetes
name: Kubernetes operations pack
version: 0.1.1
description: >
  Operator pack for Kubernetes clusters: discovery (pods, nodes,
  services, deployments), deep introspection (describe, logs, events),
  rollouts (status, history, restart, undo), and narrow node/pod
  mutators (cordon, drain, delete). Cluster targeting via KUBECONFIG
  env var on the runner host; context selectable per call.
vendor: emisar
homepage: https://github.com/andrewdryga/emisar

requires:
  os:
    - linux
  binaries:
    - kubectl

setup:
  summary: >
    kubectl finds the cluster and credentials from a kubeconfig on the
    runner host. Point it at one with KUBECONFIG, or rely on the default
    ~/.kube/config. Each action takes an optional context argument.
  env:
    - name: KUBECONFIG
      description: >
        Path (or colon-separated paths) to the kubeconfig file. Omit to
        use the default ~/.kube/config.
      example: /etc/emisar/kubeconfig
  notes:
    - "If KUBECONFIG is unset, kubectl reads ~/.kube/config on the runner host — a file, so it needs no inherit_env entry."
    - The kubeconfig must embed working credentials (client cert, token, or an exec auth plugin); whatever identity it carries gates which actions succeed, and mutators (cordon, drain, delete_pod) need RBAC for those verbs.
  verify: kubernetes.cluster_info

actions:
  # Discovery
  - actions/pods_list.yaml
  - actions/pods_problem.yaml
  - actions/pods_top.yaml
  - actions/nodes_list.yaml
  - actions/nodes_top.yaml
  - actions/services_list.yaml
  - actions/ingresses_list.yaml
  - actions/deployments_list.yaml
  - actions/statefulsets_list.yaml
  - actions/daemonsets_list.yaml
  - actions/pvcs_list.yaml
  - actions/namespaces.yaml
  # Deep introspection
  - actions/pod_describe.yaml
  - actions/pod_logs.yaml
  - actions/pod_previous_logs.yaml
  - actions/events_recent.yaml
  - actions/events_for_pod.yaml
  - actions/node_describe.yaml
  - actions/get_yaml.yaml
  # Rollouts
  - actions/rollout_status.yaml
  - actions/rollout_history.yaml
  - actions/rollout_restart.yaml
  - actions/rollout_undo.yaml
  # Mutators
  - actions/scale_deployment.yaml
  - actions/set_image.yaml
  - actions/cordon.yaml
  - actions/uncordon.yaml
  - actions/drain.yaml
  - actions/delete_pod.yaml
  # Cluster
  - actions/cluster_info.yaml
  - actions/api_versions.yaml
