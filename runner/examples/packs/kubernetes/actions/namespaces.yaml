schema_version: 1
id: kubernetes.namespaces
title: List namespaces
kind: exec
risk: low
description: '`kubectl get ns` — every namespace with status + age.'
side_effects:
  - One kubectl get invocation.
  - Read-only.
args:
  - name: context
    type: string
    required: false
    default: ""
    description: kubeconfig context.
    validation:
      pattern: "^[a-zA-Z0-9_.\\-]{0,128}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "kubectl ${KCTX:+--context=$KCTX} get ns"
  timeout: 15s
  env:
    KCTX: "{{ args.context }}"
output:
  parser: text
  max_stdout_bytes: 32768
  max_stderr_bytes: 8192
examples:
  - title: Namespaces
    args: {}
