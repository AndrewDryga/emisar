schema_version: 1
id: kubernetes.services_list
title: List services across all namespaces
kind: exec
risk: low
description: '`kubectl get svc -A` — service name, type, cluster IP, external IP, ports.'
side_effects:
  - One kubectl get invocation.
  - Read-only.
args:
  - name: context
    type: string
    required: false
    default: ""
    description: kubeconfig context.
    validation:
      pattern: "^[a-zA-Z0-9_.\\-]{0,128}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "kubectl ${KCTX:+--context=$KCTX} get svc -A"
  timeout: 30s
  env:
    KCTX: "{{ args.context }}"
output:
  parser: text
  max_stdout_bytes: 262144
  max_stderr_bytes: 8192
examples:
  - title: All services
    args: {}
