schema_version: 1
id: kubernetes.rollout_restart
title: kubectl rollout restart (rolling)
kind: exec
risk: high
description: >
  Triggers a rolling restart — pods are replaced one-by-one respecting maxSurge/maxUnavailable. In-flight requests on terminated pods are gracefully drained per pod terminationGracePeriodSeconds.
side_effects:
  - Triggers a fresh rollout of the resource.
  - Pods are replaced one-by-one; in-flight requests are drained per pod.
args:
  - name: namespace
    type: string
    required: true
    description: Namespace.
    validation:
      pattern: "^[a-z0-9][a-z0-9\\-]{0,62}$"
  - name: kind
    type: string
    required: false
    default: deployment
    description: Resource kind.
    validation:
      enum: [deployment, statefulset, daemonset]
  - name: name
    type: string
    required: true
    description: Resource name.
    validation:
      pattern: "^[a-z0-9][a-z0-9.\\-]{0,253}$"
  - name: context
    type: string
    required: false
    default: ""
    description: kubeconfig context.
    validation:
      pattern: "^[a-zA-Z0-9_.\\-]{0,128}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "kubectl ${KCTX:+--context=$KCTX} -n {{ args.namespace }} rollout restart {{ args.kind }}/{{ args.name }}"
  timeout: 30s
  env:
    KCTX: "{{ args.context }}"
output:
  parser: text
  max_stdout_bytes: 8192
  max_stderr_bytes: 8192
examples:
  - title: Rolling restart of one deployment
    args:
      namespace: default
      name: api
