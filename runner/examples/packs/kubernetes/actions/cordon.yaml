schema_version: 1
id: kubernetes.cordon
title: kubectl cordon node
kind: exec
risk: high
description: Marks a node unschedulable. Existing pods stay; new pods won't be scheduled there. First step before draining.
side_effects:
  - Node marked unschedulable.
  - Existing pods unaffected; new pods routed elsewhere.
args:
  - name: name
    type: string
    required: true
    description: Node name.
    validation:
      pattern: "^[a-z0-9][a-z0-9.\\-]{0,253}$"
  - name: context
    type: string
    required: false
    default: ""
    description: kubeconfig context.
    validation:
      pattern: "^[a-zA-Z0-9_.\\-]{0,128}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "kubectl ${KCTX:+--context=$KCTX} cordon {{ args.name }}"
  timeout: 30s
  env:
    KCTX: "{{ args.context }}"
output:
  parser: text
  max_stdout_bytes: 4096
  max_stderr_bytes: 8192
examples:
  - title: Cordon one node
    args:
      name: ip-10-0-1-23.eu-west-1.compute.internal
