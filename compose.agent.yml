# Sibling services for the agent. `agent up` starts them; the box reaches them
# by name (db). Dev data is throwaway — it lives in a named volume.
# Connection string for the box, e.g.: DATABASE_URL=postgres://postgres:postgres@db:5432/app_dev
services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_dev
    volumes: ["pgdata:/var/lib/postgresql"]  # postgres:18 mounts the parent; data goes in a version subdir
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 3s
      retries: 15
volumes:
  pgdata:
