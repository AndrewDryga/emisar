schema_version: 1

# Per-runner config for the docker-compose demo stack, mounted over the
# image's baked-in /etc/emisar/config.yaml. DEV ONLY. See
# dev/runners/edge-fra-01.yaml for the full rationale — `runner.id` is the
# external_id the seed pins so this container adopts the "pg-primary-iad" row.
runner:
  id: "pg-primary-iad"
  group: "data-postgres"
  labels:
    env: prod
    region: us-east-1
    role: primary

cloud:
  url: "http://portal:4000"
  allow_insecure: true
  auth_key_env: "EMISAR_AUTH_KEY"
  token_path: "/var/lib/emisar/token.json"
  heartbeat_every: "30s"
  reconnect_min: "1s"
  reconnect_max: "30s"

paths:
  data_dir: "/var/lib/emisar"
  work_dir: "/tmp/emisar"
  # Database host: the postgres pack (read-only diagnostics + a couple of
  # high-risk write actions) + linux-core. The compose stack points this
  # runner at the dev `db` service (PG* env below), so the read-only postgres
  # diagnostics execute for real against emisar_dev; the high-risk writes stay
  # approval-gated. linux-core runs for real off the container.
  packs:
    - "/opt/emisar/packs/linux-core"
    - "/opt/emisar/packs/postgres"

execution:
  # PG* forward the libpq connection to the psql actions (the postgres pack's
  # documented mechanism); the compose stack sets them to reach `db`.
  inherit_env: ["PATH", "LANG", "LC_ALL", "TERM", "PGHOST", "PGUSER", "PGPASSWORD", "PGDATABASE"]
  cancel_grace: "30s"

events:
  jsonl_path: "/var/log/emisar/events.jsonl"
  max_size_bytes: 104857600
  max_backups: 5

redaction:
  rules: []
