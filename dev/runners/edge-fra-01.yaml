schema_version: 1

# Per-runner config for the docker-compose demo stack, mounted over the
# image's baked-in /etc/emisar/config.yaml. DEV ONLY.
#
# `runner.id` is the durable external_id the runner presents on register.
# It MUST match the external_id the seed pins on this runner's row
# (apps/emisar/priv/repo/seeds.exs) so the live container ADOPTS the
# pre-seeded "edge-fra-01" row — inheriting its name, run history,
# approvals, and grants — instead of registering a second, empty runner.
runner:
  id: "edge-fra-01"
  group: "edge-web"
  labels:
    env: prod
    region: eu-central
    role: edge

# EMISAR_URL + EMISAR_ENROLLMENT_KEY come from the compose env. allow_insecure
# is required for the plain-HTTP in-network http://portal:4000.
cloud:
  url: "http://portal:4000"
  allow_insecure: true
  enrollment_key_env: "EMISAR_ENROLLMENT_KEY"
  token_path: "/var/lib/emisar/token.json"
  heartbeat_every: "30s"
  reconnect_min: "1s"
  reconnect_max: "30s"

paths:
  data_dir: "/var/lib/emisar"
  work_dir: "/tmp/emisar"
  # Edge host: the Caddy reverse proxy + the linux-core basics. Both ship
  # in the library, so the cloud auto-trusts them against PackBaseline on
  # connect (no manual Trust step).
  packs:
    - "/opt/emisar/packs/linux-core"
    - "/opt/emisar/packs/caddy"
    - "/opt/emisar/packs/showcase"

execution:
  inherit_env: ["PATH", "LANG", "LC_ALL", "TERM"]
  cancel_grace: "30s"

events:
  jsonl_path: "/var/log/emisar/events.jsonl"
  max_size_bytes: 104857600
  max_backups: 5

redaction:
  rules: []
