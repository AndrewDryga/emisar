# Backing services for pack tests. Each SUT is a named service.
# The runner-tools image connects to these over the test network.
#
# Bring up just the SUT(s) you need:
#   docker compose -f test-packs/docker-compose.yaml up -d postgres redis
#
# Then run pack tests from the runner-tools container:
#   docker compose run --rm runner-tools \
#     /workspace/test-packs/run-pack-tests.sh postgres

services:
  runner-tools:
    build:
      context: .
      dockerfile: Dockerfile
    image: emisar-runner-tools:latest
    volumes:
      # /workspace = dev/ (this file's parent), so harness scripts resolve at
      # /workspace/test-packs/...; packs/ is a repo-root sibling, mounted at /packs.
      - ../:/workspace:ro
      - ../../packs:/packs:ro
      - ./bin:/opt/emisar/bin:ro
      - ./reports:/reports
      - k3s_kubeconfig:/shared:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - packtest
    environment:
      # Per-pack auth env vars; populated for whichever SUT is up
      PGHOST: postgres
      PGUSER: postgres
      PGPASSWORD: testpass
      PGDATABASE: testdb
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PWD: testpass
      MONGO_URI: "mongodb://root:testpass@mongodb:27017/?authSource=admin"
      REDIS_HOST: redis
      REDISCLI_AUTH: ""
      CONSUL_HTTP_ADDR: "http://consul:8500"
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "test-root-token"
      NOMAD_ADDR: "http://nomad:4646"
      COCKROACH_URL: "postgresql://root@cockroach:26257/defaultdb?sslmode=disable"
      CH_HOST: clickhouse
      CH_USER: default
      ELASTIC_USER: elastic
      ELASTIC_PASSWORD: testpass
      PROM_URL: "http://prometheus:9090"
      ENVOY_ADMIN: "http://envoy:9901"
      CADDY_ADMIN: "http://caddy:2019"
      KAFKA_BOOTSTRAP: "kafka:9092"
      RABBITMQ_HOST: rabbitmq
      MC_HOST_local: "http://minio_admin:testpass@minio:9000"
      SNMP_VERSION: "2c"
      SNMP_COMMUNITY: public

  # Databases
  cockroach:
    image: cockroachdb/cockroach:v24.3.5
    command: start-single-node --insecure
    networks: [packtest]
    healthcheck:
      test: ["CMD", "cockroach", "sql", "--insecure", "-e", "SELECT 1"]
      interval: 10s
      retries: 10

  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: testdb
    volumes:
      - ./fixtures/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks: [packtest]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 10

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: testpass
      MYSQL_DATABASE: testdb
    command: --default-authentication-plugin=mysql_native_password
    networks: [packtest]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -ptestpass"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7
    command: redis-server --appendonly yes
    networks: [packtest]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: testpass
    networks: [packtest]
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      retries: 10

  cassandra:
    image: cassandra:4.1
    environment:
      CASSANDRA_CLUSTER_NAME: testcluster
    networks: [packtest]
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -q UN"]
      interval: 20s
      retries: 20

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    networks: [packtest]
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "true"
      ELASTIC_PASSWORD: testpass
    ulimits:
      memlock: { soft: -1, hard: -1 }
    networks: [packtest]
    healthcheck:
      test: ["CMD", "curl", "-u", "elastic:testpass", "-fsSL", "http://localhost:9200/_cluster/health"]
      interval: 10s
      retries: 20

  memcached:
    image: memcached:1.6
    networks: [packtest]
    healthcheck:
      test: ["CMD-SHELL", "echo version | nc -w 1 localhost 11211 | grep -q VERSION"]
      interval: 5s
      retries: 10

  # Streaming
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks: [packtest]

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on: [zookeeper]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks: [packtest]

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks: [packtest]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      retries: 15

  # Service mesh / cluster
  consul:
    image: hashicorp/consul:1.18
    command: agent -dev -client=0.0.0.0
    networks: [packtest]
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 5s
      retries: 10

  nomad:
    image: hashicorp/nomad:1.7
    command: agent -dev -bind=0.0.0.0
    privileged: true
    networks: [packtest]

  vault:
    image: hashicorp/vault:1.16
    cap_add: [IPC_LOCK]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "test-root-token"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    networks: [packtest]
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 5s
      retries: 10

  # Proxies / web servers
  nginx:
    image: nginx:1.27
    volumes:
      - ./fixtures/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks: [packtest]

  caddy:
    image: caddy:2.8
    command: caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    volumes:
      - ./fixtures/Caddyfile:/etc/caddy/Caddyfile:ro
    networks: [packtest]

  haproxy:
    image: haproxy:2.9
    volumes:
      - ./fixtures/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks: [packtest]

  envoy:
    image: envoyproxy/envoy:v1.30-latest
    command: envoy -c /etc/envoy/envoy.yaml
    volumes:
      - ./fixtures/envoy.yaml:/etc/envoy/envoy.yaml:ro
    networks: [packtest]

  apache-httpd:
    image: httpd:2.4
    networks: [packtest]

  # Observability
  prometheus:
    image: prom/prometheus:v2.52.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
      - --web.enable-admin-api
    volumes:
      - ./fixtures/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks: [packtest]

  grafana:
    image: grafana/grafana:11.0.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: testpass
    networks: [packtest]

  # Mail
  postfix:
    image: catatnight/postfix:latest
    environment:
      maildomain: example.test
      smtp_user: testuser:testpass
    networks: [packtest]

  bind:
    image: ubuntu/bind9:edge
    environment:
      BIND9_USER: root
    volumes:
      - ./fixtures/bind-named.conf:/etc/bind/named.conf:ro
    networks: [packtest]

  # Storage
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: testpass
    networks: [packtest]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:9000/minio/health/live"]
      interval: 5s
      retries: 10

  # Cloud emulators
  localstack:
    image: localstack/localstack:3.5
    environment:
      SERVICES: ec2,s3,iam,cloudwatch,logs
      DEFAULT_REGION: us-east-1
    networks: [packtest]

  # Network device. No official/Canonical net-snmp image exists, so build a
  # minimal snmpd from the Debian base (see ./snmpd/Dockerfile). Read-only,
  # v2c community "public" — config mounted from fixtures/snmpd.conf.
  snmpd:
    build: ./snmpd
    command: ["/usr/sbin/snmpd", "-f", "-Lo", "-C", "-c", "/etc/snmp/snmpd.conf"]
    volumes:
      - ./fixtures/snmpd.conf:/etc/snmp/snmpd.conf:ro
    networks: [packtest]

  # FRR + AgentX + snmpd SUT for the snmp pack's ROUTING reads. The plain `snmpd`
  # service answers system/interface OIDs but returns "No Such Object" for BGP4-MIB
  # / OSPF-MIB; FRR exports those over AgentX (see ./snmpd-frr/). NET_ADMIN+SYS_ADMIN
  # are needed for the dummy/veth links + the peer netns that forms a real OSPF
  # adjacency (so ospfNbrTable has a row).
  snmpd-frr:
    build: ./snmpd-frr
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    networks: [packtest]

  # Kubernetes SUT — single-node k3s for the kubernetes pack (43 actions). Privileged
  # (k3s needs cgroup/mount access). --node-name pins the node name (the node_describe
  # target); --tls-san=k3s makes the API cert valid for the `k3s` service name so
  # runner-tools' kubectl can connect over packtest. The probe fixture auto-deploys
  # via the manifests dir (a stable-named pod the pod_* reads target); coredns is a
  # stable deployment for the rollout reads, and metrics-server backs nodes_top/pods_top.
  # Only traefik is disabled (faster boot).
  k3s:
    image: rancher/k3s:v1.31.4-k3s1
    command: server --node-name=harness --tls-san=k3s --disable=traefik
    privileged: true
    environment:
      K3S_KUBECONFIG_MODE: "666"
      K3S_KUBECONFIG_OUTPUT: /shared/kubeconfig.yaml
    volumes:
      - k3s_kubeconfig:/shared
      - ./fixtures/k8s-probe.yaml:/var/lib/rancher/k3s/server/manifests/probe.yaml:ro
    networks: [packtest]
    healthcheck:
      test: ["CMD-SHELL", "kubectl get nodes | grep -q ' Ready'"]
      interval: 10s
      retries: 20

  # One-shot: rewrite the k3s-written kubeconfig's server 127.0.0.1 -> k3s (the service
  # name, reachable over packtest) so runner-tools' kubectl connects. Waits, rewrites, exits.
  k3s-kubeconfig:
    image: busybox:1.36
    depends_on: [k3s]
    volumes:
      - k3s_kubeconfig:/shared
    command: sh -c 'until [ -f /shared/kubeconfig.yaml ]; do sleep 1; done; sed -i "s#https://127.0.0.1:6443#https://k3s:6443#" /shared/kubeconfig.yaml; echo kubeconfig-rewritten'
    networks: [packtest]

networks:
  packtest:
    driver: bridge

volumes:
  k3s_kubeconfig:
