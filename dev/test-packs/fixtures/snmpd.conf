# Minimal read-only snmpd for emisar `snmp`-pack tests. v2c, community "public".
# Listen on all interfaces so the runner-tools container reaches it over the
# packtest network (Debian's shipped config binds 127.0.0.1 only).
agentaddress udp:161
rocommunity public
sysName snmpd-sut
sysLocation packtest
sysContact test@example.test
