global
    log stdout format raw local0
    stats socket /tmp/haproxy.sock mode 666 level admin

defaults
    log global
    mode http
    option httplog
    timeout connect 5s
    timeout client  30s
    timeout server  30s

frontend fe_main
    bind *:80
    default_backend be_main

backend be_main
    server s1 127.0.0.1:81 check
