# snmpd for the FRR routing SUT. v2c, community "public" — same contract as the
# plain snmpd SUT (../../fixtures/snmpd.conf), so the runner reaches it the same way.
#
# `master agentx` + agentXSocket make snmpd an AgentX master: FRR's bgpd/ospfd
# connect to this socket and register BGP4-MIB / OSPF-MIB, which snmpd then serves.
# agentXTimeout/Retries are bumped so a slow subagent registration doesn't drop rows.
master   agentx
agentXSocket /var/agentx/master
# 0777 makes the AgentX master socket writable by the unprivileged `frr` user, so
# FRR's bgpd/ospfd subagents can connect to it (without this they log "Failed to
# connect to the agentx master agent" and never register their MIBs).
agentxperms 0777
agentXTimeout 5
agentXRetries 3

# Listen on all interfaces so runner-tools reaches it over the packtest network.
agentaddress udp:161
rocommunity public

sysName snmpd-frr-sut
sysLocation packtest
sysContact test@example.test
