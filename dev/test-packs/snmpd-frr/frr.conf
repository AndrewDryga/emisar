! FRR config for the snmp-pack routing SUT. Goal: make BGP4-MIB + OSPF-MIB return
! REAL rows so snmp.bgp_peers / snmp.ospf_general / snmp.ospf_neighbors see data.
!
! `agentx` turns on the AgentX subagent in the SNMP-module daemons so they register
! their MIBs with snmpd's AgentX master. Without it the OIDs stay empty. (snmpd must
! also make its AgentX socket writable by the frr user — see snmpd.conf agentxperms.)
frr defaults traditional
log syslog informational
!
agentx
!
! dum0/dum1 are dummy links (created by entrypoint.sh) carrying the router-id and an
! advertised subnet. veth-main is the half of a veth pair to the ns1 peer netns where
! a second ospfd speaks — that link forms a REAL OSPF adjacency so ospfNbrTable has a
! row. It's point-to-point so the adjacency reaches Full (ospfNbrState 8).
interface dum0
 ip ospf hello-interval 1
 ip ospf dead-interval 4
exit
!
interface veth-main
 ip ospf network point-to-point
 ip ospf hello-interval 1
 ip ospf dead-interval 4
exit
!
! BGP: two configured neighbors create bgpPeerTable rows. They never establish (no
! peer answers 10.0.0.2/10.0.0.3) — bgpPeerState stays connect/active — which is
! exactly a real "is the session up?" read: the rows exist, remote-AS/addr are set.
router bgp 65000
 bgp router-id 10.0.0.1
 no bgp ebgp-requires-policy
 neighbor 10.0.0.2 remote-as 65001
 neighbor 10.0.0.3 remote-as 65000
 address-family ipv4 unicast
  network 10.0.1.0/24
  neighbor 10.0.0.2 activate
  neighbor 10.0.0.3 activate
 exit-address-family
exit
!
! OSPF: enabling it on dum0 + veth-main in area 0 populates ospfGeneralGroup (router-id,
! admin-stat=enabled, version 2), the OSPF interface table, and — via the ns1 peer on
! veth-main — the OSPF neighbor table.
router ospf
 ospf router-id 10.0.0.1
 network 10.0.0.0/24 area 0
 network 10.0.1.0/24 area 0
 network 192.168.99.0/30 area 0
exit
