# docker-compose.yml — local dev stack for testing the full emisar
# topology end-to-end. Boots Postgres + the Phoenix control plane
# + a one-shot DB seeder + three runners + the MCP bridge image.
#
# ╔════════════════════════════════════════════════════════════════╗
# ║                                                                ║
# ║   DEV ONLY — NOT PRODUCTION READY                              ║
# ║                                                                ║
# ║   Every secret in this file is a hardcoded, well-known string. ║
# ║   That's deliberate: it lets `docker compose up` boot the full ║
# ║   stack end-to-end with zero ceremony. Do NOT copy these       ║
# ║   values to a real deployment.                                 ║
# ║                                                                ║
# ║   For production deploy: see .github/DEPLOYMENT.md.           ║
# ║                                                                ║
# ╚════════════════════════════════════════════════════════════════╝
#
# Single command:
#
#   docker compose up
#
# Boots in the right order:
#   db          starts, becomes healthy (pg_isready)
#   portal      depends on db healthy; runs migrate + bin/server on
#               its way up; becomes healthy on GET /healthz
#   seeder      runs once after portal is healthy; inserts the demo
#               account, default policy, sample runbook, the demo runner
#               rows, and a fixed dev auth key matching what the runners present
#   runner-*    depend on seeder succeeding; register against portal and
#               ADOPT their pre-seeded rows by external_id — so they come up
#               online carrying the seeded run history, approvals, and grants
#
# Sign in at http://localhost:4010 as demo@emisar.dev — sign-in is passwordless,
# so the magic-link email lands in the dev mailbox at
# http://localhost:4010/dev/mailbox (enabled by EMISAR_DEV_ROUTES on portal);
# open it and click the newest email's link to finish.
# (Host port 4010 → container 4000, so the stack doesn't collide with a local
# `mix phx.server` on 4000.)
#
# SSO works from the host browser with NO host config — everything is plain
# `localhost`. Keycloak runs as a network sidecar in the portal's namespace
# (`network_mode: service:portal`), so the portal reaches it at the SAME
# `localhost:8443` the host browser uses (published port). The OIDC issuer is
# then one consistent `localhost:8443` for the browser, the portal's backend
# calls, and the token `iss`. Just browse http://localhost:4010 and start SSO.
#
# The MCP bridge works out of the box against the seeded fixed dev API key
# (wired into the mcp service below) — no manual key minting needed:
#
#   echo '{"jsonrpc":"2.0","id":1,"method":"tools/list"}' \
#     | docker compose run --rm -T mcp

services:
  # ----------------------------------------------------------------
  # Postgres — the only stateful dependency
  # ----------------------------------------------------------------
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: emisar_dev
    # No host port mapping by default — other containers reach this via
    # the docker network as `db:5432`. Avoids collisions with system
    # Postgres or another compose stack. If you need a `psql` shell on
    # the host, use `docker compose exec db psql -U postgres emisar_dev`
    # or temporarily uncomment the ports block below.
    # ports:
    #   - "54322:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d emisar_dev"]
      interval: 3s
      timeout: 3s
      retries: 20

  # ----------------------------------------------------------------
  # Keycloak — self-hosted OIDC provider + SCIM source for the e2e SSO
  # flow. Serves HTTPS with the dev CA (dev/keycloak/certs); the portal
  # trusts that CA. Imports the `emisar` realm (dev/keycloak/realm.json):
  # an `emisar-portal` confidential client + test users alice/bob.
  # DEV ONLY — hardcoded secrets, self-signed cert.
  # ----------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    # Network SIDECAR of the portal: shares the portal's namespace (loopback +
    # published ports) so the portal reaches Keycloak at the SAME localhost:8443
    # the host browser uses — making the OIDC issuer one consistent localhost
    # host for browser, portal, and token `iss`. Keycloak's 8443 is therefore
    # published via the portal service's `ports:`, not here.
    network_mode: "service:portal"
    depends_on:
      portal:
        condition: service_started
    command:
      - start-dev
      - --import-realm
      - --https-certificate-file=/certs/tls.crt
      - --https-certificate-key-file=/certs/tls.key
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: "admin"
      KC_BOOTSTRAP_ADMIN_PASSWORD: "admin"
      KC_HEALTH_ENABLED: "true"
      # Issuer/frontend URL — plain localhost:8443, reachable identically by the
      # host browser (published port) and the portal (shared loopback, see
      # network_mode), so discovery, the token `iss`, and the browser redirect
      # are all consistent. Admin console: https://localhost:8443 (admin/admin).
      KC_HOSTNAME: "https://localhost:8443"
      KC_HOSTNAME_STRICT: "false"
    volumes:
      - ./dev/keycloak/realm.json:/opt/keycloak/data/import/realm.json:ro
      - ./dev/keycloak/certs/tls.crt:/certs/tls.crt:ro
      - ./dev/keycloak/certs/tls.key:/certs/tls.key:ro
    # No curl in the Keycloak image; a bash TCP probe confirms the HTTPS listener.
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/8443"]
      interval: 5s
      timeout: 3s
      retries: 40
      start_period: 20s

  # ----------------------------------------------------------------
  # Portal — Phoenix release (the cloud control plane)
  # ----------------------------------------------------------------
  portal:
    # Build context is the REPO ROOT so install.sh (at the root) can be
    # COPY-ed into the build container — InstallController embeds it at
    # compile time via @external_resource.
    build:
      context: .
      dockerfile: portal/Dockerfile
      args:
        # DEV-ONLY: let this stack's plain-HTTP internal hosts (localhost / the
        # `portal` service) through prod.exs force_ssl. A production build never
        # sets this, so prod enforces HTTPS for every request host.
        EMISAR_DEV_HOST_EXCLUDES: "1"
        # DEV-ONLY: compile in the /dev routes so the passwordless magic-link
        # sign-in email is viewable at /dev/mailbox (paired with the matching
        # EMISAR_DEV_ROUTES env below, which switches the mailer to in-memory).
        EMISAR_DEV_ROUTES: "1"
    image: emisar/portal:dev
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "ecto://postgres:postgres@db/emisar_dev"
      # DEV-ONLY signing key. Generate a real one with `mix phx.gen.secret`
      # before any non-local deployment.
      SECRET_KEY_BASE: "zy7QplH6bzgWzgVDXSC8KxCprn+OQB7vWMRcQ+0iyJ2WlcQqg1AswEXqzcjHj8nu"
      # localhost so generated absolute URLs (the OIDC redirect_uri most of all)
      # resolve to this portal from the host browser via the published 4010.
      # URL_PORT=4010 advertises that PUBLISHED port while we LISTEN on PORT=4000.
      PHX_HOST: "localhost"
      PORT: "4000"
      URL_PORT: "4010"
      # Speak plain HTTP for local. force_ssl in runtime.exs is gated
      # on this knob — see config/runtime.exs.
      FORCE_SSL: "false"
      # Billing: stub by default (prod runtime.exs refuses to boot without
      # PADDLE_API_KEY unless the disable flag is set). To run REAL Paddle
      # sandbox billing in this stack instead, export the PADDLE_* vars before
      # `docker compose up` — `source portal/.agent/secrets/paddle-sandbox.env`
      # — and the API-key branch wins over the disable flag. Blank passthrough
      # values (unset host env) are treated as absent by runtime.exs.
      EMISAR_DISABLE_BILLING: "1"
      PADDLE_API_KEY: "${PADDLE_API_KEY:-}"
      PADDLE_WEBHOOK_SECRET: "${PADDLE_WEBHOOK_SECRET:-}"
      PADDLE_CLIENT_TOKEN: "${PADDLE_CLIENT_TOKEN:-}"
      # DEV-ONLY: deliver mail into the in-memory mailbox served at /dev/mailbox
      # (the /dev routes are compiled in via the build arg above). Lets you
      # complete the passwordless magic-link sign-in with no mail provider.
      EMISAR_DEV_ROUTES: "1"
    # Host port 4010 → container 4000 (keeps `portal:4000`, the healthcheck, and
    # PORT unchanged for the in-network runners/mcp while freeing host :4000 for
    # a local `mix phx.server`; URL_PORT=4010 makes generated URLs advertise the
    # published 4010). 8443 is Keycloak's HTTPS port, published here because
    # Keycloak shares this netns (network_mode: service:portal).
    ports:
      - "4010:4000"
      - "8443:8443"
    # Keep the probe at the HTTP boundary without pulling curl's large protocol
    # and TLS dependency tree into the production image. OpenBSD nc sends one
    # fixed local request; grep is part of the debian-slim base.
    healthcheck:
      test: ["CMD-SHELL", "printf 'GET /healthz HTTP/1.0\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' | nc -w 2 127.0.0.1 4000 | grep -Eq '^HTTP/1\\.[01] 200'"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s
    # DEV: trust the local Keycloak's self-signed CA so oidcc's TLS verify
    # (verify_peer against the OS CA store, see sso/oidc/oidcc.ex) accepts it.
    # Runs as root (dev only) so update-ca-certificates can rewrite the bundle
    # before the BEAM boots and first calls :public_key.cacerts_get/0.
    user: "root"
    volumes:
      - ./dev/keycloak/certs/ca.crt:/usr/local/share/ca-certificates/keycloak-dev-ca.crt:ro
    command: ["sh", "-c", "update-ca-certificates && exec /app/bin/server"]

  # ----------------------------------------------------------------
  # Seeder — runs once, exits. Inserts the demo account, default
  # policy, sample runbook, and an auth key whose SHA-256 matches the
  # raw secret the runner services below present. Idempotent.
  # ----------------------------------------------------------------
  seeder:
    image: emisar/portal:dev
    depends_on:
      portal:
        condition: service_healthy
    environment:
      DATABASE_URL: "ecto://postgres:postgres@db/emisar_dev"
      SECRET_KEY_BASE: "zy7QplH6bzgWzgVDXSC8KxCprn+OQB7vWMRcQ+0iyJ2WlcQqg1AswEXqzcjHj8nu"
      PHX_HOST: "localhost"
      FORCE_SSL: "false"
      EMISAR_DISABLE_BILLING: "1"
      # DEV-ONLY well-known auth key. Same value the runners use. The
      # seed inserts a row with the SHA-256 of this raw string so the
      # runners' /runner/register call resolves it.
      EMISAR_DEV_FIXED_AUTH_KEY: "emkey-auth-dev-fixed-bootstrap-DO-NOT-USE-IN-PROD"
      # DEV-ONLY well-known MCP API key. The seed mints the demo agent key
      # ("Claude Code - on-call") with this exact raw value so the `mcp`
      # service below can drive the bridge with no manual key minting. Must
      # start with `emk-` and stay in sync with the mcp service's EMISAR_API_KEY.
      # This is the public base64url encoding of 32 zero bytes, never a secret.
      EMISAR_DEV_FIXED_MCP_KEY: "emk-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
      # DEV-ONLY Keycloak OIDC + SCIM seed values. The OIDC secret matches the
      # client secret in dev/keycloak/realm.json; the SCIM token is the fixed
      # bearer the sso-e2e driver presents. The seed creates an enabled
      # :keycloak IdentityProvider (fixed id) on the demo account + enables SCIM.
      EMISAR_DEV_FIXED_OIDC_CLIENT_SECRET: "emisar-oidc-dev-secret-DO-NOT-USE-IN-PROD"
      EMISAR_DEV_FIXED_SCIM_TOKEN: "ems-scim-dev-fixed-bootstrap-DO-NOT-USE-IN-PROD"
      EMISAR_DEV_KEYCLOAK_ISSUER: "https://localhost:8443/realms/emisar"
      EMISAR_DEV_KEYCLOAK_PROVIDER_ID: "11111111-1111-7111-8111-111111111111"
    restart: "no"
    command: ["/app/bin/emisar", "eval", "Emisar.Release.seed()"]

  # ----------------------------------------------------------------
  # Runners — three Go runners that ADOPT their seeded demo rows
  # ----------------------------------------------------------------
  # Each runner pins a durable `runner.id` (external_id) in its mounted
  # config (dev/runners/<name>.yaml) matching the external_id the seed writes
  # on that runner's row. On register the live container REUSES the pre-seeded
  # row instead of creating a new one — so edge-fra-01 / api-iad-02 /
  # pg-primary-iad come up ONLINE carrying their seeded run history, approvals,
  # grants, and (baseline-trusted) pack catalog. The mounted config also sets
  # each runner's group, labels, and which role packs it loads + advertises.
  #
  # `hostname:` is the FQDN the runner reports and the cloud displays; the
  # compose service name (runner-1/-2/-3) stays the docker-network alias.
  #
  # Fixture volumes are demo-only: realistic /var/log entries and stub
  # systemctl / journalctl binaries so the linux-core + systemd-deep actions
  # produce believable output inside this stack (no systemd, no real
  # nginx/postgres logs). The runner image itself stays production-pristine —
  # only this compose file knows about them.
  runner-1: &runner
    # Build context is the REPO ROOT (matching the portal) — runner/docker/Dockerfile
    # COPYs both `packs/` (now at the repo root) and `runner/...`, so it can't build
    # from a `./runner` context. RUNNER_VERSION stamps the binary so the live
    # runner reports the same version the seed pinned (else the "dev" build default).
    build:
      context: .
      dockerfile: runner/docker/Dockerfile
      args:
        RUNNER_VERSION: "0.10.0"
    image: emisar/runner:dev
    hostname: edge-fra-01.northstar.example
    depends_on:
      seeder:
        condition: service_completed_successfully
    environment:
      EMISAR_URL: "http://portal:4000"
      EMISAR_AUTH_KEY: "emkey-auth-dev-fixed-bootstrap-DO-NOT-USE-IN-PROD"
    volumes:
      - runner_1_data:/var/lib/emisar
      - ./dev/runners/edge-fra-01.yaml:/etc/emisar/config.yaml:ro
      - ./dev/runner-fixtures/bin/systemctl:/usr/bin/systemctl:ro
      - ./dev/runner-fixtures/bin/journalctl:/usr/bin/journalctl:ro
      - ./dev/runner-fixtures/var-log/syslog:/var/log/syslog:ro
      - ./dev/runner-fixtures/var-log/auth.log:/var/log/auth.log:ro
      - ./dev/runner-fixtures/var-log/nginx:/var/log/nginx:ro
    restart: unless-stopped

  runner-2:
    <<: *runner
    hostname: api-iad-02.northstar.example
    volumes:
      - runner_2_data:/var/lib/emisar
      - ./dev/runners/api-iad-02.yaml:/etc/emisar/config.yaml:ro
      - ./dev/runner-fixtures/bin/systemctl:/usr/bin/systemctl:ro
      - ./dev/runner-fixtures/bin/journalctl:/usr/bin/journalctl:ro
      - ./dev/runner-fixtures/var-log/syslog:/var/log/syslog:ro
      - ./dev/runner-fixtures/var-log/auth.log:/var/log/auth.log:ro
      - ./dev/runner-fixtures/var-log/nginx:/var/log/nginx:ro

  runner-3:
    <<: *runner
    hostname: pg-primary-iad.northstar.example
    volumes:
      - runner_3_data:/var/lib/emisar
      - ./dev/runners/pg-primary-iad.yaml:/etc/emisar/config.yaml:ro
      - ./dev/runner-fixtures/bin/systemctl:/usr/bin/systemctl:ro
      - ./dev/runner-fixtures/bin/journalctl:/usr/bin/journalctl:ro
      - ./dev/runner-fixtures/var-log/syslog:/var/log/syslog:ro
      - ./dev/runner-fixtures/var-log/auth.log:/var/log/auth.log:ro
      - ./dev/runner-fixtures/var-log/nginx:/var/log/nginx:ro

  # ----------------------------------------------------------------
  # MCP bridge — stdio JSON-RPC. Profile-gated so it doesn't auto-start
  # on `docker compose up` (it would exit immediately without stdin).
  # Use `docker compose run --rm -T mcp` to drive it.
  #
  # EMISAR_API_KEY is the seeded fixed dev key (same raw the seeder mints as
  # the "Claude Code - on-call" agent key via EMISAR_DEV_FIXED_MCP_KEY), so
  # the bridge authenticates with no manual minting. Mint your own from
  # Settings → API keys and pass `-e EMISAR_API_KEY=...` to use a real one.
  # ----------------------------------------------------------------
  mcp:
    build:
      context: ./mcp
      dockerfile: Dockerfile
      args:
        MCP_VERSION: "0.3.0"
    image: emisar/mcp:dev
    profiles: ["test"]
    depends_on:
      portal:
        condition: service_healthy
    environment:
      EMISAR_URL: "http://portal:4000"
      EMISAR_API_KEY: "emk-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
      # The bridge fails closed on cleartext http:// to a non-loopback host;
      # opt in for the in-network portal:4000 (same as the runners' allow_insecure).
      EMISAR_ALLOW_INSECURE: "1"
    volumes:
      - mcp_data:/config

  # ----------------------------------------------------------------
  # signing-init — mints the signed-dispatch e2e material at stack-up
  # (GENERATE-AT-STARTUP: no CA or leaf private key is committed). One-shot,
  # idempotent; writes to the shared `signing_material` volume:
  #   /signing/config.yaml   runner-signed's config (template + the fresh CA key)
  #   /signing/leaf_key       EMISAR_SIGNING_KEY for the bridge
  #   /signing/cert.json      EMISAR_SIGNING_CERT for the bridge
  # `docker compose down -v` rotates the keys. Reuses the runner image (emisar
  # binary + a shell); runs as root to write the fresh named volume. Profile-gated
  # so the default `docker compose up` is unchanged. See dev/signing/e2e/.
  # ----------------------------------------------------------------
  signing-init:
    image: emisar/runner:dev
    profiles: ["test"]
    user: "root"
    depends_on:
      seeder:
        condition: service_completed_successfully
    volumes:
      - signing_material:/signing
      - ./dev/runners/signed-iad.yaml:/templates/signed-iad.yaml:ro
      - ./dev/signing/init.sh:/usr/local/bin/signing-init.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/signing-init.sh"]
    restart: "no"

  # ----------------------------------------------------------------
  # runner-signed — a 4th runner that ENFORCES signed dispatch. It points
  # --config at the config signing-init wrote (with the freshly-minted CA's
  # public key), so it runs a dispatch ONLY if it carries a valid, in-scope,
  # CA-vouched Ed25519 attestation — the portal Run button / runbooks can't
  # reach it, only a signed MCP call. Profile-gated so the default stack is
  # unchanged; brought up by dev/signing/e2e/run.sh.
  # ----------------------------------------------------------------
  runner-signed:
    <<: *runner
    hostname: signed-iad-01.northstar.example
    profiles: ["test"]
    depends_on:
      seeder:
        condition: service_completed_successfully
      signing-init:
        condition: service_completed_successfully
    command: ["/usr/local/bin/emisar", "connect", "--config", "/signing/config.yaml"]
    volumes:
      - runner_signed_data:/var/lib/emisar
      - signing_material:/signing:ro

  # ----------------------------------------------------------------
  # SSO e2e runs from the HOST, not as a compose service. The flow uses plain
  # localhost (issuer localhost:8443, redirect localhost:4010 → the published
  # ports), which a container CAN'T follow — inside a container `localhost` is
  # itself, not the published ports. So the driver runs on the host, where those
  # ports resolve, which is the exact path a host browser takes. Once up:
  #
  #   ./dev/keycloak/e2e/run.sh
  #
  # drives BOTH halves — SCIM provisions alice (the real IdP user) + a
  # deprovision lifecycle, then the full OIDC login as alice converges on that
  # SCIM identity (sub == externalId) at /app/demo.
  # ----------------------------------------------------------------

volumes:
  pg_data:
  runner_1_data:
  runner_2_data:
  runner_3_data:
  mcp_data:
  # runner-signed's data dir + the generated signed-dispatch material (both
  # cleared by `docker compose down -v`, which rotates the e2e keys).
  runner_signed_data:
  signing_material:
