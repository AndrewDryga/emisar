app = "emisar"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[deploy]
  # Migrations run on every release as part of bin/server.
  release_command = "/app/bin/migrate"

[env]
  PHX_HOST = "emisar.dev"
  PORT = "4000"
  POOL_SIZE = "20"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 800

  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-2x"
  memory = "1gb"

[metrics]
  port = 9091
  path = "/metrics"
