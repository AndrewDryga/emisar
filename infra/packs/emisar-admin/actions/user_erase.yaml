schema_version: 1
id: emisar.admin.user.erase
title: Permanently erase user
kind: script
risk: critical
description: Permanently delete one user and sole-owner accounts after exact UUID confirmation.
side_effects:
  - Irreversibly deletes the user, memberships, and accounts they solely own.
  - Cannot be undone; use only for a verified erasure request with two-person approval.
args:
  - name: user_id
    type: string
    required: true
    description: Exact user UUID to erase.
    validation: {pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$", max_length: 36}
  - name: confirmation
    type: string
    required: true
    description: Repeat the exact user UUID.
    validation: {pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$", max_length: 36}
  - name: reason
    type: string
    required: true
    description: Verified erasure request and approval reference.
    validation: {max_length: 500}
execution:
  script: {path: scripts/callback.sh, interpreter: /bin/sh}
  argv:
    - "emisar.admin.user.erase"
    - "user_id={{ args.user_id }}"
    - "confirmation={{ args.confirmation }}"
    - "reason={{ args.reason }}"
  timeout: 120s
output: {parser: json, parser_required: true, max_stdout_bytes: 65536, max_stderr_bytes: 8192}
