schema_version: 1
id: emisar.admin.plan.revoke
title: Revoke complimentary plan
kind: script
risk: high
description: Revoke only a complimentary grant and fall back to the free plan.
side_effects: [Changes plan limits and feature entitlements immediately.]
args:
  - name: account
    type: string
    required: true
    description: Exact account UUID or slug.
    validation: {max_length: 128}
  - name: reason
    type: string
    required: true
    description: Commercial or support reason recorded in audit.
    validation: {max_length: 500}
execution:
  script: {path: scripts/callback.sh, interpreter: /bin/sh}
  argv:
    - "emisar.admin.plan.revoke"
    - "account={{ args.account }}"
    - "reason={{ args.reason }}"
  timeout: 30s
output: {parser: json, parser_required: true, max_stdout_bytes: 65536, max_stderr_bytes: 8192}
