schema_version: 1
id: emisar.admin.mfa.reset
title: Reset member MFA
kind: script
risk: high
description: Clear one member's TOTP factor and recovery codes so they can re-enroll.
side_effects: [Removes the current second factor and records an MFA-bypass audit event.]
args:
  - name: account
    type: string
    required: true
    description: Exact account UUID or slug.
    validation: {max_length: 128}
  - name: member
    type: string
    required: true
    description: Exact membership UUID or member email.
    validation: {max_length: 320}
execution:
  script: {path: scripts/callback.sh, interpreter: /bin/sh}
  argv:
    - "emisar.admin.mfa.reset"
    - "account={{ args.account }}"
    - "member={{ args.member }}"
  timeout: 60s
output: {parser: json, parser_required: true, max_stdout_bytes: 65536, max_stderr_bytes: 8192}
