schema_version: 1
id: emisar.admin.member.reinstate
title: Reinstate account member
kind: script
risk: high
description: Restore a manually suspended membership when directory policy permits it.
side_effects: [Restores the member's account access; previously revoked keys remain revoked.]
args:
  - name: account
    type: string
    required: true
    description: Exact account UUID or slug.
    validation: {max_length: 128}
  - name: member
    type: string
    required: true
    description: Exact membership UUID or member email.
    validation: {max_length: 320}
execution:
  script: {path: scripts/callback.sh, interpreter: /bin/sh}
  argv:
    - "emisar.admin.member.reinstate"
    - "account={{ args.account }}"
    - "member={{ args.member }}"
  timeout: 60s
output: {parser: json, parser_required: true, max_stdout_bytes: 65536, max_stderr_bytes: 8192}
