schema_version: 1
id: emisar.admin.runtime.recent_failures
title: Recent product failures
kind: script
risk: low
description: Return up to 50 recent failed action runs from durable product state, without raw logs.
side_effects: [Read-only.]
args:
  - name: days
    type: integer
    required: false
    default: 1
    description: Lookback window in days.
    validation: {min: 1, max: 30}
execution:
  script: {path: scripts/callback.sh, interpreter: /bin/sh}
  argv:
    - "emisar.admin.runtime.recent_failures"
    - "days={{ args.days? }}"
  timeout: 30s
output: {parser: json, parser_required: true, max_stdout_bytes: 262144, max_stderr_bytes: 8192}
