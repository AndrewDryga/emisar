schema_version: 1
id: emisar.admin.runtime.status
title: Portal runtime status
kind: script
risk: low
description: Return release, node, scheduler, process, and clock status from the local portal.
side_effects: [Read-only.]
args: []
execution:
  script: {path: scripts/callback.sh, interpreter: /bin/sh}
  argv:
    - "emisar.admin.runtime.status"
  timeout: 15s
output: {parser: json, parser_required: true, max_stdout_bytes: 65536, max_stderr_bytes: 8192}
