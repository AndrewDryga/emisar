schema_version: 1
id: emisar.admin.account.create
title: Create account with owner
kind: script
risk: high
description: Create an account and owner identity, then send confirmation when needed.
side_effects:
  - Creates an account, owner membership, default policy, and audit rows.
  - May send an email confirmation to the owner.
args:
  - name: email
    type: string
    required: true
    description: Owner email address.
    validation: {max_length: 320, pattern: "^[^[:space:]@]+@[^[:space:]@]+\\.[^[:space:]@]+$"}
  - name: name
    type: string
    required: true
    description: Account display name.
    validation: {max_length: 80}
  - name: slug
    type: string
    required: true
    description: Lowercase URL slug.
    validation: {pattern: "^[a-z][a-z0-9-]{1,62}[a-z0-9]$"}
execution:
  script: {path: scripts/callback.sh, interpreter: /bin/sh}
  argv:
    - "emisar.admin.account.create"
    - "email={{ args.email }}"
    - "name={{ args.name }}"
    - "slug={{ args.slug }}"
  timeout: 60s
output: {parser: json, parser_required: true, max_stdout_bytes: 65536, max_stderr_bytes: 8192}
