schema_version: 1
id: emisar.admin.sessions.revoke
title: Revoke member sessions
kind: script
risk: high
description: Revoke all browser sessions for one member and disconnect active LiveViews.
side_effects: [Signs the user out of every account because sessions are user-global.]
args:
  - name: account
    type: string
    required: true
    description: Exact account UUID or slug.
    validation: {max_length: 128}
  - name: member
    type: string
    required: true
    description: Exact membership UUID or member email.
    validation: {max_length: 320}
execution:
  script: {path: scripts/callback.sh, interpreter: /bin/sh}
  argv:
    - "emisar.admin.sessions.revoke"
    - "account={{ args.account }}"
    - "member={{ args.member }}"
  timeout: 60s
output: {parser: json, parser_required: true, max_stdout_bytes: 65536, max_stderr_bytes: 8192}
