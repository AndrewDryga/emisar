schema_version: 1
id: emisar.admin.member.suspend
title: Suspend account member
kind: script
risk: high
description: Suspend one membership and revoke its sessions and delegated API keys.
side_effects: [Removes access immediately while preserving membership history.]
args:
  - name: account
    type: string
    required: true
    description: Exact account UUID or slug.
    validation: {max_length: 128}
  - name: member
    type: string
    required: true
    description: Exact membership UUID or member email.
    validation: {max_length: 320}
execution:
  script: {path: scripts/callback.sh, interpreter: /bin/sh}
  argv:
    - "emisar.admin.member.suspend"
    - "account={{ args.account }}"
    - "member={{ args.member }}"
  timeout: 60s
output: {parser: json, parser_required: true, max_stdout_bytes: 65536, max_stderr_bytes: 8192}
