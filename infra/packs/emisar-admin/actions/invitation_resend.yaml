schema_version: 1
id: emisar.admin.invitation.resend
title: Resend account invitation
kind: script
risk: medium
description: Replace and resend one pending member invitation.
side_effects: [Invalidates the previous invitation token and sends a new invitation email.]
args:
  - name: account
    type: string
    required: true
    description: Exact account UUID or slug.
    validation: {max_length: 128}
  - name: member
    type: string
    required: true
    description: Exact membership UUID or member email.
    validation: {max_length: 320}
execution:
  script: {path: scripts/callback.sh, interpreter: /bin/sh}
  argv:
    - "emisar.admin.invitation.resend"
    - "account={{ args.account }}"
    - "member={{ args.member }}"
  timeout: 60s
output: {parser: json, parser_required: true, max_stdout_bytes: 65536, max_stderr_bytes: 8192}
