#cloud-config
# Container-Optimized OS. Systemd supervises separately pinned portal and Cloud
# SQL Auth Proxy containers; neither service pulls an image on routine restart.

write_files:
%{ if database_auth_mode == "password" ~}
  - path: /etc/emisar/db-server-ca.pem
    permissions: "0444"
    content: |
      ${indent(6, db_server_ca)}
%{ endif ~}

  - path: /var/lib/emisar/ensure-image.sh
    permissions: "0755"
    content: |
      ${indent(6, ensure_image_script)}

  - path: /var/lib/emisar/start.sh
    permissions: "0755"
    content: |
      ${indent(6, start_script)}

  - path: /etc/systemd/system/emisar-image.service
    permissions: "0644"
    content: |
      [Unit]
      Description=Ensure the pinned emisar image is present
      Requires=docker.service
      Wants=gcr-online.target network-online.target
      After=docker.service gcr-online.target network-online.target
      [Service]
      Type=oneshot
      RemainAfterExit=yes
      Restart=on-failure
      RestartSec=15
      ExecStart=/bin/bash /var/lib/emisar/ensure-image.sh

%{ if database_auth_mode == "iam" ~}
  # The proxy is independently pinned infrastructure. Keeping it in its own
  # container leaves the portal image application-only and rollbacks uncoupled.
  - path: /etc/systemd/system/emisar-cloud-sql-proxy.service
    permissions: "0644"
    content: |
      [Unit]
      Description=Cloud SQL Auth Proxy for emisar
      Wants=emisar-image.service
      After=emisar-image.service
      [Service]
      Restart=always
      RestartSec=5
      ExecStartPre=-/usr/bin/docker rm -f emisar-cloud-sql-proxy
      ExecStart=/usr/bin/docker run --rm --name emisar-cloud-sql-proxy --network host --read-only --cap-drop=ALL --security-opt=no-new-privileges ${cloud_sql_proxy_image} --private-ip --auto-iam-authn --address 127.0.0.1 --port 5432 --health-check --http-address 127.0.0.1 --http-port 9090 ${database_connection_name}
      ExecStop=/usr/bin/docker stop -t 10 emisar-cloud-sql-proxy
      [Install]
      WantedBy=multi-user.target
%{ endif ~}

  - path: /etc/systemd/system/emisar.service
    permissions: "0644"
    content: |
      [Unit]
      Description=emisar portal
      Wants=emisar-image.service
%{ if database_auth_mode == "iam" ~}
      # A proxy restart is a readiness failure, not a reason to restart the BEAM.
      Wants=emisar-cloud-sql-proxy.service
%{ endif ~}
      After=emisar-image.service%{ if database_auth_mode == "iam" } emisar-cloud-sql-proxy.service%{ endif }
      [Service]
      Restart=always
      RestartSec=5
      TimeoutStopSec=130
      ExecStart=/bin/bash /var/lib/emisar/start.sh
      ExecStop=/usr/bin/docker stop -t 120 emisar
      [Install]
      WantedBy=multi-user.target

runcmd:
  - /sbin/iptables -A INPUT -p tcp --dport ${app_port} -j ACCEPT
  - /sbin/iptables -A INPUT -p tcp --dport 4369 -j ACCEPT
  - /sbin/iptables -A INPUT -p tcp --dport 9100:9105 -j ACCEPT
  - systemctl daemon-reload
%{ if database_auth_mode == "iam" ~}
  - systemctl enable --now emisar-cloud-sql-proxy.service
%{ endif ~}
  - systemctl enable --now emisar.service
