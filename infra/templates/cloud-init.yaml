#cloud-config
# Container-Optimized OS. Boots the emisar portal behind the Google HTTPS load
# balancer: fetches every runtime secret from Secret Manager into a root-only env
# file, then starts the release. Its server entrypoint runs DB migrations under
# Ecto's advisory lock before starting the endpoint. epmd + the Erlang distribution
# ports let sibling instances form one BEAM cluster; peer discovery is
# Emisar.Cluster.GCE (Compute API by label).
#
# Dollar-brace placeholders are Terraform interpolation; $NAME (no braces) is shell.

write_files:
  # Cloud SQL's per-instance server CA. The app verifies the DB's TLS cert
  # against exactly this CA (DATABASE_SSL_CACERTFILE below) — no public CA can
  # vouch for a Cloud SQL cert, and pinning the instance-specific CA is
  # stronger than a public-store check anyway.
  - path: /etc/emisar/db-server-ca.pem
    permissions: "0444"
    content: |
      ${indent(6, db_server_ca)}

  - path: /var/lib/emisar/start.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail

      ENV_FILE=/run/emisar/env
      mkdir -p /run/emisar
      : > "$ENV_FILE"
      chmod 600 "$ENV_FILE"

      # Metadata access token: auth for both Secret Manager and the Artifact
      # Registry pull. A successful-but-empty grep/cut won't fail under pipefail,
      # so guard each step explicitly.
      TOKEN=$(curl -s -H "Metadata-Flavor: Google" http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token | cut -d'"' -f4)
      [ -n "$TOKEN" ] || { echo "no metadata access token" >&2; exit 1; }

      # $1 = secret id, $2 = env var. Silently skips a secret with no version yet
      # (an unpopulated optional) — never write an empty value; the release treats
      # unset as "feature off".
      fetch_secret() {
        local data value
        # Header via stdin (curl -H @-) so the cloud-platform token never lands on
        # curl's argv, readable by any host process via /proc/<pid>/cmdline.
        data=$(printf 'Authorization: Bearer %s\n' "$TOKEN" | curl -s -H @- "https://secretmanager.googleapis.com/v1/projects/${project_id}/secrets/$1/versions/latest:access" | grep -oE '"data": ?"[^"]*"' | cut -d'"' -f4 || true)
        [ -n "$data" ] || return 0
        value=$(printf '%s' "$data" | base64 -d)
        [ -n "$value" ] || return 0
        printf '%s=%s\n' "$2" "$value" >> "$ENV_FILE"
      }

%{ for secret_id, env_name in app_secrets ~}
      fetch_secret "${secret_id}" "${env_name}"
%{ endfor ~}

      # A prod boot cannot start without these.
      grep -q '^SECRET_KEY_BASE=' "$ENV_FILE" || { echo "SECRET_KEY_BASE missing from Secret Manager" >&2; exit 1; }
      grep -q '^DATABASE_URL=' "$ENV_FILE" || { echo "DATABASE_URL missing from Secret Manager" >&2; exit 1; }

      # Stable cluster cookie across image builds, derived from the app secret so
      # old + new images share it during a rolling update.
      SKB=$(grep '^SECRET_KEY_BASE=' "$ENV_FILE" | cut -d= -f2-)
      printf 'RELEASE_COOKIE=%s\n' "$(printf 'emisar-release-cookie:%s' "$SKB" | sha256sum | cut -d' ' -f1)" >> "$ENV_FILE"

      # This instance's internal IP becomes the BEAM node name (emisar@<ip>).
      NODE_IP=$(curl -s -H "Metadata-Flavor: Google" http://metadata.google.internal/computeMetadata/v1/instance/network-interfaces/0/ip)
      [ -n "$NODE_IP" ] || { echo "no instance internal IP" >&2; exit 1; }

      # Non-secret runtime env. FORCE_SSL=true: the LB terminates TLS and forwards
      # X-Forwarded-Proto, so force_ssl serves (no redirect loop); /healthz and
      # /readyz are excluded so plain-HTTP infrastructure probes get 200.
      {
        printf 'PHX_HOST=%s\n' "${domain}"
        printf 'MAILER_FROM_EMAIL=%s\n' "${mailer_from_email}"
        printf 'PORT=%s\n' "${app_port}"
        printf 'FORCE_SSL=true\n'
        printf 'DATABASE_SSL=1\n'
        printf 'DATABASE_SSL_CACERTFILE=/etc/emisar/db-server-ca.pem\n'
        printf 'NODE_IP=%s\n' "$NODE_IP"
        printf 'EMISAR_CLUSTER_PROJECT=%s\n' "${project_id}"
        printf 'EMISAR_CLUSTER_VALUE=%s\n' "${cluster_value}"
      } >> "$ENV_FILE"
%{ if disable_billing ~}
      printf 'EMISAR_DISABLE_BILLING=1\n' >> "$ENV_FILE"
%{ endif ~}

      # Public GHCR pull, no credentials — prod runs the exact artifact
      # self-hosters pull. CI passes the tested digest into the exact Terraform
      # run a reviewer approves, so state records what actually boots.
      docker pull ${container_image}

      docker rm -f emisar 2>/dev/null || true
      # /app/bin/server runs the advisory-locked migration before the endpoint.
      exec docker run --rm --name emisar --network host --env-file "$ENV_FILE" \
        -v /etc/emisar/db-server-ca.pem:/etc/emisar/db-server-ca.pem:ro \
        ${container_image}

  - path: /etc/systemd/system/emisar.service
    permissions: "0644"
    content: |
      [Unit]
      Description=emisar portal
      Wants=gcr-online.target network-online.target
      After=gcr-online.target network-online.target
      [Service]
      Restart=always
      RestartSec=5
      TimeoutStopSec=45
      ExecStart=/bin/bash /var/lib/emisar/start.sh
      ExecStop=/usr/bin/docker stop -t 30 emisar
      [Install]
      WantedBy=multi-user.target

runcmd:
  # COS drops inbound by default (only lo/icmp/ESTABLISHED/SSH), so the VPC firewall
  # is not sufficient alone. Open the app port (LB health check + traffic) and the
  # BEAM cluster ports; the VPC firewall already restricts the sources.
  - /sbin/iptables -A INPUT -p tcp --dport ${app_port} -j ACCEPT
  - /sbin/iptables -A INPUT -p tcp --dport 4369 -j ACCEPT
  - /sbin/iptables -A INPUT -p tcp --dport 9100:9105 -j ACCEPT
  - systemctl daemon-reload
  - systemctl enable --now emisar.service
