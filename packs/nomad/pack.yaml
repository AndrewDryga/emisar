schema_version: 1

id: nomad
name: HashiCorp Nomad
version: 0.1.16
description: >
  Deep Nomad operations — full job lifecycle (inspect, history, scale
  horizontally + vertically, dispatch, revert, promote, stop), per-task
  CPU/memory resource read + set, allocation introspection + health checks +
  filesystem ls/stat (metadata only, never file contents) + fixed in-container
  Redis probes (ping/info via alloc exec, no freeform command) + restart +
  signal + stop, native service discovery (no Consul), node fleet
  management (drain, eligibility, purge), evaluation + deployment status,
  operator raft + autopilot, CSI + host volumes, ACL policies + tokens,
  namespaces + quotas. Authenticates via NOMAD_ADDR + NOMAD_TOKEN on the
  runner host.
vendor: emisar
homepage: https://github.com/andrewdryga/emisar

requires:
  os:
    - linux
  binaries:
    - nomad

# `emisar pack suggest` detection — default process names / ports.
detect:
  processes:
    - nomad
  ports:
    - 4646

setup:
  summary: >
    Both the nomad CLI and the curl-based API actions read the server
    address and ACL token from NOMAD_ADDR and NOMAD_TOKEN on the runner
    host.
  env:
    - name: NOMAD_ADDR
      description: >
        Server HTTP address, including scheme (the curl actions build
        URLs directly from it).
      default: http://127.0.0.1:4646
      example: http://nomad.internal:4646
    - name: NOMAD_TOKEN
      description: >
        ACL token. Required when ACLs are enabled; its policy gates which
        actions succeed.
  notes:
    - "Any of NOMAD_ADDR / NOMAD_TOKEN you set must also be allowlisted in the runner's execution.inherit_env — the action env is scrubbed to PATH/LANG/LC_ALL/TERM by default, so an env present on the host but not allowlisted is silently dropped (the action falls back to its local default or fails auth)."
    - With ACLs enabled the token needs the matching capabilities — submit-job for the job mutators, node:write for drain/eligibility/purge, and operator:write for the raft remove-peer action.
    - "The job_resources and task_resources_set actions also require jq on the runner host (they project / patch the inspect JSON locally)."
    - "For TLS-enabled servers use an https:// NOMAD_ADDR; the nomad CLI also reads NOMAD_CACERT / NOMAD_CLIENT_CERT / NOMAD_CLIENT_KEY, but the curl actions do not."
  verify: nomad.agent_info

actions:
  # Cluster / agent
  - actions/agent_info.yaml
  - actions/agent_self.yaml
  - actions/agent_members.yaml
  - actions/server_members.yaml
  - actions/leader.yaml
  - actions/agent_force_leave.yaml
  # Nodes (Nomad clients)
  - actions/node_status_all.yaml
  - actions/node_status_one.yaml
  - actions/node_eligibility_show.yaml
  - actions/node_drain.yaml
  - actions/node_drain_done.yaml
  - actions/node_eligibility_disable.yaml
  - actions/node_eligibility_enable.yaml
  - actions/node_purge.yaml
  # Jobs
  - actions/job_status_all.yaml
  - actions/job_status_one.yaml
  - actions/job_inspect.yaml
  - actions/job_history.yaml
  - actions/job_allocations.yaml
  - actions/job_evaluations.yaml
  - actions/job_deployments.yaml
  - actions/job_periodic_force.yaml
  - actions/job_dispatch.yaml
  - actions/job_revert.yaml
  - actions/job_resources.yaml
  - actions/job_scale.yaml
  - actions/task_resources_set.yaml
  - actions/job_promote.yaml
  - actions/job_stop.yaml
  # Allocations
  - actions/alloc_status.yaml
  - actions/alloc_checks.yaml
  - actions/alloc_fs_ls.yaml
  - actions/alloc_fs_stat.yaml
  # Fixed alloc-exec probes (medium — runs inside the container; no freeform command)
  - actions/alloc_exec_redis_ping.yaml
  - actions/alloc_exec_redis_info.yaml
  - actions/alloc_logs.yaml
  - actions/alloc_logs_stderr.yaml
  - actions/alloc_stats.yaml
  - actions/alloc_restart.yaml
  - actions/alloc_signal.yaml
  - actions/alloc_stop.yaml
  # Evaluations / deployments
  - actions/eval_status.yaml
  - actions/eval_list.yaml
  - actions/deployment_status.yaml
  # Operator (raft / autopilot)
  - actions/operator_raft_list_peers.yaml
  - actions/operator_raft_remove_peer.yaml
  - actions/operator_autopilot_get_config.yaml
  - actions/operator_autopilot_state.yaml
  # Volumes
  - actions/csi_volume_list.yaml
  - actions/csi_volume_status.yaml
  - actions/host_volume_list.yaml
  # Services (native discovery — no Consul)
  - actions/service_list.yaml
  - actions/service_info.yaml
  # ACL
  - actions/acl_policies.yaml
  - actions/acl_token_self.yaml
  # Namespaces / quotas
  - actions/namespace_list.yaml
  - actions/quota_list.yaml
  # System
  - actions/system_gc.yaml
