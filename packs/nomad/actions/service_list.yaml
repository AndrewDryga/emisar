schema_version: 1
id: nomad.service_list
title: nomad service list
kind: script
risk: low
description: >
  List the services registered in Nomad's native service discovery (no Consul)
  — the registered service names and their tags in the current namespace. This
  is the "what services does Nomad know about" read; use nomad.service_info to
  see the live instances (address, port, node, alloc) behind one service.
  Requires a Nomad token with the read-job capability on the namespace.
side_effects: ["One API call.", "Read-only."]
args:
  - name: namespace
    type: string
    required: false
    default: ""
    description: Nomad namespace to target. Empty (default) keeps the runner's ambient NOMAD_NAMESPACE or the default namespace.
    validation:
      pattern: "^([a-zA-Z0-9][a-zA-Z0-9_\\-]{0,127})?$"
  - name: region
    type: string
    required: false
    default: ""
    description: Nomad region to target. Empty (default) keeps the runner's ambient NOMAD_REGION or the agent's region.
    validation:
      pattern: "^([a-zA-Z0-9][a-zA-Z0-9_\\-]{0,63})?$"
execution:
  script:
    path: scripts/read_nsr.sh
    interpreter: /bin/sh
  argv: ["{{ args.namespace }}", "{{ args.region }}", "service list"]
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: All Nomad-registered services
    args: {}
  - title: Services in the "prod" namespace
    args:
      namespace: "prod"
