schema_version: 1
id: nomad.alloc_logs_stderr
title: Tail a task's application logs — stderr (nomad alloc logs -stderr)
kind: script
risk: low
description: >
  Tail application error logs (stderr) from one task in a Nomad allocation — the
  last N lines the app/service/container wrote to stderr (errors, stack traces,
  panics, crash output). This is the read for "show me the error logs" or "why
  did it crash" during an incident or cutover preflight, instead of a local CLI
  session. Needs the allocation ID and task name: when you only have the job
  name, call nomad.job_allocations first to list its allocations and pick the
  running one. Use nomad.alloc_logs for the stdout stream.
side_effects: ["One API call.", "Read-only."]
args:
  - name: alloc_id
    type: string
    required: true
    description: Allocation ID or prefix (from nomad.job_allocations when you only have the job name).
    validation:
      pattern: "^[a-fA-F0-9][a-fA-F0-9\\-]{3,35}$"
  - name: task
    type: string
    required: true
    description: Task name.
    validation:
      pattern: "^[a-zA-Z0-9][a-zA-Z0-9_\\-]{0,127}$"
  - name: tail
    type: integer
    required: false
    default: 200
    description: Lines.
    validation:
      min: 1
      max: 10000
  - name: namespace
    type: string
    required: false
    default: ""
    description: Nomad namespace to target. Empty (default) keeps the runner's ambient NOMAD_NAMESPACE or the default namespace.
    validation:
      pattern: "^([a-zA-Z0-9][a-zA-Z0-9_\\-]{0,127})?$"
  - name: region
    type: string
    required: false
    default: ""
    description: Nomad region to target. Empty (default) keeps the runner's ambient NOMAD_REGION or the agent's region.
    validation:
      pattern: "^([a-zA-Z0-9][a-zA-Z0-9_\\-]{0,63})?$"
execution:
  script:
    path: scripts/read_nsr.sh
    interpreter: /bin/sh
  argv: ["{{ args.namespace }}", "{{ args.region }}", "alloc logs -stderr -tail -n {{ args.tail }}", "{{ args.alloc_id }}", "{{ args.task }}"]
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 2097152
  max_stderr_bytes: 8192
examples:
  - title: Last 200 stderr lines from the web task
    args:
      alloc_id: "abc12345"
      task: "web"
  - title: Last 500 stderr lines after a crash
    args:
      alloc_id: "abc12345"
      task: "redis"
      tail: 500
