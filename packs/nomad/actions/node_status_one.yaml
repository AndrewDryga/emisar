schema_version: 1
id: nomad.node_status_one
title: nomad node status <id>
kind: exec
risk: low
description: Show one node's full detail — resources, allocations, events, drivers.
side_effects: ["One API call.", "Read-only."]
args:
  - name: node_id
    type: string
    required: true
    description: Node ID or prefix.
    validation:
      pattern: "^[a-fA-F0-9\\-]{4,36}$"
execution:
  command: {binary: nomad, argv: ["node", "status", "-verbose", "{{ args.node_id }}"]}
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: One node
    args:
      node_id: "abc12345"
