schema_version: 1
id: nomad.job_inspect
title: nomad job inspect <id>
kind: script
risk: low
description: >
  Dump one job's full spec as JSON. This surfaces the job's `env` and
  `template` blocks, which routinely carry injected secrets (DB URLs, API
  keys, rendered Vault templates). The runner's redaction is a
  fail-closed backstop, not a guarantee — it is pattern-bound and can
  miss a bespoke secret whose name and value match no rule.
side_effects:
  - One API call.
  - Read-only, but exposes the job's env/template blocks (may include secrets).
search_terms:
  - jobspec
  - job definition
args:
  - name: job
    type: string
    required: true
    description: Job ID.
    validation:
      pattern: "^[a-zA-Z0-9][a-zA-Z0-9_\\-]{0,127}$"
  - name: namespace
    type: string
    required: false
    default: ""
    description: Nomad namespace to target. Empty (default) keeps the runner's ambient NOMAD_NAMESPACE or the default namespace.
    validation:
      pattern: "^([a-zA-Z0-9][a-zA-Z0-9_\\-]{0,127})?$"
  - name: region
    type: string
    required: false
    default: ""
    description: Nomad region to target. Empty (default) keeps the runner's ambient NOMAD_REGION or the agent's region.
    validation:
      pattern: "^([a-zA-Z0-9][a-zA-Z0-9_\\-]{0,63})?$"
execution:
  script:
    path: scripts/read_nsr.sh
    interpreter: /bin/sh
  argv: ["{{ args.namespace }}", "{{ args.region }}", "job inspect", "{{ args.job }}"]
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 1048576
  max_stderr_bytes: 8192
examples:
  - title: Inspect job
    args:
      job: "api"
  - title: Inspect a job in the "prod" namespace
    args:
      job: "api"
      namespace: "prod"
