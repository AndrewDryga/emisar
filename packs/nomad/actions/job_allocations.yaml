schema_version: 1
id: nomad.job_allocations
title: nomad job allocs <id>
kind: script
risk: low
description: List all allocations for one job.
side_effects: ["One API call.", "Read-only."]
args:
  - name: job
    type: string
    required: true
    description: Job ID.
    validation:
      pattern: "^[a-zA-Z0-9_\\-]{1,128}$"
  - name: namespace
    type: string
    required: false
    default: ""
    description: Nomad namespace to target. Empty (default) keeps the runner's ambient NOMAD_NAMESPACE or the default namespace.
    validation:
      pattern: "^[a-zA-Z0-9_\\-]{0,128}$"
  - name: region
    type: string
    required: false
    default: ""
    description: Nomad region to target. Empty (default) keeps the runner's ambient NOMAD_REGION or the agent's region.
    validation:
      pattern: "^[a-zA-Z0-9_\\-]{0,64}$"
execution:
  script:
    path: scripts/read_nsr.sh
    interpreter: /bin/sh
  argv: ["{{ args.namespace }}", "{{ args.region }}", "job allocs -verbose", "{{ args.job }}"]
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: Allocations
    args:
      job: "api"
  - title: Allocations in the "prod" namespace
    args:
      job: "api"
      namespace: "prod"
