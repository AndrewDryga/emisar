schema_version: 1
id: nomad.service_info
title: nomad service info <name>
kind: script
risk: low
description: >
  Show the live instances of one service in Nomad's native service discovery
  (no Consul) — each instance's address, port, node, and allocation ID. This is
  the "where is this service running, on what address" read for a registered
  service name (list them with nomad.service_list). Requires a Nomad token with
  the read-job capability on the namespace.
side_effects: ["One API call.", "Read-only."]
args:
  - name: service
    type: string
    required: true
    description: Registered service name (from nomad.service_list).
    validation:
      pattern: "^[a-zA-Z0-9_\\-]{1,128}$"
  - name: namespace
    type: string
    required: false
    default: ""
    description: Nomad namespace to target. Empty (default) keeps the runner's ambient NOMAD_NAMESPACE or the default namespace.
    validation:
      pattern: "^[a-zA-Z0-9_\\-]{0,128}$"
  - name: region
    type: string
    required: false
    default: ""
    description: Nomad region to target. Empty (default) keeps the runner's ambient NOMAD_REGION or the agent's region.
    validation:
      pattern: "^[a-zA-Z0-9_\\-]{0,64}$"
execution:
  script:
    path: scripts/read_nsr.sh
    interpreter: /bin/sh
  argv: ["{{ args.namespace }}", "{{ args.region }}", "service info", "{{ args.service }}"]
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 262144
  max_stderr_bytes: 8192
examples:
  - title: Instances of the "redis" service
    args:
      service: "redis"
