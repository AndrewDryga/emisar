schema_version: 1
id: nomad.eval_status
title: nomad eval status <id>
kind: exec
risk: low
description: 'Show one evaluation''s status — placement failures, queued allocations, blocked count.'
side_effects: ["One API call.", "Read-only."]
search_terms:
  - stuck pending
  - not scheduling
args:
  - name: eval_id
    type: string
    required: true
    description: Evaluation ID.
    validation:
      pattern: "^[a-fA-F0-9][a-fA-F0-9\\-]{3,35}$"
execution:
  command: {binary: nomad, argv: ["eval", "status", "-verbose", "{{ args.eval_id }}"]}
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 131072
  max_stderr_bytes: 8192
examples:
  - title: Eval status
    args:
      eval_id: "abc12345"
