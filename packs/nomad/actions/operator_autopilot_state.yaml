schema_version: 1
id: nomad.operator_autopilot_state
title: GET /v1/operator/autopilot/state
kind: exec
risk: low
description: 'Show the autopilot health view — leader health, follower lag, server stabilization.'
side_effects: ["One API call.", "Read-only."]
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "{ [ -n \"$NOMAD_TOKEN\" ] && printf 'X-Nomad-Token: %s\\n' \"$NOMAD_TOKEN\"; } | curl -sS -H @- \"${NOMAD_ADDR:-http://127.0.0.1:4646}/v1/operator/autopilot/state\""
  timeout: 15s
output:
  parser: json
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192
examples:
  - title: Autopilot state
    args: {}
