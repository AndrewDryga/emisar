schema_version: 1
id: nomad.alloc_exec_redis_info
title: Show Redis INFO inside an allocation (nomad alloc exec redis-cli info)
kind: exec
risk: medium
description: >
  Show one section of Redis INFO from inside an allocation's task — runs the
  fixed command `redis-cli info <section>` via `nomad alloc exec`, with section
  bounded to the INFO enum. This is for the incident where Redis is only
  reachable inside the alloc (no direct REDIS_URL from the runner); use the redis
  pack's redis.info when you can reach it directly. The command is fixed except
  the enum section — no freeform command, shell, host, port, or password is
  accepted, so it reads the task's local redis-cli default (127.0.0.1:6379) and
  returns NOAUTH on a password-protected instance. risk:medium, not low: `nomad
  alloc exec` runs inside the running container and INFO exposes memory/stats/
  replication topology, so it is policy-gated even though the command only reads.
  Requires the alloc-exec namespace capability (alloc-node-exec for raw_exec/
  raw-driver tasks).
side_effects:
  - Executes the fixed read-only command `redis-cli info <section>` inside the task container.
  - Does not mutate Redis.
args:
  - name: alloc_id
    type: string
    required: true
    description: Allocation ID or prefix (from nomad.job_allocations / nomad.alloc_status).
    validation:
      pattern: "^[a-fA-F0-9\\-]{4,36}$"
  - name: task
    type: string
    required: true
    description: Task name inside the allocation that runs Redis.
    validation:
      pattern: "^[a-zA-Z0-9_\\-]{1,128}$"
  - name: section
    type: string
    required: false
    default: default
    description: INFO section (bounded enum).
    validation:
      enum:
        - default
        - all
        - server
        - clients
        - memory
        - persistence
        - stats
        - replication
        - cpu
        - commandstats
        - latencystats
        - cluster
        - keyspace
        - errorstats
execution:
  command:
    binary: nomad
    argv: ["alloc", "exec", "-i=false", "-t=false", "-task", "{{ args.task }}", "{{ args.alloc_id }}", "redis-cli", "info", "{{ args.section }}"]
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 131072
  max_stderr_bytes: 8192
examples:
  - title: Default INFO of Redis in the cache task
    args:
      alloc_id: "abc12345"
      task: "redis"
  - title: Replication topology
    args:
      alloc_id: "abc12345"
      task: "redis"
      section: "replication"
