schema_version: 1
id: nomad.node_eligibility_enable
title: nomad node eligibility -enable
kind: exec
risk: medium
description: Re-enables a node for new allocations.
side_effects:
  - Node may immediately receive new allocations.
search_terms:
  - uncordon
args:
  - name: node_id
    type: string
    required: true
    description: Node ID or prefix.
    validation:
      pattern: "^[a-fA-F0-9][a-fA-F0-9\\-]{3,35}$"
execution:
  command: {binary: nomad, argv: ["node", "eligibility", "-enable", "{{ args.node_id }}"]}
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 4096
  max_stderr_bytes: 8192
examples:
  - title: Uncordon
    args:
      node_id: "abc12345"
