schema_version: 1
id: nomad.alloc_checks
title: nomad alloc checks <id>
kind: script
risk: low
description: >
  Show the Nomad-native service health-check results for one allocation — each
  check's name, group/task/service, status (success | failure | pending), and
  output. This is the Nomad-side health view with no Consul: is the alloc's
  service actually passing its checks, or failing one? Needs the allocation ID
  (get it from nomad.job_allocations or nomad.alloc_status). Requires a Nomad
  token with the read-job capability on the namespace.
side_effects: ["One API call.", "Read-only."]
args:
  - name: alloc_id
    type: string
    required: true
    description: Allocation ID or prefix (from nomad.job_allocations / nomad.alloc_status).
    validation:
      pattern: "^[a-fA-F0-9][a-fA-F0-9\\-]{3,35}$"
  - name: namespace
    type: string
    required: false
    default: ""
    description: Nomad namespace to target. Empty (default) keeps the runner's ambient NOMAD_NAMESPACE or the default namespace.
    validation:
      pattern: "^([a-zA-Z0-9][a-zA-Z0-9_\\-]{0,127})?$"
  - name: region
    type: string
    required: false
    default: ""
    description: Nomad region to target. Empty (default) keeps the runner's ambient NOMAD_REGION or the agent's region.
    validation:
      pattern: "^([a-zA-Z0-9][a-zA-Z0-9_\\-]{0,63})?$"
execution:
  script:
    path: scripts/read_nsr.sh
    interpreter: /bin/sh
  argv: ["{{ args.namespace }}", "{{ args.region }}", "alloc checks", "{{ args.alloc_id }}"]
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 131072
  max_stderr_bytes: 8192
examples:
  - title: Health checks for one alloc
    args:
      alloc_id: "abc12345"
