schema_version: 1
id: nomad.job_action_run
title: nomad action -job <job> -group <group> -task <task> <name>
kind: exec
risk: high
description: >
  Run a job-spec-defined action inside a running allocation (Nomad 1.7+).
  Nomad job authors declare named commands in the task's `action` blocks; this
  executes ONE of them by name — whatever command the job spec declares, with
  the task's own environment and filesystem. The pack fixes nothing about the
  command itself, so treat this as remote execution bounded by the job author,
  not by this pack. List a job's declared actions via nomad.job_inspect
  (TaskGroups[].Tasks[].Actions). Requires a token with alloc-exec.
side_effects:
  - The job-defined command runs inside the task's container/environment.
  - Effect depends entirely on what the job author declared.
args:
  - name: job
    type: string
    required: true
    description: Job ID.
    validation:
      pattern: "^[a-zA-Z0-9][a-zA-Z0-9_\\-]{0,127}$"
  - name: group
    type: string
    required: true
    description: Task group name.
    validation:
      pattern: "^[a-zA-Z0-9][a-zA-Z0-9_\\-]{0,127}$"
  - name: task
    type: string
    required: true
    description: Task name.
    validation:
      pattern: "^[a-zA-Z0-9][a-zA-Z0-9_\\-]{0,127}$"
  - name: action_name
    type: string
    required: true
    description: The action name declared in the job spec's `action` block.
    validation:
      pattern: "^[a-zA-Z0-9][a-zA-Z0-9_\\-]{0,127}$"
execution:
  command:
    binary: nomad
    argv: ["action", "-job", "{{ args.job }}", "-group", "{{ args.group }}", "-task", "{{ args.task }}", "--", "{{ args.action_name }}"]
  timeout: 120s
output:
  parser: text
  max_stdout_bytes: 262144
  max_stderr_bytes: 8192
examples:
  - title: Run a job-declared action
    args:
      job: "api"
      group: "web"
      task: "app"
      action_name: "reload-config"
