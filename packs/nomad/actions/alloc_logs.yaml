schema_version: 1
id: nomad.alloc_logs
title: Tail a task's application logs — stdout (nomad alloc logs)
kind: exec
risk: low
description: >
  Tail application logs (stdout) from one task in a Nomad allocation — the last
  N lines the app/service/container wrote to stdout. This is the read for "show
  me the app logs" or "tail the service output" during an incident or cutover
  preflight, instead of a local CLI session. Needs the allocation ID and task
  name: when you only have the job name, call nomad.job_allocations first to
  list its allocations and pick the running one. Use nomad.alloc_logs_stderr for
  the stderr stream (errors, stack traces, panics).
side_effects: ["One API call.", "Read-only."]
args:
  - name: alloc_id
    type: string
    required: true
    description: Allocation ID or prefix (from nomad.job_allocations when you only have the job name).
    validation:
      pattern: "^[a-fA-F0-9\\-]{4,36}$"
  - name: task
    type: string
    required: true
    description: Task name.
    validation:
      pattern: "^[a-zA-Z0-9_\\-]{1,128}$"
  - name: tail
    type: integer
    required: false
    default: 200
    description: Lines.
    validation:
      min: 1
      max: 10000
execution:
  command:
    binary: nomad
    argv: ["alloc", "logs", "-tail", "-n", "{{ args.tail }}", "{{ args.alloc_id }}", "{{ args.task }}"]
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 2097152
  max_stderr_bytes: 8192
examples:
  - title: Last 200 stdout lines from the web task
    args:
      alloc_id: "abc12345"
      task: "web"
  - title: Last 500 stdout lines while chasing a restart
    args:
      alloc_id: "abc12345"
      task: "redis"
      tail: 500
