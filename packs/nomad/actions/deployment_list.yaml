schema_version: 1
id: nomad.deployment_list
title: nomad deployment list
kind: script
risk: low
description: >
  List all deployments cluster-wide with their job, status, and description —
  the "what is rolling out right now" read. Use nomad.deployment_status for
  one deployment's full canary/health detail, or nomad.job_deployments for one
  job's history.
side_effects: ["One API call.", "Read-only."]
search_terms:
  - deploy stuck
  - rollout stalled
args:
  - name: namespace
    type: string
    required: false
    default: ""
    description: Nomad namespace to target. Empty (default) keeps the runner's ambient NOMAD_NAMESPACE or the default namespace.
    validation:
      pattern: "^([a-zA-Z0-9][a-zA-Z0-9_\\-]{0,127})?$"
  - name: region
    type: string
    required: false
    default: ""
    description: Nomad region to target. Empty (default) keeps the runner's ambient NOMAD_REGION or the agent's region.
    validation:
      pattern: "^([a-zA-Z0-9][a-zA-Z0-9_\\-]{0,63})?$"
execution:
  script:
    path: scripts/read_nsr.sh
    interpreter: /bin/sh
  argv: ["{{ args.namespace }}", "{{ args.region }}", "deployment list -verbose"]
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 262144
  max_stderr_bytes: 8192
examples:
  - title: All deployments
    args: {}
  - title: Deployments in the "prod" namespace
    args:
      namespace: "prod"
