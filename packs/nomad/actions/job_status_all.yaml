schema_version: 1
id: nomad.job_status_all
title: nomad job status (all)
kind: script
risk: low
description: List all jobs with their type, priority, status, and submit time.
side_effects: ["One API call.", "Read-only."]
args:
  - name: namespace
    type: string
    required: false
    default: ""
    description: Nomad namespace to target. Empty (default) keeps the runner's ambient NOMAD_NAMESPACE or the default namespace.
    validation:
      pattern: "^([a-zA-Z0-9][a-zA-Z0-9_\\-]{0,127})?$"
  - name: region
    type: string
    required: false
    default: ""
    description: Nomad region to target. Empty (default) keeps the runner's ambient NOMAD_REGION or the agent's region.
    validation:
      pattern: "^([a-zA-Z0-9][a-zA-Z0-9_\\-]{0,63})?$"
execution:
  script:
    path: scripts/read_nsr.sh
    interpreter: /bin/sh
  argv: ["{{ args.namespace }}", "{{ args.region }}", "job status"]
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: All jobs
    args: {}
  - title: All jobs in the "prod" namespace
    args:
      namespace: "prod"
