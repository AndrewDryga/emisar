schema_version: 1
id: nomad.job_history
title: nomad job history <id>
kind: exec
risk: low
description: List all versions of one job with submitter + timestamp.
side_effects: ["One API call.", "Read-only."]
args:
  - name: job
    type: string
    required: true
    description: Job ID.
    validation:
      pattern: "^[a-zA-Z0-9][a-zA-Z0-9_\\-]{0,127}$"
execution:
  command: {binary: nomad, argv: ["job", "history", "-p", "{{ args.job }}"]}
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: History
    args:
      job: "api"
