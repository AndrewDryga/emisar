schema_version: 1
id: nomad.node_purge
title: Purge a dead node (PUT /v1/node/<id>/purge)
kind: exec
risk: critical
description: >
  Removes a dead (down) node from the catalog; allocations on it are GC'd. There
  is no `nomad node purge` CLI subcommand — this is the HTTP API
  (PUT /v1/node/<id>/purge). Only valid for nodes that are down.
side_effects:
  - Node entry removed permanently (one API PUT).
  - Allocations on it are GC'd.
  - Only valid for nodes that are down — running nodes refuse purge.
args:
  - name: node_id
    type: string
    required: true
    description: Node ID.
    validation:
      pattern: "^[a-fA-F0-9][a-fA-F0-9\\-]{3,35}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "{ [ -n \"$NOMAD_TOKEN\" ] && printf 'X-Nomad-Token: %s\\n' \"$NOMAD_TOKEN\"; } | curl -sS -H @- -X PUT \"${NOMAD_ADDR:-http://127.0.0.1:4646}/v1/node/{{ args.node_id }}/purge\""
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 8192
  max_stderr_bytes: 8192
examples:
  - title: Purge a dead node
    args:
      node_id: "deadbeef"
