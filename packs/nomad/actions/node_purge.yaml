schema_version: 1
id: nomad.node_purge
title: nomad node purge
kind: exec
risk: critical
description: Removes a dead (down) node from the catalog. Allocations on it are GC'd.
side_effects:
  - Node entry removed permanently.
  - Allocations on it are GC'd.
  - Only valid for nodes that are down — running nodes refuse purge.
args:
  - name: node_id
    type: string
    required: true
    description: Node ID.
    validation:
      pattern: "^[a-fA-F0-9\\-]{4,36}$"
execution:
  command: {binary: nomad, argv: ["node", "purge", "{{ args.node_id }}"]}
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 4096
  max_stderr_bytes: 8192
examples:
  - title: Purge a dead node
    args:
      node_id: "deadbeef"
