schema_version: 1
id: haproxy.show_stat
title: show stat
kind: exec
risk: low
description: Per-proxy + per-server stats (sessions, queues, bytes, errors, response times).
side_effects:
  - One admin socket command.
  - Read-only.
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "echo 'show stat' | socat - \"$HAPROXY_SOCK\""
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 1048576
  max_stderr_bytes: 8192
examples:
  - title: Stats
    args: {}
