schema_version: 1
id: haproxy.show_sess
title: show sess
kind: exec
risk: low
description: List in-flight sessions (one row per active connection).
side_effects:
  - One admin socket command.
  - Read-only.
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "echo 'show sess' | socat - \"$HAPROXY_SOCK\""
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 1048576
  max_stderr_bytes: 8192
examples:
  - title: Sessions
    args: {}
