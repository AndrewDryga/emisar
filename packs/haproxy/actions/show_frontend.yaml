schema_version: 1
id: haproxy.show_frontend
title: Frontend stats (show stat, type=frontend)
kind: exec
risk: low
description: >
  Show per-frontend stats (status, sessions, bytes, denied, errors) as CSV. There is
  no `show frontend` Runtime-API command, so this uses `show stat -1 1 -1` —
  the stat dump filtered to type=frontend (the bitmask 1 = frontend).
side_effects:
  - One admin socket command.
  - Read-only.
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "echo 'show stat -1 1 -1' | socat - \"$HAPROXY_SOCK\""
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 16384
  max_stderr_bytes: 8192
examples:
  - title: Frontends
    args: {}
