schema_version: 1
id: haproxy.show_info
title: show info
kind: exec
risk: low
description: HAProxy version, uptime, process stats, conn rate, mem usage.
side_effects:
  - One admin socket command.
  - Read-only.
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "echo 'show info' | socat - \"$HAPROXY_SOCK\""
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192
examples:
  - title: Info
    args: {}
