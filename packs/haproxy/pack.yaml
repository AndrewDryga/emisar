schema_version: 1

id: haproxy
name: HAProxy operations
version: 0.1.5
description: >
  Stats, server state, frontends/backends, session inventory, plus narrow
  mutators to enable/disable backend servers. Talks to the HAProxy admin
  socket. Set HAPROXY_SOCK env var on the runner host.
vendor: emisar
homepage: https://github.com/andrewdryga/emisar

requires:
  os:
    - linux
  binaries:
    - socat

# `emisar pack suggest` detection — default process names / ports.
detect:
  processes:
    - haproxy

setup:
  summary: >
    Talks to the local HAProxy admin/stats UNIX socket via socat on the
    runner host. There is no default — you must point HAPROXY_SOCK at the
    socket.
  env:
    - name: HAPROXY_SOCK
      required: true
      description: Path to the HAProxy admin/stats UNIX socket (the `stats socket` from haproxy.cfg).
      example: /run/haproxy/admin.sock
  notes:
    - "The socket must be declared with `level admin` in haproxy.cfg for the enable/disable/set mutators to work."
    - "The runner user needs read/write access to the socket (it is often owned by root with mode 0600) — run the runner as root or grant access via the socket's group/mode."
  verify: haproxy.show_info

actions:
  - actions/show_info.yaml
  - actions/show_stat.yaml
  - actions/show_servers_state.yaml
  - actions/show_pools.yaml
  - actions/show_errors.yaml
  - actions/show_sess.yaml
  - actions/show_map.yaml
  - actions/show_backend.yaml
  - actions/show_frontend.yaml
  - actions/enable_server.yaml
  - actions/disable_server.yaml
  - actions/set_maxconn.yaml
