schema_version: 1
id: minio
name: MinIO operations
version: 0.1.10
retired_below: 0.1.10
description: >
  Cluster + bucket + user introspection plus operator surface (user
  enable/disable, bucket heal, cluster service restart). Talks to mc
  CLI configured via MC_HOST_<alias> env var on the runner host.
vendor: emisar
homepage: https://github.com/andrewdryga/emisar

requires:
  os: [linux]
  binaries: [mc]

# `emisar pack suggest` detection — default process names / ports.
detect:
  processes:
    - minio

setup:
  summary: >
    Actions run the mc client against an alias passed as an argument. mc reads
    that alias from an MC_HOST_<alias> env var of the form
    https://ACCESS:SECRET@endpoint on the runner host — no on-disk mc config
    needed.
  env:
    - name: MC_HOST_minio
      required: true
      description: 'Connection for the "minio" alias, as https://ACCESS_KEY:SECRET_KEY@endpoint. Rename the suffix to match the alias you pass.'
      example: https://minioadmin:minioadmin@minio.internal:9000
  notes:
    - "The MC_HOST_<alias> you set (e.g. MC_HOST_minio) must also be allowlisted in the runner's execution.inherit_env — the action env is scrubbed to PATH/LANG/LC_ALL/TERM by default, so an env present on the host but not allowlisted is silently dropped (the action falls back to its local default or fails auth)."
    - "The env var suffix must exactly match the alias argument: actions whose examples pass alias \"minio\" need MC_HOST_minio; a different alias needs MC_HOST_<that-alias>."
    - "The access/secret pair needs admin permissions for the admin-* actions (info, user list/enable/disable, heal, service restart); a plain user key can only list buckets and stat."
  verify: minio.admin_info

actions:
  - actions/admin_info.yaml
  - actions/admin_top_locks.yaml
  - actions/ls_buckets.yaml
  - actions/bucket_stat.yaml
  - actions/list_users.yaml
  - actions/list_policies.yaml
  - actions/heal_summary.yaml
  - actions/user_enable.yaml
  - actions/user_disable.yaml
  - actions/admin_trace.yaml
  - actions/heal_bucket.yaml
  - actions/service_restart.yaml
