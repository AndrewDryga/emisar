schema_version: 1
id: minio.admin_info
title: mc admin info
kind: exec
risk: low
description: 'Show cluster info: nodes, storage, network, uptime.'
side_effects: ["One admin call.", "Read-only."]
args:
  - name: alias
    type: string
    required: true
    description: mc alias for the cluster.
    validation:
      pattern: "^[a-zA-Z0-9_\\-]{1,64}$"
execution:
  command:
    binary: mc
    argv: ["admin", "info", "{{ args.alias }}", "--json"]
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: Cluster info
    args:
      alias: "minio"
