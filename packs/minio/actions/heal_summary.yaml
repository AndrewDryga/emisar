schema_version: 1
id: minio.heal_summary
title: mc admin heal --recursive (cluster-wide)
kind: exec
risk: high
description: Triggers a cluster-wide healing scan that repairs objects (not a dry-run). Does NOT use --remove. May be IO-heavy.
side_effects:
  - Heavy disk + CPU during scan on each node.
  - May actually heal objects (not just dry-run).
args:
  - name: alias
    type: string
    required: true
    description: mc alias.
    validation:
      pattern: "^[a-zA-Z0-9_][a-zA-Z0-9_\\-]{0,63}$"
execution:
  command:
    binary: mc
    argv: ["admin", "heal", "--recursive", "{{ args.alias }}"]
  timeout: 30m
output:
  parser: text
  max_stdout_bytes: 1048576
  max_stderr_bytes: 8192
examples:
  - title: Heal cluster
    args:
      alias: "minio"
