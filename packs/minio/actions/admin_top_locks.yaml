schema_version: 1
id: minio.admin_top_locks
title: mc admin top locks
kind: exec
risk: low
description: List the top object locks held across the cluster — spots stuck operations.
side_effects: ["One admin call.", "Read-only."]
args:
  - name: alias
    type: string
    required: true
    description: mc alias.
    validation:
      pattern: "^[a-zA-Z0-9_][a-zA-Z0-9_\\-]{0,63}$"
execution:
  command:
    binary: mc
    argv: ["admin", "top", "locks", "{{ args.alias }}"]
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192
examples:
  - title: Top locks
    args:
      alias: "minio"
