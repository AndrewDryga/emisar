schema_version: 1
id: minio.user_disable
title: mc admin user disable
kind: exec
risk: high
description: Disables one IAM user. They can't authenticate until re-enabled.
side_effects:
  - User can no longer authenticate.
  - In-flight requests by them complete.
args:
  - name: alias
    type: string
    required: true
    description: mc alias.
    validation:
      pattern: "^[a-zA-Z0-9_\\-]{1,64}$"
  - name: user
    type: string
    required: true
    description: User access key.
    validation:
      pattern: "^[a-zA-Z0-9_\\-]{3,128}$"
execution:
  command:
    binary: mc
    argv: ["admin", "user", "disable", "{{ args.alias }}", "{{ args.user }}"]
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 4096
  max_stderr_bytes: 8192
examples:
  - title: Disable one
    args:
      alias: "minio"
      user: "alice"
