schema_version: 1

id: podman
name: Podman containers
version: 0.1.2
description: >
  Read-only inventory + per-container introspection plus narrow mutators
  (restart, stop, kill, prune). Drop-in alternative for Docker on RHEL /
  Fedora hosts. Rootless mode supported as long as the runner uid matches
  the user that owns the containers.
vendor: emisar
homepage: https://github.com/andrewdryga/emisar

requires:
  os:
    - linux
  binaries:
    - podman

setup:
  summary: >
    Drives the local podman CLI on the runner host — no credentials
    needed.
  notes:
    - "Rootless by default: the runner sees only the containers owned by the uid it runs as, so it must run as the user that owns the target containers (or as root for rootful / system-wide containers)."
  verify: podman.ps

actions:
  - actions/info.yaml
  - actions/version.yaml
  - actions/ps.yaml
  - actions/inspect.yaml
  - actions/logs.yaml
  - actions/stats.yaml
  - actions/images.yaml
  - actions/system_df.yaml
  - actions/restart.yaml
  - actions/stop.yaml
  - actions/kill.yaml
  - actions/system_prune.yaml
