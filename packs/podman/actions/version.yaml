schema_version: 1
id: podman.version
title: podman version
kind: exec
risk: low
description: Podman binary + API + runtime versions.
side_effects: ["One CLI call.", "Read-only."]
args: []
execution:
  command: {binary: podman, argv: ["version", "--format", "json"]}
  timeout: 15s
output:
  parser: json
  max_stdout_bytes: 4096
  max_stderr_bytes: 8192
examples:
  - title: Version
    args: {}
