schema_version: 1
id: podman.inspect
title: podman inspect <id>
kind: exec
risk: medium
description: >
  Show full container details for one ID/name — state, mounts, network
  config, labels, and the container's env. The env commonly carries
  injected secrets (values passed with -e), so this is approval-gated;
  the runner's redaction is a pattern-bound backstop, not a guarantee.
  Read-only.
side_effects: ["One CLI call.", "Read-only, but exposes the container's env (may include secrets)."]
args:
  - name: container
    type: string
    required: true
    description: Container ID or name.
    validation:
      pattern: "^[a-zA-Z0-9_.][a-zA-Z0-9_.\\-]{0,63}$"
execution:
  command: {binary: podman, argv: ["inspect", "{{ args.container }}"]}
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: One container
    args:
      container: "web"
