schema_version: 1
id: podman.kill
title: podman kill <id>
kind: exec
risk: high
description: 'Sends SIGKILL: instant termination. In-flight requests are dropped.'
side_effects:
  - SIGKILL — no graceful shutdown.
  - In-flight requests lost.
args:
  - name: container
    type: string
    required: true
    description: Container ID or name.
    validation:
      pattern: "^[a-zA-Z0-9_.\\-]{1,64}$"
execution:
  command: {binary: podman, argv: ["kill", "{{ args.container }}"]}
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 4096
  max_stderr_bytes: 8192
examples:
  - title: Hard kill
    args:
      container: "web"
