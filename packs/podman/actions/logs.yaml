schema_version: 1
id: podman.logs
title: podman logs <id> --tail <N>
kind: exec
risk: low
description: Tail container logs (last N lines).
side_effects: ["One CLI call.", "Read-only."]
args:
  - name: container
    type: string
    required: true
    description: Container ID or name.
    validation:
      pattern: "^[a-zA-Z0-9_.][a-zA-Z0-9_.\\-]{0,63}$"
  - name: tail
    type: integer
    required: false
    default: 200
    description: Lines.
    validation:
      min: 1
      max: 10000
execution:
  command:
    binary: podman
    argv: ["logs", "--tail", "{{ args.tail }}", "{{ args.container }}"]
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 2097152
  max_stderr_bytes: 8192
examples:
  - title: Last 200
    args:
      container: "web"
