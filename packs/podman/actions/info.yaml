schema_version: 1
id: podman.info
title: podman info
kind: exec
risk: low
description: Show system + storage + network info.
side_effects: ["One CLI call.", "Read-only."]
args: []
execution:
  command: {binary: podman, argv: ["info", "--format", "json"]}
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 262144
  max_stderr_bytes: 8192
examples:
  - title: System info
    args: {}
