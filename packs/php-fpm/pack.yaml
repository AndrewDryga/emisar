schema_version: 1

id: php-fpm
name: PHP-FPM
version: 0.1.3
description: >
  PHP runtime + FPM pool introspection — version, modules, ini, pool
  status (via fpm_status endpoint), error + slow logs, OPcache state,
  Composer manifest. Read-only. Set PHP_FPM_STATUS_URL env to point
  to the FPM status endpoint.
vendor: emisar
homepage: https://github.com/andrewdryga/emisar

requires:
  os:
    - linux

# `emisar pack suggest` detection — default process names / ports.
detect:
  processes:
    - php-fpm

setup:
  summary: >
    Inspects the local PHP runtime and FPM pool on the runner host
    (php -v / -i, logs, OPcache, Composer) — no credentials needed.
  env:
    - name: PHP_FPM_STATUS_URL
      description: URL of the FPM pool status page, used by the fpm_status/fpm_status_full/fpm_ping actions. Optional; defaults to http://127.0.0.1/fpm-status. Add it to the runner's inherit_env if you override it.
      default: "http://127.0.0.1/fpm-status"
  notes:
    - "The status page must be enabled in the pool config (pm.status_path) and reachable from the runner host for the fpm_status actions to return data."
    - "Reading php-fpm's error/slow logs requires the runner uid to have read access to those log files (often root-owned)."
  verify: phpfpm.version

actions:
  - actions/version.yaml
  - actions/modules.yaml
  - actions/ini.yaml
  - actions/fpm_status.yaml
  - actions/fpm_status_full.yaml
  - actions/fpm_ping.yaml
  - actions/error_log_tail.yaml
  - actions/slow_log_tail.yaml
  - actions/opcache_status.yaml
  - actions/composer_show.yaml
