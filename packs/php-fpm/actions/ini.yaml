schema_version: 1
id: phpfpm.ini
title: php --ini
kind: exec
risk: low
description: List all loaded php.ini paths + their contents path.
side_effects: ["One forked process.", "Read-only."]
args: []
execution:
  command: {binary: php, argv: ["--ini"]}
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 32768
  max_stderr_bytes: 8192
examples:
  - title: ini files
    args: {}
