schema_version: 1
id: phpfpm.error_log_tail
title: tail FPM error_log
kind: exec
risk: low
description: Tail the FPM error log (last N lines).
side_effects: ["One file read.", "Read-only."]
args:
  - name: lines
    type: integer
    required: false
    default: 200
    description: Lines.
    validation:
      min: 1
      max: 10000
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "tail -n {{ args.lines }} \"${PHP_FPM_ERROR_LOG:-/var/log/php-fpm/error.log}\""
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 1048576
  max_stderr_bytes: 8192
examples:
  - title: Last 200 errors
    args: {}
