schema_version: 1
id: pfsense.gateways
title: GET /api/v2/routing/gateways
kind: script
risk: low
description: >
  List the configured gateways (the routing config, not live status) — each
  gateway's name, interface, gateway/monitor IP, default flag, and weight. Use
  pfsense.gateway_status for live dpinger up/down/RTT, and pfsense.gateway_groups
  for failover groups.
side_effects:
  - One read-only HTTP GET to the pfSense REST API.
  - Read-only.
args: []
execution:
  script:
    path: scripts/pfreq.sh
    interpreter: /bin/sh
  argv:
    - "GET"
    - "/api/v2/routing/gateways"
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 262144
  max_stderr_bytes: 8192
examples:
  - title: Configured gateways
    args: {}
