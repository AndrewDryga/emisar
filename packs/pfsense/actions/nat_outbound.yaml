schema_version: 1
id: pfsense.nat_outbound
title: GET /api/v2/firewall/nat/outbound/mappings
kind: script
risk: low
description: >
  List outbound NAT mappings — how internal traffic is translated leaving the
  firewall. Use to debug source-NAT and masquerade behaviour.
side_effects:
  - One read-only HTTP GET to the pfSense REST API.
  - Read-only.
args: []
execution:
  script:
    path: scripts/pfreq.sh
    interpreter: /bin/sh
  argv:
    - "GET"
    - "/api/v2/firewall/nat/outbound/mappings"
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 1048576
  max_stderr_bytes: 8192
examples:
  - title: Outbound NAT
    args: {}
