schema_version: 1
id: pfsense.ipsec_child_sas
title: GET /api/v2/status/ipsec/child_sas
kind: script
risk: low
description: >
  Show IPsec child SAs (phase 2) — the installed traffic-selector pairs that
  actually carry tunnel traffic, with state, bytes, and lifetime. Pair with
  ipsec_status (phase-1 IKE SAs) to tell "tunnel up" from "tunnel passing
  traffic".
side_effects:
  - One read-only HTTP GET to the pfSense REST API.
  - Read-only.
args: []
execution:
  script:
    path: scripts/pfreq.sh
    interpreter: /bin/sh
  argv:
    - "GET"
    - "/api/v2/status/ipsec/child_sas"
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 1048576
  max_stderr_bytes: 8192
examples:
  - title: IPsec child SAs
    args: {}
