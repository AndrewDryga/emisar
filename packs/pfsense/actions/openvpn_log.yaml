schema_version: 1
id: pfsense.openvpn_log
title: GET /api/v2/status/logs/openvpn
kind: script
risk: low
description: >
  Show recent OpenVPN log entries — tunnel up/down, client connect/disconnect,
  and TLS/auth handshake errors. Use to debug VPN connectivity or a client that
  cannot establish a tunnel. See pfsense.openvpn_status for live session state.
side_effects:
  - One read-only HTTP GET to the pfSense REST API.
  - Read-only.
args:
  - name: limit
    type: integer
    required: false
    default: 100
    description: Maximum number of log lines to return.
    validation:
      min: 1
      max: 5000
execution:
  script:
    path: scripts/pfreq.sh
    interpreter: /bin/sh
  argv:
    - "GET"
    - "/api/v2/status/logs/openvpn?limit={{ args.limit }}"
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 2097152
  max_stderr_bytes: 8192
examples:
  - title: Last 100 OpenVPN log lines
    args: {}
