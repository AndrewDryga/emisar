schema_version: 1
id: pfsense.ipsec_status
title: GET /api/v2/status/ipsec/sas
kind: script
risk: low
description: >
  IPsec security associations — phase-1 IKE SAs and their state (established
  or not), peers, and algorithms. Use to check whether a site-to-site tunnel
  is up.
side_effects:
  - One read-only HTTP GET to the pfSense REST API.
  - Read-only.
args: []
execution:
  script:
    path: scripts/pfreq.sh
    interpreter: /bin/sh
  argv:
    - "GET"
    - "/api/v2/status/ipsec/sas"
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 1048576
  max_stderr_bytes: 8192
examples:
  - title: IPsec SAs
    args: {}
