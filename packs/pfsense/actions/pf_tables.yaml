schema_version: 1
id: pfsense.pf_tables
title: GET /api/v2/diagnostics/tables
kind: script
risk: low
description: >
  List the pf table NAMES defined on the firewall (bogons, sshguard, virusprot,
  pfBlocker aliases, …) — just the names, not their contents. Use
  pfsense.pf_table to read the addresses in one table (some tables hold tens of
  thousands of entries).
side_effects:
  - One read-only HTTP GET to the pfSense REST API.
  - Read-only.
args: []
execution:
  script:
    path: scripts/pfreq.sh
    interpreter: /bin/sh
  argv:
    - "GET"
    - "/api/v2/diagnostics/tables"
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 262144
  max_stderr_bytes: 8192
examples:
  - title: All pf table names
    args: {}
