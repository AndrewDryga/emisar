schema_version: 1
id: pfsense.gateway_status
title: GET /api/v2/status/gateways
kind: script
risk: low
description: >
  Show gateway monitoring (dpinger) — per-gateway up/down state, RTT, std-dev,
  and packet loss. Use to diagnose WAN / multi-WAN failover.
side_effects:
  - One read-only HTTP GET to the pfSense REST API.
  - Read-only.
args: []
execution:
  script:
    path: scripts/pfreq.sh
    interpreter: /bin/sh
  argv:
    - "GET"
    - "/api/v2/status/gateways"
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 1048576
  max_stderr_bytes: 8192
examples:
  - title: Gateway health
    args: {}
