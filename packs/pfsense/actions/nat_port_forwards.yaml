schema_version: 1
id: pfsense.nat_port_forwards
title: GET /api/v2/firewall/nat/port_forwards
kind: script
risk: low
description: >
  List inbound NAT port-forward rules — external port/interface to internal
  target. Use to audit what is exposed.
side_effects:
  - One read-only HTTP GET to the pfSense REST API.
  - Read-only.
args: []
execution:
  script:
    path: scripts/pfreq.sh
    interpreter: /bin/sh
  argv:
    - "GET"
    - "/api/v2/firewall/nat/port_forwards"
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 1048576
  max_stderr_bytes: 8192
examples:
  - title: Port forwards
    args: {}
