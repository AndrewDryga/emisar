schema_version: 1
id: pfsense.restart_service
title: POST /api/v2/status/service (restart)
kind: script
risk: high
description: >
  Restart a pfSense service by name (unbound, dhcpd, openvpn, ipsec,
  dpinger, …). The service is briefly unavailable while it restarts, so
  dependent connectivity can blip.
side_effects:
  - Restarts the named service.
  - The service is briefly unavailable; dependent connectivity may drop.
args:
  - name: service
    type: string
    required: true
    description: 'Service name as listed by service_status, e.g. unbound, openvpn, ipsec.'
    validation:
      pattern: '^[a-zA-Z0-9_]{1,64}$'
execution:
  script:
    path: scripts/pfreq.sh
    interpreter: /bin/sh
  argv:
    - "POST"
    - "/api/v2/status/service"
    - "--data-raw"
    - "{\"name\":\"{{ args.service }}\",\"action\":\"restart\"}"
  timeout: 60s
output:
  parser: json
  max_stdout_bytes: 1048576
  max_stderr_bytes: 8192
examples:
  - title: Restart the DNS Resolver
    args:
      service: "unbound"
