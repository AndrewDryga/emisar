schema_version: 1
id: pfsense.dhcp_leases
title: GET /api/v2/status/dhcp_server/leases
kind: script
risk: low
description: >
  List DHCP leases — IP, MAC, hostname, and state (active / expired / static).
  Works for both the ISC and Kea backends. Use to find what a device was
  assigned.
side_effects:
  - One read-only HTTP GET to the pfSense REST API.
  - Read-only.
args: []
execution:
  script:
    path: scripts/pfreq.sh
    interpreter: /bin/sh
  argv:
    - "GET"
    - "/api/v2/status/dhcp_server/leases"
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 2097152
  max_stderr_bytes: 8192
examples:
  - title: DHCP leases
    args: {}
