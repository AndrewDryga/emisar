- action: pfsense.nat_port_forwards
  args: {}
  expect_exit: 0
- action: pfsense.nat_outbound
  args: {}
  expect_exit: 0
- action: pfsense.aliases
  args: {}
  expect_exit: 0
- action: pfsense.states_size
  args: {}
  expect_exit: 0
- action: pfsense.interface_status
  args: {}
  expect_exit: 0
- action: pfsense.gateway_status
  args: {}
  expect_exit: 0
- action: pfsense.static_routes
  args: {}
  expect_exit: 0
- action: pfsense.arp_table
  args: {}
  expect_exit: 0
- action: pfsense.service_status
  args: {}
  expect_exit: 0
- action: pfsense.dhcp_leases
  args: {}
  expect_exit: 0
- action: pfsense.openvpn_status
  args: {}
  expect_exit: 0
- action: pfsense.ipsec_status
  args: {}
  expect_exit: 0
- action: pfsense.carp_status
  args: {}
  expect_exit: 0
- action: pfsense.firewall_log
