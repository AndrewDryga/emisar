    PFSENSE_URL: https://pfsense
    PFSENSE_API_KEY: test-key
    PFSENSE_INSECURE: "true"
cases:
- action: pfsense.version
  args: {}
  expect_exit: 0
- action: pfsense.system_status
  args: {}
  expect_exit: 0
- action: pfsense.firewall_rules
  args: {}
