  expect_exit: 0
- action: pfsense.system_log
  args:
    limit: 50
  expect_exit: 0
- action: pfsense.system_packages
  args: {}
  expect_exit: 0
- action: pfsense.virtual_ips
  args: {}
  expect_exit: 0
- action: pfsense.interface_config
  args: {}
  expect_exit: 0
- action: pfsense.gateway_groups
  args: {}
  expect_exit: 0
- action: pfsense.ipsec_child_sas
  args: {}
  expect_exit: 0
- action: pfsense.auth_log
  args:
    limit: 50
  expect_exit: 0
- action: pfsense.config_history
  args: {}
  expect_exit: 0
- action: pfsense.apply_filter
  args: {}
  expect_exit: 0
  skip: mutator skipped by default (medium)
- action: pfsense.flush_states
  args: {}
  expect_exit: 0
  skip: mutator skipped by default (high)
- action: pfsense.restart_service
  args:
    service: unbound
  expect_exit: 0
  skip: mutator skipped by default (high)
- action: pfsense.reboot
  args: {}
  expect_exit: 0
  skip: mutator skipped by default (critical)
