schema_version: 1

id: vault
name: HashiCorp Vault operations
version: 0.1.5
description: >
  Vault status, seal state, auth/audit/secret backends, mount listing,
  token & lease introspection, plus operator surface for incident
  response: revoke lease, revoke leases by prefix, operator step-down,
  emergency seal. Auth via VAULT_ADDR + VAULT_TOKEN on the runner host.
  Does NOT include unseal — that requires quorum and shouldn't be
  automated through a runner.
vendor: emisar
homepage: https://github.com/andrewdryga/emisar

requires:
  os:
    - linux
  binaries:
    - vault

# `emisar pack suggest` detection — default process names / ports.
detect:
  processes:
    - vault
  ports:
    - 8200

setup:
  summary: >
    The vault CLI reads the server address and auth token from VAULT_ADDR
    and VAULT_TOKEN on the runner host.
  env:
    - name: VAULT_ADDR
      required: true
      description: Vault API address, including scheme.
      example: https://vault.internal:8200
    - name: VAULT_TOKEN
      description: >
        Token to authenticate with. Required unless a ~/.vault-token file
        is present on the runner host.
  notes:
    - "Alternative to VAULT_TOKEN: a ~/.vault-token file (written by `vault login`) on the runner host — read from disk, so it needs no inherit_env entry."
    - The token's policies gate every action; the incident-response mutators (revoke_lease, lease_revoke_prefix, operator_step_down, operator_seal) need sys/* capabilities, so a read-only token will see those denied.
    - "TLS to an https:// VAULT_ADDR uses the system CA bundle; set VAULT_CACERT for a private CA, or VAULT_SKIP_VERIFY=1 only in non-production."
  verify: vault.status

actions:
  - actions/status.yaml
  - actions/seal_status.yaml
  - actions/list_mounts.yaml
  - actions/list_auth.yaml
  - actions/list_audit.yaml
  - actions/list_policies.yaml
  - actions/read_policy.yaml
  - actions/leases_count.yaml
  - actions/token_lookup_self.yaml
  - actions/cubbyhole_list.yaml
  - actions/revoke_lease.yaml
  - actions/lease_revoke_prefix.yaml
  - actions/operator_step_down.yaml
  - actions/operator_seal.yaml
