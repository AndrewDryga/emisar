schema_version: 1
id: vault.lease_revoke_prefix
title: vault lease revoke -prefix <prefix>
kind: exec
risk: high
description: >
  Revoke every lease under a path prefix. Use after a compromise
  to invalidate every dynamic credential for one engine. Irreversible
  for issued credentials — affected services must re-authenticate.
side_effects:
  - Every lease under the prefix revoked.
  - Dynamic credentials (DB users, AWS keys, etc.) revoked at the upstream.
  - Affected clients see auth failures until they request new credentials.
args:
  - name: prefix
    type: string
    required: true
    description: Lease prefix.
    validation:
      pattern: "^[a-zA-Z0-9_./\\-]{1,256}$"
execution:
  command:
    binary: vault
    argv: ["lease", "revoke", "-prefix", "{{ args.prefix }}"]
  timeout: 120s
  cancel_grace: 30s
output:
  parser: text
  max_stdout_bytes: 8192
  max_stderr_bytes: 8192
examples:
  - title: Revoke all DB credentials
    args:
      prefix: "database/creds/"
