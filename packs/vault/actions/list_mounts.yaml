schema_version: 1
id: vault.list_mounts
title: vault secrets list
kind: exec
risk: low
description: List all secret engine mount points.
side_effects:
  - One sys/mounts request.
  - Read-only.
args: []
execution:
  command:
    binary: vault
    argv:
      - "secrets"
      - "list"
      - "-format=json"
  timeout: 15s
output:
  parser: json
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192
examples:
  - title: Secret mounts
    args: {}
