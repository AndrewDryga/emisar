schema_version: 1
id: vault.read_policy
title: vault policy read <name>
kind: exec
risk: low
description: Read the HCL document for one policy.
side_effects:
  - One sys/policy/<name> request.
  - Read-only.
args:
  - name: name
    type: string
    required: true
    description: Policy name.
    validation:
      pattern: "^[a-zA-Z0-9_.][a-zA-Z0-9_.\\-]{0,127}$"
execution:
  command:
    binary: vault
    argv:
      - "policy"
      - "read"
      - "{{ args.name }}"
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 131072
  max_stderr_bytes: 8192
examples:
  - title: Read 'default' policy
    args:
      name: "default"
