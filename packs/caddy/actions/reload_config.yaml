schema_version: 1
id: caddy.reload_config
title: caddy reload --config <file>
kind: exec
risk: high
description: Live-swap the running config. No connection drops on success; rejected config keeps the old one running.
side_effects:
  - Replaces the in-memory config atomically.
  - Existing connections keep running on their handlers.
args:
  - name: file
    type: string
    required: false
    default: "/etc/caddy/Caddyfile"
    description: Config path.
    validation:
      pattern: "^/[a-zA-Z0-9_./\\-]{1,512}$"
      # The pattern blocks shell metacharacters but NOT `..` (`.`/`/` are
      # literal charset members). allowed_prefixes runs the runner's
      # Clean+EvalSymlinks containment, scoping this to Caddy's standard config
      # roots so a caller can't point the live-config swap at an arbitrary file
      # (reload reads, parses AND APPLIES the config) or escape via `..`/symlink.
      allowed_prefixes:
        - /etc/caddy
        - /srv
        - /opt
execution:
  command:
    binary: caddy
    argv: ["reload", "--config", "{{ args.file }}"]
  timeout: 60s
output:
  parser: text
  max_stdout_bytes: 16384
  max_stderr_bytes: 16384
examples:
  - title: Reload
    args: {}
