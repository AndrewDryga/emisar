schema_version: 1
id: caddy.adapt_caddyfile
title: caddy adapt --config <file>
kind: exec
risk: low
description: Converts a Caddyfile to JSON config without loading it.
side_effects: ["One forked process.", "Read-only."]
args:
  - name: file
    type: string
    required: false
    default: "/etc/caddy/Caddyfile"
    description: Caddyfile path.
    validation:
      pattern: "^/[a-zA-Z0-9_./\\-]{1,512}$"
      # The pattern blocks shell metacharacters but NOT `..` (`.`/`/` are
      # literal charset members). allowed_prefixes runs the runner's
      # Clean+EvalSymlinks containment, scoping this to Caddy's standard config
      # roots so it can't become an arbitrary-file read oracle — adapt parses
      # the file and quotes offending lines back in its errors, so an
      # unscoped path leaks the contents of any runner-readable secret.
      allowed_prefixes:
        - /etc/caddy
        - /srv
        - /opt
execution:
  command:
    binary: caddy
    argv: ["adapt", "--config", "{{ args.file }}", "--pretty"]
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 2097152
  max_stderr_bytes: 16384
examples:
  - title: Adapt the default Caddyfile
    args: {}
