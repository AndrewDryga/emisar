schema_version: 1
id: caddy.pki_certs
title: GET /pki/ca/<id>/certificates
kind: exec
risk: low
description: List certificates managed by Caddy's internal PKI.
side_effects: ["One admin GET.", "Read-only."]
args:
  - name: ca
    type: string
    required: false
    default: "local"
    description: CA ID.
    validation:
      pattern: "^[a-z0-9_\\-]{1,32}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "curl -sS \"${CADDY_ADMIN:-http://127.0.0.1:2019}/pki/ca/{{ args.ca }}/certificates\""
  timeout: 15s
output:
  parser: json
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: Local CA certs
    args: {}
