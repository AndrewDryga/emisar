schema_version: 1
id: caddy.validate_config
title: caddy validate --config <file>
kind: exec
risk: low
description: Validates a Caddyfile or JSON config without loading it.
side_effects: ["One forked process.", "Read-only."]
args:
  - name: file
    type: string
    required: false
    default: "/etc/caddy/Caddyfile"
    description: Config path.
    validation:
      pattern: "^/[a-zA-Z0-9_./\\-]{1,512}$"
      # The pattern blocks shell metacharacters but NOT `..` (`.`/`/` are
      # literal charset members). allowed_prefixes runs the runner's
      # Clean+EvalSymlinks containment, scoping this to Caddy's standard config
      # roots so it can't become an arbitrary-file read oracle — validate parses
      # the file and quotes offending lines back in its errors, so an
      # unscoped path leaks the contents of any runner-readable secret.
      allowed_prefixes:
        - /etc/caddy
        - /srv
        - /opt
execution:
  command:
    binary: caddy
    argv: ["validate", "--config", "{{ args.file }}"]
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 16384
  max_stderr_bytes: 16384
examples:
  - title: Validate
    args: {}
