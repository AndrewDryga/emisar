schema_version: 1
id: caddy.config_dump
title: GET /config (current config)
kind: exec
risk: medium
description: >
  Dump the currently-loaded Caddy configuration as JSON. This surfaces the
  full config, which can carry secrets (TLS private-key material,
  basic-auth hashes, upstream credentials, API tokens). The runner's
  redaction is a fail-closed backstop, not a guarantee — it is
  pattern-bound and can miss a bespoke secret whose name and value match
  no rule.
side_effects:
  - One admin GET.
  - Read-only, but exposes the full Caddy config (may include secrets).
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "curl -sS \"${CADDY_ADMIN:-http://127.0.0.1:2019}/config/\""
  timeout: 15s
output:
  parser: json
  max_stdout_bytes: 4194304
  max_stderr_bytes: 8192
examples:
  - title: Live config
    args: {}
