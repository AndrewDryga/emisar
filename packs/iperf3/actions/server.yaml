schema_version: 1
id: iperf3.server
title: iperf3 one-shot server
kind: exec
risk: medium
description: >
  Run a one-shot iperf3 server: listen on a port, accept a single
  throughput test from one client, print the server-side result as JSON,
  and exit. Pair it with iperf3.client / iperf3.udp on another node —
  start the server here, then run the client there within the listen
  window. One server handles both TCP and UDP clients. It self-terminates
  after idle_timeout seconds if no client connects (and is bounded by the
  action timeout), so it never leaves a lingering daemon or open port.
  Optionally restrict the listener to a single interface with `bind`.
side_effects:
  - Opens an inbound listening port (default 5201) for up to idle_timeout seconds.
  - Accepts ONE throughput test from a connecting client and discards the data; self-closes after that test or on idle timeout.
  - Opens the host to inbound connections on that port while it waits — anyone who can reach it may run a test through it or occupy the one-off slot.
  - Changes no host state and leaves no daemon running — the listener is transient and self-closing.
args:
  - name: port
    type: integer
    required: false
    default: 5201
    description: Port to listen on.
    validation:
      min: 1
      max: 65535
  - name: idle_timeout
    type: integer
    required: false
    default: 30
    description: >
      Seconds to wait for a client before giving up (also the stuck-guard
      during a test). The server exits after this many idle seconds if no
      client connects. Maps to iperf3 --idle-timeout.
    validation:
      min: 1
      max: 60
  - name: bind
    type: string
    required: false
    default: ""
    description: >
      Restrict the listener to one interface by address (e.g. "10.0.0.5").
      Empty (the default) listens on all interfaces.
    validation:
      pattern: "^[a-zA-Z0-9.\\-:]{0,253}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - 'set -- iperf3 -s -1 --idle-timeout "$IDLE_TIMEOUT" -p "$PORT" -J; [ -n "$BIND" ] && set -- "$@" -B "$BIND"; exec "$@"'
  env:
    PORT: "{{ args.port }}"
    IDLE_TIMEOUT: "{{ args.idle_timeout }}"
    BIND: "{{ args.bind }}"
  timeout: 120s
output:
  parser: json
  max_stdout_bytes: 1048576
  max_stderr_bytes: 8192
examples:
  - title: Listen on 5201 for one test, give up after 30s idle
    args: {}
  - title: Listen only on the private interface
    args:
      bind: "10.0.0.5"
