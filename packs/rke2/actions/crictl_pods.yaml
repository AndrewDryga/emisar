schema_version: 1
id: rke2.crictl_pods
title: List pod sandboxes on this node (crictl pods)
kind: exec
risk: low
description: >
  List pod sandboxes on this node's RKE2 containerd — pod id, name, namespace,
  state, age. The CRI view of which pods the node actually has, independent of
  the API server. Read-only.
side_effects:
  - One crictl pods call against the node container runtime.
  - Read-only.
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "/var/lib/rancher/rke2/bin/crictl pods"
  env:
    CRI_CONFIG_FILE: /var/lib/rancher/rke2/agent/etc/crictl.yaml
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 262144
  max_stderr_bytes: 16384
examples:
  - title: Pod sandboxes
    args: {}
