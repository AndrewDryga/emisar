schema_version: 1

id: rke2
name: RKE2 cluster (host-level)
version: 0.1.1
description: >
  RKE2-specific host introspection that kubectl can't give you — embedded-etcd
  snapshot health, node certificate expiry, and the RKE2-bundled containerd via
  crictl (containers, pods, images). Runs on an RKE2 server node. Generic
  Kubernetes API reads are in the kubernetes pack; rke2-server / rke2-agent
  unit status and logs are covered by the linux-core / systemd-deep packs
  (systemctl status rke2-server, journalctl -u rke2-server).
vendor: emisar
homepage: https://github.com/andrewdryga/emisar

requires:
  os:
    - linux
  binaries:
    - rke2

# `emisar pack suggest` detection — the rke2 supervisor binary/process.
detect:
  binaries:
    - rke2
  processes:
    - rke2

setup:
  summary: >
    Runs on an RKE2 server node, as root (etcd-snapshot, certificate check, and
    crictl all need root). rke2 reads /etc/rancher/rke2/config.yaml by default;
    crictl talks to the RKE2 containerd socket via CRI_CONFIG_FILE.
  notes:
    - "Binary-path exception: RKE2 does not add /var/lib/rancher/rke2/bin to PATH, so crictl is invoked by its absolute path inside a /bin/sh command (the same absolute-path-in-a-shell-pipeline pattern other read actions use). rke2 itself installs to /usr/local/bin and is invoked bare."
    - "Run the runner as root (or grant it the equivalent) on the server node — all three tools need it. On an agent-only node there is no etcd and no rke2 server cert set, so etcd_snapshot_list / certificate_check will not return server data."
    - "Direct etcdctl health is intentionally not shipped — the etcd client-cert path/name varies by version. Use etcd_snapshot_list (backups current?) + kubernetes.control_plane_health (/readyz includes an etcd check) + the rke2-server unit status as the verified etcd-health proxy."
  verify: rke2.certificate_check

actions:
  - actions/etcd_snapshot_list.yaml
  - actions/certificate_check.yaml
  - actions/crictl_ps.yaml
  - actions/crictl_pods.yaml
  - actions/crictl_images.yaml
