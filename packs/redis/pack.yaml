schema_version: 1

id: redis
name: Redis operations pack
version: 0.3.5
description: >
  Deep Redis ops — INFO + memory accounting, slowlog + per-event
  latency, command stats, client list/kill/pause, keyspace introspection
  (SCAN, TYPE, TTL, OBJECT encoding/refcount/idle/freq, MEMORY USAGE),
  config get/set/rewrite/resetstat, ACL list/whoami/getuser, cluster
  topology (info, nodes, slots, slot-count, check), cluster operators
  (failover, forget, replicaof), Sentinel HA topology (masters, master,
  replicas, sentinels, get-master-addr, ckquorum, is-master-down,
  Sentinel INFO) and operators (failover, reset), persistence (lastsave,
  bgsave, bgrewriteaof, memory purge/doctor), streams + pub/sub
  introspection, script cache flush, and tier-critical actions
  (flush_db, flushall, swapdb, shutdown_nosave). Sentinel actions target
  the Sentinel on port 26379; all others default to 127.0.0.1:6379.
  Authenticates via REDISCLI_AUTH / REDIS_* env vars on the runner host
  — never via per-call credentials.
vendor: emisar
homepage: https://github.com/andrewdryga/emisar

requires:
  os:
    - linux
  binaries:
    - redis-cli

# `emisar pack suggest` detection — default process names / ports.
detect:
  processes:
    - redis-server
  ports:
    - 6379

setup:
  summary: >
    redis-cli authenticates with the password in REDISCLI_AUTH on the runner
    host. It does not read host or port from the environment — the actions
    pass no -h/-p flags, so connections default to the local instance at
    127.0.0.1:6379.
  env:
    - name: REDISCLI_AUTH
      description: Password sent via AUTH. Omit for an instance with no requirepass/ACL. The matching user must hold the commands the actions you enable will run.
  notes:
    - "REDISCLI_AUTH must also be allowlisted in the runner's execution.inherit_env — the action env is scrubbed to PATH/LANG/LC_ALL/TERM by default, so an env present on the host but not allowlisted is silently dropped (the action falls back to its local default or fails auth)."
    - Host and port are not configurable through this pack's env — redis-cli takes them as -h/-p flags, which the actions do not set, so it always targets 127.0.0.1:6379.
    - "REDISCLI_AUTH supplies only the password; for an ACL-enabled server with a non-default username, set requirepass-style access or run the runner as a user whose default ACL covers these commands."
    - Critical mutators (flush_db, flushall, swapdb, shutdown_nosave) and config writes need an ACL/user permitted to run them.
  verify: redis.info

actions:
  # INFO / stats
  - actions/info.yaml
  - actions/memory_stats.yaml
  - actions/memory_doctor.yaml
  - actions/command_stats.yaml
  - actions/slowlog.yaml
  - actions/latency.yaml
  - actions/latency_history.yaml
  - actions/dbsize.yaml
  - actions/lastsave.yaml
  - actions/role.yaml
  # Clients
  - actions/client_list.yaml
  - actions/client_kill.yaml
  - actions/client_pause.yaml
  # Config
  - actions/config_get.yaml
  - actions/config_set.yaml
  - actions/config_rewrite.yaml
  - actions/config_resetstat.yaml
  # ACL
  - actions/acl_list.yaml
  - actions/acl_whoami.yaml
  - actions/acl_getuser.yaml
  # Keyspace introspection
  - actions/scan.yaml
  - actions/randomkey.yaml
  - actions/type_of.yaml
  - actions/ttl_of.yaml
  - actions/memory_usage.yaml
  - actions/object_encoding.yaml
  - actions/object_refcount.yaml
  - actions/object_idletime.yaml
  - actions/object_freq.yaml
  # Streams / pubsub
  - actions/pubsub_channels.yaml
  - actions/pubsub_numsub.yaml
  - actions/xinfo_stream.yaml
  - actions/xlen.yaml
  # Cluster
  - actions/cluster_info.yaml
  - actions/cluster_nodes.yaml
  - actions/cluster_slots.yaml
  - actions/cluster_countkeysinslot.yaml
  - actions/cluster_check.yaml
  # Cluster / replication operators
  - actions/cluster_failover.yaml
  - actions/cluster_forget.yaml
  - actions/replicaof.yaml
  # Sentinel (HA) — reads (port 26379)
  - actions/sentinel_masters.yaml
  - actions/sentinel_master.yaml
  - actions/sentinel_replicas.yaml
  - actions/sentinel_sentinels.yaml
  - actions/sentinel_get_master_addr.yaml
  - actions/sentinel_ckquorum.yaml
  - actions/sentinel_is_master_down.yaml
  - actions/sentinel_info.yaml
  # Sentinel (HA) — operators (gated)
  - actions/sentinel_failover.yaml
  - actions/sentinel_reset.yaml
  # Persistence / memory operators
  - actions/bgsave.yaml
  - actions/bgrewriteaof.yaml
  - actions/memory_purge.yaml
  - actions/script_flush.yaml
  # Critical mutators
  - actions/flush_db.yaml
  - actions/flushall.yaml
  - actions/swapdb.yaml
  - actions/shutdown_nosave.yaml
