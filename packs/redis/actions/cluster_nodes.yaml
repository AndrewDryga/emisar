schema_version: 1
id: redis.cluster_nodes
title: CLUSTER NODES
kind: exec
risk: low
description: >
  Per-node view — id, addr, flags (master/replica/myself/fail), master
  id, last ping/pong, config epoch, link state, slot ranges. Use to
  see who owns which slot ranges and which replicas serve which masters.
side_effects:
  - One CLUSTER NODES command.
  - Read-only.
args: []
execution:
  command:
    binary: redis-cli
    argv: ["CLUSTER", "NODES"]
  timeout: 10s
output:
  parser: text
  max_stdout_bytes: 131072
  max_stderr_bytes: 8192
examples:
  - title: Topology view
    args: {}
