schema_version: 1

id: redis.command_stats
title: INFO commandstats
kind: exec
risk: low

description: >
  Returns per-command call count, total µs spent, and µs per call.
  Use to identify hot commands (e.g. an unexpectedly high KEYS rate or
  a SUBSCRIBE storm). Read-only.

side_effects:
  - Issues one INFO commandstats command.
  - No keys read or written.

search_terms:
  - hot commands

args: []

execution:
  command:
    binary: redis-cli
    argv:
      - "INFO"
      - "commandstats"
  timeout: 10s

output:
  parser: text
  max_stdout_bytes: 131072
  max_stderr_bytes: 8192

examples:
  - title: Per-command stats
    args: {}
