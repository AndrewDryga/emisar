schema_version: 1
id: redis.xlen
title: XLEN
kind: exec
risk: low
description: Count entries in a stream.
side_effects:
  - One XLEN command.
  - Read-only.
args:
  - name: key
    type: string
    required: true
    description: Stream key.
    validation:
      pattern: "^[A-Za-z0-9_:.\\-{}@#/=+]{1,512}$"
execution:
  command:
    binary: redis-cli
    argv: ["XLEN", "{{ args.key }}"]
  timeout: 5s
output:
  parser: text
  max_stdout_bytes: 4096
  max_stderr_bytes: 8192
examples:
  - title: Length of events stream
    args:
      key: "events:audit"
