schema_version: 1
id: redis.acl_whoami
title: ACL WHOAMI
kind: exec
risk: low
description: >
  Show the ACL username of the current connection. Use to verify the runner
  credential is the expected service principal.
side_effects:
  - One ACL WHOAMI command.
  - Read-only.
args: []
execution:
  command:
    binary: redis-cli
    argv: ["ACL", "WHOAMI"]
  timeout: 5s
output:
  parser: text
  max_stdout_bytes: 1024
  max_stderr_bytes: 8192
examples:
  - title: Connected user
    args: {}
