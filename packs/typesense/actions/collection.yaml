schema_version: 1
id: typesense.collection
title: GET /collections/{name}
kind: script
risk: low
description: >
  Returns the schema and document count for a single collection by name. Use
  when you already know the collection and want just its definition. Requires
  the admin API key.
side_effects:
  - One read-only HTTP GET to the Typesense /collections/{name} endpoint.
  - Read-only — never writes or mutates data.
args:
  - name: name
    type: string
    required: true
    description: Collection name.
    validation:
      pattern: '^[A-Za-z0-9._-]{1,128}$'
execution:
  script:
    path: scripts/tsget.sh
    interpreter: /bin/sh
  argv:
    - "/collections/{{ args.name }}"
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 262144
  max_stderr_bytes: 8192
examples:
  - title: Schema for the "products" collection
    args:
      name: products
