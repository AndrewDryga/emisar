defaults:
  env: {}
cases:
- action: systemd.analyze_blame
  args: {}
  expect_exit: 0
- action: systemd.analyze_critical_chain
  args:
    unit: multi-user.target
  expect_exit: 0
- action: systemd.analyze_security
  args:
    unit: nginx.service
  expect_exit: 0
- action: systemd.boot_errors
  args: {}
  expect_exit: 0
- action: systemd.cgroup_top
  args: {}
  expect_exit: 0
- action: systemd.cgroup_tree
  args: {}
  expect_exit: 0
- action: systemd.daemon_reload
  args: {}
  expect_exit: 0
- action: systemd.failed_units
  args: {}
  expect_exit: 0
- action: systemd.journal_disk_usage
  args: {}
  expect_exit: 0
- action: systemd.list_unit_files
  args: {}
  expect_exit: 0
- action: systemd.list_units
  args: {}
  expect_exit: 0
- action: systemd.reset_failed
  args: {}
  expect_exit: 0
- action: systemd.sockets
  args: {}
  expect_exit: 0
- action: systemd.timers
  args: {}
  expect_exit: 0
- action: systemd.unit_kill
  args:
    unit: rsyslog.service
    signal: SIGHUP
  skip: mutator skipped by default (high); set --include=systemd.unit_kill to run
- action: systemd.unit_mask
  args:
    unit: snapd.service
  skip: mutator skipped by default (high); set --include=systemd.unit_mask to run
- action: systemd.unit_reload
  args:
    unit: nginx.service
  skip: mutator skipped by default (medium); set --include=systemd.unit_reload to run
- action: systemd.unit_restart
  args:
    unit: nginx.service
  skip: mutator skipped by default (high); set --include=systemd.unit_restart to run
- action: systemd.unit_show
  args:
    unit: nginx.service
  expect_exit: 0
- action: systemd.unit_start
  args:
    unit: nginx.service
  skip: mutator skipped by default (medium); set --include=systemd.unit_start to run
- action: systemd.unit_stop
  args:
    unit: stuck-worker.service
  skip: mutator skipped by default (high); set --include=systemd.unit_stop to run
- action: systemd.unit_unmask
  args:
    unit: snapd.service
  skip: mutator skipped by default (medium); set --include=systemd.unit_unmask to run
- action: systemd.vacuum_journal
  args:
    cutoff: 7d
  expect_exit:
  - 0
  - 1
  skip: mutator skipped by default (high)
- action: systemd.watchdog_status
  args: {}
  expect_exit: 0
