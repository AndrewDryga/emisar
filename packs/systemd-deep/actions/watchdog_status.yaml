schema_version: 1
id: systemd.watchdog_status
title: Watchdog status across units
kind: exec
risk: low
description: 'Lists every unit with a non-zero WatchdogUSec property — services that have systemd-level watchdog supervision.'
side_effects:
  - Iterates systemctl show across all units.
  - Read-only.
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      # --plain omits the leading ● bullet on failed units (else awk picks it
      # up as $1, yielding a false "●: …" row). `if/then/fi` (not `&& echo`)
      # so the loop's last iteration on a no-watchdog unit doesn't make the
      # whole pipeline exit 1 — it reported `failed` even on a successful list.
      - "systemctl list-units --type=service --plain --no-legend --no-pager | awk '{print $1}' | while read u; do v=$(systemctl show \"$u\" -p WatchdogUSec --value 2>/dev/null); if [ -n \"$v\" ] && [ \"$v\" != \"0\" ]; then echo \"$u: $v\"; fi; done"
  timeout: 60s
output:
  parser: text
  max_stdout_bytes: 65536
  max_stderr_bytes: 16384
examples:
  - title: Units with watchdog
    args: {}
