schema_version: 1
id: systemd.cgroup_top
title: systemd-cgtop (3 samples)
kind: exec
risk: low
description: 'Show three batched cgtop samples — CPU + memory + IO + tasks per cgroup. The systemd-aware top equivalent.'
side_effects:
  - One systemd-cgtop invocation lasting ~3s.
  - Read-only.
args: []
execution:
  command:
    binary: systemd-cgtop
    argv: ["-b", "-n", "3"]
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192
examples:
  - title: cgtop snapshot
    args: {}
