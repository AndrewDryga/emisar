schema_version: 1
id: systemd.vacuum_journal
title: Vacuum the systemd journal
kind: exec
risk: high
description: >
  Drops journal records older than the cutoff time. Frees disk but loses forensic history. Provide cutoff as a journalctl --vacuum-time value (e.g. "7d", "30d").
side_effects:
  - Deletes journal records older than the cutoff.
  - Frees disk under /var/log/journal.
search_terms:
  - shrink journal
  - reclaim disk space
args:
  - name: cutoff
    type: string
    required: true
    description: Vacuum window (e.g. "7d", "30d", "12h").
    validation:
      pattern: "^[0-9]{1,4}[smhdw]$"
execution:
  command:
    binary: journalctl
    argv:
      - "--vacuum-time={{ args.cutoff }}"
  timeout: 5m
output:
  parser: text
  max_stdout_bytes: 32768
  max_stderr_bytes: 16384
examples:
  - title: Keep last 7 days
    args:
      cutoff: "7d"
