schema_version: 1
id: systemd.unit_stop
title: systemctl stop <unit>
kind: exec
risk: high
description: >
  Stop one unit. Workload-bearing units stay down until manually
  started or auto-restarted by `Restart=`. Use during incident
  containment or planned downtime.
side_effects:
  - Service stopped.
  - In-flight work terminated.
  - Stays stopped until started again (or Restart= triggers).
args:
  - name: unit
    type: string
    required: true
    description: Unit name.
    validation:
      pattern: "^[a-zA-Z0-9@_\\-.]{1,128}$"
execution:
  command:
    binary: systemctl
    argv: ["stop", "{{ args.unit }}"]
  timeout: 120s
cancel_grace: 30s
output:
  parser: text
  max_stdout_bytes: 4096
  max_stderr_bytes: 8192
examples:
  - title: Stop a misbehaving worker
    args:
      unit: "stuck-worker.service"
