defaults:
  env: {}
cases:
- action: zfs.arc_stats
  args: {}
  expect_exit: 0
- action: zfs.clear_pool_errors
  args:
    pool: tank
  skip: mutator skipped by default (high); set --include=zfs.clear_pool_errors to run
- action: zfs.dataset_list
  args: {}
  expect_exit: 0
- action: zfs.dataset_rollback
  args:
    dataset: tank/home
    snap: pre-disaster
    force: true
  skip: mutator skipped by default (critical); set --include=zfs.dataset_rollback to run
- action: zfs.pool_iostat
  args: {}
  expect_exit: 0
- action: zfs.pool_list
  args: {}
  expect_exit: 0
- action: zfs.pool_status
  args: {}
  expect_exit: 0
- action: zfs.properties
  args:
    dataset: tank/data
  expect_exit: 0
- action: zfs.scrub_stop
  args:
    pool: tank
  expect_exit: 0
- action: zfs.snapshot_destroy
  args:
    dataset: tank/home
    snap: auto-2026-05-01
  skip: mutator skipped by default (high); set --include=zfs.snapshot_destroy to run
- action: zfs.snapshot_list
  args: {}
  expect_exit: 0
- action: zfs.start_scrub
  args:
    pool: tank
  expect_exit: 0
- action: zfs.take_snapshot
  args:
    dataset: tank/data
    name: pre-migration-2026-06-01
  expect_exit:
  - 0
  - 1
  skip: mutator skipped by default (medium)
