schema_version: 1
id: zfs.properties
title: zfs get all <dataset>
kind: exec
risk: low
description: List all properties of one dataset (compression, dedup, atime, quota, etc).
side_effects: ["Reads dataset metadata.", "Read-only."]
args:
  - name: dataset
    type: string
    required: true
    description: Dataset name.
    validation:
      pattern: "^[a-zA-Z0-9_./][a-zA-Z0-9_./\\-]{0,127}$"
execution:
  command: {binary: zfs, argv: ["get", "all", "{{ args.dataset }}"]}
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 131072
  max_stderr_bytes: 8192
examples:
  - title: Dataset props
    args:
      dataset: "tank/data"
