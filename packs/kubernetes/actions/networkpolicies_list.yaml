schema_version: 1
id: kubernetes.networkpolicies_list
title: List NetworkPolicies across all namespaces
kind: exec
risk: low
description: >
  `kubectl get networkpolicies -A` — which namespaces have NetworkPolicies and
  their pod selectors. Use when traffic is being unexpectedly allowed or
  blocked. Read-only.
side_effects:
  - One kubectl get invocation.
  - Read-only.
args:
  - name: context
    type: string
    required: false
    default: ""
    description: kubeconfig context. Empty = current-context.
    validation:
      pattern: "^[a-zA-Z0-9_.\\-]{0,128}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "kubectl ${KCTX:+--context=$KCTX} get networkpolicies -A"
  timeout: 30s
  env:
    KCTX: "{{ args.context }}"
output:
  parser: text
  max_stdout_bytes: 131072
  max_stderr_bytes: 8192
examples:
  - title: All network policies
    args: {}
