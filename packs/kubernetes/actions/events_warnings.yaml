schema_version: 1
id: kubernetes.events_warnings
title: Recent Warning events (all namespaces)
kind: exec
risk: low
description: >
  The most recent Warning-type events cluster-wide, oldest-to-newest
  (FailedScheduling, BackOff, FailedMount, Unhealthy, …). The fastest
  cluster-wide "what is wrong right now". Read-only.
side_effects:
  - One kubectl get events invocation.
  - Read-only.
args:
  - name: context
    type: string
    required: false
    default: ""
    description: kubeconfig context. Empty = current-context.
    validation:
      pattern: "^[a-zA-Z0-9_.\\-]{0,128}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "kubectl ${KCTX:+--context=$KCTX} get events -A --field-selector type=Warning --sort-by=.lastTimestamp | tail -n 60"
  timeout: 30s
  env:
    KCTX: "{{ args.context }}"
output:
  parser: text
  max_stdout_bytes: 262144
  max_stderr_bytes: 16384
examples:
  - title: Warning events
    args: {}
