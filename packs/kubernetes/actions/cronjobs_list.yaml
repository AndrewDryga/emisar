schema_version: 1
id: kubernetes.cronjobs_list
title: List CronJobs across all namespaces
kind: exec
risk: low
description: >
  `kubectl get cronjobs -A` — schedule, suspend state, last-schedule time, and
  active count. Read-only.
side_effects:
  - One kubectl get invocation.
  - Read-only.
args:
  - name: context
    type: string
    required: false
    default: ""
    description: kubeconfig context. Empty = current-context.
    validation:
      pattern: "^[a-zA-Z0-9_.\\-]{0,128}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "kubectl ${KCTX:+--context=$KCTX} get cronjobs -A"
  timeout: 30s
  env:
    KCTX: "{{ args.context }}"
output:
  parser: text
  max_stdout_bytes: 131072
  max_stderr_bytes: 8192
examples:
  - title: All cronjobs
    args: {}
