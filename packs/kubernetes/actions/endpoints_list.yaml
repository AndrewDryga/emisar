schema_version: 1
id: kubernetes.endpoints_list
title: List endpoints across all namespaces
kind: exec
risk: low
description: >
  `kubectl get endpoints -A` — the ready backend IPs behind each Service. An
  empty endpoint set means a Service has no ready pods (a common "service is
  down but the Deployment looks fine" cause). Read-only.
side_effects:
  - One kubectl get invocation.
  - Read-only.
args:
  - name: context
    type: string
    required: false
    default: ""
    description: kubeconfig context. Empty = current-context.
    validation:
      pattern: "^[a-zA-Z0-9_.\\-]{0,128}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "kubectl ${KCTX:+--context=$KCTX} get endpoints -A"
  timeout: 30s
  env:
    KCTX: "{{ args.context }}"
output:
  parser: text
  max_stdout_bytes: 262144
  max_stderr_bytes: 8192
examples:
  - title: All endpoints
    args: {}
