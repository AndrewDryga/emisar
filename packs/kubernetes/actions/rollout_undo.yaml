schema_version: 1
id: kubernetes.rollout_undo
title: kubectl rollout undo (rollback)
kind: exec
risk: high
description: >
  Rolls back to the previous revision. Bring `rollout_history` first to confirm what "previous" means in this case.
side_effects:
  - Triggers a fresh rollout to the previous revision.
  - Pods replaced one-by-one; previous container image becomes current.
args:
  - name: namespace
    type: string
    required: true
    description: Namespace.
    validation:
      pattern: "^[a-z0-9][a-z0-9\\-]{0,62}$"
  - name: kind
    type: string
    required: false
    default: deployment
    description: Resource kind.
    validation:
      enum: [deployment, statefulset, daemonset]
  - name: name
    type: string
    required: true
    description: Resource name.
    validation:
      pattern: "^[a-z0-9][a-z0-9.\\-]{0,253}$"
  - name: context
    type: string
    required: false
    default: ""
    description: kubeconfig context.
    validation:
      pattern: "^[a-zA-Z0-9_.\\-]{0,128}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "kubectl ${KCTX:+--context=$KCTX} -n {{ args.namespace }} rollout undo {{ args.kind }}/{{ args.name }}"
  timeout: 30s
  env:
    KCTX: "{{ args.context }}"
output:
  parser: text
  max_stdout_bytes: 8192
  max_stderr_bytes: 8192
examples:
  - title: Rollback the api deployment
    args:
      namespace: default
      name: api
