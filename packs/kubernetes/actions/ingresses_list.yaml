schema_version: 1
id: kubernetes.ingresses_list
title: List ingresses across all namespaces
kind: exec
risk: low
description: '`kubectl get ingress -A` — ingress name, hosts, addresses, TLS hosts.'
side_effects:
  - One kubectl get invocation.
  - Read-only.
args:
  - name: context
    type: string
    required: false
    default: ""
    description: kubeconfig context.
    validation:
      pattern: "^[a-zA-Z0-9_.\\-]{0,128}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "kubectl ${KCTX:+--context=$KCTX} get ingress -A"
  timeout: 30s
  env:
    KCTX: "{{ args.context }}"
output:
  parser: text
  max_stdout_bytes: 131072
  max_stderr_bytes: 8192
examples:
  - title: All ingresses
    args: {}
