schema_version: 1
id: kubernetes.node_describe
title: kubectl describe node
kind: exec
risk: low
description: Show the full describe output for one node — capacity, allocatable, conditions, addresses, taints, pods, events.
side_effects:
  - One kubectl describe invocation.
  - Read-only.
args:
  - name: name
    type: string
    required: true
    description: Node name.
    validation:
      pattern: "^[a-z0-9][a-z0-9.\\-]{0,253}$"
  - name: context
    type: string
    required: false
    default: ""
    description: kubeconfig context.
    validation:
      pattern: "^[a-zA-Z0-9_.\\-]{0,128}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "kubectl ${KCTX:+--context=$KCTX} describe node {{ args.name }}"
  timeout: 30s
  env:
    KCTX: "{{ args.context }}"
output:
  parser: text
  max_stdout_bytes: 524288
  max_stderr_bytes: 16384
examples:
  - title: Describe a node
    args:
      name: ip-10-0-1-23.eu-west-1.compute.internal
