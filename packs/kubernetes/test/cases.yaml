defaults:
  env:
    KUBECONFIG: /shared/kubeconfig.yaml
cases:
# Read-only reads — verified against a single-node k3s (node `harness`, fixture pod
# default/probe, kube-system/coredns deployment, metrics-server for top).
- action: kubernetes.api_versions
  args: {}
  expect_exit: 0
- action: kubernetes.auth_can_i
  args:
    namespace: default
  expect_exit: 0
- action: kubernetes.cluster_info
  args: {}
  expect_exit: 0
- action: kubernetes.control_plane_health
  args: {}
  expect_exit: 0
- action: kubernetes.crds_list
  args: {}
  expect_exit: 0
- action: kubernetes.cronjobs_list
  args: {}
  expect_exit: 0
- action: kubernetes.daemonsets_list
  args: {}
  expect_exit: 0
- action: kubernetes.deployments_list
  args: {}
  expect_exit: 0
- action: kubernetes.endpoints_list
  args: {}
  expect_exit: 0
- action: kubernetes.events_for_pod
  args:
    namespace: default
    name: probe
  expect_exit: 0
- action: kubernetes.events_recent
  args: {}
  expect_exit: 0
- action: kubernetes.events_warnings
  args: {}
  expect_exit: 0
- action: kubernetes.get_yaml
  args:
    namespace: kube-system
    kind: deployment
    name: coredns
  expect_exit: 0
- action: kubernetes.hpa_list
  args: {}
  expect_exit: 0
- action: kubernetes.ingresses_list
  args: {}
  expect_exit: 0
- action: kubernetes.jobs_list
  args: {}
  expect_exit: 0
- action: kubernetes.namespaces
  args: {}
  expect_exit: 0
- action: kubernetes.networkpolicies_list
  args: {}
  expect_exit: 0
- action: kubernetes.node_describe
  args:
    name: harness
  expect_exit: 0
- action: kubernetes.nodes_list
  args: {}
  expect_exit: 0
- action: kubernetes.nodes_top
  args: {}
  expect_exit: 0
- action: kubernetes.pod_describe
  args:
    namespace: default
    name: probe
  expect_exit: 0
- action: kubernetes.pod_logs
  args:
    namespace: default
    name: probe
    container: probe
  expect_exit: 0
- action: kubernetes.pod_previous_logs
  args:
    namespace: default
    name: probe
    container: probe
  # The fixture pod has not restarted, so there is no previous container — kubectl
  # exits non-zero. The command-assembly is what's under test here.
  expect_exit:
  - 0
  - 1
- action: kubernetes.pods_list
  args: {}
  expect_exit: 0
- action: kubernetes.pods_problem
  args: {}
  expect_exit: 0
- action: kubernetes.pods_top
  args: {}
  expect_exit: 0
- action: kubernetes.pv_list
  args: {}
  expect_exit: 0
- action: kubernetes.pvcs_list
  args: {}
  expect_exit: 0
- action: kubernetes.quotas_list
  args:
    namespace: default
  expect_exit: 0
- action: kubernetes.rollout_history
  args:
    namespace: kube-system
    kind: deployment
    name: coredns
  expect_exit: 0
- action: kubernetes.rollout_status
  args:
    namespace: kube-system
    kind: deployment
    name: coredns
  expect_exit: 0
- action: kubernetes.services_list
  args: {}
  expect_exit: 0
- action: kubernetes.statefulsets_list
  args: {}
  expect_exit: 0
- action: kubernetes.storageclasses_list
  args: {}
  expect_exit: 0
# Mutators — skipped by default (they cordon/drain/delete/scale/roll real workloads).
- action: kubernetes.uncordon
  args:
    name: harness
  skip: mutator skipped by default (medium); set --include=kubernetes.uncordon to run
- action: kubernetes.cordon
  args:
    name: harness
  skip: mutator skipped by default (high); set --include=kubernetes.cordon to run
- action: kubernetes.delete_pod
  args:
    namespace: default
    name: probe
  skip: mutator skipped by default (high); set --include=kubernetes.delete_pod to run
- action: kubernetes.rollout_restart
  args:
    namespace: kube-system
    kind: deployment
    name: coredns
  skip: mutator skipped by default (high); set --include=kubernetes.rollout_restart to run
- action: kubernetes.rollout_undo
  args:
    namespace: kube-system
    kind: deployment
    name: coredns
  skip: mutator skipped by default (high); set --include=kubernetes.rollout_undo to run
- action: kubernetes.scale_deployment
  args:
    namespace: kube-system
    name: coredns
    replicas: 1
  skip: mutator skipped by default (high); set --include=kubernetes.scale_deployment to run
- action: kubernetes.set_image
  args:
    namespace: kube-system
    name: coredns
    container: coredns
    image: rancher/mirrored-coredns-coredns:1.11.3
  skip: mutator skipped by default (high); set --include=kubernetes.set_image to run
- action: kubernetes.drain
  args:
    name: harness
  skip: mutator skipped by default (critical); set --include=kubernetes.drain to run
