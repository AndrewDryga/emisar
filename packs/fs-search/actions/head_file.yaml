schema_version: 1
id: fs.head_file
title: head -n <N> <file>
kind: exec
risk: low
description: Show the first N lines of one file.
side_effects:
  - One read of the file.
  - Read-only.
args:
  - name: path
    type: string
    required: true
    description: File path.
    validation:
      pattern: "^/[a-zA-Z0-9_./\\-]{0,512}$"
  - name: lines
    type: integer
    required: false
    default: 100
    description: Lines.
    validation:
      min: 1
      max: 10000
execution:
  command:
    binary: head
    argv:
      - "-n"
      - "{{ args.lines }}"
      - "{{ args.path }}"
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 1048576
  max_stderr_bytes: 8192
examples:
  - title: First 100 lines
    args:
      path: "/var/log/syslog"
