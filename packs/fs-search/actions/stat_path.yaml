schema_version: 1
id: fs.stat_path
title: stat <path>
kind: exec
risk: low
description: Show inode + timestamps + permissions for one path.
side_effects:
  - One stat() call.
  - Read-only.
args:
  - name: path
    type: string
    required: true
    description: Path.
    validation:
      pattern: "^/[a-zA-Z0-9_./\\-]{0,512}$"
      denied_paths:
        - /etc/shadow
        - /etc/gshadow
        - /etc/shadow-
        - /etc/gshadow-
        - /etc/ssl/private
        - /root/.ssh
        - /etc/ssh
        - /etc/sudoers
        - /etc/sudoers.d
        - /proc/kcore
execution:
  command:
    binary: stat
    argv:
      - "{{ args.path }}"
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 4096
  max_stderr_bytes: 8192
examples:
  - title: stat /etc/passwd
    args:
      path: "/etc/passwd"
