schema_version: 1
id: fs.find_recent_modified
title: Files modified in last N minutes
kind: exec
risk: low
description: Find files under one path modified within the last N minutes. Useful for "what just changed?".
side_effects:
  - One file-system traversal.
  - Read-only.
args:
  - name: path
    type: string
    required: true
    description: Root path.
    validation:
      pattern: "^/[a-zA-Z0-9_./\\-]{0,512}$"
  - name: minutes
    type: integer
    required: false
    default: 60
    description: Mtime window in minutes.
    validation:
      min: 1
      max: 10080
  - name: max_depth
    type: integer
    required: false
    default: 6
    description: Max directory depth.
    validation:
      min: 1
      max: 20
execution:
  command:
    binary: find
    argv:
      - "{{ args.path }}"
      - "-maxdepth"
      - "{{ args.max_depth }}"
      - "-type"
      - "f"
      - "-mmin"
      - "-{{ args.minutes }}"
      - "-printf"
      - "%T@ %p\\n"
  timeout: 60s
output:
  parser: text
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: Recently touched config files
    args:
      path: "/etc"
      minutes: 1440
