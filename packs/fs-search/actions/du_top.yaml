schema_version: 1
id: fs.du_top
title: du -sh — top N subdirs
kind: exec
risk: low
description: Show the top 20 immediate subdirs of one path by size.
side_effects:
  - One file-system traversal.
  - Read-only.
search_terms:
  - where did the space go
  - disk filling up
  - biggest directories
args:
  - name: path
    type: path
    required: true
    description: Root path.
    validation:
      pattern: "^/[a-zA-Z0-9_./\\-]{0,512}$"
      denied_paths:
        - /etc/shadow
        - /etc/gshadow
        - /etc/shadow-
        - /etc/gshadow-
        - /etc/sudoers
        - /proc/kcore
      denied_prefixes:
        - /etc/ssl/private
        - /root/.ssh
        - /etc/ssh
        - /etc/sudoers.d
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "du -sh --exclude=.ssh --exclude=ssh --exclude=private --exclude=sudoers.d {{ args.path }}/* 2>/dev/null | sort -rh | head -20"
  timeout: 5m
output:
  parser: text
  max_stdout_bytes: 16384
  max_stderr_bytes: 8192
examples:
  - title: Where's the space in /var?
    args:
      path: "/var"
