schema_version: 1
id: fs.find_by_name
title: find -name <glob> under <path>
kind: exec
risk: low
description: Find files matching one shell glob under one path. Capped at 1000 results.
side_effects:
  - One file-system traversal.
  - Read-only.
args:
  - name: path
    type: path
    required: true
    description: Root path.
    validation:
      pattern: "^/[a-zA-Z0-9_./\\-]{0,512}$"
      denied_paths:
        - /etc/shadow
        - /etc/gshadow
        - /etc/shadow-
        - /etc/gshadow-
        - /etc/sudoers
        - /proc/kcore
      denied_prefixes:
        - /etc/ssl/private
        - /root/.ssh
        - /etc/ssh
        - /etc/sudoers.d
  - name: glob
    type: string
    required: true
    description: Shell glob (e.g. '*.log').
    validation:
      pattern: "^[a-zA-Z0-9_.*?[\\]\\-]{1,64}$"
  - name: max_depth
    type: integer
    required: false
    default: 6
    description: Max directory depth.
    validation:
      min: 1
      max: 20
execution:
  command:
    binary: find
    argv:
      - "{{ args.path }}"
      - "-maxdepth"
      - "{{ args.max_depth }}"
      - "("
      - "-path"
      - "/etc/ssh"
      - "-o"
      - "-path"
      - "/etc/ssl/private"
      - "-o"
      - "-path"
      - "/root/.ssh"
      - "-o"
      - "-path"
      - "/etc/sudoers.d"
      - ")"
      - "-prune"
      - "-o"
      - "-name"
      - "{{ args.glob }}"
      - "-print"
  timeout: 60s
output:
  parser: text
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: Find .conf under /etc
    args:
      path: "/etc"
      glob: "*.conf"
