schema_version: 1
id: fs.find_setuid
title: setuid + setgid files
kind: exec
risk: low
description: Find files with setuid or setgid bits. Audit for privilege escalation surface.
side_effects:
  - One file-system traversal.
  - Read-only.
search_terms:
  - suid
  - sgid
args:
  - name: path
    type: path
    required: false
    default: "/"
    description: Root path.
    validation:
      pattern: "^/[a-zA-Z0-9_./\\-]{0,512}$"
      denied_paths:
        - /etc/shadow
        - /etc/gshadow
        - /etc/shadow-
        - /etc/gshadow-
        - /etc/sudoers
        - /proc/kcore
      denied_prefixes:
        - /etc/ssl/private
        - /root/.ssh
        - /etc/ssh
        - /etc/sudoers.d
execution:
  command:
    binary: find
    argv:
      - "{{ args.path }}"
      - "-xdev"
      - "("
      - "-path"
      - "/etc/ssh"
      - "-o"
      - "-path"
      - "/etc/ssl/private"
      - "-o"
      - "-path"
      - "/root/.ssh"
      - "-o"
      - "-path"
      - "/etc/sudoers.d"
      - ")"
      - "-prune"
      - "-o"
      - "-type"
      - "f"
      - "("
      - "-perm"
      - "-4000"
      - "-o"
      - "-perm"
      - "-2000"
      - ")"
      - "-print"
  timeout: 5m
output:
  parser: text
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: setuid/setgid binaries
    args: {}
