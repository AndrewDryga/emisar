schema_version: 1
id: fs.grep_recursive
title: grep -rE <pattern> <path>
kind: exec
risk: low
description: Search recursively under one path. Bounded to 500 matches.
side_effects:
  - Recursive file-system traversal + read of matched files.
  - Read-only.
args:
  - name: path
    type: path
    required: true
    description: Root path.
    validation:
      pattern: "^/[a-zA-Z0-9_./\\-]{0,512}$"
      denied_paths:
        - /etc/shadow
        - /etc/gshadow
        - /etc/shadow-
        - /etc/gshadow-
        - /etc/sudoers
        - /proc/kcore
      denied_prefixes:
        - /etc/ssl/private
        - /root/.ssh
        - /etc/ssh
        - /etc/sudoers.d
  - name: pattern
    type: string
    required: true
    description: Regex.
    validation:
      pattern: "^[^'\"`$;|&<>]{1,256}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "grep -rEnH --no-messages -m 500 --exclude-dir=.ssh --exclude-dir=ssh --exclude-dir=private --exclude-dir=sudoers.d --exclude=shadow --exclude=gshadow --exclude=shadow- --exclude=gshadow- --exclude=sudoers --exclude=kcore \"$P\" \"{{ args.path }}\""
  env:
    P: "{{ args.pattern }}"
  timeout: 5m
output:
  parser: text
  max_stdout_bytes: 2097152
  max_stderr_bytes: 8192
  redact:
    - name: private-key-pem
      type: regex
      pattern: '(?s)-----BEGIN [A-Z0-9 ]*PRIVATE KEY-----.*?-----END [A-Z0-9 ]*PRIVATE KEY-----'
      replacement: '[REDACTED PRIVATE KEY]'
examples:
  - title: Find calls to deprecated API
    args:
      path: "/opt/app/src"
      pattern: "deprecated_call"
