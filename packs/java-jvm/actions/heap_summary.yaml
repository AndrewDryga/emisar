schema_version: 1
id: jvm.heap_summary
title: jcmd GC.heap_info
kind: exec
risk: low
description: 'Show heap geometry — used/committed per generation (Eden, Survivor, Old, Metaspace) via the attach API. Works on JDK 9+ where `jmap -heap` was removed, and on JVMs running -XX:+PerfDisableSharedMem (e.g. Cassandra).'
side_effects:
  - One jcmd invocation.
  - Read-only.
search_terms:
  - memory pressure
  - heap full
  - old gen full
  - out of memory
args:
  - name: pid
    type: integer
    required: true
    description: JVM PID.
    validation:
      min: 1
      max: 4194304
execution:
  command:
    binary: jcmd
    argv: ["{{ args.pid }}", "GC.heap_info"]
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 32768
  max_stderr_bytes: 8192
examples:
  - title: Heap layout
    args:
      pid: 4321
