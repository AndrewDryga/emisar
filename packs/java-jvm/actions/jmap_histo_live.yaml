schema_version: 1
id: jvm.jmap_histo_live
title: jmap -histo:live (top 50)
kind: exec
risk: low
description: List top classes by retained-heap size after a forced full GC. Use to find the leak candidate.
side_effects:
  - Triggers a full GC.
  - JVM pause for the duration of the GC.
args:
  - name: pid
    type: integer
    required: true
    description: JVM PID.
    validation:
      min: 1
      max: 4194304
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "jmap -histo:live {{ args.pid }} | head -50"
  timeout: 60s
output:
  parser: text
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192
examples:
  - title: Top retained classes
    args:
      pid: 4321
