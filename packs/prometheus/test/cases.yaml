defaults:
  env:
    PROM_URL: http://prometheus:9090
cases:
- action: prom.alertmanagers
  args: {}
  expect_exit: 0
- action: prom.alerts
  args: {}
  expect_exit: 0
- action: prom.build_info
  args: {}
  expect_exit: 0
- action: prom.clean_tombstones
  args: {}
  expect_exit: 0
- action: prom.delete_series
  args:
    matcher: '{__name__="bad_metric"}'
  expect_exit:
  - 0
  - 1
  skip: mutator skipped by default (high)
- action: prom.flags
  args: {}
  expect_exit: 0
- action: prom.query_instant
  args:
    query: up
  expect_exit: 0
- action: prom.query_range
  args:
    query: rate(node_cpu_seconds_total[5m])
    window: 1h
    step: 60s
  expect_exit: 0
- action: prom.reload_config
  args: {}
  expect_exit: 0
- action: prom.rules
  args: {}
  expect_exit: 0
- action: prom.runtime_info
  args: {}
  expect_exit: 0
- action: prom.snapshot
  args: {}
  expect_exit: 0
- action: prom.targets
  args: {}
  expect_exit: 0
- action: prom.tsdb_stats
  args: {}
  expect_exit: 0
