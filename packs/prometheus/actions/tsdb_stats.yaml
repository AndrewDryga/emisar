schema_version: 1
id: prom.tsdb_stats
title: GET /api/v1/status/tsdb
kind: exec
risk: low
description: Show the top-10 cardinal label/value pairs in the TSDB. Use to spot cardinality explosion.
side_effects:
  - One GET request.
  - Read-only.
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "curl -sS \"${PROM_URL:-http://127.0.0.1:9090}/api/v1/status/tsdb\""
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192
examples:
  - title: TSDB cardinality
    args: {}
