schema_version: 1
id: prom.targets
title: GET /api/v1/targets
kind: exec
risk: low
description: List all scrape targets with state (up/down) and last error.
side_effects:
  - One GET request.
  - Read-only.
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "curl -sS \"${PROM_URL:-http://127.0.0.1:9090}/api/v1/targets\""
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 1048576
  max_stderr_bytes: 8192
examples:
  - title: All targets
    args: {}
