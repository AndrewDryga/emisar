schema_version: 1
id: tailscale.exit_node_list
title: tailscale exit-node list
kind: exec
risk: low
description: Available exit nodes on the tailnet (hostname, country, city, status).
side_effects: ["One tailscale read.", "Read-only."]
args: []
execution:
  command: {binary: tailscale, argv: ["exit-node", "list"]}
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 32768
  max_stderr_bytes: 8192
examples:
  - title: List available exit nodes
    args: {}
