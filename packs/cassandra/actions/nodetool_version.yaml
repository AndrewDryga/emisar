schema_version: 1
id: cassandra.nodetool_version
title: nodetool version
kind: exec
risk: low
description: Show the Cassandra version string for the node.
side_effects: ["One JMX call.", "Read-only."]
args: []
execution:
  command: {binary: nodetool, argv: ["version"]}
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 1024
  max_stderr_bytes: 8192
examples:
  - title: Version
    args: {}
