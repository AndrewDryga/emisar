schema_version: 1
id: cassandra.nodetool_ring
title: nodetool ring [keyspace]
kind: exec
risk: low
description: Token ring with owner host per token.
side_effects: ["One JMX call.", "Read-only."]
args:
  - name: keyspace
    type: string
    required: false
    default: ""
    description: Optional keyspace (default — all).
    validation:
      pattern: "^[a-zA-Z][a-zA-Z0-9_]{0,47}$|^$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "if [ -n '{{ args.keyspace }}' ]; then nodetool ring {{ args.keyspace }}; else nodetool ring; fi"
  timeout: 60s
output:
  parser: text
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: Ring
    args: {}
