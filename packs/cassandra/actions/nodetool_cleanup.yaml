schema_version: 1
id: cassandra.nodetool_cleanup
title: nodetool cleanup [ks]
kind: exec
risk: high
description: Removes data no longer owned by this node (after a topology change). IO-heavy.
side_effects:
  - SSTables rewritten without data that moved off this node.
  - Heavy IO + CPU; may take hours on large tables.
  - Free space requirement during cleanup.
args:
  - name: keyspace
    type: string
    required: false
    default: ""
    description: Optional keyspace (empty = all).
    validation:
      pattern: "^[a-zA-Z][a-zA-Z0-9_]{0,47}$|^$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "if [ -n '{{ args.keyspace }}' ]; then nodetool cleanup {{ args.keyspace }}; else nodetool cleanup; fi"
  timeout: 12h
  cancel_grace: 5m
output:
  parser: text
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192
examples:
  - title: Cleanup post-bootstrap
    args: {}
