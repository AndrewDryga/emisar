schema_version: 1
id: cassandra.cqlsh_list_keyspaces
title: cqlsh -e "DESCRIBE KEYSPACES"
kind: exec
risk: low
description: All keyspaces.
side_effects: ["One CQL query.", "Read-only."]
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "cqlsh -e 'DESCRIBE KEYSPACES;' \"${CQLSH_HOST:-127.0.0.1}\" \"${CQLSH_PORT:-9042}\""
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 16384
  max_stderr_bytes: 8192
examples:
  - title: Keyspaces
    args: {}
