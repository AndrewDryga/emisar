schema_version: 1
id: cassandra.nodetool_snapshot
title: nodetool snapshot -t <name> [ks]
kind: exec
risk: medium
description: Atomic hard-link snapshot of SSTables. Cheap to take, expensive if left around.
side_effects:
  - Hard links created in each table's snapshots/<name>/ dir.
  - Disk usage grows as SSTables roll over (snapshot pins originals).
  - Use clearsnapshot to delete.
args:
  - name: tag
    type: string
    required: true
    description: Snapshot tag.
    validation:
      pattern: "^[a-zA-Z0-9_.\\-]{1,64}$"
  - name: keyspace
    type: string
    required: false
    default: ""
    description: Optional keyspace (empty = all).
    validation:
      pattern: "^[a-zA-Z][a-zA-Z0-9_]{0,47}$|^$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "if [ -n '{{ args.keyspace }}' ]; then nodetool snapshot -t {{ args.tag }} {{ args.keyspace }}; else nodetool snapshot -t {{ args.tag }}; fi"
  timeout: 30m
output:
  parser: text
  max_stdout_bytes: 16384
  max_stderr_bytes: 8192
examples:
  - title: Backup snapshot
    args:
      tag: "pre-migration-2026-06-01"
