schema_version: 1
id: kafka.list_acls
title: List ACLs
kind: exec
risk: low
description: Every ACL binding on the cluster.
side_effects:
  - One admin request.
  - Read-only.
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "kafka-acls.sh '--bootstrap-server' \"$KAFKA_BOOTSTRAP\" '--list'"
  timeout: 60s
output:
  parser: text
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: All ACLs
    args: {}
