schema_version: 1
id: s3.bucket_encryption
title: aws s3api get-bucket-encryption
kind: exec
risk: low
description: Show default-encryption settings for one bucket.
side_effects:
  - One API call.
  - Read-only.
args:
  - name: bucket
    type: string
    required: true
    description: Bucket name.
    validation:
      pattern: "^[a-z0-9.\\-]{3,63}$"
execution:
  command:
    binary: aws
    argv: ["s3api", "get-bucket-encryption", "--bucket", "{{ args.bucket }}", "--output", "json"]
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 8192
  max_stderr_bytes: 8192
examples:
  - title: Encryption
    args:
      bucket: "my-bucket"
