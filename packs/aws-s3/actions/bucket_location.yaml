schema_version: 1
id: s3.bucket_location
title: aws s3api get-bucket-location
kind: exec
risk: low
description: Show the region for one bucket.
side_effects:
  - One API call.
  - Read-only.
args:
  - name: bucket
    type: string
    required: true
    description: Bucket name.
    validation:
      pattern: "^[a-z0-9.\\-]{3,63}$"
execution:
  command:
    binary: aws
    argv: ["s3api", "get-bucket-location", "--bucket", "{{ args.bucket }}"]
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 4096
  max_stderr_bytes: 8192
examples:
  - title: Region
    args:
      bucket: "my-bucket"
