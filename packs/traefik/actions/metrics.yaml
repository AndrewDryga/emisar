schema_version: 1
id: traefik.metrics
title: GET /metrics
kind: script
risk: low
description: >
  Show Prometheus metrics in text exposition format (requires
  --metrics.prometheus=true): per-entrypoint/router/service request counts,
  durations, open connections, and TLS cert expiry gauges. Served on the
  traefik entrypoint (:8080) by default unless metrics.prometheus.entryPoint
  moves it.
side_effects:
  - One read-only HTTP GET to the Traefik metrics endpoint.
  - Read-only.
args: []
execution:
  script:
    path: scripts/trget.sh
    interpreter: /bin/sh
  argv:
    - "/metrics"
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 4194304
  max_stderr_bytes: 8192
examples:
  - title: Prometheus metrics
    args: {}
