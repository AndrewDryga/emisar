schema_version: 1

id: memcached
name: Memcached cache server
version: 0.1.4
description: >
  Read-only memcached introspection via the `stats` ASCII protocol —
  general stats, slab usage, item counts, sizes. Plus FLUSH_ALL as a
  critical mutator. Target host/port via MEMCACHED_HOST + MEMCACHED_PORT
  env vars on the runner host (default 127.0.0.1:11211).
vendor: emisar
homepage: https://github.com/andrewdryga/emisar

requires:
  os:
    - linux
  binaries:
    - nc

# `emisar pack suggest` detection: memcached's process + default port.
detect:
  processes:
    - memcached
  ports:
    - 11211

setup:
  summary: >
    Actions speak the memcached ASCII protocol over nc to MEMCACHED_HOST:
    MEMCACHED_PORT on the runner host, defaulting to the local instance at
    127.0.0.1:11211. The ASCII protocol has no authentication, so no
    credentials are involved.
  env:
    - name: MEMCACHED_HOST
      description: Target host.
      default: 127.0.0.1
    - name: MEMCACHED_PORT
      description: Target port.
      default: "11211"
  notes:
    - "Any of MEMCACHED_HOST you set must also be allowlisted in the runner's execution.inherit_env — the action env is scrubbed to PATH/LANG/LC_ALL/TERM by default, so an env present on the host but not allowlisted is silently dropped (the action falls back to its local default or fails auth)."
    - No authentication exists for this transport; reach a remote daemon only over a trusted network or tunnel.
    - flush_all is destructive — it invalidates every key and can stampede the origin on the next miss.
  verify: mc.stats

actions:
  - actions/stats.yaml
  - actions/stats_slabs.yaml
  - actions/stats_items.yaml
  - actions/stats_sizes.yaml
  - actions/stats_settings.yaml
  - actions/version.yaml
  - actions/flush_all.yaml
