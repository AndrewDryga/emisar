schema_version: 1
id: mc.stats_settings
title: stats settings
kind: exec
risk: low
description: Show daemon configuration at boot.
side_effects: ["One ASCII protocol call.", "Read-only."]
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "printf 'stats settings\\nquit\\n' | nc -w 5 \"${MEMCACHED_HOST:-127.0.0.1}\" \"${MEMCACHED_PORT:-11211}\""
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 8192
  max_stderr_bytes: 8192
examples:
  - title: Settings
    args: {}
