schema_version: 1
id: tf.show_json
title: terraform show -json
kind: exec
risk: low
description: >
  Show the full workspace state as JSON (terraform show -json), for
  programmatic queries. This dumps every resource's attributes,
  including ones marked `sensitive` (passwords, private keys, tokens),
  in cleartext; scope it by policy. The runner's redaction is a
  fail-closed backstop, not a guarantee — it is pattern-bound and can't
  reliably mask secrets whose names and shapes match no rule.
side_effects:
  - Reads state file.
  - Read-only, but dumps every resource attribute (may include secrets).
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "cd \"$TF_DIR\" && terraform show -json"
  timeout: 60s
output:
  parser: json
  max_stdout_bytes: 4194304
  max_stderr_bytes: 8192
examples:
  - title: State JSON
    args: {}
