schema_version: 1
id: tf.output
title: terraform output -json
kind: exec
risk: low
description: >
  Show the workspace's output values (terraform output -json). The
  -json form deliberately un-masks outputs marked `sensitive`, so the
  values routinely carry secrets (a db_password, a kubeconfig, provider
  credentials) in cleartext; scope it by policy. The runner's redaction
  is a fail-closed backstop, not a guarantee — it is pattern-bound and
  can't reliably mask output values whose arbitrary names and shapes
  match no rule.
side_effects:
  - Reads state file.
  - Read-only, but un-masks `sensitive` outputs (may include secrets).
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "cd \"$TF_DIR\" && terraform output -json"
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: Outputs
    args: {}
