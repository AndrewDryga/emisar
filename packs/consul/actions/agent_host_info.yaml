schema_version: 1
id: consul.agent_host_info
title: GET /v1/agent/host
kind: exec
risk: low
description: 'Host info: OS, CPU, memory, filesystem, network from the agent''s view.'
side_effects: ["One API call.", "Read-only."]
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "{ [ -n \"$CONSUL_HTTP_TOKEN\" ] && printf 'X-Consul-Token: %s\\n' \"$CONSUL_HTTP_TOKEN\"; } | curl -sS -H @- \"${CONSUL_HTTP_ADDR:-http://127.0.0.1:8500}/v1/agent/host\""
  timeout: 45s
output:
  parser: json
  max_stdout_bytes: 131072
  max_stderr_bytes: 8192
examples:
  - title: Host info
    args: {}
