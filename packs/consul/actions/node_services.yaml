schema_version: 1
id: consul.node_services
title: GET /v1/catalog/node-services/<node>
kind: exec
risk: low
description: List all services registered against one node.
side_effects: ["One API call.", "Read-only."]
args:
  - name: node
    type: string
    required: true
    description: Node name.
    validation:
      # First char is non-dash so a "-flag"-shaped value can't be parsed as a flag if this ever lands as a bare positional.
      pattern: "^[a-zA-Z0-9_.][a-zA-Z0-9_.\\-]{0,127}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "{ [ -n \"$CONSUL_HTTP_TOKEN\" ] && printf 'X-Consul-Token: %s\\n' \"$CONSUL_HTTP_TOKEN\"; } | curl -sS -H @- \"${CONSUL_HTTP_ADDR:-http://127.0.0.1:8500}/v1/catalog/node-services/{{ args.node }}\""
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: One node's services
    args:
      node: "node-1"
