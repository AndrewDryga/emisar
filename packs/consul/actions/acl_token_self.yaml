schema_version: 1
id: consul.acl_token_self
title: GET /v1/acl/token/self
kind: exec
risk: low
description: Show metadata on the runner's own token — accessor, policies, roles, expiration. The SecretID the API returns is redacted from the output.
side_effects:
  - One ACL read request.
  - Read-only; the SecretID field returned by the API is redacted before output.
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "{ [ -n \"$CONSUL_HTTP_TOKEN\" ] && printf 'X-Consul-Token: %s\\n' \"$CONSUL_HTTP_TOKEN\"; } | curl -sS -H @- \"${CONSUL_HTTP_ADDR:-http://127.0.0.1:8500}/v1/acl/token/self\""
  timeout: 15s
output:
  parser: json
  max_stdout_bytes: 16384
  max_stderr_bytes: 8192
  redact:
    - name: consul-token-secretid
      type: regex
      pattern: '("SecretID"\s*:\s*)"[^"]*"'
      replacement: '${1}"[REDACTED]"'
examples:
  - title: Self
    args: {}
