schema_version: 1
id: consul.intentions_match
title: GET /v1/connect/intentions/match (by destination)
kind: exec
risk: low
description: List all intentions whose destination is the named service. Use to answer "what can talk to X?".
side_effects: ["One API call.", "Read-only."]
args:
  - name: destination
    type: string
    required: true
    description: Destination service.
    validation:
      # First char is non-dash so a "-flag"-shaped value can't be parsed as a flag if this ever lands as a bare positional.
      pattern: "^[a-zA-Z0-9_.][a-zA-Z0-9_.\\-]{0,127}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "{ [ -n \"$CONSUL_HTTP_TOKEN\" ] && printf 'X-Consul-Token: %s\\n' \"$CONSUL_HTTP_TOKEN\"; } | curl -sS -H @- \"${CONSUL_HTTP_ADDR:-http://127.0.0.1:8500}/v1/connect/intentions/match?by=destination&name={{ args.destination }}\""
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 131072
  max_stderr_bytes: 8192
examples:
  - title: Match for api
    args:
      destination: "api"
