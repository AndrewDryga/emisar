schema_version: 1
id: consul.kv_get
title: consul kv get <key>
kind: exec
risk: low
description: Get the value at one KV key.
side_effects:
  - One KV request.
  - Read-only — value will be returned, may be redacted by audit rules.
args:
  - name: key
    type: string
    required: true
    description: Full key path.
    validation:
      pattern: "^[a-zA-Z0-9_.][a-zA-Z0-9_./\\-]{0,255}$"
execution:
  command:
    binary: consul
    argv: ["kv", "get", "{{ args.key }}"]
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: Value for config/api/log_level
    args:
      key: "config/api/log_level"
