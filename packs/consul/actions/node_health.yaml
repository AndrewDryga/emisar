schema_version: 1
id: consul.node_health
title: GET /v1/health/node/<node>
kind: exec
risk: low
description: List all checks for one node + their status.
side_effects: ["One API call.", "Read-only."]
args:
  - name: node
    type: string
    required: true
    description: Node name.
    validation:
      pattern: "^[a-zA-Z0-9_.\\-]{1,128}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "{ [ -n \"$CONSUL_HTTP_TOKEN\" ] && printf 'X-Consul-Token: %s\\n' \"$CONSUL_HTTP_TOKEN\"; } | curl -sS -H @- \"${CONSUL_HTTP_ADDR:-http://127.0.0.1:8500}/v1/health/node/{{ args.node }}\""
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 131072
  max_stderr_bytes: 8192
examples:
  - title: One node's checks
    args:
      node: "node-1"
