schema_version: 1
id: consul.leader
title: GET /v1/status/leader
kind: exec
risk: low
description: >
  Show the current Raft leader address for this datacenter. Reads the status
  endpoint, which is not ACL-gated, so it answers "is there a leader?"
  even when no CONSUL_HTTP_TOKEN is set.
side_effects:
  - One API call.
  - Read-only.
search_terms:
  - no leader
  - leader election
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "{ [ -n \"$CONSUL_HTTP_TOKEN\" ] && printf 'X-Consul-Token: %s\\n' \"$CONSUL_HTTP_TOKEN\"; } | curl -sS -H @- \"${CONSUL_HTTP_ADDR:-http://127.0.0.1:8500}/v1/status/leader\""
  timeout: 15s
output:
  parser: json
  max_stdout_bytes: 4096
  max_stderr_bytes: 8192
examples:
  - title: Leader address
    args: {}
