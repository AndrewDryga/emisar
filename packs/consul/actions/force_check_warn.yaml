schema_version: 1
id: consul.force_check_warn
title: PUT /v1/agent/check/warn/<check_id>
kind: exec
risk: high
description: Forces one check into WARNING state.
side_effects:
  - Targeted check transitions to WARNING.
  - Strict service discovery (passing-only) routes away from it.
args:
  - name: check_id
    type: string
    required: true
    description: Check ID.
    validation:
      # First char is non-dash so a "-flag"-shaped value can't be parsed as a flag if this ever lands as a bare positional.
      pattern: "^[a-zA-Z0-9_.:][a-zA-Z0-9_.:\\-]{0,127}$"
  - name: note
    type: string
    required: false
    default: "operator override"
    description: Note attached.
    validation:
      pattern: "^[A-Za-z0-9 _.,:/()#@=+-]{1,255}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - '{ [ -n "$CONSUL_HTTP_TOKEN" ] && printf "X-Consul-Token: %s\n" "$CONSUL_HTTP_TOKEN"; } | curl -sS -XPUT -H @- --data-urlencode "note=$NOTE" -G "${CONSUL_HTTP_ADDR:-http://127.0.0.1:8500}/v1/agent/check/warn/$CHECK_ID"'
  env:
    NOTE: "{{ args.note }}"
    CHECK_ID: "{{ args.check_id }}"
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 4096
  max_stderr_bytes: 8192
examples:
  - title: Mark warning
    args:
      check_id: "service:api:1"
