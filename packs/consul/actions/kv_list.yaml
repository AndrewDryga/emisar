schema_version: 1
id: consul.kv_list
title: consul kv get -keys <prefix>
kind: exec
risk: low
description: List all KV keys under one prefix.
side_effects:
  - One KV request.
  - Read-only — keys only, no values.
args:
  - name: prefix
    type: string
    required: true
    description: Key prefix.
    validation:
      pattern: "^[a-zA-Z0-9_.][a-zA-Z0-9_./\\-]{0,255}$"
execution:
  command:
    binary: consul
    argv: ["kv", "get", "-keys", "{{ args.prefix }}"]
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: All keys under 'config/'
    args:
      prefix: "config/"
