schema_version: 1
id: consul.service_health
title: Health of a service's instances
kind: exec
risk: low
description: Show per-node health for one service.
side_effects:
  - One health request.
  - Read-only.
args:
  - name: service
    type: string
    required: true
    description: Service name.
    validation:
      # First char is non-dash so a "-flag"-shaped value can't be parsed as a flag if this ever lands as a bare positional.
      pattern: "^[a-zA-Z0-9_.][a-zA-Z0-9_.\\-]{0,127}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "{ [ -n \"$CONSUL_HTTP_TOKEN\" ] && printf 'X-Consul-Token: %s\\n' \"$CONSUL_HTTP_TOKEN\"; } | curl -sS \"${CONSUL_HTTP_ADDR:-http://127.0.0.1:8500}/v1/health/service/{{ args.service }}\" -H @-"
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: Health for api
    args:
      service: "api"
