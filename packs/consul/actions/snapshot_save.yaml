schema_version: 1
id: consul.snapshot_save
title: consul snapshot save <path>
kind: exec
risk: medium
description: Writes a Raft snapshot to a local file. Use before risky operations + as a backup.
side_effects:
  - One read of the entire state store.
  - File written at the configured path on the runner host.
  - Brief leader IO; no service impact.
args:
  - name: path
    type: string
    required: true
    description: Destination file.
    validation:
      pattern: "^/[a-zA-Z0-9_./\\-]{1,512}\\.snap$"
      # The pattern blocks shell metacharacters but NOT `..` (`.`/`/` are literal
      # charset members), so on its own it lets `save` WRITE a .snap-named file
      # anywhere the runner can write (`/etc/cron.d/x.snap`, etc.). allowed_prefixes
      # engages the runner's Clean+EvalSymlinks containment, scoping the write to
      # Consul's data dir and standard backup roots. Keep the .snap suffix.
      allowed_prefixes:
        - /var/lib/consul
        - /var/backups
        - /opt
        - /tmp
execution:
  command: {binary: consul, argv: ["snapshot", "save", "{{ args.path }}"]}
  timeout: 5m
output:
  parser: text
  max_stdout_bytes: 8192
  max_stderr_bytes: 8192
examples:
  - title: Pre-migration snap
    args:
      path: "/var/backups/consul-pre-migration.snap"
