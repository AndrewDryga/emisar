schema_version: 1
id: idrac.firmware
title: List installed firmware versions
kind: script
risk: low
description: >
  List the firmware inventory — GET
  /redfish/v1/UpdateService/FirmwareInventory?$expand=*($levels=1). Returns one
  member per component (BIOS, iDRAC, NIC, PERC, PSU, drives, …) with its Version
  and whether it is Updateable. Members are prefixed Installed- (running),
  Available- (staged/pending), or Previous- (rollback image). The answer to
  "what firmware is on this box and is anything pending?".
side_effects:
  - One read-only Redfish GET of the firmware inventory, expanded one level.
  - Read-only.
args:
  - name: host
    type: string
    required: true
    description: Target iDRAC hostname or IP.
    validation:
      pattern: "^[A-Za-z0-9._-]{1,253}$"
      max_length: 253
execution:
  script:
    path: scripts/idracreq.sh
    interpreter: /bin/sh
  argv:
    - "{{ args.host }}"
    - "GET"
    - "/UpdateService/FirmwareInventory?$expand=*($levels=1)"
  timeout: 60s
output:
  parser: json
  max_stdout_bytes: 1048576
  max_stderr_bytes: 8192
examples:
  - title: All installed firmware versions
    args:
      host: "idrac-web01.mgmt"
