schema_version: 1
id: multipath.daemon_paths
title: multipathd show paths
kind: exec
risk: low
description: Show per-path state from the running multipathd (dev, dm state, path checker, latency).
side_effects: ["One multipathd query.", "Read-only."]
search_terms:
  - failed paths
args: []
execution:
  command: {binary: multipathd, argv: ["show", "paths"]}
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 131072
  max_stderr_bytes: 8192
examples:
  - title: Path states
    args: {}
