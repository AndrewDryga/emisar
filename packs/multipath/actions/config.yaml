schema_version: 1
id: multipath.config
title: multipath -t
kind: exec
risk: low
description: Show effective multipathd configuration (merged built-in defaults + multipath.conf).
side_effects: ["One config dump.", "Read-only."]
args: []
execution:
  command: {binary: multipath, argv: ["-t"]}
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: Effective config
    args: {}
