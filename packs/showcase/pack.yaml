schema_version: 1

id: showcase
name: Showcase pack
version: 0.2.8
description: >
  Synthetic pack that demonstrates every action-schema feature in one
  place: all arg types, every validation, both parsers, both kinds, opts
  envelope bounds, and per-action redaction rules. Not a production pack —
  use it as a reference when authoring real ones.
vendor: emisar

setup:
  summary: >
    Reference pack only — every action runs a trivial local command (echo or a
    bundled script) and authenticates to nothing. No env vars or credentials
    to provision; do not use it in production.
  verify: showcase.every_arg_type

actions:
  - actions/every_arg_type.yaml
  - actions/path_validation.yaml
  - actions/json_output.yaml
  - actions/opts_envelope.yaml
  - actions/script_action.yaml
