schema_version: 1

# Demonstrates the four path validation knobs: allowed_paths,
# allowed_prefixes, denied_paths, denied_prefixes. Path args are cleaned
# via filepath.Clean before validation, so "/var/log/../shadow" cannot
# sneak past denied_prefixes.

id: showcase.path_validation
title: Read-only file inspection with path allowlist
kind: exec
risk: low

description: >
  Show a reference action for path-typed arguments. Demonstrates allowed
  prefixes plus an explicit deny list. The combined effect: the caller
  may inspect anything under /var/log or /tmp, except /var/log/secure
  and anything under /tmp/private.

side_effects:
  - Reads file metadata via stat.
  - Does not read file contents.

args:
  - name: file
    type: path
    required: true
    description: A path under /var/log or /tmp, excluding the denied set.
    validation:
      allowed_prefixes:
        - /var/log
        - /tmp
      denied_paths:
        - /var/log/secure
      denied_prefixes:
        - /tmp/private

  - name: extras
    type: string_array
    required: false
    default: []
    description: >
      Additional paths to inspect. Every element is validated the same way
      as `file`: the runner applies the path allow/deny rules and
      max_length to each element (not just the whole-array validators), so
      the same /var/log,/tmp containment holds for extras.
    validation:
      max_items: 4
      max_length: 256
      allowed_prefixes:
        - /var/log
        - /tmp
      denied_paths:
        - /var/log/secure
      denied_prefixes:
        - /tmp/private

execution:
  command:
    binary: stat
    argv:
      - "{{ args.file }}"
      - "{{ args.extras }}"
  timeout: 5s
  cwd: /

output:
  parser: text
  max_stdout_bytes: 16384
  max_stderr_bytes: 4096

examples:
  - title: Inspect one allowlisted file
    args:
      file: /var/log/syslog
  - title: Inspect a tmp file with extras
    args:
      file: /tmp/run.pid
      extras:
        - /tmp/run.lock
