schema_version: 1
id: ec2.reboot_instance
title: aws ec2 reboot-instances
kind: exec
risk: high
description: Reboots one instance. Instance keeps its IPs + ephemeral storage.
side_effects:
  - Instance reboots; ephemeral storage and IPs persist.
  - Brief downtime — services on host go down with it.
args:
  - name: instance_id
    type: string
    required: true
    description: Instance ID.
    validation:
      pattern: "^i-[0-9a-f]{8,17}$"
execution:
  command:
    binary: aws
    argv: ["ec2", "reboot-instances", "--instance-ids", "{{ args.instance_id }}", "--output", "json"]
  timeout: 60s
output:
  parser: json
  max_stdout_bytes: 8192
  max_stderr_bytes: 8192
examples:
  - title: Reboot one
    args:
      instance_id: "i-0123456789abcdef0"
