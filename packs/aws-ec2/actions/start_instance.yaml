schema_version: 1
id: ec2.start_instance
title: aws ec2 start-instances
kind: exec
risk: high
description: Starts one stopped instance.
side_effects:
  - Instance begins booting; billing resumes.
  - New public IPv4 unless Elastic IP attached.
args:
  - name: instance_id
    type: string
    required: true
    description: Instance ID.
    validation:
      pattern: "^i-[0-9a-f]{8,17}$"
execution:
  command:
    binary: aws
    argv: ["ec2", "start-instances", "--instance-ids", "{{ args.instance_id }}", "--output", "json"]
  timeout: 60s
output:
  parser: json
  max_stdout_bytes: 16384
  max_stderr_bytes: 8192
examples:
  - title: Start one
    args:
      instance_id: "i-0123456789abcdef0"
