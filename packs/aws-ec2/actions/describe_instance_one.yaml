schema_version: 1
id: ec2.describe_instance_one
title: aws ec2 describe-instances --instance-ids
kind: exec
risk: low
description: Get details for one EC2 instance.
side_effects:
  - One API call.
  - Read-only.
args:
  - name: instance_id
    type: string
    required: true
    description: i-xxxxxxxx[xxxxxxxxx]
    validation:
      pattern: "^i-[0-9a-f]{8,17}$"
execution:
  command:
    binary: aws
    argv: ["ec2", "describe-instances", "--instance-ids", "{{ args.instance_id }}", "--output", "json"]
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: One
    args:
      instance_id: "i-0123456789abcdef0"
