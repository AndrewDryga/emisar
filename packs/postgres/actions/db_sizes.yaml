schema_version: 1
id: postgres.db_sizes
title: All databases by size
kind: exec
risk: low
description: List every database with pg_database_size.
side_effects: ["One SELECT.", "Read-only."]
args: []
execution:
  command:
    binary: psql
    argv:
      - "-XAt"
      - "-c"
      - "SELECT datname, pg_size_pretty(pg_database_size(datname)) AS size FROM pg_database WHERE NOT datistemplate ORDER BY pg_database_size(datname) DESC;"
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 16384
  max_stderr_bytes: 8192
examples:
  - title: All databases
    args: {}
