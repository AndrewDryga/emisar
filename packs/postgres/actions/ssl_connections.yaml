schema_version: 1
id: postgres.ssl_connections
title: pg_stat_ssl
kind: exec
risk: low
description: 'List per-backend TLS state: version, cipher, client_serial.'
side_effects: ["One SELECT.", "Read-only."]
args: []
execution:
  command:
    binary: psql
    argv:
      - "-XAt"
      - "-c"
      - "SELECT s.pid, a.usename, a.application_name, s.ssl, s.version, s.cipher FROM pg_stat_ssl s JOIN pg_stat_activity a USING (pid) ORDER BY s.ssl DESC, s.pid LIMIT 100;"
  timeout: 10s
output:
  parser: text
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192
examples:
  - title: TLS state
    args: {}
