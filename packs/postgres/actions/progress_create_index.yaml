schema_version: 1
id: postgres.progress_create_index
title: pg_stat_progress_create_index
kind: exec
risk: low
description: Show in-flight CREATE INDEX operations with phase + blocks scanned.
side_effects: ["One SELECT.", "Read-only."]
args: []
execution:
  command:
    binary: psql
    argv:
      - "-XAt"
      - "-c"
      - "SELECT pid, datname, p.relid::regclass AS table, p.index_relid::regclass AS index, phase, blocks_total, blocks_done, tuples_total, tuples_done FROM pg_stat_progress_create_index p;"
  timeout: 10s
output:
  parser: text
  max_stdout_bytes: 16384
  max_stderr_bytes: 8192
examples:
  - title: Live CREATE INDEXes
    args: {}
