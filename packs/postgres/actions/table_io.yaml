schema_version: 1
id: postgres.table_io
title: pg_statio_user_tables
kind: exec
risk: low
description: 'Show per-table heap + index buffer reads vs hits. Bad cache hit rate? Find the table.'
side_effects: ["One SELECT.", "Read-only."]
args: []
execution:
  command:
    binary: psql
    argv:
      - "-XAt"
      - "-c"
      - "SELECT schemaname || '.' || relname AS table, heap_blks_read, heap_blks_hit, ROUND(100.0 * heap_blks_hit / NULLIF(heap_blks_hit + heap_blks_read, 0), 2) AS heap_hit_pct, idx_blks_read, idx_blks_hit, ROUND(100.0 * idx_blks_hit / NULLIF(idx_blks_hit + idx_blks_read, 0), 2) AS idx_hit_pct FROM pg_statio_user_tables ORDER BY heap_blks_read + idx_blks_read DESC LIMIT 50;"
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192
examples:
  - title: Table IO
    args: {}
