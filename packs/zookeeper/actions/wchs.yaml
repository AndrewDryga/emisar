schema_version: 1
id: zk.wchs
title: wchs (watch summary)
kind: exec
risk: low
description: Show active watch counts.
side_effects: ["One 4lw command.", "Read-only."]
args:
  - name: server
    type: string
    required: true
    description: host:port.
    validation:
      pattern: "^[a-zA-Z0-9][a-zA-Z0-9.\\-]{0,254}:[0-9]{1,5}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "S='{{ args.server }}'; echo wchs | nc -w 5 ${S%:*} ${S##*:}"
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 8192
  max_stderr_bytes: 8192
examples:
  - title: Watches
    args:
      server: "zk1:2181"
