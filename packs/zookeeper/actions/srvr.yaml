schema_version: 1
id: zk.srvr
title: srvr (server stats)
kind: exec
risk: low
description: Show server version, latency, packets, mode (leader/follower/standalone).
side_effects: ["One 4lw command.", "Read-only."]
args:
  - name: server
    type: string
    required: true
    description: host:port.
    validation:
      pattern: "^[a-zA-Z0-9.\\-]{1,255}:[0-9]{1,5}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "S='{{ args.server }}'; echo srvr | nc -w 5 ${S%:*} ${S##*:}"
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 16384
  max_stderr_bytes: 8192
examples:
  - title: One server
    args:
      server: "zk1:2181"
