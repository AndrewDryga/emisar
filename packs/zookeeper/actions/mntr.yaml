schema_version: 1
id: zk.mntr
title: mntr (monitoring metrics)
kind: exec
risk: low
description: Show per-server metrics in a metrics-friendly format.
side_effects: ["One 4lw command.", "Read-only."]
args:
  - name: server
    type: string
    required: true
    description: host:port.
    validation:
      pattern: "^[a-zA-Z0-9][a-zA-Z0-9.\\-]{0,254}:[0-9]{1,5}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "S='{{ args.server }}'; echo mntr | nc -w 5 ${S%:*} ${S##*:}"
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 16384
  max_stderr_bytes: 8192
examples:
  - title: Metrics
    args:
      server: "zk1:2181"
