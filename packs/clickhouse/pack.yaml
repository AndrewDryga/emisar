schema_version: 1

id: clickhouse
name: ClickHouse analytics DB
version: 0.2.3
description: >
  ClickHouse server + table introspection — metrics, errors, slow & failed
  queries, parts/partitions, merges, mutations, replication queue, Keeper/ZK
  health, detached parts, distributed-send backlog, backups — plus narrow
  mutators (OPTIMIZE, KILL QUERY, SYSTEM RELOAD CONFIG, replica ops). Auth via
  CH_HOST + CH_USER + CH_PASSWORD env vars on the runner host. Uses
  clickhouse-client with --query to keep arg surface minimal.
vendor: emisar
homepage: https://github.com/andrewdryga/emisar

requires:
  os:
    - linux
  binaries:
    - clickhouse-client

# `emisar pack suggest` detection — default process names / ports.
detect:
  processes:
    - clickhouse-server
  ports:
    - 8123

setup:
  summary: >
    Each action reads CH_HOST, CH_USER, and CH_PASSWORD on the runner host and
    passes them to clickhouse-client as --host/--user/--password. Host and user
    fall back to localhost and the default user, so a local server with the
    default account needs no setup at all.
  env:
    - name: CH_HOST
      description: Server host passed to --host.
      default: localhost
    - name: CH_USER
      description: User passed to --user.
      default: default
    - name: CH_PASSWORD
      description: Password passed to --password. Leave unset for a passwordless account.
  notes:
    - "Any of CH_HOST / CH_USER / CH_PASSWORD you set must also be allowlisted in the runner's execution.inherit_env — the action env is scrubbed to PATH/LANG/LC_ALL/TERM by default, so an env present on the host but not allowlisted is silently dropped (the action falls back to its local default or fails auth)."
    - Connection always uses clickhouse-client's default native port (9000); there is no port env var in this pack.
    - The user needs SELECT on the system tables for the reads, plus rights for the mutators (KILL QUERY, OPTIMIZE, SYSTEM ... for replica/config actions) you enable.
    - The replication/Keeper reads (replication_queue, zookeeper_connection, keeper_status, detached_parts) only return data on a ReplicatedMergeTree + Keeper/ZooKeeper deployment; on a single non-replicated server they come back empty, which is correct, not an error.
  verify: ch.uptime

actions:
  # Server state
  - actions/uptime.yaml
  - actions/system_metrics.yaml
  - actions/system_events.yaml
  - actions/disks.yaml
  - actions/dictionaries.yaml
  # Live queries
  - actions/processes.yaml
  - actions/slow_queries.yaml
  # Replication / merges / mutations
  - actions/replicas_status.yaml
  - actions/merge_queue.yaml
  - actions/mutation_queue.yaml
  # Tables / parts
  - actions/parts_summary.yaml
  - actions/table_sizes.yaml
  # Errors / health
  - actions/errors.yaml
  - actions/query_errors.yaml
  - actions/asynchronous_metrics.yaml
  - actions/backups.yaml
  # Replication queue / Keeper
  - actions/replication_queue.yaml
  - actions/stuck_mutations.yaml
  - actions/zookeeper_connection.yaml
  - actions/keeper_status.yaml
  # Parts / tables / distributed
  - actions/detached_parts.yaml
  - actions/parts_by_partition.yaml
  - actions/distribution_queue.yaml
  - actions/tables_overview.yaml
  # Mutators
  - actions/kill_query.yaml
  - actions/optimize_table.yaml
  - actions/reload_config.yaml
  - actions/system_drop_replica.yaml
  - actions/system_restart_replica.yaml
  - actions/system_sync_replica.yaml
  - actions/system_flush_logs.yaml
