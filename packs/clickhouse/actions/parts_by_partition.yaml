schema_version: 1
id: ch.parts_by_partition
title: Active part count per partition (system.parts)
kind: exec
risk: low
description: List active parts grouped by partition, top offenders first. Where you actually diagnose too-many-parts / merge backlog (parts_summary is table-level only).
side_effects: ["One SELECT.", "Read-only."]
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "clickhouse-client --host \"${CH_HOST:-localhost}\" --user \"${CH_USER:-default}\" --password \"$CH_PASSWORD\" --query \"SELECT database, table, partition, count() AS parts, sum(rows) AS rows, sum(bytes_on_disk) AS bytes FROM system.parts WHERE active GROUP BY database, table, partition ORDER BY parts DESC LIMIT 100 FORMAT JSONEachRow\""
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: Parts per partition
    args: {}
