schema_version: 1
id: ch.errors
title: SELECT * FROM system.errors
kind: exec
risk: low
description: List error codes seen since startup with counts and the last message. Spot error storms.
side_effects: ["One SELECT.", "Read-only."]
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "clickhouse-client --host \"${CH_HOST:-localhost}\" --user \"${CH_USER:-default}\" --password \"$CH_PASSWORD\" --query \"SELECT name, code, value, last_error_time, substring(last_error_message, 1, 300) AS last_message, remote FROM system.errors WHERE value > 0 ORDER BY last_error_time DESC LIMIT 100 FORMAT JSONEachRow\""
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 131072
  max_stderr_bytes: 8192
examples:
  - title: Recent errors
    args: {}
