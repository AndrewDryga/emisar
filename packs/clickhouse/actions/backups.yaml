schema_version: 1
id: ch.backups
title: SELECT * FROM system.backups
kind: exec
risk: low
description: BACKUP/RESTORE operations since the last server start with status and error. Non-persistent across restarts.
side_effects: ["One SELECT.", "Read-only."]
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "clickhouse-client --host \"${CH_HOST:-localhost}\" --user \"${CH_USER:-default}\" --password \"$CH_PASSWORD\" --query \"SELECT id, name, status, substring(error, 1, 300) AS error, start_time, end_time, num_files, total_size FROM system.backups ORDER BY start_time DESC LIMIT 100 FORMAT JSONEachRow\""
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 131072
  max_stderr_bytes: 8192
examples:
  - title: Backup/restore status
    args: {}
