schema_version: 1
id: ch.replicas_status
title: SELECT * FROM system.replicas
kind: exec
risk: low
description: Show per-replica state — leader, queue size, log delays, errors.
side_effects: ["One SELECT.", "Read-only."]
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "clickhouse-client --host \"${CH_HOST:-localhost}\" --user \"${CH_USER:-default}\" --password \"$CH_PASSWORD\" --query \"SELECT database, table, is_leader, is_readonly, future_parts, parts_to_check, queue_size, absolute_delay, log_max_index, log_pointer, total_replicas, active_replicas FROM system.replicas FORMAT JSONEachRow\""
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: Replica health
    args: {}
