schema_version: 1
id: ch.system_drop_replica
title: SYSTEM DROP REPLICA <name>
kind: exec
risk: critical
description: >
  Remove a replica's metadata from ZooKeeper for one table. Use only
  for an already-dead replica that is never coming back. The replica
  cannot rejoin without recreating its tables. Wrong replica name
  destroys a healthy cluster member's metadata.
side_effects:
  - Replica metadata deleted from ZK.
  - Replica cannot rejoin without recreating tables.
  - Other replicas continue normally.
args:
  - name: replica
    type: string
    required: true
    description: Replica name as listed in system.replicas.
    validation:
      pattern: "^[a-zA-Z0-9_:.\\-]{1,128}$"
  - name: table
    type: string
    required: true
    description: Database.table (qualified).
    validation:
      pattern: "^[a-zA-Z0-9_]{1,64}\\.[a-zA-Z0-9_]{1,128}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "clickhouse-client --host \"${CH_HOST:-localhost}\" --user \"${CH_USER:-default}\" --password \"$CH_PASSWORD\" --query \"SYSTEM DROP REPLICA '$RPL' FROM TABLE $TBL\""
  env:
    RPL: "{{ args.replica }}"
    TBL: "{{ args.table }}"
  timeout: 60s
output:
  parser: text
  max_stdout_bytes: 4096
  max_stderr_bytes: 8192
examples:
  - title: Drop dead replica
    args:
      replica: "replica-7"
      table: "analytics.events"
