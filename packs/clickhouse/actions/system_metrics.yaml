schema_version: 1
id: ch.system_metrics
title: SELECT * FROM system.metrics
kind: exec
risk: low
description: Show per-metric current values (gauges + counters).
side_effects: ["One SELECT.", "Read-only."]
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "CLICKHOUSE_PASSWORD=\"$CH_PASSWORD\" clickhouse-client --host \"${CH_HOST:-localhost}\" --user \"${CH_USER:-default}\" --query \"SELECT metric, value FROM system.metrics WHERE value != 0 ORDER BY metric FORMAT JSONEachRow\""
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 131072
  max_stderr_bytes: 8192
examples:
  - title: Metrics
    args: {}
