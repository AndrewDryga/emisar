schema_version: 1
id: ch.tables_overview
title: Engine inventory (system.tables)
kind: exec
risk: low
description: List all non-system tables with engine, row/byte totals, and part counts. Engine inventory + fleet shape.
side_effects: ["One SELECT.", "Read-only."]
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "clickhouse-client --host \"${CH_HOST:-localhost}\" --user \"${CH_USER:-default}\" --password \"$CH_PASSWORD\" --query \"SELECT database, name, engine, total_rows, total_bytes, parts, active_parts FROM system.tables WHERE database NOT IN ('system','INFORMATION_SCHEMA','information_schema') ORDER BY total_bytes DESC LIMIT 200 FORMAT JSONEachRow\""
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: Engine inventory
    args: {}
