schema_version: 1

id: debian.dpkg_changes
title: Recent dpkg installs/removes
kind: exec
risk: low

description: >
  Show recent dpkg install / remove / upgrade activity across
  /var/log/dpkg.log and its rotated logs (.1 and .*.gz), returned in
  time order. Use to answer "what was changed on this host recently?"
  before deeper forensics. Read-only.

side_effects:
  - Reads /var/log/dpkg.log and its rotated logs (/var/log/dpkg.log.1, /var/log/dpkg.log.*.gz).

args:
  - name: lines
    type: integer
    required: false
    default: 200
    description: How many tail lines.
    validation:
      min: 1
      max: 5000

execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "zcat -f /var/log/dpkg.log /var/log/dpkg.log.* 2>/dev/null | sort | tail -n {{ args.lines }}"
  timeout: 15s

output:
  parser: text
  max_stdout_bytes: 524288
  max_stderr_bytes: 16384

examples:
  - title: Last 200 dpkg log lines
    args: {}
