schema_version: 1

id: debian.dpkg_changes
title: Recent dpkg installs/removes
kind: exec
risk: low

description: >
  Tails /var/log/dpkg.log* and returns recent install / remove /
  upgrade lines. Use to answer "what was changed on this host
  recently?" before deeper forensics. Read-only.

side_effects:
  - Reads /var/log/dpkg.log* (rotated logs included).

args:
  - name: lines
    type: integer
    required: false
    default: 200
    description: How many tail lines.
    validation:
      min: 1
      max: 5000

execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "tail -n {{ args.lines }} /var/log/dpkg.log"
  timeout: 15s

output:
  parser: text
  max_stdout_bytes: 524288
  max_stderr_bytes: 16384

examples:
  - title: Last 200 dpkg log lines
    args: {}
