schema_version: 1
id: cloud-init.init_local
title: cloud-init init --local
kind: exec
risk: high
description: >
  Run the init-local stage — datasource detection, fallback networking,
  early disk setup. Normally only runs at boot. Re-running mid-life
  rarely useful except for testing a datasource fix.
side_effects:
  - Datasource detection re-runs.
  - Network may briefly reconfigure.
  - /var/lib/cloud/instance/ state files refreshed.
args: []
execution:
  command:
    binary: cloud-init
    argv: ["init", "--local"]
  timeout: 300s
  cancel_grace: 30s
output:
  parser: text
  max_stdout_bytes: 131072
  max_stderr_bytes: 16384
examples:
  - title: Re-run init-local
    args: {}
