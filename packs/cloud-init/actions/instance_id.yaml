schema_version: 1
id: cloud-init.instance_id
title: cat /var/lib/cloud/data/instance-id
kind: exec
risk: low
description: >
  Instance ID cloud-init currently tracks. If this differs from the
  cloud's idea, cloud-init thinks the machine is "new" and may re-run
  all modules at next boot.
side_effects:
  - Reads one file.
  - No mutation.
args: []
execution:
  command:
    binary: cat
    argv: ["/var/lib/cloud/data/instance-id"]
  timeout: 5s
output:
  parser: text
  max_stdout_bytes: 256
  max_stderr_bytes: 4096
examples:
  - title: Instance id
    args: {}
