schema_version: 1
id: cloud-init.cloud_config_dump
title: cat /var/lib/cloud/instance/cloud-config.txt
kind: exec
risk: low
description: >
  Dump the final merged cloud-config (user-data + vendor-data + system defaults)
  as cloud-init evaluated it. The source of truth for "what did
  cloud-init actually try to do?".
side_effects:
  - Reads one file.
  - May expose secrets baked into user-data / vendor-data — the merged
    cloud-config is a superset; the runner redacts via its configured
    redaction rules.
args: []
execution:
  command:
    binary: cat
    argv: ["/var/lib/cloud/instance/cloud-config.txt"]
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 1048576
  max_stderr_bytes: 4096
examples:
  - title: Effective cloud-config
    args: {}
