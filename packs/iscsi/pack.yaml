schema_version: 1

id: iscsi
name: iSCSI initiator
version: 0.1.0
description: >
  Inspect the host's iSCSI initiator (open-iscsi): active sessions,
  per-session detail (targets, connections, negotiated parameters),
  configured target nodes, and initiator interfaces. Read-only.
vendor: emisar
homepage: https://github.com/andrewdryga/emisar

requires:
  os:
    - linux
  binaries:
    - iscsiadm

# `emisar pack suggest` detection — the open-iscsi CLI + its daemon.
detect:
  binaries:
    - iscsiadm
  processes:
    - iscsid

setup:
  summary: >
    Reads the local host's iSCSI initiator state via iscsiadm — no
    credentials needed. iscsiadm needs root (it reads /sys and the
    initiator DB).
  notes:
    - "iscsiadm needs real root (netlink, /sys, the initiator DB) — no group or capability delegates it, and the -P 3 session detail especially. The actions exec iscsiadm directly and the runner has no privilege escalation, so the runner must run as root on iSCSI hosts. Set it with a drop-in: `systemctl edit emisar` adding `[Service]` / `User=root` / `Group=root`, then `systemctl daemon-reload && systemctl restart emisar`."
    - "Running as root applies to every action on that host, not just these; on a dedicated storage host that's expected, and the cloud policy + approval gates still govern what runs."
  verify: iscsi.sessions

actions:
  - actions/sessions.yaml
  - actions/session_detail.yaml
  - actions/nodes.yaml
  - actions/ifaces.yaml
