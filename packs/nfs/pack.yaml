schema_version: 1

id: nfs
name: NFS server + client
version: 0.1.6
description: >
  Inspect a host's NFS exports, mounted shares, RPC state, active client
  connections. Plus two narrow operator actions: exportfs -r (re-export) and
  exportfs -u (unexport one client:path — evicts that client). Read-only
  otherwise.
vendor: emisar
homepage: https://github.com/andrewdryga/emisar

requires:
  os:
    - linux

# `emisar pack suggest` detection — default process names / ports.
detect:
  processes:
    - nfsd
  ports:
    - 2049

setup:
  summary: >
    Inspects the local runner host's NFS server/client state — no
    credentials needed.
  notes:
    - "exportfs (including the -r re-export and unexport) needs root; showmount/nfsstat/rpcinfo reads work as any user."
  verify: nfs.exportfs_v

actions:
  - actions/exportfs_v.yaml
  - actions/showmount_e.yaml
  - actions/nfsstat_s.yaml
  - actions/nfsstat_c.yaml
  - actions/rpcinfo_p.yaml
  - actions/cat_etab.yaml
  - actions/nfs_mounts.yaml
  - actions/exportfs_r.yaml
  - actions/exportfs_unexport_path.yaml
