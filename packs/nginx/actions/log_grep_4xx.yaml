schema_version: 1
id: nginx.log_grep_4xx
title: Recent 4xx responses from access log
kind: exec
risk: low
description: Greps the access log for 4xx status codes. Read-only.
side_effects:
  - Reads /var/log/nginx/access.log.
  - Read-only.
args:
  - name: lines
    type: integer
    required: false
    default: 100
    description: How many recent 4xx lines.
    validation:
      min: 1
      max: 5000
  - name: log_path
    type: string
    required: false
    default: /var/log/nginx/access.log
    description: Access log path.
    validation:
      pattern: "^/var/log/nginx/[A-Za-z0-9._/-]{1,128}$"
      # The pattern blocks shell metacharacters (the value substitutes into a
      # /bin/sh -c pipeline) but NOT `..` — `.` and `/` are literal charset
      # members. allowed_prefixes runs the runner's Clean+EvalSymlinks
      # containment, collapsing any `../` escape to its real path and rejecting
      # anything outside the nginx log dir.
      allowed_prefixes:
        - /var/log/nginx
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "grep -E ' 4[0-9][0-9] ' {{ args.log_path }} | tail -n {{ args.lines }}"
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 262144
  max_stderr_bytes: 16384
examples:
  - title: Last 100 4xx
    args: {}
