schema_version: 1

id: nginx.access_top_clients
title: Top client IPs from access log
kind: exec
risk: low

description: >
  Tails the access log and returns the top N source IPs by hit count.
  Assumes the default combined log format (client IP in column 1).
  Use to spot abusive crawlers or single-host traffic spikes that
  hint at a misconfigured client. Read-only.

side_effects:
  - Reads /var/log/nginx/access.log.
  - Read-only.

args:
  - name: lines
    type: integer
    required: false
    default: 100000
    description: How many tail lines to analyze.
    validation:
      min: 1000
      max: 1000000

  - name: limit
    type: integer
    required: false
    default: 30
    description: Top-N IPs.
    validation:
      min: 1
      max: 200

  - name: log_path
    type: string
    required: false
    default: /var/log/nginx/access.log
    description: Path to access log.
    validation:
      pattern: "^/var/log/nginx/[A-Za-z0-9._/-]{1,128}$"
      # The pattern blocks shell metacharacters (the value substitutes into a
      # /bin/sh -c pipeline) but NOT `..` — `.` and `/` are literal charset
      # members. allowed_prefixes runs the runner's Clean+EvalSymlinks
      # containment, collapsing any `../` escape to its real path and rejecting
      # anything outside the nginx log dir.
      allowed_prefixes:
        - /var/log/nginx

execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "tail -n {{ args.lines }} {{ args.log_path }} | awk '{print $1}' | sort | uniq -c | sort -nr | head -n {{ args.limit }}"
  timeout: 60s

output:
  parser: text
  max_stdout_bytes: 131072
  max_stderr_bytes: 16384

examples:
  - title: Top 30 source IPs
    args: {}
