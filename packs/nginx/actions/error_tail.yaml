schema_version: 1

id: nginx.error_tail
title: Tail nginx error log
kind: exec
risk: low

description: >
  Returns the last N lines from /var/log/nginx/error.log. Use to spot
  upstream connect failures, SSL handshake errors, or worker crashes
  immediately after a reload. Read-only.

side_effects:
  - Reads /var/log/nginx/error.log.
  - Read-only.

args:
  - name: lines
    type: integer
    required: false
    default: 200
    description: How many tail lines.
    validation:
      min: 1
      max: 5000

  - name: log_path
    type: string
    required: false
    default: /var/log/nginx/error.log
    description: Path to error log.
    validation:
      pattern: "^/var/log/nginx/[A-Za-z0-9._/-]{1,128}$"

execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "tail -n {{ args.lines }} {{ args.log_path }}"
  timeout: 30s

output:
  parser: text
  max_stdout_bytes: 524288
  max_stderr_bytes: 16384

examples:
  - title: Last 200 error log lines
    args: {}
