schema_version: 1
id: nginx.connections_now
title: Active connections (stub_status)
kind: exec
risk: low
description: >
  Hits the stub_status endpoint to get active/reading/writing/waiting counts. Cheaper than `nginx.status` (less parsing). Requires `stub_status on;` enabled. Loopback-only — the host is pinned to 127.0.0.1/localhost/[::1]; only the port and path vary.
side_effects:
  - One curl to the local nginx over loopback.
  - Read-only.
args:
  - name: url
    type: string
    required: false
    default: "http://127.0.0.1/nginx_status"
    description: >
      stub_status URL. Host is pinned to loopback (127.0.0.1, localhost, or
      [::1]); pass a non-default port/path here.
    validation:
      # Loopback host is fixed so this low-risk, no-approval read cannot be
      # aimed at an off-host target (cloud metadata 169.254.169.254, RFC1918,
      # TEST-NET) — only the port and path are caller-controlled.
      pattern: "^https?://(127\\.0\\.0\\.1|localhost|\\[::1\\])(:[0-9]{1,5})?(/[A-Za-z0-9._~/-]{0,512})?$"
execution:
  command:
    binary: curl
    argv:
      - "-fsS"
      - "--max-time"
      - "5"
      - "{{ args.url }}"
  timeout: 10s
output:
  parser: text
  max_stdout_bytes: 4096
  max_stderr_bytes: 4096
examples:
  - title: Live conn counts
    args: {}
