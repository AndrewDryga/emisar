schema_version: 1
id: nginx.vhost_list
title: List configured server_name + listen blocks
kind: exec
risk: low
description: >
  Greps `nginx -T` output for `server_name` and `listen` directives — a compact view of every virtual host this nginx serves. Read-only.
side_effects:
  - One nginx -T invocation (config validation).
  - Read-only.
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "nginx -T 2>/dev/null | grep -E '^\\s*(server_name|listen)\\b'"
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192
examples:
  - title: All configured vhosts
    args: {}
