schema_version: 1

id: nginx.status
title: Nginx stub_status
kind: exec
risk: low

description: >
  Fetches the nginx stub_status endpoint over loopback. Returns
  active connections, total requests, reading/writing/waiting counts.
  Requires `stub_status on;` in a location block reachable from
  127.0.0.1. Loopback-only — the host is pinned to 127.0.0.1/localhost/[::1];
  only the port and path vary. Read-only.

side_effects:
  - One curl to the local nginx over loopback.
  - Read-only.

args:
  - name: url
    type: string
    required: false
    default: "http://127.0.0.1/nginx_status"
    description: >
      stub_status URL on the runner host. Host is pinned to loopback
      (127.0.0.1, localhost, or [::1]); pass a non-default port/path here.
    validation:
      # Loopback host is fixed so this low-risk, no-approval read cannot be
      # aimed at an off-host target (cloud metadata 169.254.169.254, RFC1918,
      # TEST-NET) — only the port and path are caller-controlled.
      pattern: "^https?://(127\\.0\\.0\\.1|localhost|\\[::1\\])(:[0-9]{1,5})?(/[A-Za-z0-9._~/-]*)?$"

execution:
  command:
    binary: curl
    argv:
      - "-fsS"
      - "--max-time"
      - "5"
      - "{{ args.url }}"
  timeout: 10s

output:
  parser: text
  max_stdout_bytes: 8192
  max_stderr_bytes: 8192

examples:
  - title: Stub_status from default URL
    args: {}
