schema_version: 1
id: nginx.config_dump
title: Full loaded config (nginx -T)
kind: exec
risk: medium
description: >
  Dumps the loaded config — main + all includes — via `nginx -T`. Sensitive content (passwords in auth_basic_user_file, API keys); output passes through redaction.
side_effects:
  - One nginx -T invocation.
  - Read-only.
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "nginx -T 2>&1 | head -800"
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 524288
  max_stderr_bytes: 16384
examples:
  - title: Show what nginx loaded
    args: {}
