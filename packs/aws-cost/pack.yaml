schema_version: 1
id: aws-cost
name: AWS Cost Explorer operations
version: 0.1.2
description: >
  Read-only AWS spend introspection — month-to-date by service, by
  account, forecast. Auth via AWS_PROFILE with ce:* permissions. Cost
  Explorer must be enabled.
vendor: emisar
homepage: https://github.com/andrewdryga/emisar

requires:
  os: [linux]
  binaries: [aws]

setup:
  summary: >
    Drives the aws CLI on the runner host. It resolves credentials from
    its own environment or ~/.aws config — the runner only forwards the
    variables you allowlist in inherit_env.
  env:
    - name: AWS_PROFILE
      description: Named profile in ~/.aws/config and ~/.aws/credentials. Omit to use the default profile or static-key/instance-role auth.
      example: prod
    - name: AWS_ACCESS_KEY_ID
      description: Static access key. Use instead of a profile; pair with AWS_SECRET_ACCESS_KEY.
    - name: AWS_SECRET_ACCESS_KEY
      description: Secret for AWS_ACCESS_KEY_ID.
    - name: AWS_SESSION_TOKEN
      description: Session token for temporary (STS) credentials.
  notes:
    - "Cost Explorer is a global service, so no region is required."
    - "Cost Explorer must be enabled for the account, and the principal needs Cost Explorer read permissions (ce:GetCostAndUsage, ce:GetCostForecast, ce:GetSavingsPlansCoverage)."
    - "Alternative to env keys: an ~/.aws/credentials profile (read from disk, no inherit_env entry) or, on EC2/ECS, the instance/task role from instance metadata (no credentials needed at all)."
  verify: ce.mtd_by_service

actions:
  - actions/mtd_by_service.yaml
  - actions/mtd_by_account.yaml
  - actions/last_7d_daily.yaml
  - actions/forecast_current_month.yaml
  - actions/savings_plans_coverage.yaml
