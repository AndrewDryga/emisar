schema_version: 1
id: ce.last_7d_daily
title: Last-7-day daily totals
kind: exec
risk: low
description: Show daily unblended cost for the last 7 days. Use to spot spend spikes.
side_effects: ["One Cost Explorer call.", "Read-only."]
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "END=$(date -u +%Y-%m-%d); START=$(date -u -d '7 days ago' +%Y-%m-%d 2>/dev/null || date -u -v-7d +%Y-%m-%d); aws ce get-cost-and-usage --time-period Start=$START,End=$END --granularity DAILY --metrics UnblendedCost --output json"
  timeout: 60s
output:
  parser: json
  max_stdout_bytes: 131072
  max_stderr_bytes: 8192
examples:
  - title: 7-day daily
    args: {}
