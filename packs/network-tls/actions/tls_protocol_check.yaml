schema_version: 1
id: net.tls_protocol_check
title: TLS protocol support check
kind: exec
risk: low
description: >
  Probes TLS 1.0/1.1/1.2/1.3 support on host:port one at a time, reporting which versions the server accepts. Use for compliance audits ("is TLS 1.0 still on?"). Runs with OPENSSL_CONF=/dev/null so the host's system MinProtocol floor (TLSv1.2 on Debian) doesn't pre-fail the 1.0/1.1 probes — each result reflects the server, not the client.
side_effects:
  - Up to 4 outbound TLS handshakes.
  - Read-only.
args:
  - name: host
    type: string
    required: true
    description: Host.
    validation:
      pattern: "^[a-zA-Z0-9.\\-]{1,253}$"
  - name: port
    type: integer
    required: false
    default: 443
    description: Port.
    validation:
      min: 1
      max: 65535
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "for v in tls1 tls1_1 tls1_2 tls1_3; do printf '%s: ' \"$v\"; openssl s_client -connect {{ args.host }}:{{ args.port }} -servername {{ args.host }} -$v </dev/null 2>/dev/null | grep -q 'BEGIN CERT' && echo OK || echo FAIL; done"
  env:
    OPENSSL_CONF: /dev/null
  timeout: 60s
output:
  parser: text
  max_stdout_bytes: 2048
  max_stderr_bytes: 4096
examples:
  - title: TLS support matrix
    args:
      host: "example.com"
