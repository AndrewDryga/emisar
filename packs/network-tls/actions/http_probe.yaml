schema_version: 1
id: net.http_probe
title: HTTP probe with timing
kind: exec
risk: low
description: >
  Probes a URL with curl, returning HTTP status, DNS / TCP / TLS / total
  timings, and bytes transferred. Use as a synthetic check. Set
  insecure=true to skip TLS verification when the endpoint serves an
  internal or self-signed certificate (otherwise such a probe reports
  http_code=000).
side_effects:
  - Outbound HTTP(S) to the URL.
  - Read-only.
args:
  - name: url
    type: string
    required: true
    description: URL to probe.
    validation:
      pattern: "^https?://[a-zA-Z0-9.:/_\\-?=&%+]{1,512}$"
  - name: max_time
    type: integer
    required: false
    default: 10
    description: Max total seconds.
    validation:
      min: 1
      max: 60
  - name: insecure
    type: boolean
    required: false
    default: false
    description: Skip TLS certificate verification (curl -k). Use for internal or self-signed certs.
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - 'set --; [ "$INSECURE" = "true" ] && set -- -k; exec curl -sS "$@" -o /dev/null --max-time "$MAX_TIME" -w "http_code=%{http_code}\nlookup=%{time_namelookup}\nconnect=%{time_connect}\nappconnect=%{time_appconnect}\nstarttransfer=%{time_starttransfer}\ntotal=%{time_total}\nsize=%{size_download}\n" "$URL"'
  env:
    URL: "{{ args.url }}"
    MAX_TIME: "{{ args.max_time }}"
    INSECURE: "{{ args.insecure }}"
  timeout: 90s
output:
  parser: text
  max_stdout_bytes: 4096
  max_stderr_bytes: 8192
examples:
  - title: Probe example.com
    args:
      url: "https://example.com/"
  - title: Probe an internal endpoint with a self-signed cert
    args:
      url: "https://10.0.0.5:8443/healthz"
      insecure: true
