schema_version: 1
id: net.tls_chain_dump
title: TLS chain dump
kind: exec
risk: low
description: Dumps the full certificate chain a server returns. Use to debug "browsers see incomplete chain" errors.
side_effects:
  - One openssl s_client connection.
  - Read-only.
search_terms:
  - missing intermediate
args:
  - name: host
    type: string
    required: true
    description: Host.
    validation:
      pattern: "^[a-zA-Z0-9.\\-]{1,253}$"
  - name: port
    type: integer
    required: false
    default: 443
    description: Port.
    validation:
      min: 1
      max: 65535
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "openssl s_client -connect {{ args.host }}:{{ args.port }} -servername {{ args.host }} -showcerts </dev/null 2>/dev/null"
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192
examples:
  - title: Chain for example.com
    args:
      host: "example.com"
