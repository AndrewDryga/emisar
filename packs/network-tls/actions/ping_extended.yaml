schema_version: 1
id: net.ping_extended
title: ping (with count + timeout)
kind: exec
risk: low
description: Sends N ICMP echo requests with explicit per-probe timeout.
side_effects:
  - Outbound ICMP.
  - Read-only.
args:
  - name: host
    type: string
    required: true
    description: Target hostname or IP.
    validation:
      pattern: "^[a-zA-Z0-9][a-zA-Z0-9.\\-:]{0,252}$"
  - name: count
    type: integer
    required: false
    default: 10
    description: Probes.
    validation:
      min: 1
      max: 100
  - name: timeout
    type: integer
    required: false
    default: 2
    description: Per-probe timeout seconds.
    validation:
      min: 1
      max: 10
execution:
  command:
    binary: ping
    argv:
      - "-c"
      - "{{ args.count }}"
      - "-W"
      - "{{ args.timeout }}"
      - "{{ args.host }}"
  timeout: 120s
output:
  parser: text
  max_stdout_bytes: 16384
  max_stderr_bytes: 8192
examples:
  - title: 10 probes to 1.1.1.1
    args:
      host: "1.1.1.1"
