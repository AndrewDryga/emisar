schema_version: 1
id: rmq.close_connection
title: rabbitmqctl close_connection
kind: exec
risk: high
description: Forcibly closes one AMQP connection. Whatever client owned it must reconnect.
side_effects:
  - Connection is dropped with the given reason.
  - In-flight unacked messages on its channels go back to the queue.
args:
  - name: pid
    type: string
    required: true
    description: Connection PID (from list_connections).
    validation:
      pattern: "^<[A-Za-z0-9@._-]{1,255}>$"
  - name: note
    type: string
    required: false
    default: "Closed by operator"
    description: Explanation recorded with the connection close.
    validation:
      pattern: "^.{1,255}$"
execution:
  command:
    binary: rabbitmqctl
    argv:
      - "close_connection"
      - "{{ args.pid }}"
      - "{{ args.note }}"
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 4096
  max_stderr_bytes: 8192
examples:
  - title: Drop a stuck conn
    args:
      pid: "<rabbit@host.1.123.0>"
