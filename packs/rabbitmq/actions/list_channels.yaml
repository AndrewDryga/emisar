schema_version: 1
id: rmq.list_channels
title: rabbitmqctl list_channels
kind: exec
risk: low
description: List all open channels with consumer + prefetch + ack stats.
side_effects:
  - One CLI call.
  - Read-only.
args: []
execution:
  command:
    binary: rabbitmqctl
    argv:
      - "list_channels"
      - "pid"
      - "connection"
      - "consumer_count"
      - "messages_unacknowledged"
      - "prefetch_count"
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: Channels
    args: {}
