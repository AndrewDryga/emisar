schema_version: 1
id: rmq.list_policies
title: rabbitmqctl list_policies
kind: exec
risk: low
description: List all set policies (HA, federation, shovel, etc).
side_effects:
  - One CLI call.
  - Read-only.
args: []
execution:
  command:
    binary: rabbitmqctl
    argv:
      - "list_policies"
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192
examples:
  - title: Policies
    args: {}
