schema_version: 1
id: rmq.list_exchanges
title: rabbitmqctl list_exchanges
kind: exec
risk: low
description: List all exchanges with type + durability.
side_effects:
  - One CLI call.
  - Read-only.
args: []
execution:
  command:
    binary: rabbitmqctl
    argv:
      - "list_exchanges"
      - "name"
      - "type"
      - "durable"
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192
examples:
  - title: Exchanges
    args: {}
