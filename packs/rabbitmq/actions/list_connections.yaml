schema_version: 1
id: rmq.list_connections
title: rabbitmqctl list_connections
kind: exec
risk: low
description: List all open AMQP connections with client + user + channels.
side_effects:
  - One CLI call.
  - Read-only.
args: []
execution:
  command:
    binary: rabbitmqctl
    argv:
      - "list_connections"
      - "pid"
      - "user"
      - "peer_host"
      - "peer_port"
      - "channels"
      - "state"
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: Connections
    args: {}
