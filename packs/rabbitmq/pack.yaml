schema_version: 1

id: rabbitmq
name: RabbitMQ operations
version: 0.1.4
description: >
  Cluster, queue, exchange, binding, connection, channel, and consumer
  inventory plus narrow operator actions (purge_queue, set_policy,
  force_close_connection). Uses rabbitmqctl + rabbitmqadmin on the
  runner host.
vendor: emisar
homepage: https://github.com/andrewdryga/emisar

requires:
  os:
    - linux
  binaries:
    - rabbitmqctl

# `emisar pack suggest` detection — default process names / ports.
detect:
  ports:
    - 5672
    - 15672

setup:
  summary: >
    rabbitmqctl and rabbitmq-diagnostics talk to the RabbitMQ node on the same
    host and authenticate with the Erlang cookie, not a username or URL. No
    connection env vars — provisioning is about running as the right user.
  notes:
    - "Run the runner as a user that can read the node's Erlang cookie (~/.erlang.cookie, mode 0400) — typically the rabbitmq service user or root. A mismatched or unreadable cookie fails with a node-down/auth error even when RabbitMQ is healthy."
    - "These tools target the local node only. To manage a remote node you would need -n <node>, which these actions do not set."
  verify: rmq.node_health_check

actions:
  # Cluster
  - actions/cluster_status.yaml
  - actions/node_health_check.yaml
  - actions/list_nodes.yaml
  # Vhosts / users / policies
  - actions/list_vhosts.yaml
  - actions/list_users.yaml
  - actions/list_policies.yaml
  - actions/list_parameters.yaml
  # Topology
  - actions/list_queues.yaml
  - actions/list_exchanges.yaml
  - actions/list_bindings.yaml
  # Live traffic
  - actions/list_connections.yaml
  - actions/list_channels.yaml
  - actions/list_consumers.yaml
  # Mutators
  - actions/purge_queue.yaml
  - actions/close_connection.yaml
  - actions/sync_queue.yaml
  - actions/start_app.yaml
  - actions/stop_app.yaml
