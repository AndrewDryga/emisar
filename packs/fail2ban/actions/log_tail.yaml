schema_version: 1
id: f2b.log_tail
title: tail /var/log/fail2ban.log
kind: exec
risk: low
description: Last N lines of fail2ban.log.
side_effects: ["One file read.", "Read-only."]
args:
  - name: lines
    type: integer
    required: false
    default: 200
    description: Lines.
    validation:
      min: 1
      max: 10000
execution:
  command:
    binary: tail
    argv: ["-n", "{{ args.lines }}", "/var/log/fail2ban.log"]
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: Last 200
    args: {}
