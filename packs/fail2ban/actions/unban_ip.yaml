schema_version: 1
id: f2b.unban_ip
title: set <jail> unbanip <ip>
kind: exec
risk: medium
description: Remove one IP's ban from one jail. Counter is reset; IP may be banned again on next failure.
side_effects:
  - IP removed from the jail's banned set.
  - Future failures will re-ban according to the jail's policy.
args:
  - name: jail
    type: string
    required: true
    description: Jail name.
    validation:
      pattern: "^[a-zA-Z0-9_\\-]{1,64}$"
  - name: ip
    type: string
    required: true
    description: IPv4 or IPv6 address.
    validation:
      pattern: "^[a-fA-F0-9:.]{2,45}$"
execution:
  command:
    binary: fail2ban-client
    argv: ["set", "{{ args.jail }}", "unbanip", "{{ args.ip }}"]
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 4096
  max_stderr_bytes: 8192
examples:
  - title: Unban one IP
    args:
      jail: "sshd"
      ip: "203.0.113.10"
