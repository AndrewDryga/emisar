schema_version: 1
id: gh.pr_list
title: gh pr list
kind: exec
risk: low
description: Open PRs for one repo.
side_effects:
  - One API call.
  - Read-only.
args:
  - name: repo
    type: string
    required: true
    description: 'Repo in owner/name form.'
    validation:
      pattern: "^[a-zA-Z0-9_.\\-]{1,40}/[a-zA-Z0-9_.\\-]{1,100}$"
  - name: state
    type: string
    required: false
    default: "open"
    description: open | closed | merged | all.
    validation:
      enum: ["open", "closed", "merged", "all"]
execution:
  command:
    binary: gh
    argv:
      - "pr"
      - "list"
      - "--repo"
      - "{{ args.repo }}"
      - "--state"
      - "{{ args.state }}"
      - "--limit"
      - "100"
      - "--json"
      - "number,title,author,state,createdAt,updatedAt,mergeable,reviewDecision"
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: Open PRs
    args:
      repo: "andrewdryga/emisar"
