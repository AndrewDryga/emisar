schema_version: 1
id: cf.zone_analytics
title: GET /zones/<id>/analytics/dashboard
kind: exec
risk: low
description: Show last-24h analytics for one zone (requests, bandwidth, threats).
side_effects:
  - One API request.
  - Read-only.
args:
  - name: zone_id
    type: string
    required: true
    description: Zone ID.
    validation:
      pattern: "^[a-f0-9]{32}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "{ [ -n \"$CF_API_TOKEN\" ] && printf 'Authorization: Bearer %s\\n' \"$CF_API_TOKEN\"; } | curl -sS \"https://api.cloudflare.com/client/v4/zones/{{ args.zone_id }}/analytics/dashboard?since=-1440\" -H @-"
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: 24h analytics
    args:
      zone_id: "abc123def456abc123def456abc123de"
