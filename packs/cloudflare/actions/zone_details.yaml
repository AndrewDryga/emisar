schema_version: 1
id: cf.zone_details
title: GET /zones/<id>
kind: exec
risk: low
description: Show one zone's full settings + state + nameservers.
side_effects:
  - One API request.
  - Read-only.
args:
  - name: zone_id
    type: string
    required: true
    description: Zone ID.
    validation:
      pattern: "^[a-f0-9]{32}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "{ [ -n \"$CF_API_TOKEN\" ] && printf 'Authorization: Bearer %s\\n' \"$CF_API_TOKEN\"; } | curl -sS \"https://api.cloudflare.com/client/v4/zones/{{ args.zone_id }}\" -H @-"
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 131072
  max_stderr_bytes: 8192
examples:
  - title: Zone details
    args:
      zone_id: "abc123def456abc123def456abc123de"
