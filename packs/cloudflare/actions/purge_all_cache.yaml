schema_version: 1
id: cf.purge_all_cache
title: POST /zones/<id>/purge_cache (everything)
kind: exec
risk: critical
description: >
  Purges ALL cached content for one zone. Cold-cache origin spike — every URL becomes a miss until it warms again. Avoid on busy zones.
side_effects:
  - Origin sees a 100% miss rate until cache re-warms.
  - Rate-limited by Cloudflare to once per minute per zone.
args:
  - name: zone_id
    type: string
    required: true
    description: Zone ID.
    validation:
      pattern: "^[a-f0-9]{32}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "{ [ -n \"$CF_API_TOKEN\" ] && printf 'Authorization: Bearer %s\\n' \"$CF_API_TOKEN\"; } | curl -sS -XPOST \"https://api.cloudflare.com/client/v4/zones/{{ args.zone_id }}/purge_cache\" -H @- -H \"Content-Type: application/json\" -d '{\"purge_everything\":true}'"
  timeout: 60s
output:
  parser: json
  max_stdout_bytes: 16384
  max_stderr_bytes: 8192
examples:
  - title: Full purge
    args:
      zone_id: "abc123def456abc123def456abc123de"
