schema_version: 1
id: cf.dns_records
title: GET /zones/<id>/dns_records
kind: exec
risk: low
description: All DNS records in one zone.
side_effects:
  - One API request.
  - Read-only.
args:
  - name: zone_id
    type: string
    required: true
    description: Zone ID.
    validation:
      pattern: "^[a-f0-9]{32}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "{ [ -n \"$CF_API_TOKEN\" ] && printf 'Authorization: Bearer %s\\n' \"$CF_API_TOKEN\"; } | curl -sS \"https://api.cloudflare.com/client/v4/zones/{{ args.zone_id }}/dns_records?per_page=200\" -H @-"
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: DNS for one zone
    args:
      zone_id: "abc123def456abc123def456abc123de"
