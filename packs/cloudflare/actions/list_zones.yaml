schema_version: 1
id: cf.list_zones
title: GET /zones
kind: exec
risk: low
description: List all zones accessible by the API token.
side_effects:
  - One API request.
  - Read-only.
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "{ [ -n \"$CF_API_TOKEN\" ] && printf 'Authorization: Bearer %s\\n' \"$CF_API_TOKEN\"; } | curl -sS \"https://api.cloudflare.com/client/v4/zones?per_page=50\" -H @-"
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: Zones
    args: {}
