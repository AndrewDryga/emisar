schema_version: 1
id: ssl.cert_text
title: openssl x509 -text -noout
kind: exec
risk: low
description: Dump a human-readable x509 certificate.
side_effects:
  - One file read.
  - Read-only.
args:
  - name: path
    type: string
    required: true
    description: Cert file.
    validation:
      pattern: "^/[a-zA-Z0-9_./\\-]{1,512}$"
      denied_paths:
        - /etc/shadow
        - /etc/gshadow
        - /etc/shadow-
        - /etc/gshadow-
      denied_prefixes:
        - /root/.ssh
execution:
  command:
    binary: openssl
    argv:
      - "x509"
      - "-in"
      - "{{ args.path }}"
      - "-text"
      - "-noout"
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192
  redact:
    - name: private-key-pem
      type: regex
      pattern: '(?s)-----BEGIN [A-Z0-9 ]*PRIVATE KEY-----.*?-----END [A-Z0-9 ]*PRIVATE KEY-----'
      replacement: '[REDACTED PRIVATE KEY]'
examples:
  - title: Inspect cert
    args:
      path: "/etc/ssl/certs/server.crt"
