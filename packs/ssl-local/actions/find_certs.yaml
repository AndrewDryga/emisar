schema_version: 1
id: ssl.find_certs
title: find *.pem *.crt *.cer under <path>
kind: exec
risk: low
description: Lists certificate-like files under one path.
side_effects:
  - One file-system traversal.
  - Read-only.
args:
  - name: path
    type: string
    required: false
    default: "/etc/ssl"
    description: Root path.
    validation:
      pattern: "^/[a-zA-Z0-9_./\\-]{0,512}$"
      denied_paths:
        - /etc/shadow
        - /etc/gshadow
        - /etc/shadow-
        - /etc/gshadow-
        - /root/.ssh
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "find {{ args.path }} -xdev -type f \\( -name '*.pem' -o -name '*.crt' -o -name '*.cer' \\) -print 2>/dev/null | head -500"
  timeout: 60s
output:
  parser: text
  max_stdout_bytes: 131072
  max_stderr_bytes: 8192
  redact:
    - name: private-key-pem
      type: regex
      pattern: '(?s)-----BEGIN [A-Z0-9 ]*PRIVATE KEY-----.*?-----END [A-Z0-9 ]*PRIVATE KEY-----'
      replacement: '[REDACTED PRIVATE KEY]'
examples:
  - title: Cert files under /etc/ssl
    args: {}
