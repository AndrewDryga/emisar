schema_version: 1
id: ssl.cert_expiry
title: openssl x509 -enddate -subject
kind: exec
risk: low
description: Show cert expiry date + subject. Quick way to answer "is this about to expire?".
side_effects:
  - One file read.
  - Read-only.
args:
  - name: path
    type: string
    required: true
    description: Cert file.
    validation:
      pattern: "^/[a-zA-Z0-9_./\\-]{1,512}$"
      denied_paths:
        - /etc/shadow
        - /etc/gshadow
        - /etc/shadow-
        - /etc/gshadow-
        - /root/.ssh
execution:
  command:
    binary: openssl
    argv:
      - "x509"
      - "-in"
      - "{{ args.path }}"
      - "-noout"
      - "-subject"
      - "-issuer"
      - "-startdate"
      - "-enddate"
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 4096
  max_stderr_bytes: 8192
  redact:
    - name: private-key-pem
      type: regex
      pattern: '(?s)-----BEGIN [A-Z0-9 ]*PRIVATE KEY-----.*?-----END [A-Z0-9 ]*PRIVATE KEY-----'
      replacement: '[REDACTED PRIVATE KEY]'
examples:
  - title: Expiry of one cert
    args:
      path: "/etc/ssl/certs/server.crt"
