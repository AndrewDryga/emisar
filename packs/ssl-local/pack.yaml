schema_version: 1

id: ssl-local
name: Local SSL/TLS cert inspection
version: 0.1.5
description: >
  Inspect TLS certificates and keys on the local filesystem — find PEMs
  under a path, dump x509 details, check chain, verify private-key match,
  inspect PKCS#12. Read-only. Pair with `network-tls` for the remote-side
  view.
vendor: emisar
homepage: https://github.com/andrewdryga/emisar

requires:
  os:
    - linux
  binaries:
    - openssl

setup:
  summary: >
    Inspects certificate and key files on the local runner host's
    filesystem at the paths you pass as action arguments — no credentials
    needed.
  notes:
    - "The runner process needs read access to the cert/key files it inspects; private keys and PKCS#12 stores are often root- or owner-only, so run as a user that can read them."
  verify: ssl.cert_expiry

actions:
  - actions/find_certs.yaml
  - actions/cert_text.yaml
  - actions/cert_expiry.yaml
  - actions/cert_fingerprint.yaml
  - actions/key_modulus.yaml
  - actions/verify_chain.yaml
  - actions/pkcs12_info.yaml
