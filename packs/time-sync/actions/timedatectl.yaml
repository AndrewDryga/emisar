schema_version: 1
id: time.timedatectl
title: timedatectl status
kind: exec
risk: low
description: 'Show current time, timezone, NTP-active state, RTC sync state.'
side_effects:
  - One systemd-timesyncd query.
  - Read-only.
search_terms:
  - clock wrong
  - time skew
  - clock drift
args: []
execution:
  command:
    binary: timedatectl
    argv: ["status"]
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 4096
  max_stderr_bytes: 8192
examples:
  - title: Time + sync state
    args: {}
