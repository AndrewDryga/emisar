defaults:
  env:
    VM_URL: http://victoria-metrics:8428/prometheus
cases:
- action: vm.query_instant
  args:
    query: up
  expect_exit: 0
- action: vm.query_range
  args:
    query: rate(vm_http_requests_total[5m])
    window: 1h
    step: 60s
  expect_exit: 0
- action: vm.series
  args:
    match: up
  expect_exit: 0
- action: vm.labels
  args: {}
  expect_exit: 0
- action: vm.label_values
  args:
    label: job
  expect_exit: 0
- action: vm.tsdb_status
  args: {}
  expect_exit: 0
- action: vm.active_queries
  args: {}
  expect_exit: 0
- action: vm.top_queries
  args: {}
  expect_exit: 0
