schema_version: 1
id: vm.tsdb_status
title: GET /api/v1/status/tsdb
kind: script
risk: low
description: >
  Show TSDB cardinality stats — the metric names, label pairs, and label values
  with the highest series counts. The first stop when cardinality or memory
  is climbing.
side_effects:
  - One read-only HTTP GET to the VictoriaMetrics query API.
  - Read-only.
search_terms:
  - metrics missing
  - series gone
  - cardinality explosion
  - too many series
args:
  - name: top_n
    type: integer
    required: false
    default: 10
    description: Number of top entries to return per category.
    validation:
      min: 1
      max: 100
execution:
  script:
    path: scripts/vmget.sh
    interpreter: /bin/sh
  argv:
    - "/api/v1/status/tsdb"
    - "--data-urlencode"
    - "topN={{ args.top_n }}"
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 1048576
  max_stderr_bytes: 8192
examples:
  - title: Top cardinality contributors
    args: {}
