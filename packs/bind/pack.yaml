schema_version: 1

id: bind
name: BIND DNS server
version: 0.1.6
description: >
  Authoritative/recursive BIND ops: rndc status + stats, zone validation,
  cache inspection, local resolution probes, plus narrow operator actions
  (rndc reload, zone freeze/thaw). Requires rndc key on the runner host.
vendor: emisar
homepage: https://github.com/andrewdryga/emisar

requires:
  os:
    - linux
  binaries:
    - rndc

# `emisar pack suggest` detection — default process names / ports.
detect:
  processes:
    - named

setup:
  summary: >
    Operates on the local named instance on the runner host — no
    credentials needed. rndc controls named via its key file; dig queries
    127.0.0.1.
  notes:
    - "rndc needs its key readable by the runner user (/etc/rndc.key or the key in /etc/rndc.conf) and the named controls channel reachable on 127.0.0.1."
    - "rndc_reload, rndc_freeze, rndc_thaw, and rndc_flush change server state and need root (or a key with the matching rndc permissions)."
    - "zone_dump (AXFR) requires named's allow-transfer to include 127.0.0.1."
  verify: bind.rndc_status

actions:
  - actions/rndc_status.yaml
  - actions/rndc_stats.yaml
  - actions/named_checkconf.yaml
  - actions/named_checkzone.yaml
  - actions/zone_dump.yaml
  - actions/query_local.yaml
  - actions/zone_serial.yaml
  - actions/rndc_reload.yaml
  - actions/rndc_freeze.yaml
  - actions/rndc_thaw.yaml
  - actions/rndc_flush.yaml
