schema_version: 1
id: bind.rndc_status
title: rndc status
kind: exec
risk: low
description: Show named version, uptime, zone count, configured vs current settings.
side_effects: ["One rndc call.", "Read-only."]
args: []
execution:
  command: {binary: rndc, argv: ["status"]}
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 8192
  max_stderr_bytes: 8192
examples:
  - title: Status
    args: {}
