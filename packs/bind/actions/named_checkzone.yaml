schema_version: 1
id: bind.named_checkzone
title: named-checkzone <zone> <file>
kind: exec
risk: low
description: Validates one zone file.
side_effects: ["One file read.", "Read-only."]
args:
  - name: zone
    type: string
    required: true
    description: Zone name.
    validation:
      pattern: "^[a-zA-Z0-9.\\-]{1,253}$"
  - name: file
    type: string
    required: true
    description: Zone file path.
    validation:
      pattern: "^/[a-zA-Z0-9_./\\-]{1,512}$"
execution:
  command:
    binary: named-checkzone
    argv: ["{{ args.zone }}", "{{ args.file }}"]
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 16384
  max_stderr_bytes: 8192
examples:
  - title: Check zone file
    args:
      zone: "example.com"
      file: "/etc/bind/db.example.com"
