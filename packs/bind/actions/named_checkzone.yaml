schema_version: 1
id: bind.named_checkzone
title: named-checkzone <zone> <file>
kind: exec
risk: low
description: Validates one zone file.
side_effects: ["One file read.", "Read-only."]
args:
  - name: zone
    type: string
    required: true
    description: Zone name.
    validation:
      pattern: "^[a-zA-Z0-9][a-zA-Z0-9.\\-]{0,252}$"
  - name: file
    type: string
    required: true
    description: Zone file path.
    validation:
      pattern: "^/[a-zA-Z0-9_./\\-]{1,512}$"
      # The pattern blocks shell metacharacters but NOT `..` (`.`/`/` are literal
      # charset members). named-checkzone PARSES the file and quotes offending
      # lines back in its errors, so an unscoped path is a filtered read oracle
      # over any runner-readable secret. allowed_prefixes engages the runner's
      # Clean+EvalSymlinks containment, scoping the read to BIND's standard zone
      # roots (Debian /etc/bind + /var/lib/bind dynamic zones, RHEL /var/named
      # incl. its chroot, /etc/named).
      allowed_prefixes:
        - /etc/bind
        - /var/lib/bind
        - /var/named
        - /etc/named
execution:
  command:
    binary: named-checkzone
    argv: ["{{ args.zone }}", "{{ args.file }}"]
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 16384
  max_stderr_bytes: 8192
examples:
  - title: Check zone file
    args:
      zone: "example.com"
      file: "/etc/bind/db.example.com"
