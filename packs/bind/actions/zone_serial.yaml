schema_version: 1
id: bind.zone_serial
title: SOA serial of <zone>
kind: exec
risk: low
description: SOA serial from localhost — use to confirm a zone reloaded.
side_effects: ["One DNS query.", "Read-only."]
args:
  - name: zone
    type: string
    required: true
    description: Zone name.
    validation:
      pattern: "^[a-zA-Z0-9.\\-]{1,253}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "dig @127.0.0.1 {{ args.zone }} SOA +short | awk '{print $3}'"
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 1024
  max_stderr_bytes: 8192
examples:
  - title: Serial
    args:
      zone: "example.com"
