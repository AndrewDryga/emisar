schema_version: 1

id: mysql
name: MySQL / MariaDB operations
version: 0.1.4
description: >
  Read-only MySQL diagnostics plus narrow operator actions for killing
  queries, flushing logs, and analyzing tables. Authenticates via
  ~/.my.cnf or MYSQL_PWD env var on the runner host — never via
  per-call credentials over the wire.
vendor: emisar
homepage: https://github.com/andrewdryga/emisar

requires:
  os:
    - linux
  binaries:
    - mysql

# `emisar pack suggest` detection — default process names / ports.
detect:
  processes:
    - mysqld
    - mariadbd
  ports:
    - 3306

setup:
  summary: >
    The mysql client reads its password and connection target from its own
    environment variables on the runner host; the actions pass no connection
    flags. The username is not taken from the environment — it comes from
    ~/.my.cnf or defaults to the runner's OS user.
  env:
    - name: MYSQL_PWD
      description: Password for the connecting user. Prefer ~/.my.cnf instead — env-var passwords are visible in the process list.
    - name: MYSQL_HOST
      description: Server host for TCP connections.
      default: localhost
    - name: MYSQL_TCP_PORT
      description: Server TCP port.
      default: "3306"
    - name: MYSQL_UNIX_PORT
      description: Unix socket path, used when connecting to localhost.
      example: /var/run/mysqld/mysqld.sock
  notes:
    - "Cleanest credential store: ~/.my.cnf (mode 0600) on the runner host with [client] user/password/host — read from disk, so it needs no inherit_env entry."
    - The username is never read from the environment; set it in ~/.my.cnf, otherwise it defaults to the runner's OS user.
    - Mutators (kill_query, kill_connection, flush_logs, analyze_table, optimize_table) need a user with PROCESS/RELOAD and the relevant table privileges.
  verify: mysql.uptime

actions:
  # Server state
  - actions/uptime.yaml
  - actions/status.yaml
  - actions/variables.yaml
  - actions/engines.yaml
  # Live activity
  - actions/processlist.yaml
  - actions/connections_summary.yaml
  - actions/innodb_status.yaml
  - actions/slow_queries.yaml
  - actions/lock_waits.yaml
  - actions/open_tables.yaml
  # Storage / tables
  - actions/db_sizes.yaml
  - actions/table_sizes.yaml
  - actions/table_io_summary.yaml
  - actions/index_unused.yaml
  # Replication
  - actions/replica_status.yaml
  - actions/master_status.yaml
  - actions/binlog_positions.yaml
  - actions/gtid_executed.yaml
  # ACL
  - actions/users_grants.yaml
  # Mutators
  - actions/kill_query.yaml
  - actions/kill_connection.yaml
  - actions/flush_logs.yaml
  - actions/flush_status.yaml
  - actions/analyze_table.yaml
  - actions/optimize_table.yaml
