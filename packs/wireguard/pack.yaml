schema_version: 1

id: wireguard
name: WireGuard VPN
version: 0.1.5
description: >
  WireGuard state — interfaces, peers, transfer counts, last
  handshakes — plus operator actions: bring iface up/down via wg-quick,
  remove a peer from a live iface. Use to debug connectivity or evict
  a compromised peer.
vendor: emisar
homepage: https://github.com/andrewdryga/emisar

requires:
  os:
    - linux
  binaries:
    - wg

setup:
  summary: >
    Reads and manages WireGuard interfaces on the local runner host — no
    credentials needed.
  notes:
    - "wg show / showconf read interface and peer state via netlink, which needs root (CAP_NET_ADMIN); showconf's PrivateKey/PresharedKey lines are masked at the source before output leaves the host."
    - "Mutators (wg-quick up/down, removing a peer) also need root."
  verify: wg.show

actions:
  # Inventory
  - actions/show.yaml
  - actions/show_transfer.yaml
  - actions/show_latest_handshakes.yaml
  - actions/show_endpoints.yaml
  - actions/showconf.yaml
  # Mutators
  - actions/quick_up.yaml
  - actions/quick_down.yaml
  - actions/set_peer_remove.yaml
