schema_version: 1
id: grafana.settings
title: GET /api/admin/settings
kind: exec
risk: low
description: Server settings (auth, smtp, database paths).
side_effects: ["One API call.", "Read-only — credentials in output may be partially masked but rely on audit redaction."]
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "{ [ -n \"$GRAFANA_TOKEN\" ] && printf 'Authorization: Bearer %s\\n' \"$GRAFANA_TOKEN\"; } | curl -sS -H @- \"${GRAFANA_URL:-http://127.0.0.1:3000}/api/admin/settings\""
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: Settings
    args: {}
