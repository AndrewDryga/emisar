schema_version: 1
id: grafana.datasources
title: GET /api/datasources
kind: exec
risk: low
description: List all datasources with type + URL + access mode.
side_effects: ["One API call.", "Read-only."]
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "{ [ -n \"$GRAFANA_TOKEN\" ] && printf 'Authorization: Bearer %s\\n' \"$GRAFANA_TOKEN\"; } | curl -sS -H @- \"${GRAFANA_URL:-http://127.0.0.1:3000}/api/datasources\""
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: All datasources
    args: {}
