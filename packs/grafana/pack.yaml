schema_version: 1

id: grafana
name: Grafana
version: 0.1.8
description: >
  Grafana admin-API ops — datasource health, dashboard listings, alert
  state, user list, version, settings. Read-only. Auth via GRAFANA_URL
  + GRAFANA_TOKEN env vars on the runner host.
vendor: emisar
homepage: https://github.com/andrewdryga/emisar

requires:
  os:
    - linux
  binaries:
    - curl

# Suggestion signal for `emisar pack suggest`: Grafana runs locally on its
# own process and port; the curl above is only how the read actions reach
# its HTTP API, so it can't be the detection signal.
detect:
  processes:
    - grafana-server
    - grafana

setup:
  summary: >
    Every action calls the Grafana HTTP API at $GRAFANA_URL via curl, sending
    $GRAFANA_TOKEN as an "Authorization: Bearer" header. Both are read on the
    runner host; set them to a reachable Grafana and a valid token.
  env:
    - name: GRAFANA_URL
      default: http://127.0.0.1:3000
      description: Grafana base URL (scheme + host + port, no trailing path). Defaults to a local Grafana.
      example: https://grafana.internal:3000
    - name: GRAFANA_TOKEN
      required: true
      description: Service-account token or API key sent as the Bearer credential.
  notes:
    - "Any of GRAFANA_URL / GRAFANA_TOKEN you set must also be allowlisted in the runner's execution.inherit_env — the action env is scrubbed to PATH/LANG/LC_ALL/TERM by default, so an env present on the host but not allowlisted is silently dropped (the action falls back to its local default or fails auth)."
    - "Create the token as a service account (Administration -> Service accounts) or a legacy API key; this pack is read-only, so a Viewer/Admin-read role is enough."
    - "settings and users actions return data only if the token's role can read them — a Viewer token may see less than an Admin token."
  verify: grafana.health

actions:
  - actions/health.yaml
  - actions/version.yaml
  - actions/datasources.yaml
  - actions/datasource_health.yaml
  - actions/dashboards_search.yaml
  - actions/alerting_state.yaml
  - actions/alerting_rules.yaml
  - actions/users.yaml
  - actions/orgs.yaml
  - actions/settings.yaml
