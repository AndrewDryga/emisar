schema_version: 1

id: linux.systemctl_restart
title: Restart a systemd unit
kind: exec
risk: high

description: >
  Restarts a named systemd unit. Clients will see an outage of
  seconds-to-minutes depending on the unit. Treat as a last-resort action:
  prefer diagnosis (logs, status, disk, memory) first. Never restart a
  database under load without confirming there is no in-flight repair,
  compaction, or similar background operation.

side_effects:
  - Stops the named unit, then starts it.
  - Disconnects existing clients of the unit.
  - May trigger downstream alerts if the unit takes time to recover.
  - Does not modify configuration or on-disk state.

args:
  - name: unit
    type: string
    required: true
    description: Systemd unit to restart.
    validation:
      enum:
        - cassandra
        - nginx
        - postgresql
        - docker

execution:
  command:
    binary: systemctl
    argv:
      - "restart"
      - "{{ args.unit }}"
  timeout: 60s
  cwd: /

output:
  parser: text
  max_stdout_bytes: 4096
  max_stderr_bytes: 8192

examples:
  - title: Restart nginx after a config reload check
    args:
      unit: nginx
