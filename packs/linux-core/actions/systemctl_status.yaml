schema_version: 1

id: linux.systemctl_status
title: Systemd unit status
kind: exec
risk: low

description: >
  Reports the current systemd unit status for a named service. Read-only.
  Use to confirm whether a service is active before recommending diagnostic
  or remediation actions.

side_effects:
  - Reads systemd state.
  - Touches no files.

args:
  - name: unit
    type: string
    required: true
    description: Systemd unit to query.
    validation:
      # Any valid systemd unit name. A generic pack can't enumerate every
      # service a fleet runs; the regex keeps the argument injection-safe
      # without baking in one environment's service list.
      pattern: "^[a-zA-Z0-9@._-]{1,128}$"

execution:
  command:
    # Resolved from PATH (systemctl is under /usr/bin or /bin depending on
    # the distro's usr-merge). Alpine + minimal images don't ship
    # systemd-tools at all — the runner will error out cleanly there.
    binary: systemctl
    argv:
      - "status"
      - "{{ args.unit }}"
      - "--no-pager"
  timeout: 10s
  cwd: /

output:
  parser: text
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192

examples:
  - title: Check Cassandra status
    args:
      unit: cassandra
