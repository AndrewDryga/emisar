schema_version: 1

id: linux.memory_detailed
title: Full /proc/meminfo
kind: exec
risk: low

description: >
  Dump full /proc/meminfo. More detail than the `linux.memory` action
  — surfaces hugepages, slab, dirty/writeback, page tables, KSM,
  cgroup memcg. Read-only.

side_effects:
  - One read of /proc/meminfo.
  - Read-only.

args: []

execution:
  command:
    binary: cat
    argv:
      - "/proc/meminfo"
  timeout: 5s

output:
  parser: text
  max_stdout_bytes: 8192
  max_stderr_bytes: 4096

examples:
  - title: Full memory accounting
    args: {}
