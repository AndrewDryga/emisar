schema_version: 1

id: linux.disk_smart
title: SMART health for one disk
kind: exec
risk: low

description: >
  Runs `smartctl -H -A` against a block device. Returns the overall
  PASS/FAIL plus the attribute table (reallocated sectors, pending,
  uncorrectable, temperature). Read-only on the disk; needs the
  `smartmontools` package and CAP_SYS_RAWIO (root) to access device
  registers. For a disk behind a RAID controller (Dell PERC, HP
  SmartArray), pass `device_type` (e.g. `megaraid,0`) — the bare block
  device isn't reachable through the controller without it.

side_effects:
  - One smartctl invocation.
  - Reads SMART registers; no writes to the disk.

search_terms:
  - failing drive
  - bad sectors

args:
  - name: device
    type: string
    required: true
    description: Block device under /dev (e.g. sda, nvme0n1).
    validation:
      pattern: "^[a-zA-Z0-9]{1,16}$"
  - name: device_type
    type: string
    required: false
    default: auto
    description: >
      smartctl device type (-d). "auto" (default) auto-detects direct
      ATA/SATA/NVMe disks; use "megaraid,N" or "cciss,N" for a disk behind a
      RAID controller, or "sat"/"scsi"/"nvme" to force a transport.
    validation:
      pattern: "^(auto|ata|sat|scsi|nvme|megaraid,[0-9]{1,3}|cciss,[0-9]{1,3}|aacraid,[0-9]{1,3},[0-9]{1,3},[0-9]{1,3})$"
      max_length: 32

execution:
  command:
    binary: smartctl
    argv:
      - "-d"
      - "{{ args.device_type }}"
      - "-H"
      - "-A"
      - "/dev/{{ args.device }}"
  timeout: 15s

output:
  parser: text
  max_stdout_bytes: 32768
  max_stderr_bytes: 8192

examples:
  - title: SMART for sda (direct)
    args:
      device: sda
  - title: SMART for a disk behind a PERC / megaraid controller
    args:
      device: sda
      device_type: "megaraid,0"
