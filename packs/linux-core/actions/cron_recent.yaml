schema_version: 1

id: linux.cron_recent
title: Recent cron job execution log
kind: exec
risk: low

description: >
  Show last N journalctl entries matching CRON. Lets operators see "did
  the backup job fire last night?" without grepping syslog. Read-only.

side_effects:
  - One journalctl invocation.
  - Read-only.

args:
  - name: count
    type: integer
    required: false
    default: 50
    description: How many recent CRON entries to return.
    validation:
      min: 1
      max: 500

execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "journalctl -u cron -u crond _COMM=CRON --no-pager -n {{ args.count }}"
  timeout: 15s

output:
  parser: text
  max_stdout_bytes: 131072
  max_stderr_bytes: 8192

examples:
  - title: Last 50 cron entries
    args: {}
