schema_version: 1

id: git-local
name: Host-side git
version: 0.1.4
retired_below: 0.1.4
description: >
  Read-only git operations against a checkout living on the runner host
  (e.g. /opt/myapp). For remote-GitHub-API work, see the `github-cli`
  pack. The repo directory must live at GIT_REPO env var on the runner
  host.
vendor: emisar
homepage: https://github.com/andrewdryga/emisar

requires:
  os:
    - linux
  binaries:
    - git

setup:
  summary: >
    Runs read-only git commands against a checkout on the runner host —
    no credentials needed (nothing fetches or pushes to a remote).
  env:
    - name: GIT_REPO
      required: true
      description: Absolute path to the git checkout on the runner host that every action operates in. Add it to the runner's inherit_env.
      example: /opt/myapp
  notes:
    - "The runner uid must be able to read the repo directory; for repos owned by another user, add the path to git's safe.directory or run as that user."
  verify: git.status

actions:
  - actions/status.yaml
  - actions/log_recent.yaml
  - actions/diff_head.yaml
  - actions/branch_list.yaml
  - actions/show_commit.yaml
  - actions/blame_file.yaml
  - actions/reflog.yaml
  - actions/remote_list.yaml
