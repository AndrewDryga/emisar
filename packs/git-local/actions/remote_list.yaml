schema_version: 1
id: git.remote_list
title: git remote -v
kind: exec
risk: low
description: List the remote URLs (fetch + push).
side_effects:
  - One git remote.
  - Read-only.
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "cd \"$GIT_REPO\" && git remote -v"
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 8192
  max_stderr_bytes: 8192
examples:
  - title: Remotes
    args: {}
