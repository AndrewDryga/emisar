schema_version: 1
id: pure.array_connections
title: GET /array-connections
kind: script
risk: low
description: >
  Connected-array / replication status — each peer array this array is
  connected to, the connection type (async / sync replication), and its
  status. Use to confirm replication peers are connected and healthy. Returns
  {items:[...], more_items_remaining, ...}, one item per connected array.
side_effects:
  - One read-only HTTP GET to the FlashArray REST API.
  - Read-only — never writes or mutates array state.
args: []
execution:
  script:
    path: scripts/pureget.sh
    interpreter: /bin/sh
  argv:
    - "/array-connections"
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 1048576
  max_stderr_bytes: 8192
examples:
  - title: Replication / connected-array status
    args: {}
