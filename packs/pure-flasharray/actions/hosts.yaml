schema_version: 1
id: pure.hosts
title: GET /hosts
kind: script
risk: low
description: >
  List the host inventory — each host object and the initiator identities registered
  to it: iSCSI IQNs, Fibre Channel WWNs, and NVMe NQNs. Use to confirm an
  initiator is registered to the expected host. Returns
  {items:[...], more_items_remaining, ...}, one item per host.
side_effects:
  - One read-only HTTP GET to the FlashArray REST API.
  - Read-only — never writes or mutates array state.
args: []
execution:
  script:
    path: scripts/pureget.sh
    interpreter: /bin/sh
  argv:
    - "/hosts"
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 1048576
  max_stderr_bytes: 8192
examples:
  - title: Host inventory (IQNs / WWNs / NQNs)
    args: {}
