schema_version: 1
id: iam.list_access_keys
title: aws iam list-access-keys
kind: exec
risk: low
description: List access key IDs for one user (NOT the secret).
side_effects: ["One API call.", "Read-only — secret keys not returned."]
args:
  - name: user
    type: string
    required: true
    description: Username.
    validation:
      pattern: "^[a-zA-Z0-9_+=,.@\\-]{1,64}$"
execution:
  command:
    binary: aws
    argv: ["iam", "list-access-keys", "--user-name", "{{ args.user }}", "--output", "json"]
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 8192
  max_stderr_bytes: 8192
examples:
  - title: Access keys for one user
    args:
      user: "alice"
