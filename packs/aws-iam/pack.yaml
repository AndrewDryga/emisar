schema_version: 1
id: aws-iam
name: AWS IAM operations
version: 0.1.4
description: >
  IAM introspection — users, roles, policies, attached policies, access
  keys — plus incident-response mutators: deactivate access key,
  delete access key, detach user policy. Auth via AWS_PROFILE. Routine
  IAM changes belong in IaC; these actions are for emergency lockout.
vendor: emisar
homepage: https://github.com/andrewdryga/emisar

requires:
  os: [linux]
  binaries: [aws]

setup:
  summary: >
    Drives the aws CLI on the runner host. It resolves credentials from
    its own environment or ~/.aws config — the runner only forwards the
    variables you allowlist in inherit_env.
  env:
    - name: AWS_PROFILE
      description: Named profile in ~/.aws/config and ~/.aws/credentials. Omit to use the default profile or static-key/instance-role auth.
      example: prod
    - name: AWS_ACCESS_KEY_ID
      description: Static access key. Use instead of a profile; pair with AWS_SECRET_ACCESS_KEY.
    - name: AWS_SECRET_ACCESS_KEY
      description: Secret for AWS_ACCESS_KEY_ID.
    - name: AWS_SESSION_TOKEN
      description: Session token for temporary (STS) credentials.
  notes:
    - "IAM is a global service, so no region is required (AWS_REGION is harmless if set)."
    - "Read actions need iam:Get*/List*. The mutators deactivate_access_key / delete_access_key / detach_user_policy additionally need iam:UpdateAccessKey / DeleteAccessKey / DetachUserPolicy."
    - "Alternative to env keys: an ~/.aws/credentials profile (read from disk, no inherit_env entry) or, on EC2/ECS, the instance/task role from instance metadata (no credentials needed at all)."
  verify: iam.list_users

actions:
  - actions/list_users.yaml
  - actions/list_roles.yaml
  - actions/list_policies.yaml
  - actions/get_user.yaml
  - actions/get_role.yaml
  - actions/list_attached_user_policies.yaml
  - actions/list_access_keys.yaml
  - actions/last_used_access_key.yaml
  - actions/deactivate_access_key.yaml
  - actions/delete_access_key.yaml
  - actions/detach_user_policy.yaml
