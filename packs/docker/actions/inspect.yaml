schema_version: 1

id: docker.inspect
title: docker inspect (one container)
kind: exec
risk: medium

description: >
  Returns the full JSON inspect document for one container — state, exit
  code, restart count, mounts, network config, labels, and the
  container's env. The env commonly carries injected secrets (DB URLs,
  API keys, values passed with -e), so this is approval-gated; the
  runner's redaction is a fail-closed backstop, not a guarantee — it is
  pattern-bound and can miss a bespoke secret. Container name is
  pattern-restricted. Read-only.

side_effects:
  - One docker inspect invocation.
  - Read-only, but exposes the container's env (may include secrets).

search_terms:
  - environment variables
  - exit reason

args:
  - name: container
    type: string
    required: true
    description: Container name or ID.
    validation:
      pattern: "^[a-zA-Z0-9_.][a-zA-Z0-9_.\\-]{0,127}$"

execution:
  command:
    binary: docker
    argv:
      - "inspect"
      - "{{ args.container }}"
  timeout: 30s

output:
  parser: json
  max_stdout_bytes: 1048576
  max_stderr_bytes: 16384

examples:
  - title: Inspect the "api" container
    args:
      container: api
