schema_version: 1
id: docker.compose_ps
title: docker compose ps -a
kind: exec
risk: low
description: >
  Lists services in a compose project (running + stopped). The compose-file path is required and pattern-restricted. Read-only.
side_effects:
  - One docker compose ps invocation.
  - Read-only.
args:
  - name: file
    type: string
    required: true
    description: Path to docker-compose.yml.
    validation:
      pattern: "^/[A-Za-z0-9._/-]{1,256}$"
      # The pattern blocks shell metacharacters but NOT `..` — `.` and `/` are
      # literal charset members. allowed_prefixes runs the runner's
      # Clean+EvalSymlinks containment, collapsing any `../` escape to its real
      # path and rejecting anything outside a standard compose-project root:
      # docker compose PARSES the file and quotes offending lines back in its
      # errors, so an unscoped path is an arbitrary-file read oracle over any
      # runner-readable secret. Scoped to service-deployment roots (compose
      # stacks on managed hosts live here) — /home and /root are excluded so
      # this no-approval read can't reach user/root dotfile secrets
      # (.ssh/.pgpass/.aws/.env).
      allowed_prefixes:
        - /opt
        - /srv
        - /var/www
        - /data
        - /usr/local
execution:
  command:
    binary: docker
    argv:
      - "compose"
      - "-f"
      - "{{ args.file }}"
      - "ps"
      - "-a"
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192
examples:
  - title: Status of services in the prod stack
    args:
      file: "/opt/stack/docker-compose.yml"
