schema_version: 1
id: docker.events_tail
title: docker events (bounded window)
kind: exec
risk: low
description: >
  Replays docker daemon events from the last N minutes (create/destroy/start/stop/oom/health). Use to find "why did the container restart?" Read-only.
side_effects:
  - One docker events query bounded to the requested window.
  - Read-only.
args:
  - name: minutes
    type: integer
    required: false
    default: 5
    description: How many minutes of events to replay.
    validation:
      min: 1
      max: 1440
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "docker events --since {{ args.minutes }}m --until 0s"
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 262144
  max_stderr_bytes: 8192
examples:
  - title: Events from the last 5 minutes
    args: {}
