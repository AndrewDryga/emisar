schema_version: 1
id: docker.volume_prune
title: docker volume prune (DESTRUCTIVE)
kind: exec
risk: critical
description: >
  Removes every volume not attached to a container. **Permanently deletes the data on them.** Use only on caches and dev hosts. Pair with `docker.volume_ls` first to confirm what's loose.
side_effects:
  - Deletes every unattached volume.
  - Irreversible — there is no recycle bin for docker volumes.
search_terms:
  - orphaned volumes
args: []
execution:
  command:
    binary: docker
    argv:
      - "volume"
      - "prune"
      - "-f"
      - "--filter"
      - "all=true"
  timeout: 60s
output:
  parser: text
  max_stdout_bytes: 65536
  max_stderr_bytes: 16384
examples:
  - title: Drop every detached volume
    args: {}
