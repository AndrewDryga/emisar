defaults:
  env: {}
cases:
- action: docker.compose_logs
  args:
    file: /opt/stack/docker-compose.yml
    service: api
  expect_exit: 0
- action: docker.compose_ps
  args:
    file: /opt/stack/docker-compose.yml
  expect_exit: 0
- action: docker.compose_restart
  args:
    file: /opt/stack/docker-compose.yml
    service: api
  skip: mutator skipped by default (high); set --include=docker.compose_restart to run
- action: docker.container_top
  args:
    container: api
  expect_exit: 0
- action: docker.events_tail
  args: {}
  expect_exit: 0
- action: docker.events_tail
  args:
    minutes: 30
    include_exec: true
  expect_exit: 0
- action: docker.image_history
  args:
    image: nginx:latest
  expect_exit: 0
- action: docker.image_inspect
  args:
    image: nginx:latest
  expect_exit: 0
- action: docker.images
  args: {}
  expect_exit: 0
- action: docker.info
  args: {}
  expect_exit: 0
- action: docker.inspect
  args:
    container: api
  expect_exit: 0
- action: docker.kill
  args:
    container: api
  skip: mutator skipped by default (high); set --include=docker.kill to run
- action: docker.logs
  args:
    container: api
  expect_exit: 0
- action: docker.network_inspect
  args:
    name: bridge
  expect_exit: 0
- action: docker.network_ls
  args: {}
  expect_exit: 0
- action: docker.ps
  args: {}
  expect_exit: 0
- action: docker.pull_image
  args:
    image: busybox:1.36
  expect_exit:
  - 0
  - 1
  skip: mutator skipped by default (medium)
- action: docker.restart
  args:
    container: api
  skip: mutator skipped by default (high); set --include=docker.restart to run
- action: docker.stats
  args: {}
  expect_exit: 0
- action: docker.stop
  args:
    container: api
  skip: mutator skipped by default (high); set --include=docker.stop to run
- action: docker.system_df
  args: {}
  expect_exit: 0
- action: docker.system_prune
  args: {}
  skip: mutator skipped by default (high); set --include=docker.system_prune to run
- action: docker.version
  args: {}
  expect_exit: 0
- action: docker.volume_inspect
  args:
    name: pgdata
  expect_exit: 0
- action: docker.volume_ls
  args: {}
  expect_exit: 0
- action: docker.volume_prune
  args: {}
  skip: mutator skipped by default (critical); set --include=docker.volume_prune to run
