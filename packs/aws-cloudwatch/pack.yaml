schema_version: 1
id: aws-cloudwatch
name: AWS CloudWatch operations
version: 0.1.2
description: >
  Metric + alarm + log group + log stream + log query introspection.
  Read-only. Auth via AWS_PROFILE.
vendor: emisar
homepage: https://github.com/andrewdryga/emisar

requires:
  os: [linux]
  binaries: [aws]

setup:
  summary: >
    Drives the aws CLI on the runner host. It resolves credentials and
    region from its own environment or ~/.aws config — the runner only
    forwards the variables you allowlist in inherit_env.
  env:
    - name: AWS_PROFILE
      description: Named profile in ~/.aws/config and ~/.aws/credentials. Omit to use the default profile or static-key/instance-role auth.
      example: prod
    - name: AWS_REGION
      required: true
      description: Region to query; CloudWatch is regional, so calls fail without it.
      example: us-east-1
    - name: AWS_ACCESS_KEY_ID
      description: Static access key. Use instead of a profile; pair with AWS_SECRET_ACCESS_KEY.
    - name: AWS_SECRET_ACCESS_KEY
      description: Secret for AWS_ACCESS_KEY_ID.
    - name: AWS_SESSION_TOKEN
      description: Session token for temporary (STS) credentials.
  notes:
    - "Alternative to env keys: an ~/.aws/credentials profile (read from disk, no inherit_env entry) or, on EC2/ECS, the instance/task role from instance metadata (no credentials needed at all)."
    - "Principal needs read access to CloudWatch and Logs (e.g. cloudwatch:DescribeAlarms / GetMetricStatistics / ListMetrics and logs:DescribeLogGroups / DescribeLogStreams / GetLogEvents / FilterLogEvents)."
  verify: cw.describe_alarms

actions:
  - actions/describe_alarms.yaml
  - actions/alarms_in_alarm.yaml
  - actions/list_metrics.yaml
  - actions/get_metric_statistics.yaml
  - actions/log_groups.yaml
  - actions/log_streams.yaml
  - actions/log_tail.yaml
