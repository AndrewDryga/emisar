schema_version: 1
id: vector.version
title: vector --version
kind: exec
risk: low
description: >
  Print the Vector binary version and build metadata. Run this FIRST: it
  tells you whether the observability API is GraphQL (Vector <= 0.54) or
  gRPC (>= 0.55, April 2026). That determines whether the GraphQL
  component_metrics action will work or 404. Talks only to the local
  binary — needs no API.
side_effects: ["Reads the local Vector binary version.", "Read-only."]
args: []
execution:
  command: {binary: vector, argv: ["--version"]}
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 16384
  max_stderr_bytes: 8192
examples:
  - title: Show version (and pick GraphQL vs gRPC)
    args: {}
