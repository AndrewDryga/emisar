schema_version: 1
id: httpd.error_tail
title: tail error_log
kind: exec
risk: low
description: Tail the last N lines from the Apache error log.
side_effects:
  - One file read.
  - Read-only.
args:
  - name: lines
    type: integer
    required: false
    default: 200
    description: Lines to tail.
    validation:
      min: 1
      max: 5000
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "tail -n {{ args.lines }} \"${HTTPD_ERROR_LOG:-/var/log/apache2/error.log}\""
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 1048576
  max_stderr_bytes: 8192
examples:
  - title: Last 200 errors
    args: {}
