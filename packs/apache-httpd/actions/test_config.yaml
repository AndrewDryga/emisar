schema_version: 1
id: httpd.test_config
title: apachectl -t
kind: exec
risk: low
description: Check config syntax. Run before graceful_reload.
side_effects:
  - Forks apachectl.
  - Read-only.
args: []
execution:
  command:
    binary: apachectl
    argv:
      - "-t"
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 8192
  max_stderr_bytes: 8192
examples:
  - title: Test config
    args: {}
