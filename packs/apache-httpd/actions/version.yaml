schema_version: 1
id: httpd.version
title: apachectl -V
kind: exec
risk: low
description: Show Apache version + compiled-in directives + MPM.
side_effects:
  - Forks apachectl.
  - Read-only.
args: []
execution:
  command:
    binary: apachectl
    argv:
      - "-V"
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 8192
  max_stderr_bytes: 8192
examples:
  - title: Version
    args: {}
