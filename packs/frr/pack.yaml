schema_version: 1

id: frr
name: FRRouting (FRR)
version: 0.1.1
description: >
  Query the local FRRouting daemons via vtysh — BGP summary + neighbors,
  BFD peers, IP route summary, and interface state. Read-only `show`
  commands.
vendor: emisar
homepage: https://github.com/andrewdryga/emisar

requires:
  os:
    - linux
  binaries:
    - vtysh

# `emisar pack suggest` detection — the vtysh CLI + the FRR core daemon.
detect:
  binaries:
    - vtysh
  processes:
    - zebra

setup:
  summary: >
    Queries the local FRR daemons through vtysh — no credentials needed.
    vtysh needs root or membership in the frrvty group to reach the
    daemon vty sockets.
  notes:
    - "Prefer the frrvty group over root: vtysh reads the daemon vty sockets, which FRR group-owns by frrvty. Add the runner user and restart so the membership takes effect — `usermod -aG frrvty emisar` (add `frr` too if your build has no separate vty group), then `systemctl restart emisar` (restart, not reload). Root also works but isn't needed."
    - "Every action here is a read-only `show` command; an unconfigured protocol (no BGP, no BFD) returns an empty / 'no process' result rather than failing."
  verify: frr.bgp_summary

actions:
  - actions/bgp_summary.yaml
  - actions/bgp_neighbors.yaml
  - actions/bfd_peers.yaml
  - actions/route_summary.yaml
  - actions/interfaces.yaml
