schema_version: 1

id: frr
name: FRRouting (FRR)
version: 0.1.3
description: >
  Query the local FRRouting daemons via vtysh — BGP summary + neighbors,
  BFD peers, IP route summary, and interface state — plus one gated mutation:
  shut a BGP neighbor to drain a node from an anycast VIP. Reads are `show`
  commands; the drain is policy-gated (risk: high).
vendor: emisar
homepage: https://github.com/andrewdryga/emisar

requires:
  os:
    - linux
  binaries:
    - vtysh

# `emisar pack suggest` detection — the vtysh CLI + the FRR core daemon.
detect:
  binaries:
    - vtysh
  processes:
    - zebra

setup:
  summary: >
    Queries the local FRR daemons through vtysh — no credentials needed.
    vtysh needs root or membership in the frrvty group to reach the
    daemon vty sockets.
  notes:
    - "Reads need vty socket access: prefer the frrvty group over root — `usermod -aG frrvty emisar` (add `frr` too if your build has no separate vty group), then `systemctl restart emisar` (restart, not reload). The bgp_neighbor_shutdown drain writes the running config, which needs write access to the vty — the `frr` group (or root); the read-only frrvty group is not enough for it."
    - "The `show` actions are read-only; an unconfigured protocol (no BGP, no BFD) returns an empty / 'no process' result rather than failing. bgp_neighbor_shutdown is the one mutation — risk: high, policy-gated, and reversible (`no neighbor <peer> shutdown`)."
  verify: frr.bgp_summary

actions:
  - actions/bgp_summary.yaml
  - actions/bgp_neighbors.yaml
  - actions/bfd_peers.yaml
  - actions/route_summary.yaml
  - actions/interfaces.yaml
  - actions/bgp_neighbor_shutdown.yaml
