defaults:
  env:
    COCKROACH_URL: "postgresql://root@cockroach:26257/defaultdb?sslmode=disable"
cases:
# Read-only reads — verified against a single-node `cockroach start-single-node`.
- action: cockroach.cluster_queries
  args: {}
  expect_exit: 0
- action: cockroach.cluster_sessions
  args: {}
  expect_exit: 0
- action: cockroach.cluster_settings
  args: {}
  expect_exit: 0
- action: cockroach.cluster_transactions
  args: {}
  expect_exit: 0
- action: cockroach.contention_events
  args: {}
  expect_exit: 0
- action: cockroach.contention_leaderboard
  args: {}
  expect_exit: 0
- action: cockroach.databases
  args: {}
  expect_exit: 0
- action: cockroach.jobs
  args: {}
  expect_exit: 0
- action: cockroach.locks
  args: {}
  expect_exit: 0
- action: cockroach.node_liveness
  args: {}
  expect_exit: 0
- action: cockroach.node_status
  args: {}
  expect_exit: 0
- action: cockroach.node_status_one
  args:
    node_id: "1"
  expect_exit: 0
- action: cockroach.replication_constraints
  args: {}
  expect_exit: 0
- action: cockroach.replication_stats
  args: {}
  expect_exit: 0
- action: cockroach.statement_stats
  args: {}
  expect_exit: 0
- action: cockroach.store_status
  args: {}
  expect_exit: 0
- action: cockroach.table_ranges
  args:
    database: system
    table: users
  expect_exit: 0
- action: cockroach.table_row_counts
  args: {}
  expect_exit: 0
# Mutators — skipped by default (they change cluster state).
- action: cockroach.cancel_job
  args:
    job_id: "0"
  expect_exit:
  - 0
  - 1
  skip: mutator skipped by default (medium)
- action: cockroach.cancel_query
  args:
    query_id: "0"
  expect_exit:
  - 0
  - 1
  skip: mutator skipped by default (medium)
- action: cockroach.cancel_session
  args:
    session_id: "0"
  expect_exit:
  - 0
  - 1
  skip: mutator skipped by default (medium)
- action: cockroach.pause_job
  args:
    job_id: "0"
  expect_exit:
  - 0
  - 1
  skip: mutator skipped by default (medium)
- action: cockroach.resume_job
  args:
    job_id: "0"
  expect_exit:
  - 0
  - 1
  skip: mutator skipped by default (medium)
- action: cockroach.node_decommission
  args:
    node_id: "9"
  expect_exit:
  - 0
  - 1
  skip: mutator skipped by default (high)
- action: cockroach.node_recommission
  args:
    node_id: "9"
  expect_exit:
  - 0
  - 1
  skip: mutator skipped by default (high)
- action: cockroach.set_cluster_setting
  args:
    name: sql.defaults.distsql
    value: "off"
  expect_exit:
  - 0
  - 1
  skip: mutator skipped by default (critical)
