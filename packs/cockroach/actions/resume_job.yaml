schema_version: 1
id: cockroach.resume_job
title: Resume a paused job (RESUME JOB)
kind: exec
risk: medium
description: >
  Resume one paused job by id (from jobs). Use to continue a job paused with
  pause_job.
side_effects:
  - The target job resumes running.
args:
  - name: job_id
    type: integer
    required: true
    description: job_id from cockroach.jobs.
    validation:
      min: 1
      max: 9223372036854775807
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "cockroach sql --url \"$COCKROACH_URL\" --format=tsv -e \"RESUME JOB {{ args.job_id }}\""
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 4096
  max_stderr_bytes: 8192
examples:
  - title: Resume a job
    args:
      job_id: 891234567890123456
