schema_version: 1
id: cockroach.node_recommission
title: Recommission a node (cockroach node recommission)
kind: exec
risk: high
description: >
  Reverse an in-progress decommission so the node resumes accepting replicas.
  Only valid before the decommission completes. Use to abort a decommission
  started by mistake.
side_effects:
  - The node resumes accepting replicas.
args:
  - name: node_id
    type: integer
    required: true
    description: Node id to recommission (from node_status).
    validation:
      min: 1
      max: 65535
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "cockroach node recommission {{ args.node_id }} --url \"$COCKROACH_URL\""
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 16384
  max_stderr_bytes: 8192
examples:
  - title: Recommission node 4
    args:
      node_id: 4
