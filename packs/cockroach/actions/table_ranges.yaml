schema_version: 1
id: cockroach.table_ranges
title: Show range count + size for one table
kind: exec
risk: low
description: >
  Show the ranges backing one table — range id, leaseholder, size in MB, and
  replica nodes — via SHOW RANGES ... WITH DETAILS. Use to find a table's data
  size and how its ranges are spread across nodes.
side_effects:
  - One read-only SHOW RANGES query.
  - Read-only.
args:
  - name: database
    type: string
    required: true
    description: Database name.
    validation:
      pattern: "^[a-zA-Z_][a-zA-Z0-9_]{0,127}$"
  - name: table
    type: string
    required: true
    description: Table name.
    validation:
      pattern: "^[a-zA-Z_][a-zA-Z0-9_]{0,127}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "cockroach sql --url \"$COCKROACH_URL\" --format=tsv -e \"SELECT range_id, lease_holder, range_size_mb, replicas FROM [SHOW RANGES FROM TABLE {{ args.database }}.{{ args.table }} WITH DETAILS]\""
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 131072
  max_stderr_bytes: 8192
examples:
  - title: Ranges of movr.rides
    args:
      database: movr
      table: rides
