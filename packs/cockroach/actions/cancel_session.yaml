schema_version: 1
id: cockroach.cancel_session
title: Cancel a session (CANCEL SESSION)
kind: exec
risk: medium
description: >
  End one client session by its session_id (from cluster_sessions) — its
  current query is cancelled and the connection closed; an open transaction is
  rolled back. Use to evict a stuck or abusive connection.
side_effects:
  - The target session is terminated and its connection closed.
  - Any open transaction on it is rolled back.
args:
  - name: session_id
    type: string
    required: true
    description: session_id from cockroach.cluster_sessions.
    validation:
      pattern: "^[0-9a-f]{16,40}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "cockroach sql --url \"$COCKROACH_URL\" --format=tsv -e \"CANCEL SESSION '{{ args.session_id }}'\""
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 4096
  max_stderr_bytes: 8192
examples:
  - title: Cancel a session
    args:
      session_id: "16f8c5a0b2c3d4e50000000000000001"
