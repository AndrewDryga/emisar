schema_version: 1
id: cockroach.cancel_job
title: Cancel a job (CANCEL JOB)
kind: exec
risk: medium
description: >
  Cancel one job by id (from jobs). The job stops and rolls back any partial
  work where applicable. Use to abort a wrong or stuck schema change / backup /
  import.
side_effects:
  - The target job is cancelled and begins reverting.
args:
  - name: job_id
    type: integer
    required: true
    description: job_id from cockroach.jobs.
    validation:
      min: 1
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "cockroach sql --url \"$COCKROACH_URL\" --format=tsv -e \"CANCEL JOB {{ args.job_id }}\""
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 4096
  max_stderr_bytes: 8192
examples:
  - title: Cancel a job
    args:
      job_id: 891234567890123456
