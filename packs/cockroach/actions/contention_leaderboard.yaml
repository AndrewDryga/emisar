schema_version: 1
id: cockroach.contention_leaderboard
title: Show most-contended objects
kind: exec
risk: low
description: >
  Show the most-contended tables/indexes by cumulative contention time, from
  crdb_internal.cluster_contention_events. Use to find the hotspot behind
  widespread contention.
side_effects:
  - One read-only SELECT on crdb_internal.cluster_contention_events.
  - Read-only.
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "cockroach sql --url \"$COCKROACH_URL\" --format=tsv -e \"SELECT table_id, index_id, num_contention_events, cumulative_contention_time FROM crdb_internal.cluster_contention_events ORDER BY cumulative_contention_time DESC LIMIT 50\""
  timeout: 20s
output:
  parser: text
  max_stdout_bytes: 32768
  max_stderr_bytes: 8192
examples:
  - title: Contention leaderboard
    args: {}
