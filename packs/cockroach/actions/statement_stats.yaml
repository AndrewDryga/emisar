schema_version: 1
id: cockroach.statement_stats
title: Show top statement fingerprints by exec count
kind: exec
risk: low
description: >
  Show the busiest statement fingerprints — application, execution count, mean
  service latency, and the query text — from crdb_internal.statement_statistics
  (the data behind the DB Console's Statements page). Use to find the
  highest-volume or slowest statements.
side_effects:
  - One read-only SELECT on crdb_internal.statement_statistics.
  - Read-only.
args:
  - name: limit
    type: integer
    required: false
    default: 25
    description: Max fingerprints to return.
    validation:
      min: 1
      max: 200
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "cockroach sql --url \"$COCKROACH_URL\" --format=tsv -e \"SELECT app_name, (statistics->'statistics'->>'cnt')::INT AS count, (statistics->'statistics'->'svcLat'->>'mean')::FLOAT AS mean_svc_lat_s, left(metadata->>'query',200) AS query FROM crdb_internal.statement_statistics ORDER BY (statistics->'statistics'->>'cnt')::INT DESC LIMIT {{ args.limit }}\""
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 131072
  max_stderr_bytes: 8192
examples:
  - title: Busiest statements
    args: {}
