schema_version: 1
id: cockroach.cluster_queries
title: Show running queries cluster-wide
kind: exec
risk: low
description: >
  Show in-flight queries across all nodes (the SHOW CLUSTER QUERIES surface) —
  query id, node, user, start time, client address, application, and the
  query text (truncated). Use to find a long-running or runaway query.
side_effects:
  - One read-only SELECT on crdb_internal.cluster_queries.
  - Read-only.
args:
  - name: limit
    type: integer
    required: false
    default: 100
    description: Max rows to return.
    validation:
      min: 1
      max: 1000
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "cockroach sql --url \"$COCKROACH_URL\" --format=tsv -e \"SELECT query_id, node_id, user_name, start, client_address, application_name, left(query,200) AS query FROM crdb_internal.cluster_queries ORDER BY start ASC LIMIT {{ args.limit }}\""
  timeout: 20s
output:
  parser: text
  max_stdout_bytes: 131072
  max_stderr_bytes: 8192
examples:
  - title: Oldest running queries
    args: {}
