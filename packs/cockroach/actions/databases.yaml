schema_version: 1
id: cockroach.databases
title: List databases (SHOW DATABASES)
kind: exec
risk: low
description: >
  List the cluster's databases. Cheap connectivity + auth check, and the
  pack's verify action.
side_effects:
  - One SHOW DATABASES query.
  - Read-only.
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "cockroach sql --url \"$COCKROACH_URL\" --format=tsv -e \"SHOW DATABASES\""
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 32768
  max_stderr_bytes: 8192
examples:
  - title: All databases
    args: {}
