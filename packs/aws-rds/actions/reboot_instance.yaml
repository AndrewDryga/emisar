schema_version: 1
id: rds.reboot_instance
title: aws rds reboot-db-instance
kind: exec
risk: high
description: Reboots one RDS instance. Brief downtime.
side_effects:
  - Brief downtime (~30-120 seconds for non-Multi-AZ).
  - Multi-AZ reboot can failover if --force-failover used.
args:
  - name: instance
    type: string
    required: true
    description: Instance identifier.
    validation:
      pattern: "^[a-zA-Z][a-zA-Z0-9\\-]{0,62}$"
execution:
  command:
    binary: aws
    argv: ["rds", "reboot-db-instance", "--db-instance-identifier", "{{ args.instance }}", "--output", "json"]
  timeout: 60s
output:
  parser: json
  max_stdout_bytes: 16384
  max_stderr_bytes: 8192
examples:
  - title: Reboot one
    args:
      instance: "prod-postgres-1"
