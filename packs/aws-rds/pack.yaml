schema_version: 1
id: aws-rds
name: AWS RDS operations
version: 0.1.2
description: >
  RDS instance + cluster inventory, parameter groups, snapshots, plus
  narrow operator actions (reboot, create-snapshot). Auth via AWS_PROFILE.
  Does NOT include delete-instance/delete-cluster.
vendor: emisar
homepage: https://github.com/andrewdryga/emisar

requires:
  os: [linux]
  binaries: [aws]

setup:
  summary: >
    Drives the aws CLI on the runner host. It resolves credentials and
    region from its own environment or ~/.aws config — the runner only
    forwards the variables you allowlist in inherit_env.
  env:
    - name: AWS_PROFILE
      description: Named profile in ~/.aws/config and ~/.aws/credentials. Omit to use the default profile or static-key/instance-role auth.
      example: prod
    - name: AWS_REGION
      required: true
      description: Region to operate in; RDS is regional, so calls fail without it.
      example: us-east-1
    - name: AWS_ACCESS_KEY_ID
      description: Static access key. Use instead of a profile; pair with AWS_SECRET_ACCESS_KEY.
    - name: AWS_SECRET_ACCESS_KEY
      description: Secret for AWS_ACCESS_KEY_ID.
    - name: AWS_SESSION_TOKEN
      description: Session token for temporary (STS) credentials.
  notes:
    - "Inventory needs rds:Describe* (read-only). The operator actions reboot_instance / create_snapshot additionally need rds:RebootDBInstance / CreateDBSnapshot."
    - "Alternative to env keys: an ~/.aws/credentials profile (read from disk, no inherit_env entry) or, on EC2/ECS, the instance/task role from instance metadata (no credentials needed at all)."
  verify: rds.list_instances

actions:
  - actions/list_instances.yaml
  - actions/describe_instance.yaml
  - actions/list_clusters.yaml
  - actions/describe_cluster.yaml
  - actions/list_snapshots.yaml
  - actions/parameter_groups.yaml
  - actions/create_snapshot.yaml
  - actions/reboot_instance.yaml
