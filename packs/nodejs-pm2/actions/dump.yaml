schema_version: 1
id: pm2.dump
title: pm2 dump
kind: exec
risk: medium
description: Persists the current process list so PM2 resurrects it on boot.
side_effects:
  - Writes ~/.pm2/dump.pm2.
  - Future PM2 resurrects will use this snapshot.
args: []
execution:
  command:
    binary: pm2
    argv:
      - "dump"
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 8192
  max_stderr_bytes: 8192
examples:
  - title: Save startup list
    args: {}
