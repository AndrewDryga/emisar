schema_version: 1
id: pm2.describe
title: pm2 describe <name>
kind: exec
risk: low
description: Show config + runtime details for one process (status, restarts, uptime, script path, resources). Read-only. Per-process environment is projected out — use `pm2.env` for one process's effective env.
side_effects:
  - One PM2 IPC call.
  - Read-only.
args:
  - name: name
    type: string
    required: true
    description: Process name or id.
    validation:
      pattern: "^[a-zA-Z0-9_.\\-]{1,64}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "pm2 jlist | jq --arg n \"{{ args.name }}\" 'map(select(.name == $n or (.pm_id|tostring) == $n)) | map({name, pm_id, pid, monit, namespace: .pm2_env.namespace, status: .pm2_env.status, uptime: .pm2_env.pm_uptime, restarts: .pm2_env.restart_time, unstable_restarts: .pm2_env.unstable_restarts, mode: .pm2_env.exec_mode, instances: .pm2_env.instances, script: .pm2_env.pm_exec_path, cwd: .pm2_env.pm_cwd, interpreter: .pm2_env.exec_interpreter, node_args: .pm2_env.node_args, created_at: .pm2_env.created_at, version: .pm2_env.version, autorestart: .pm2_env.autorestart, max_memory_restart: .pm2_env.max_memory_restart})'"
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: Describe one
    args:
      name: "api"
