schema_version: 1
id: pm2.env
title: pm2 env <id>
kind: exec
risk: medium
description: Show effective environment for one process (post-merge of system + app env).
side_effects:
  - One PM2 IPC call.
  - Read-only — values may be redacted by audit rules.
args:
  - name: id
    type: integer
    required: true
    description: PM2 process id.
    validation:
      min: 0
      max: 1000
execution:
  command:
    binary: pm2
    argv:
      - "env"
      - "{{ args.id }}"
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 131072
  max_stderr_bytes: 8192
examples:
  - title: Env for id 0
    args:
      id: 0
