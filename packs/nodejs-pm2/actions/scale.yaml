schema_version: 1
id: pm2.scale
title: pm2 scale <name> <N>
kind: exec
risk: high
description: Sets the number of cluster-mode workers for one app. No-op for fork mode.
side_effects:
  - PM2 adds or removes worker processes.
  - Scale-down causes graceful worker shutdown.
args:
  - name: name
    type: string
    required: true
    description: Process name (cluster-mode).
    validation:
      pattern: "^[a-zA-Z0-9_.\\-]{1,64}$"
  - name: instances
    type: integer
    required: true
    description: Target worker count.
    validation:
      min: 1
      max: 128
execution:
  command:
    binary: pm2
    argv:
      - "scale"
      - "{{ args.name }}"
      - "{{ args.instances }}"
  timeout: 120s
output:
  parser: text
  max_stdout_bytes: 16384
  max_stderr_bytes: 8192
examples:
  - title: Scale to 4 workers
    args:
      name: "api"
      instances: 4
