schema_version: 1
id: pm2.logs
title: pm2 logs <name> --lines N --nostream
kind: exec
risk: low
description: Tails the last N stdout+stderr lines for one process.
side_effects:
  - Reads PM2 log files.
  - Read-only.
args:
  - name: name
    type: string
    required: true
    description: Process name or id.
    validation:
      pattern: "^[a-zA-Z0-9_.][a-zA-Z0-9_.\\-]{0,63}$"
  - name: lines
    type: integer
    required: false
    default: 200
    description: Lines to tail.
    validation:
      min: 1
      max: 5000
execution:
  command:
    binary: pm2
    argv:
      - "logs"
      - "{{ args.name }}"
      - "--lines"
      - "{{ args.lines }}"
      - "--nostream"
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 1048576
  max_stderr_bytes: 8192
examples:
  - title: Last 200 lines
    args:
      name: "api"
