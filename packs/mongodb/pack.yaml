schema_version: 1

id: mongodb
name: MongoDB operations
version: 0.2.0
description: >
  Replica-set + shard-cluster introspection, slow-query identification,
  collection stats, plus remediation surface (killOp, replSet stepDown,
  collection compact, dropIndex). Authenticates via MONGO_URI env var
  on the runner host.
vendor: emisar
homepage: https://github.com/andrewdryga/emisar

requires:
  os:
    - linux
  binaries:
    - mongosh

# `emisar pack suggest` detection — default process names / ports.
detect:
  processes:
    - mongod
  ports:
    - 27017

setup:
  summary: >
    Every action expands MONGO_URI on the runner host and passes it to mongosh
    as the connection string, so the host, port, replica set, auth database,
    and credentials all live in that single URI.
  env:
    - name: MONGO_URI
      required: true
      description: Full MongoDB connection string, including credentials and any auth/TLS options.
      example: "mongodb://opsuser:secret@db.internal:27017/?authSource=admin&replicaSet=rs0"
  notes:
    - mongosh does not read MONGO_URI on its own; the actions substitute it into the command line, so the user it encodes needs the privileges (clusterMonitor for reads, plus killOp/replSetStateChange/compact/dropIndex for the mutators) for the actions you enable.
    - Because the URI carries the credentials, it must be allowlisted in inherit_env for any action to reach the database.
  verify: mongo.server_status

actions:
  # Server state
  - actions/server_status.yaml
  - actions/build_info.yaml
  - actions/host_info.yaml
  - actions/get_parameter.yaml
  - actions/connections.yaml
  # Databases / collections
  - actions/db_list.yaml
  - actions/db_stats.yaml
  - actions/collection_list.yaml
  - actions/collection_stats.yaml
  - actions/index_stats.yaml
  - actions/explain_query.yaml
  # Replication
  - actions/replset_status.yaml
  - actions/replset_config.yaml
  - actions/oplog_size.yaml
  # Sharding
  - actions/shard_status.yaml
  - actions/balancer_status.yaml
  # Live ops / profiling
  - actions/current_op.yaml
  - actions/profiler_status.yaml
  - actions/top.yaml
  # Replication: lag, oplog window, elections, durability
  - actions/replset_lag.yaml
  - actions/replication_info.yaml
  - actions/election_metrics.yaml
  - actions/default_rw_concern.yaml
  # Saturation: cache, tickets, locks, connections, cursors
  - actions/wiredtiger_cache.yaml
  - actions/concurrent_transactions.yaml
  - actions/global_lock.yaml
  - actions/connection_stats.yaml
  - actions/cursor_stats.yaml
  # Live ops: long-running ops, profiler reads, index builds
  - actions/long_running_ops.yaml
  - actions/profile_slow_queries.yaml
  - actions/index_builds.yaml
  # Mutators
  - actions/kill_op.yaml
  - actions/replset_stepdown.yaml
  - actions/compact_collection.yaml
  - actions/drop_index.yaml
