schema_version: 1
id: mongo.balancer_status
title: sh.getBalancerState()
kind: exec
risk: low
description: Whether the balancer is enabled + currently running.
side_effects:
  - Reads sharding metadata.
  - Read-only.
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "mongosh \"$MONGO_URI\" '--quiet' '--eval' 'JSON.stringify({enabled:sh.getBalancerState(),running:sh.isBalancerRunning()})'"
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 4096
  max_stderr_bytes: 8192
examples:
  - title: Balancer state
    args: {}
