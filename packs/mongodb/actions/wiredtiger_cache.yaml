schema_version: 1
id: mongo.wiredtiger_cache
title: WiredTiger cache pressure (serverStatus.wiredTiger.cache)
kind: exec
risk: low
description: >
  WiredTiger cache pressure — bytes currently in cache vs maximum configured,
  tracked dirty bytes, pages evicted by application threads, and pages read
  into cache. Application-thread eviction and a full dirty cache indicate
  memory pressure.
side_effects:
  - One serverStatus command.
  - Read-only.
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "mongosh \"$MONGO_URI\" '--quiet' '--eval' 'JSON.stringify(db.serverStatus().wiredTiger.cache)'"
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192
examples:
  - title: Cache stats
    args: {}
