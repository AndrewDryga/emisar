schema_version: 1
id: mongo.replset_status
title: rs.status()
kind: exec
risk: low
description: Show replica set member health, lag, last applied optime.
side_effects:
  - One replSetGetStatus.
  - Read-only.
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "mongosh \"$MONGO_URI\" '--quiet' '--eval' 'JSON.stringify(rs.status())'"
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 131072
  max_stderr_bytes: 8192
examples:
  - title: RS status
    args: {}
