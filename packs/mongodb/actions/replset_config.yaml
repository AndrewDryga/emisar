schema_version: 1
id: mongo.replset_config
title: rs.conf()
kind: exec
risk: low
description: Show replica set configuration — members, votes, priorities, settings.
side_effects:
  - One replSetGetConfig.
  - Read-only.
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "mongosh '--nodb' '--quiet' '--eval' 'db=new Mongo(process.env.MONGO_URI).getDB(\"admin\");JSON.stringify(rs.conf())'"
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192
examples:
  - title: RS config
    args: {}
