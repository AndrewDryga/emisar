schema_version: 1
id: mongo.server_status
title: db.serverStatus()
kind: exec
risk: low
description: 'Show top-level server metrics: connections, ops counters, memory, cluster role.'
side_effects:
  - One serverStatus command.
  - Read-only.
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "mongosh \"$MONGO_URI\" '--quiet' '--eval' 'JSON.stringify(db.serverStatus())'"
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: Full server status
    args: {}
