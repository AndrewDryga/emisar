schema_version: 1
id: mongo.replication_info
title: Oplog time window (db.getReplicationInfo)
kind: exec
risk: low
description: >
  Show oplog time window — logSizeMB, usedMB, timeDiff / timeDiffHours, tFirst,
  tLast. How much history the oplog retains, which bounds how long a secondary
  can be down before it needs a full resync. Distinct from oplog size.
side_effects:
  - Reads oplog metadata.
  - Read-only.
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "mongosh \"$MONGO_URI\" '--quiet' '--eval' 'JSON.stringify(db.getReplicationInfo())'"
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 8192
  max_stderr_bytes: 8192
examples:
  - title: Oplog window
    args: {}
