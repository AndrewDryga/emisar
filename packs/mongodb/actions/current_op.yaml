schema_version: 1
id: mongo.current_op
title: db.currentOp()
kind: exec
risk: low
description: 'List in-flight operations. The canonical "what is the server doing right now?" check.'
side_effects:
  - One currentOp command.
  - Read-only.
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "mongosh '--nodb' '--quiet' '--eval' 'db=new Mongo(process.env.MONGO_URI).getDB(\"admin\");JSON.stringify(db.currentOp({active:true}))'"
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: Live ops
    args: {}
