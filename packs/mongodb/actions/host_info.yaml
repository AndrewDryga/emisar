schema_version: 1
id: mongo.host_info
title: hostInfo
kind: exec
risk: low
description: Show host CPU, memory, NUMA layout, OS.
side_effects:
  - One hostInfo command.
  - Read-only.
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "mongosh '--nodb' '--quiet' '--eval' 'db=new Mongo(process.env.MONGO_URI).getDB(\"admin\");JSON.stringify(db.adminCommand({hostInfo:1}))'"
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 16384
  max_stderr_bytes: 8192
examples:
  - title: Host info
    args: {}
