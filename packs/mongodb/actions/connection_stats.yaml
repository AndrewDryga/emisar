schema_version: 1
id: mongo.connection_stats
title: Incoming connection saturation (serverStatus.connections)
kind: exec
risk: low
description: >
  Show incoming connection counts — current, available, active, totalCreated.
  Approaching the available limit means new clients will be refused. Distinct
  from connections (connPoolStats), which is the outgoing pool.
side_effects:
  - One serverStatus command.
  - Read-only.
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "mongosh '--nodb' '--quiet' '--eval' 'db=new Mongo(process.env.MONGO_URI).getDB(\"admin\");JSON.stringify(db.serverStatus().connections)'"
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 8192
  max_stderr_bytes: 8192
examples:
  - title: Connection counts
    args: {}
