schema_version: 1

id: nic
name: NIC / ethtool diagnostics
version: 0.1.0
description: >
  Inspect physical network interface cards via ethtool: driver and
  firmware versions across every NIC (the "what firmware is my i40e fleet
  running?" check), plus per-interface link settings, hardware counters,
  offload features, and ring-buffer sizes. Read-only — no ethtool SET
  operations.
vendor: emisar
homepage: https://github.com/andrewdryga/emisar

requires:
  os:
    - linux
  binaries:
    - ethtool

# `emisar pack suggest` detection — ethtool is the tool these actions
# wrap; suggest the pack on hosts that have it installed.
detect:
  binaries:
    - ethtool

setup:
  summary: >
    Reads NIC driver / firmware / link state via ethtool. No credentials
    needed, and nothing here changes NIC configuration — every action is a
    read-only ethtool GET, which runs as the unprivileged runner user (the
    kernel allows ethtool GETs, including statistics, without
    CAP_NET_ADMIN).
  notes:
    - "Read-only by construction: the pack uses only ethtool GET flags (-i, -S, -k, -g, and bare link), never the config-changing counterparts (-K, -G, -A, -C, -s). Interface arguments are validated to start with a letter, so a value can't be slipped in as an ethtool option flag."
    - "Interface arguments are physical device names (e.g. eth0, eno1, enp24s0f0). nic.firmware scans every NIC that has a /sys/class/net/*/device link and skips virtual interfaces (lo, veth, bonds, bridges)."
  verify: nic.firmware

actions:
  - actions/firmware.yaml
  - actions/driver_info.yaml
  - actions/link.yaml
  - actions/stats.yaml
  - actions/features.yaml
  - actions/ring.yaml
