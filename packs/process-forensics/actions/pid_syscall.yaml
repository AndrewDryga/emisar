schema_version: 1
id: forensics.pid_syscall
title: /proc/PID/syscall
kind: exec
risk: low
description: Show current syscall (or "running" if user-space). Snapshot of where the kernel is for one thread.
side_effects:
  - One /proc read.
  - Read-only.
args:
  - name: pid
    type: integer
    required: true
    description: PID.
    validation:
      min: 1
      max: 4194304
execution:
  command:
    binary: cat
    argv:
      - "/proc/{{ args.pid }}/syscall"
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 1024
  max_stderr_bytes: 8192
examples:
  - title: Current syscall
    args:
      pid: 1
