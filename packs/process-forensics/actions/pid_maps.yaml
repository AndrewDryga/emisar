schema_version: 1
id: forensics.pid_maps
title: /proc/PID/maps
kind: exec
risk: low
description: Memory map for one PID. Use to see loaded libraries + heap/stack ranges.
side_effects:
  - One /proc read.
  - Read-only.
args:
  - name: pid
    type: integer
    required: true
    description: PID.
    validation:
      min: 1
      max: 4194304
execution:
  command:
    binary: cat
    argv:
      - "/proc/{{ args.pid }}/maps"
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 524288
  max_stderr_bytes: 8192
examples:
  - title: Map of PID 1
    args:
      pid: 1
