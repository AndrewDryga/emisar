schema_version: 1
id: forensics.pid_smaps_summary
title: /proc/PID/smaps_rollup
kind: exec
risk: low
description: Show aggregated memory stats — Rss, Pss, Shared, Private. Better than RSS for diagnosing memory pressure.
side_effects:
  - One /proc read.
  - Read-only.
search_terms:
  - memory leak
  - process memory usage
args:
  - name: pid
    type: integer
    required: true
    description: PID.
    validation:
      min: 1
      max: 4194304
execution:
  command:
    binary: cat
    argv:
      - "/proc/{{ args.pid }}/smaps_rollup"
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 16384
  max_stderr_bytes: 8192
examples:
  - title: Memory rollup
    args:
      pid: 1
