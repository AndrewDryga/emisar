schema_version: 1
id: forensics.pid_open_files
title: lsof -p <pid>
kind: exec
risk: low
description: List all open files (regular, sockets, pipes) for one PID. Richer than /proc/PID/fd alone.
side_effects:
  - lsof walks /proc + kernel tables.
  - Read-only.
search_terms:
  - fd leak
  - file descriptor leak
  - too many open files
args:
  - name: pid
    type: integer
    required: true
    description: PID.
    validation:
      min: 1
      max: 4194304
execution:
  command:
    binary: lsof
    argv:
      - "-p"
      - "{{ args.pid }}"
  timeout: 60s
output:
  parser: text
  max_stdout_bytes: 1048576
  max_stderr_bytes: 8192
examples:
  - title: Open files for PID 1
    args:
      pid: 1
