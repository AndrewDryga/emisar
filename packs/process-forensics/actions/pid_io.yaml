schema_version: 1
id: forensics.pid_io
title: /proc/PID/io
kind: exec
risk: low
description: Show cumulative read/write byte counts for one PID. Use to identify IO hogs.
side_effects:
  - One /proc read.
  - Read-only.
search_terms:
  - io hog
  - disk io per process
args:
  - name: pid
    type: integer
    required: true
    description: PID.
    validation:
      min: 1
      max: 4194304
execution:
  command:
    binary: cat
    argv:
      - "/proc/{{ args.pid }}/io"
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 4096
  max_stderr_bytes: 8192
examples:
  - title: IO of PID 1
    args:
      pid: 1
