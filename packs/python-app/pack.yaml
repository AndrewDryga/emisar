schema_version: 1

id: python-app
name: Python application runtime
version: 0.1.3
description: >
  Inspect a Python deployment — interpreter + venv state, pip
  inventory + freeze, dependency conflicts, outdated packages, sys.path.
  Read-only. Most actions act on the venv at PY_VENV env var
  (default /opt/app/venv).
vendor: emisar
homepage: https://github.com/andrewdryga/emisar

requires:
  os:
    - linux

setup:
  summary: >
    Inspects a local Python deployment on the runner host — interpreter,
    venv, and pip state — no credentials needed.
  env:
    - name: PY_VENV
      description: Path to the application's virtualenv; the venv-scoped actions run its bin/python and bin/pip. Optional; defaults to /opt/app/venv. Add it to the runner's inherit_env if you override it.
      default: "/opt/app/venv"
  notes:
    - "The runner uid must be able to read the venv and the interpreter it points at; system actions use /usr/bin/python3."
  verify: py.python_version_system

actions:
  - actions/python_version_system.yaml
  - actions/venv_python_version.yaml
  - actions/pip_list.yaml
  - actions/pip_freeze.yaml
  - actions/pip_show.yaml
  - actions/pip_check.yaml
  - actions/pip_outdated.yaml
  - actions/sys_path.yaml
  - actions/site_packages_du.yaml
  - actions/pip_cache_info.yaml
