schema_version: 1
id: es.flush_synced
title: POST /<index>/_flush
kind: exec
risk: medium
description: Triggers a synced flush — speeds up recovery if the shard later restarts.
side_effects:
  - Brief pause to write to disk.
  - Updates sync IDs.
args:
  - name: index
    type: string
    required: true
    description: Index name.
    validation:
      pattern: "^[a-zA-Z0-9_.\\-]{1,255}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "{ printf 'Authorization: Basic '; printf '%s:%s' \"$ELASTIC_USER\" \"$ELASTIC_PASSWORD\" | base64 | tr -d '\\n'; printf '\\n'; } | curl -sS -H @- -XPOST \"${ELASTIC_URL:-http://127.0.0.1:9200}/{{ args.index }}/_flush?pretty\""
  timeout: 5m
output:
  parser: json
  max_stdout_bytes: 8192
  max_stderr_bytes: 8192
examples:
  - title: Synced flush
    args:
      index: "logs-2026-06-01"
