schema_version: 1
id: es.flush_synced
title: POST /<index>/_flush (flush index)
kind: exec
risk: medium
description: >
  Flushes the index — forces a Lucene commit so the translog is cleared, which
  speeds recovery if a shard later restarts. Plain flush; the synced-flush API
  (/_flush/synced, sync IDs) was deprecated in 7.6 and removed in ES 8.0 — a
  normal flush gives the same recovery benefit there.
side_effects:
  - Brief pause to write segments to disk.
args:
  - name: index
    type: string
    required: true
    description: Index name.
    validation:
      pattern: "^[a-zA-Z0-9_.\\-]{1,255}$"
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "{ printf 'Authorization: Basic '; printf '%s:%s' \"$ELASTIC_USER\" \"$ELASTIC_PASSWORD\" | base64 | tr -d '\\n'; printf '\\n'; } | curl -sS -H @- -XPOST \"${ELASTIC_URL:-http://127.0.0.1:9200}/{{ args.index }}/_flush?pretty\""
  timeout: 5m
output:
  parser: json
  max_stdout_bytes: 8192
  max_stderr_bytes: 8192
examples:
  - title: Flush an index
    args:
      index: "logs-2026-06-01"
