schema_version: 1
id: envoy.config_dump
title: GET /config_dump
kind: exec
risk: low
description: >
  Dump full xDS config — bootstrap, clusters, routes, listeners. This
  surfaces the entire effective config, which can carry secrets (TLS
  private keys / SDS material, upstream credentials, auth headers). The
  runner's redaction is a fail-closed backstop, not a guarantee — it is
  pattern-bound and can miss a bespoke secret whose name and value match
  no rule.
side_effects:
  - One admin GET.
  - Read-only, but exposes the full xDS config (may include secrets).
args: []
execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "curl -sS \"${ENVOY_ADMIN:-http://127.0.0.1:9901}/config_dump?include_eds=true\""
  timeout: 30s
output:
  parser: json
  max_stdout_bytes: 16777216
  max_stderr_bytes: 8192
examples:
  - title: Full config
    args: {}
