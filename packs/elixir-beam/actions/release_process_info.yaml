schema_version: 1
id: beam.release_process_info
title: Elixir release process info
kind: script
risk: low
description: Show selected process_info fields for one BEAM PID in the running release.
side_effects:
  - Resolves the target release from running BEAM processes (reads /proc; docker exec when container is set).
  - One release rpc call with a fixed expression.
  - Does not read process dictionaries or mailbox contents.
  - Read-only.
args:
  - name: erlang_pid
    type: string
    required: true
    description: BEAM PID in <A.B.C> form.
    validation:
      pattern: "^<[0-9]+\\.[0-9]+\\.[0-9]+>$"
      max_length: 32
  - name: container
    type: string
    required: false
    default: ""
    description: Docker container name or ID when the release runs inside a container (see beam.release_targets); omit for a release running directly on the host.
    validation:
      pattern: "^([A-Za-z0-9][A-Za-z0-9_.-]{0,127})?$"
      max_length: 128
  - name: release
    type: string
    required: false
    default: ""
    description: Release name when several Elixir releases run on the target (see beam.release_targets); omit when only one runs or ELIXIR_RELEASE_CTL pins the target.
    validation:
      pattern: "^([a-z][a-z0-9_]{0,63})?$"
      max_length: 64
execution:
  script:
    path: scripts/release_ctl.sh
    interpreter: /bin/bash
  argv:
    - "--mode"
    - "process_info"
    - "--erlang-pid"
    - "{{ args.erlang_pid }}"
    - "--container"
    - "{{ args.container }}"
    - "--release"
    - "{{ args.release }}"
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192
examples:
  - title: Process info for PID <0.123.0>
    args:
      erlang_pid: "<0.123.0>"
