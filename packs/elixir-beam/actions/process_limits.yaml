schema_version: 1
id: beam.process_limits
title: BEAM process limits
kind: exec
risk: low
description: Show Linux resource limits for a BEAM process.
side_effects:
  - One /proc limits read.
  - Read-only.
args:
  - name: pid
    type: integer
    required: true
    description: BEAM OS process PID.
    validation:
      min: 1
      max: 4194304
execution:
  command:
    binary: cat
    argv:
      - "/proc/{{ args.pid }}/limits"
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 16384
  max_stderr_bytes: 8192
examples:
  - title: Limits for PID 4321
    args:
      pid: 4321
