schema_version: 1
id: beam.process_tree
title: BEAM process tree
kind: script
risk: low
description: Show ancestors and descendants for a BEAM OS process without command-line arguments.
side_effects:
  - Reads the process table.
  - Does not print command-line arguments or environment variables.
  - Read-only.
args:
  - name: pid
    type: integer
    required: true
    description: BEAM OS process PID.
    validation:
      min: 1
      max: 4194304
execution:
  script:
    path: scripts/process_tree.sh
    interpreter: /bin/bash
  argv:
    - "--pid"
    - "{{ args.pid }}"
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192
examples:
  - title: Tree for PID 4321
    args:
      pid: 4321
