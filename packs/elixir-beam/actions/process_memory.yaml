schema_version: 1
id: beam.process_memory
title: BEAM process memory summary
kind: script
risk: low
description: Show Linux /proc memory, fd, thread, and mapping counts for a BEAM process.
side_effects:
  - Reads selected /proc files for one PID.
  - Does not read process argv, environment, memory contents, or file descriptor targets.
  - Read-only.
args:
  - name: pid
    type: integer
    required: true
    description: BEAM OS process PID.
    validation:
      min: 1
      max: 4194304
execution:
  script:
    path: scripts/process_memory.sh
    interpreter: /bin/bash
  argv:
    - "--pid"
    - "{{ args.pid }}"
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192
examples:
  - title: Memory summary for PID 4321
    args:
      pid: 4321
