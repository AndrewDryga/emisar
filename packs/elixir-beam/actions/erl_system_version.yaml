schema_version: 1
id: beam.erl_system_version
title: Erlang/OTP system version
kind: exec
risk: low
description: Show the installed Erlang/OTP system version.
side_effects:
  - Starts a short-lived local Erlang VM.
  - Read-only.
args: []
execution:
  command:
    binary: erl
    argv:
      - "-noshell"
      - "-eval"
      - 'io:format("~s~n", [erlang:system_info(system_version)]), halt().'
  timeout: 10s
output:
  parser: text
  max_stdout_bytes: 4096
  max_stderr_bytes: 8192
examples:
  - title: Erlang system version
    args: {}
