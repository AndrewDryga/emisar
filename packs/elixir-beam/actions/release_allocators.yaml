schema_version: 1
id: beam.release_allocators
title: Elixir release memory allocators
kind: script
risk: low
description: Show BEAM memory allocator utilization for the running Elixir release with recon_alloc — allocated vs used bytes, the usage ratio, and a per-allocator breakdown for fragmentation analysis. Requires recon in the release (check with beam.release_debug_tools).
side_effects:
  - Resolves the target release from running BEAM processes (reads /proc; docker exec when container is set).
  - One release rpc call with a fixed expression.
  - Read-only.
args:
  - name: container
    type: string
    required: false
    default: ""
    description: Docker container name or ID when the release runs inside a container (see beam.release_targets); omit for a release running directly on the host.
    validation:
      pattern: "^([A-Za-z0-9][A-Za-z0-9_.-]{0,127})?$"
      max_length: 128
  - name: release
    type: string
    required: false
    default: ""
    description: Release name when several Elixir releases run on the target (see beam.release_targets); omit when only one runs or ELIXIR_RELEASE_CTL pins the target.
    validation:
      pattern: "^([a-z][a-z0-9_]{0,63})?$"
      max_length: 64
execution:
  script:
    path: scripts/release_ctl.sh
    interpreter: /bin/bash
  argv:
    - "--mode"
    - "allocators"
    - "--container"
    - "{{ args.container }}"
    - "--release"
    - "{{ args.release }}"
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192
examples:
  - title: Allocator utilization
    args: {}
