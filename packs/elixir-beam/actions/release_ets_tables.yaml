schema_version: 1
id: beam.release_ets_tables
title: Elixir release ETS tables
kind: script
risk: low
description: List ETS tables in the running Elixir release sorted by memory or row count, with owner, type, and a total-usage summary.
side_effects:
  - Resolves the target release from running BEAM processes (reads /proc; docker exec when container is set).
  - One release rpc call with a fixed expression.
  - Reads table metadata only, never table contents.
  - Read-only.
args:
  - name: limit
    type: integer
    required: false
    default: 50
    description: Maximum tables to return.
    validation:
      min: 1
      max: 500
  - name: sort_by
    type: string
    required: false
    default: memory
    description: Sort tables by memory footprint or row count.
    validation:
      enum:
        - memory
        - size
  - name: container
    type: string
    required: false
    default: ""
    description: Docker container name or ID when the release runs inside a container (see beam.release_targets); omit for a release running directly on the host.
    validation:
      pattern: "^([A-Za-z0-9][A-Za-z0-9_.-]{0,127})?$"
      max_length: 128
  - name: release
    type: string
    required: false
    default: ""
    description: Release name when several Elixir releases run on the target (see beam.release_targets); omit when only one runs or ELIXIR_RELEASE_CTL pins the target.
    validation:
      pattern: "^([a-z][a-z0-9_]{0,63})?$"
      max_length: 64
execution:
  script:
    path: scripts/release_ctl.sh
    interpreter: /bin/bash
  argv:
    - "--mode"
    - "ets_tables"
    - "--limit"
    - "{{ args.limit }}"
    - "--sort-by"
    - "{{ args.sort_by }}"
    - "--container"
    - "{{ args.container }}"
    - "--release"
    - "{{ args.release }}"
  timeout: 20s
output:
  parser: text
  max_stdout_bytes: 262144
  max_stderr_bytes: 8192
examples:
  - title: Biggest ETS tables by memory
    args: {}
  - title: Biggest tables by row count in a container
    args:
      sort_by: size
      container: my_app
