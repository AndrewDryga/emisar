schema_version: 1
id: beam.release_top_processes
title: Elixir release top BEAM processes
kind: script
risk: low
description: List top BEAM processes in the running release by memory, mailbox length, reductions, or heap size.
side_effects:
  - Resolves the target release from running BEAM processes (reads /proc; docker exec when container is set).
  - One release rpc call with a fixed expression.
  - Does not read process dictionaries or mailbox contents.
  - Read-only.
search_terms:
  - message queue backlog
  - mailbox growing
  - busiest processes
args:
  - name: limit
    type: integer
    required: false
    default: 25
    description: Maximum processes to return.
    validation:
      min: 1
      max: 100
  - name: sort_by
    type: string
    required: false
    default: memory
    description: Process metric to sort by.
    validation:
      enum:
        - memory
        - message_queue_len
        - reductions
        - total_heap_size
  - name: container
    type: string
    required: false
    default: ""
    description: Docker container name or ID when the release runs inside a container (see beam.release_targets); omit for a release running directly on the host.
    validation:
      pattern: "^([A-Za-z0-9][A-Za-z0-9_.-]{0,127})?$"
      max_length: 128
  - name: release
    type: string
    required: false
    default: ""
    description: Release name when several Elixir releases run on the target (see beam.release_targets); omit when only one runs or ELIXIR_RELEASE_CTL pins the target.
    validation:
      pattern: "^([a-z][a-z0-9_]{0,63})?$"
      max_length: 64
execution:
  script:
    path: scripts/release_ctl.sh
    interpreter: /bin/bash
  argv:
    - "--mode"
    - "top_processes"
    - "--limit"
    - "{{ args.limit }}"
    - "--sort-by"
    - "{{ args.sort_by }}"
    - "--container"
    - "{{ args.container }}"
    - "--release"
    - "{{ args.release }}"
  timeout: 20s
output:
  parser: text
  max_stdout_bytes: 262144
  max_stderr_bytes: 8192
examples:
  - title: Top processes by memory
    args:
      limit: 25
      sort_by: memory
  - title: Top processes by mailbox length
    args:
      limit: 25
      sort_by: message_queue_len
