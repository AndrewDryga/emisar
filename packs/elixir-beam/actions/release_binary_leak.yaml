schema_version: 1
id: beam.release_binary_leak
title: Elixir release binary leak check
kind: script
risk: medium
description: Check the running Elixir release for refc binary leaks with recon bin_leak — garbage-collects every process and reports which freed the most binary references. Requires recon in the release (check with beam.release_debug_tools).
side_effects:
  - Resolves the target release from running BEAM processes (reads /proc; docker exec when container is set).
  - Forces a garbage collection of every process in the release; expect a brief latency impact while it runs.
  - One release rpc call with a fixed expression.
  - Does not modify application data.
args:
  - name: limit
    type: integer
    required: false
    default: 10
    description: Number of top binary-releasing processes to report.
    validation:
      min: 1
      max: 100
  - name: container
    type: string
    required: false
    default: ""
    description: Docker container name or ID when the release runs inside a container (see beam.release_targets); omit for a release running directly on the host.
    validation:
      pattern: "^([A-Za-z0-9][A-Za-z0-9_.-]{0,127})?$"
      max_length: 128
  - name: release
    type: string
    required: false
    default: ""
    description: Release name when several Elixir releases run on the target (see beam.release_targets); omit when only one runs or ELIXIR_RELEASE_CTL pins the target.
    validation:
      pattern: "^([a-z][a-z0-9_]{0,63})?$"
      max_length: 64
execution:
  script:
    path: scripts/release_ctl.sh
    interpreter: /bin/bash
  argv:
    - "--mode"
    - "bin_leak"
    - "--limit"
    - "{{ args.limit }}"
    - "--container"
    - "{{ args.container }}"
    - "--release"
    - "{{ args.release }}"
  timeout: 30s
  timeout_min: 10s
  timeout_max: 60s
output:
  parser: text
  max_stdout_bytes: 131072
  max_stderr_bytes: 8192
examples:
  - title: Top 10 binary-leak suspects
    args: {}
