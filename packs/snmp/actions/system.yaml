schema_version: 1
id: snmp.system
title: snmpwalk system group (1.3.6.1.2.1.1)
kind: script
risk: low
description: >
  Show the SNMP system group of a device — sysDescr (model/OS), sysObjectID,
  sysUpTime, sysContact, sysName, sysLocation. The first stop to confirm SNMP
  works and identify what the device is. Walks 1.3.6.1.2.1.1.
side_effects:
  - One read-only SNMP walk of the system group.
  - Read-only.
args:
  - name: host
    type: string
    required: true
    description: Target device hostname or IP (optionally host:port).
    validation:
      pattern: "^[a-zA-Z0-9][a-zA-Z0-9.\\-:]{0,252}$"
execution:
  script:
    path: scripts/snmpreq.sh
    interpreter: /bin/sh
  argv:
    - "snmpbulkwalk"
    - "{{ args.host }}"
    - "1.3.6.1.2.1.1"
  timeout: 15s
output:
  parser: text
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192
examples:
  - title: System group of a firewall
    args:
      host: "10.11.13.1"
