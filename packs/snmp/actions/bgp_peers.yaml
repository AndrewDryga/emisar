schema_version: 1
id: snmp.bgp_peers
title: snmpwalk BGP4-MIB bgpPeerTable (1.3.6.1.2.1.15.3)
kind: script
risk: low
description: >
  List BGP peers from BGP4-MIB bgpPeerTable — per-peer bgpPeerState (.2: 1=idle
  2=connect 3=active 4=opensent 5=openconfirm 6=established), bgpPeerAdminStatus
  (.3: 1=stop 2=start), bgpPeerRemoteAddr (.7), bgpPeerRemoteAs (.9), in/out
  updates (.10/.11), and bgpPeerFsmEstablishedTime (.16). The right read for
  "is the BGP session up?" on a router or firewall (e.g. pfSense + FRR) that
  this control plane can't reach by a native API. Walks 1.3.6.1.2.1.15.3.
side_effects:
  - One read-only SNMP walk of the BGP peer table.
  - Read-only.
args:
  - name: host
    type: string
    required: true
    description: Target device hostname or IP (optionally host:port).
    validation:
      pattern: "^[a-zA-Z0-9][a-zA-Z0-9.\\-:]{0,252}$"
execution:
  script:
    path: scripts/snmpreq.sh
    interpreter: /bin/sh
  argv:
    - "snmpbulkwalk"
    - "{{ args.host }}"
    - "1.3.6.1.2.1.15.3"
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 2097152
  max_stderr_bytes: 8192
examples:
  - title: BGP peers on the edge firewall
    args:
      host: "10.11.13.1"
