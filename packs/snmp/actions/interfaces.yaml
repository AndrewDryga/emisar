schema_version: 1
id: snmp.interfaces
title: snmpwalk IF-MIB ifTable (1.3.6.1.2.1.2.2)
kind: script
risk: low
description: >
  List a device's interfaces from IF-MIB ifTable — per-interface ifDescr (.2),
  ifType (.3), ifSpeed (.5), ifAdminStatus (.7: 1=up 2=down), ifOperStatus
  (.8: 1=up 2=down), and in/out octets (.10/.16) and errors (.14/.20). Use to
  spot a down or errored link. Walks 1.3.6.1.2.1.2.2.
side_effects:
  - One read-only SNMP walk of the interface table.
  - Read-only.
args:
  - name: host
    type: string
    required: true
    description: Target device hostname or IP (optionally host:port).
    validation:
      pattern: "^[a-zA-Z0-9.\\-:]{1,253}$"
execution:
  script:
    path: scripts/snmpreq.sh
    interpreter: /bin/sh
  argv:
    - "snmpbulkwalk"
    - "{{ args.host }}"
    - "1.3.6.1.2.1.2.2"
  timeout: 30s
output:
  parser: text
  max_stdout_bytes: 1048576
  max_stderr_bytes: 8192
examples:
  - title: Interface table of a switch
    args:
      host: "10.11.13.1"
