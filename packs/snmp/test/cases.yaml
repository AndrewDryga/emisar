# Cases run against the `snmpd` SUT (dev/test-packs/docker-compose.yaml — a minimal
# net-snmp snmpd, community "public" from defaults.env below). system / interfaces /
# get / walk return exit 0 with real data; bgp_peers / ospf_* return exit 0 with "No
# Such Object" on this non-FRR agent — they verify command assembly + clean handling;
# real rows need an FRR+AgentX SUT.
defaults:
  env:
    SNMP_VERSION: "2c"
    SNMP_COMMUNITY: public
cases:
- action: snmp.system
  args:
    host: snmpd
  expect_exit: 0
  # MIB-independent: the system walk returns the SUT's sysName VALUE ("snmpd-sut").
  # The pack is numeric-by-design (the Debian fleet ships no MIBs), so output is
  # OID-numeric, not symbolic — never assert a MIB label like "sysDescr".
  expect_stdout_contains: ["snmpd-sut"]
- action: snmp.interfaces
  args:
    host: snmpd
  expect_exit: 0
# Routing reads target the FRR+AgentX SUT (snmpd-frr), which exports BGP4-MIB /
# OSPF-MIB over AgentX — so these assert REAL rows, not just clean handling of an
# absent MIB. (The plain snmpd returns no-such-object for these OIDs.)
- action: snmp.bgp_peers
  args:
    host: snmpd-frr
  expect_exit: 0
  # bgpPeerRemoteAs (.9) for the configured neighbor 10.0.0.2 → AS 65001.
  expect_stdout_contains: ["iso.3.6.1.2.1.15.3.1.9.10.0.0.2 = INTEGER: 65001"]
- action: snmp.ospf_neighbors
  args:
    host: snmpd-frr
  expect_exit: 0
  # ospfNbrState (.6) = 8 (full) for the peer 192.168.99.2 across the veth adjacency.
  expect_stdout_contains: ["iso.3.6.1.2.1.14.10.1.6.192.168.99.2.0 = INTEGER: 8"]
- action: snmp.ospf_general
  args:
    host: snmpd-frr
  expect_exit: 0
  # ospfRouterId (.1) = 10.0.0.1.
  expect_stdout_contains: ["iso.3.6.1.2.1.14.1.1.0 = IpAddress: 10.0.0.1"]
- action: snmp.get
  args:
    host: snmpd
    oid: 1.3.6.1.2.1.1.5.0
  expect_exit: 0
- action: snmp.walk
  args:
    host: snmpd
    oid: 1.3.6.1.2.1.1
  expect_exit: 0
# Option-injection guard (m42): a host/OID beginning with "-" must be rejected by
# arg validation so it can never reach net-snmp as a flag (e.g. oid "-cPRIVATE"
# overriding the community, or "-Cr50000" forcing a GETBULK amplification burst).
# `action run` exits 0 for a validation failure — the verdict is in the JSON
# status, so we assert on stdout, not the exit code.
- action: snmp.get
  args:
    host: snmpd
    oid: "-cPRIVATE"
  expect_exit: 0
  expect_stdout_contains: ["validation_failed"]
- action: snmp.system
  args:
    host: "-cPRIVATE"
  expect_exit: 0
  expect_stdout_contains: ["validation_failed"]
