schema_version: 1

id: debugging.pid_cwd
title: Process cwd + exe
kind: exec
risk: low

description: >
  Returns the working directory and executable path of a PID. Use
  before drawing conclusions from a process name — `nginx` could be
  any of several binaries depending on PATH order.

side_effects:
  - Two /proc readlink calls.
  - Read-only.

args:
  - name: pid
    type: integer
    required: true
    description: PID to inspect.
    validation:
      min: 1
      max: 4194304

execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "echo cwd=$(readlink /proc/{{ args.pid }}/cwd); echo exe=$(readlink /proc/{{ args.pid }}/exe)"
  timeout: 5s

output:
  parser: text
  max_stdout_bytes: 8192
  max_stderr_bytes: 4096

examples:
  - title: Confirm exe path for PID 4321
    args:
      pid: 4321
