schema_version: 1

id: debugging.pid_environ
title: Process environment
kind: exec
risk: medium

description: >
  Show the full set of environment variables a PID was started with —
  reads /proc/<pid>/environ and turns NULs into newlines. This
  deliberately surfaces the process's entire environment, which
  commonly carries injected secrets (DB URLs, API keys, cloud
  credentials); scope it by policy and prefer pid_status / pid_limits
  when you don't need the values. The runner's redaction is a
  fail-closed backstop, not a guarantee — it is pattern-bound and can
  miss a bespoke secret whose name and value match no rule.

side_effects:
  - Reads /proc/<pid>/environ — requires runner uid to match or root.
  - Read-only, but exposes the process's full environment (may include secrets).

args:
  - name: pid
    type: integer
    required: true
    description: PID to inspect.
    validation:
      min: 1
      max: 4194304

execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "tr '\\0' '\\n' < /proc/{{ args.pid }}/environ"
  timeout: 5s

output:
  parser: text
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192

examples:
  - title: Show env for PID 4321
    args:
      pid: 4321
