schema_version: 1

id: debugging.pid_environ
title: Process environment
kind: exec
risk: low

description: >
  Returns the env vars a PID was started with. Reads
  /proc/<pid>/environ and turns NULs into newlines. Use to confirm a
  daemon picked up the config you think it did. Output will pass
  through the runner's redaction pipeline so secrets matching the
  configured rules are masked.

side_effects:
  - Reads /proc/<pid>/environ — requires runner uid to match or root.
  - Read-only.

args:
  - name: pid
    type: integer
    required: true
    description: PID to inspect.
    validation:
      min: 1
      max: 4194304

execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "tr '\\0' '\\n' < /proc/{{ args.pid }}/environ"
  timeout: 5s

output:
  parser: text
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192

examples:
  - title: Show env for PID 4321
    args:
      pid: 4321
