schema_version: 1

id: debugging.processes_top
title: Top processes by CPU
kind: exec
risk: low

description: >
  Returns the top N processes sorted by CPU%. Standard `ps` output —
  pid, user, %cpu, %mem, rss, command. Use as a first-touch check
  before going deeper with per-PID inspection.

side_effects:
  - One ps invocation.
  - Read-only.

args:
  - name: limit
    type: integer
    required: false
    default: 25
    description: How many processes to return.
    validation:
      min: 1
      max: 500

execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "ps -eo pid,user,pcpu,pmem,rss,etime,comm --sort=-pcpu | head -n {{ args.limit }}"
  timeout: 10s

output:
  parser: text
  max_stdout_bytes: 131072
  max_stderr_bytes: 8192

examples:
  - title: Top 25 by CPU
    args: {}
