schema_version: 1

id: debugging.lsof_port
title: Who owns a TCP port?
kind: exec
risk: low

description: >
  Returns the PID/process that has a given TCP port open (listening or
  connected), via `ss -tnp` (not lsof, despite the name). Use to answer
  "EADDRINUSE: who's on 8080?" or to confirm a stuck connection to an
  upstream. Read-only.

side_effects:
  - One ss invocation.
  - Read-only.

search_terms:
  - address already in use
  - port in use
  - port conflict

args:
  - name: port
    type: integer
    required: true
    description: TCP port number.
    validation:
      min: 1
      max: 65535

execution:
  command:
    binary: /bin/sh
    argv:
      - "-c"
      - "ss -tnp 'sport = :{{ args.port }} or dport = :{{ args.port }}'"
  timeout: 10s

output:
  parser: text
  max_stdout_bytes: 65536
  max_stderr_bytes: 8192

examples:
  - title: Who owns port 8080?
    args:
      port: 8080
