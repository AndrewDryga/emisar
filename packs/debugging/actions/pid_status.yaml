schema_version: 1

id: debugging.pid_status
title: Process /proc status block
kind: exec
risk: low

description: >
  Dumps /proc/<pid>/status — capabilities, uid/gid, signal masks,
  RSS, peak RSS, voluntary/involuntary context switches, OOM score.
  More detail than `ps` for one PID. Read-only.

side_effects:
  - One /proc read.
  - Read-only.

args:
  - name: pid
    type: integer
    required: true
    description: PID to inspect.
    validation:
      min: 1
      max: 4194304

execution:
  command:
    binary: cat
    argv:
      - "/proc/{{ args.pid }}/status"
  timeout: 5s

output:
  parser: text
  max_stdout_bytes: 16384
  max_stderr_bytes: 4096

examples:
  - title: Status for PID 4321
    args:
      pid: 4321
