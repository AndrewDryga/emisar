defaults:
  env:
    VL_URL: http://victoria-logs:9428
cases:
- action: vl.query
  args:
    query: "_time:5m *"
    limit: 10
  expect_exit: 0
- action: vl.hits
  args:
    query: "_time:1h *"
    step: 5m
  expect_exit: 0
- action: vl.stats_query
  args:
    query: "_time:1h * | stats count() logs"
  expect_exit: 0
- action: vl.stats_query_range
  args:
    query: "_time:6h * | stats count() logs"
    step: 1h
  expect_exit: 0
- action: vl.field_names
  args: {}
  expect_exit: 0
- action: vl.field_values
  args:
    field: level
  expect_exit: 0
- action: vl.streams
  args: {}
  expect_exit: 0
