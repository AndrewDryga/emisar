schema_version: 1
id: vl.query
title: GET /select/logsql/query
kind: script
risk: low
description: >
  Run a LogsQL query and return matching log entries as newline-delimited
  JSON. Bound the result with a _time filter in the query (e.g.
  "_time:5m error") and/or sort + limit — without a _time filter this
  scans all stored logs. The limit arg caps how many entries come back.
side_effects:
  - One read-only HTTP GET to the VictoriaLogs query API.
  - Read-only — never ingests or deletes logs.
args:
  - name: query
    type: string
    required: true
    description: 'LogsQL query, e.g. _time:5m error, or {app="api"} | stats by (level) count().'
    validation:
      pattern: '^[\s\S]{1,1000}$'
  - name: limit
    type: integer
    required: false
    default: 100
    description: Maximum number of log entries to return.
    validation:
      min: 1
      max: 10000
execution:
  script:
    path: scripts/vlget.sh
    interpreter: /bin/sh
  argv:
    - "/select/logsql/query"
    - "--data-urlencode"
    - "query={{ args.query }}"
    - "--data-urlencode"
    - "limit={{ args.limit }}"
  timeout: 60s
output:
  parser: text
  max_stdout_bytes: 4194304
  max_stderr_bytes: 8192
examples:
  - title: Recent errors
    args:
      query: "_time:15m error"
  - title: Errors for one app, newest first
    args:
      query: '_time:1h level:error app:api | sort by (_time) desc'
      limit: 50
